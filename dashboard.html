<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard – Auto Spares</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background: #e9ecef; padding: 20px; margin: 0; }
        .container { max-width: 1400px; margin: auto; }
        .header { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        h1 { color: #0a7c71; margin: 0; }
        .nav-links a { background: #0a7c71; color: white; padding: 8px 16px; text-decoration: none; border-radius: 6px; margin-left: 10px; display: inline-block; }
        .stats { display: flex; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
        .stat-card { background: white; flex: 1; min-width: 180px; padding: 20px; border-radius: 12px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .stat-card .number { font-size: 32px; font-weight: bold; color: #0a7c71; }
        .section { background: white; border-radius: 12px; padding: 20px; margin-bottom: 30px; }
        .section h2 { margin-top: 0; color: #0a7c71; border-bottom: 2px solid #dee2e6; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #dee2e6; padding: 8px; text-align: left; }
        th { background: #f1f3f5; }
        .low-stock { background-color: #fff3cd; }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-box input { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 6px; }
        button { background: #0a7c71; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
    </style>
    <script src="data-manager.js"></script>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🏠 Business Dashboard</h1>
        <div class="nav-links">
            <a href="customer-master.html">Customers</a>
            <a href="supplier-master.html">Suppliers</a>
            <a href="product-master.html">Products</a>
            <a href="invoice-stock.html">Sales Invoice</a>
            <a href="purchase-invoice-stock.html">Purchase Entry</a>
            <a href="payment-receipt.html">Payment</a>
            <a href="stock-report.html">Stock</a>
        </div>
    </div>
    <div class="stats" id="stats"></div>
    <div class="section">
        <h2>🔍 Search Any Party</h2>
        <div class="search-box"><input type="text" id="searchInput" placeholder="Name, Email, Phone..."><button onclick="searchParties()">Search</button><button onclick="clearSearch()">Clear</button></div>
        <div id="searchResults"></div>
    </div>
    <div style="display: flex; gap: 20px; flex-wrap: wrap;">
        <div class="section" style="flex:1;"><h2>📦 Low Stock Alerts</h2><div id="lowStock"></div></div>
        <div class="section" style="flex:1;"><h2>📋 Recent Sales</h2><div id="recentSales"></div></div>
    </div>
</div>
<script>
    function loadStats() {
        const customers = JSON.parse(localStorage.getItem('customers') || '[]');
        const suppliers = JSON.parse(localStorage.getItem('suppliers') || '[]');
        const products = getProducts();
        const sales = JSON.parse(localStorage.getItem('salesInvoices') || '[]');
        const custOut = customers.reduce((s,c) => s + (c.outstanding||0), 0);
        const suppOut = suppliers.reduce((s,sp) => s + (sp.outstanding||0), 0);
        document.getElementById('stats').innerHTML = `
            <div class="stat-card"><h3>Customers</h3><div class="number">${customers.length}</div></div>
            <div class="stat-card"><h3>Suppliers</h3><div class="number">${suppliers.length}</div></div>
            <div class="stat-card"><h3>Products</h3><div class="number">${products.length}</div></div>
            <div class="stat-card"><h3>Total Sales</h3><div class="number">${sales.length}</div></div>
            <div class="stat-card"><h3>Customer Outstanding</h3><div class="number">₹${custOut.toLocaleString()}</div></div>
            <div class="stat-card"><h3>Supplier Outstanding</h3><div class="number">₹${suppOut.toLocaleString()}</div></div>
        `;
        const lowStock = products.filter(p => (p.currentStock||0) <= (p.reorderLevel||0));
        let lowHtml = '<table><tr><th>Product</th><th>Stock</th><th>Reorder</th></tr>';
        lowStock.forEach(p => { lowHtml += `<tr class="low-stock"><td>${p.name}</td><td>${p.currentStock}</td><td>${p.reorderLevel}</td></tr>`; });
        lowHtml += '</table>';
        document.getElementById('lowStock').innerHTML = lowHtml || '<p>No low stock items.</p>';
        const recentSales = sales.slice(-5).reverse();
        let salesHtml = '<table><tr><th>Invoice</th><th>Date</th><th>Customer</th><th>Amount</th></tr>';
        recentSales.forEach(s => { salesHtml += `<tr><td>${s.invoiceNo}</td><td>${s.date}</td><td>${s.customerEmail}</td><td>₹${s.total.toLocaleString()}</td></tr>`; });
        salesHtml += '</table>';
        document.getElementById('recentSales').innerHTML = salesHtml || '<p>No sales yet.</p>';
    }
    function searchParties() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        if (!term) return;
        const customers = JSON.parse(localStorage.getItem('customers') || '[]');
        const suppliers = JSON.parse(localStorage.getItem('suppliers') || '[]');
        const matchedCust = customers.filter(c => c.name?.toLowerCase().includes(term) || c.email?.toLowerCase().includes(term));
        const matchedSupp = suppliers.filter(s => s.name?.toLowerCase().includes(term) || s.email?.toLowerCase().includes(term));
        let html = '<h3>Search Results</h3>';
        if (matchedCust.length) {
            html += '<h4>Customers</h4><table><tr><th>Name</th><th>Email</th><th>Outstanding</th><th></th></tr>';
            matchedCust.forEach(c => { html += `<tr><td>${c.name}</td><td>${c.email}</td><td>₹${(c.outstanding||0).toLocaleString()}</td><td><button onclick="viewCustomerLedger('${c.email}')">Ledger</button></td></tr>`; });
            html += '</table>';
        }
        if (matchedSupp.length) {
            html += '<h4>Suppliers</h4><table><tr><th>Name</th><th>Email</th><th>Outstanding</th><th></th></tr>';
            matchedSupp.forEach(s => { html += `<tr><td>${s.name}</td><td>${s.email}</td><td>₹${(s.outstanding||0).toLocaleString()}</td><td><button onclick="viewSupplierLedger('${s.email}')">Ledger</button></td></tr>`; });
            html += '</table>';
        }
        if (!matchedCust.length && !matchedSupp.length) html += '<p>No matches.</p>';
        document.getElementById('searchResults').innerHTML = html;
    }
    function clearSearch() { document.getElementById('searchInput').value = ''; document.getElementById('searchResults').innerHTML = ''; }
    function viewCustomerLedger(email) { localStorage.setItem('viewCustomerEmail', email); window.open('customer-ledger.html', '_blank'); }
    function viewSupplierLedger(email) { localStorage.setItem('viewSupplierEmail', email); window.open('supplier-ledger.html', '_blank'); }
    loadStats();
</script>
</body>
</html>
