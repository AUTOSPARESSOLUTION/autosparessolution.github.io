<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Payment Receipt</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: 'Roboto', sans-serif; background: #e9ecef; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; border-radius: 12px; padding: 20px; }
        h1 { color: #0a7c71; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; }
        button { background: #0a7c71; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; margin-right: 10px; }
        .warning { background: #fff3cd; border-left: 4px solid #ffc107; padding: 10px; margin-bottom: 15px; }
    </style>
</head>
<body>
<div class="container">
    <h1><i class="fas fa-edit"></i> Edit Payment Receipt</h1>
    <div id="warningMsg" class="warning" style="display:none;"></div>
    <div class="form-group"><label>Receipt No (read-only)</label><input type="text" id="receiptNo" readonly></div>
    <div class="form-group"><label>Customer Email (read-only)</label><input type="email" id="customerEmail" readonly></div>
    <div class="form-group"><label>Payment Date</label><input type="date" id="paymentDate"></div>
    <div class="form-group"><label>Amount (₹)</label><input type="number" id="amount" step="0.01"></div>
    <div class="form-group"><label>Payment Mode</label><select id="mode"><option value="Cash">Cash</option><option value="Bank Transfer">Bank Transfer</option><option value="Cheque">Cheque</option><option value="UPI">UPI</option></select></div>
    <div class="form-group"><label>Reference</label><input type="text" id="reference"></div>
    <div class="form-group"><label>Remarks</label><textarea id="remarks" rows="2"></textarea></div>
    <div><button onclick="saveEdit()">Save Changes</button><button onclick="window.close()">Cancel</button></div>
</div>

<script>
    let originalPayment = null;
    let paymentId = localStorage.getItem('editPaymentId');
    let payments = [];
    let customers = [];

    function loadPayment() {
        payments = JSON.parse(localStorage.getItem('customerPayments') || '[]');
        customers = JSON.parse(localStorage.getItem('customers') || '[]');
        originalPayment = payments.find(p => p.id == paymentId);
        if (!originalPayment) { alert('Payment not found'); window.close(); return; }
        document.getElementById('receiptNo').value = originalPayment.receiptNo;
        document.getElementById('customerEmail').value = originalPayment.customerEmail;
        document.getElementById('paymentDate').value = originalPayment.date;
        document.getElementById('amount').value = originalPayment.amount;
        document.getElementById('mode').value = originalPayment.mode || 'Cash';
        document.getElementById('reference').value = originalPayment.reference || '';
        document.getElementById('remarks').value = originalPayment.remarks || '';
    }

    function saveEdit() {
        const newAmount = parseFloat(document.getElementById('amount').value);
        if (isNaN(newAmount) || newAmount <= 0) { alert('Enter valid amount'); return; }
        const newDate = document.getElementById('paymentDate').value;
        const newMode = document.getElementById('mode').value;
        const newRef = document.getElementById('reference').value.trim() || 'N/A';
        const newRemarks = document.getElementById('remarks').value;

        const oldAmount = originalPayment.amount;
        const amountDiff = oldAmount - newAmount;  // positive if amount reduced

        // Update customer outstanding if amount changed
        if (oldAmount !== newAmount) {
            const customer = customers.find(c => c.email === originalPayment.customerEmail);
            if (customer) {
                // Outstanding should increase if amount reduced (less payment received)
                customer.outstanding = (customer.outstanding || 0) + amountDiff;
                if (customer.outstanding < 0) customer.outstanding = 0;
                localStorage.setItem('customers', JSON.stringify(customers));
                // Also update ledger entry for this payment (optional, but we'll update)
                let ledger = JSON.parse(localStorage.getItem('customerLedger') || '[]');
                const ledgerEntry = ledger.find(l => l.ref === originalPayment.receiptNo && l.type === 'payment');
                if (ledgerEntry) {
                    ledgerEntry.credit = newAmount;
                    ledgerEntry.balance = customer.outstanding;
                    ledgerEntry.narration = newRemarks || 'Payment edited';
                    localStorage.setItem('customerLedger', JSON.stringify(ledger));
                }
                showWarning(`Amount changed from ₹${oldAmount.toFixed(2)} to ₹${newAmount.toFixed(2)}. Customer outstanding adjusted.`);
            } else {
                alert('Customer not found in master, outstanding not updated');
            }
        }

        // Update payment record
        originalPayment.date = newDate;
        originalPayment.amount = newAmount;
        originalPayment.mode = newMode;
        originalPayment.reference = newRef;
        originalPayment.remarks = newRemarks;
        const index = payments.findIndex(p => p.id == paymentId);
        payments[index] = originalPayment;
        localStorage.setItem('customerPayments', JSON.stringify(payments));

        alert('Payment updated successfully!');
        // Optionally regenerate PDF
        generateUpdatedReceiptPDF(originalPayment);
        // Close or redirect
        window.close();
    }

    function generateUpdatedReceiptPDF(payment) {
        const customer = customers.find(c => c.email === payment.customerEmail);
        if (!customer) return;
        const receiptDiv = document.createElement('div');
        receiptDiv.style.maxWidth = '800px';
        receiptDiv.style.margin = '0 auto';
        receiptDiv.style.backgroundColor = 'white';
        receiptDiv.style.padding = '20px';
        receiptDiv.style.fontFamily = 'Roboto, sans-serif';
        receiptDiv.style.border = '1px solid #ccc';
        receiptDiv.innerHTML = `
            <div style="text-align: center; margin-bottom: 20px;">
                <div style="display: flex; align-items: center; justify-content: center; gap: 15px;">
                    <img src="images/ASS.jpg" alt="Logo" style="height: 60px;" onerror="this.style.display='none'">
                    <div>
                        <div style="font-size: 24px; font-weight: bold;">Auto Spares Solution</div>
                        <div>GSTIN: 19ANOPD3300R1ZO</div>
                        <div>101, 1st floor, Howrah, WB 711108</div>
                    </div>
                </div>
                <h2>PAYMENT RECEIPT</h2>
                <p>Receipt No: ${payment.receiptNo}</p>
            </div>
            <div><strong>Customer:</strong> ${escapeHtml(customer.name)} (${escapeHtml(customer.email)})</div>
            <div><strong>Date:</strong> ${payment.date}</div>
            <div><strong>Amount:</strong> ₹${payment.amount.toFixed(2)}</div>
            <div><strong>Mode:</strong> ${payment.mode}</div>
            <div><strong>Reference:</strong> ${escapeHtml(payment.reference)}</div>
            <div><strong>Remarks:</strong> ${escapeHtml(payment.remarks)}</div>
            <div style="margin-top: 30px; text-align: center;">This is an updated receipt.</div>
        `;
        html2pdf().set({ margin: 0.2, filename: `Payment_Receipt_${payment.receiptNo}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' } }).from(receiptDiv).save();
    }

    function showWarning(msg) {
        const warnDiv = document.getElementById('warningMsg');
        warnDiv.innerHTML = msg;
        warnDiv.style.display = 'block';
        setTimeout(() => warnDiv.style.display = 'none', 5000);
    }

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }

    loadPayment();
</script>
</body>
</html>
