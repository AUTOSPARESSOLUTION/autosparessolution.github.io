<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase Invoices – Auto Spares</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="data-manager.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background: #e9ecef; margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: auto; background: white; border-radius: 12px; padding: 20px; }
        h1 { color: #0a7c71; }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #dee2e6; padding: 10px; text-align: left; vertical-align: top; }
        th { background: #0a7c71; color: white; }
        button { background: #0a7c71; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; margin: 2px; }
        .btn-pdf { background: #e67e22; }
        .btn-edit { background: #17a2b8; }
        .btn-delete { background: #dc3545; }
        .btn-new { background: #28a745; text-decoration: none; display: inline-block; }
        .action-buttons { display: flex; gap: 5px; flex-wrap: wrap; }
        .debug { background: #fff3cd; padding: 10px; margin-bottom: 15px; display: none; font-family: monospace; font-size: 12px; }
    </style>
</head>
<body>
<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h1>Purchase Invoices</h1>
        <a href="purchase-invoice-stock.html" class="btn-new"><i class="fas fa-plus"></i> New Purchase</a>
    </div>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search by Invoice No, Supplier..." style="flex:1; padding: 8px;">
        <button onclick="filterInvoices()"><i class="fas fa-search"></i> Search</button>
        <button onclick="loadInvoices()"><i class="fas fa-sync-alt"></i> Refresh</button>
        <button onclick="exportToCSV()"><i class="fas fa-file-csv"></i> Export CSV</button>
        <button onclick="toggleDebug()"><i class="fas fa-bug"></i> Debug</button>
    </div>
    <div id="debugPanel" class="debug"></div>
    <div id="invoicesTable"></div>
    <button onclick="window.location.href='index.html'" style="margin-top:20px;">Back to Dashboard</button>
</div>

<script>
    let purchaseInvoices = [];
    let suppliers = [];
    let products = [];

    function loadInvoices() {
        purchaseInvoices = JSON.parse(localStorage.getItem('purchaseInvoices') || '[]');
        suppliers = JSON.parse(localStorage.getItem('suppliers') || '[]');
        products = getProducts();
        displayInvoices();
    }

    function displayInvoices(filter = '') {
        let filtered = purchaseInvoices;
        if (filter) {
            const term = filter.toLowerCase();
            filtered = purchaseInvoices.filter(inv => {
                const invNo = inv.invoiceNo || inv.poNo || '';
                const sup = suppliers.find(s => s.email === inv.supplierEmail);
                const supName = sup ? sup.name : (inv.supplierEmail || inv.supplier?.name || '');
                return invNo.toLowerCase().includes(term) || supName.toLowerCase().includes(term);
            });
        }
        if (filtered.length === 0) {
            document.getElementById('invoicesTable').innerHTML = '<p>No purchase invoices found.</p>';
            return;
        }
        filtered.sort((a,b) => {
            const aNo = a.invoiceNo || a.poNo || '';
            const bNo = b.invoiceNo || b.poNo || '';
            return bNo.localeCompare(aNo);
        });
        let html = '<table><thead>运转<th>#</th><th>Invoice No</th><th>Date</th><th>Supplier</th><th>Amount (₹)</th><th>Due Date</th><th>Actions</th></tr></thead><tbody>';
        filtered.forEach((inv, idx) => {
            const invNo = inv.invoiceNo || inv.poNo || 'N/A';
            const amount = inv.total || inv.grandTotal || 0;
            const sup = suppliers.find(s => s.email === inv.supplierEmail);
            const supName = sup ? sup.name : (inv.supplierEmail || inv.supplier?.name || 'Unknown');
            html += `<tr>
                <td>${idx+1}</td>
                <td><strong>${escapeHtml(invNo)}</strong></td>
                <td>${inv.date || ''}</td>
                <td>${escapeHtml(supName)}</strong></td>
                <td>₹${parseFloat(amount).toFixed(2)}</strong></td>
                <td>${inv.dueDate || '-'}</td>
                <td><div class="action-buttons">
                    <button class="btn-pdf" onclick="generatePDF('${inv.id}')"><i class="fas fa-file-pdf"></i> PDF</button>
                    <button class="btn-edit" onclick="editInvoice('${inv.id}')"><i class="fas fa-edit"></i> Edit</button>
                    <button class="btn-delete" onclick="deleteInvoice('${inv.id}')"><i class="fas fa-trash"></i> Delete</button>
                </div></td>
            </tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('invoicesTable').innerHTML = html;
    }

    function normaliseItem(item) {
        let part = item.part || item.productId || item.sku || '';
        let qty = item.quantity || item.qty || 1;
        let cost = item.cost || item.price || 0;
        let discount = item.discount || 0;
        let hsn = item.hsn || '';
        let desc = item.desc || item.productName || '';
        // Try to fetch from product master if description missing
        if (!desc && part && products) {
            const prod = products.find(p => p.id == part || p.sku == part);
            if (prod) desc = prod.name;
            if (!hsn && prod) hsn = prod.hsn || '';
        }
        return { part, desc, hsn, qty, cost, discount };
    }

    function generatePDF(invoiceId) {
        const inv = purchaseInvoices.find(i => i.id == invoiceId);
        if (!inv) { alert('Invoice not found'); return; }
        const supplier = suppliers.find(s => s.email === inv.supplierEmail) || inv.supplier || {};
        const invNo = inv.invoiceNo || inv.poNo || 'N/A';
        const amount = inv.total || inv.grandTotal || 0;
        const rawItems = inv.items || [];
        const container = document.createElement('div');
        container.style.maxWidth = '1200px';
        container.style.margin = '0 auto';
        container.style.backgroundColor = 'white';
        container.style.padding = '20px';
        container.style.fontFamily = 'Roboto, sans-serif';
        let itemsHtml = '';
        if (rawItems.length === 0) {
            itemsHtml = '<tr><td colspan="12" style="text-align:center;">No item details found.</td></tr>';
        } else {
            rawItems.forEach((item, idx) => {
                const norm = normaliseItem(item);
                const taxable = norm.qty * norm.cost * (1 - norm.discount/100);
                const cgst = taxable * 0.09;
                const sgst = taxable * 0.09;
                const total = taxable + cgst + sgst;
                itemsHtml += `<tr>
                    <td style="border:1px solid #dee2e6; padding:6px;">${idx+1}</td>
                    <td style="border:1px solid #dee2e6; padding:6px;">${escapeHtml(norm.part)}</strong></td>
                    <td style="border:1px solid #dee2e6; padding:6px;">${escapeHtml(norm.desc)}</strong></td>
                    <td style="border:1px solid #dee2e6; padding:6px;">${escapeHtml(norm.hsn)}</strong></td>
                    <td style="border:1px solid #dee2e6; padding:6px; text-align:center;">${norm.qty}</strong></td>
                    <td style="border:1px solid #dee2e6; padding:6px; text-align:right;">₹${norm.cost.toFixed(2)}</strong></td>
                    <td style="border:1px solid #dee2e6; padding:6px; text-align:center;">${norm.discount}%</strong></td>
                    <td style="border:1px solid #dee2e6; padding:6px; text-align:right;">₹${taxable.toFixed(2)}</strong></td>
                    <td style="border:1px solid #dee2e6; padding:6px; text-align:center;">18%</strong></td>
                    <td style="border:1px solid #dee2e6; padding:6px; text-align:right;">₹${cgst.toFixed(2)}</strong></td>
                    <td style="border:1px solid #dee2e6; padding:6px; text-align:right;">₹${sgst.toFixed(2)}</strong></td>
                    <td style="border:1px solid #dee2e6; padding:6px; text-align:right;">₹${total.toFixed(2)}</strong></td>
                </tr>`;
            });
        }
        container.innerHTML = `
            <div style="background:#0a7c71; color:white; padding:15px; display:flex; justify-content:space-between;">
                <div><img src="images/ASS.jpg" style="height:50px;" onerror="this.style.display='none'"> <span style="font-size:20px;">Auto Spares Solution</span><br>GSTIN: 19ANOPD3300R1ZO<br>101, 1st floor, Howrah, WB 711108</div>
                <div><div style="font-size:18px;">PURCHASE INVOICE</div><div>${invNo}</div><div>${inv.date || ''}</div><div>Due: ${inv.dueDate || ''}</div></div>
            </div>
            <div style="margin:15px 0;"><strong>Supplier:</strong> ${escapeHtml(supplier.name || inv.supplierEmail)}<br>${escapeHtml(supplier.address || '')}<br>GSTIN: ${escapeHtml(supplier.gstin || '')}<br>Phone: ${escapeHtml(supplier.phone || '')}</div>
            <table style="width:100%; border-collapse:collapse; font-size:11px;"><thead><tr style="background:#f8f9fa;"><th>#</th><th>Part No</th><th>Description</th><th>HSN</th><th>Qty</th><th>Unit Cost</th><th>Disc%</th><th>Taxable</th><th>GST%</th><th>CGST</th><th>SGST</th><th>Total</th></tr></thead><tbody>${itemsHtml}</tbody></table>
            <div style="text-align:right; margin-top:10px;">
                Subtotal after discount: ₹${parseFloat(amount).toFixed(2)}<br>
                CGST (9%): ₹${(amount*0.09).toFixed(2)}<br>
                SGST (9%): ₹${(amount*0.09).toFixed(2)}<br>
                <strong>Grand Total: ₹${amount.toFixed(2)}</strong>
            </div>
            <div style="margin-top:20px; text-align:center; font-size:10px;">This is a computer generated invoice. Thank you for your business.</div>
        `;
        const opt = { margin: [0.2,0.2,0.2,0.2], filename: `Purchase_${invNo}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' } };
        html2pdf().set(opt).from(container).save();
    }

    function editInvoice(invoiceId) {
        localStorage.setItem('editPurchaseInvoiceId', invoiceId);
        window.open('edit-purchase-invoice.html', '_blank');
    }

    function deleteInvoice(invoiceId) {
        if (!confirm('Delete this purchase invoice? Stock and supplier outstanding will be reversed.')) return;
        const inv = purchaseInvoices.find(i => i.id == invoiceId);
        if (!inv) return;
        try {
            let allProducts = getProducts();
            let allSuppliers = JSON.parse(localStorage.getItem('suppliers') || '[]');
            for (let item of (inv.items || [])) {
                const norm = normaliseItem(item);
                let prod = allProducts.find(p => p.id == norm.part || p.sku == norm.part);
                if (prod) prod.currentStock -= norm.qty;
                if (prod && prod.currentStock < 0) prod.currentStock = 0;
            }
            saveProducts(allProducts);
            let supp = allSuppliers.find(s => s.email === inv.supplierEmail);
            if (supp) {
                const amt = inv.total || inv.grandTotal || 0;
                supp.outstanding = (supp.outstanding || 0) - amt;
                if (supp.outstanding < 0) supp.outstanding = 0;
                localStorage.setItem('suppliers', JSON.stringify(allSuppliers));
            }
            purchaseInvoices = purchaseInvoices.filter(i => i.id != invoiceId);
            localStorage.setItem('purchaseInvoices', JSON.stringify(purchaseInvoices));
            alert('Invoice deleted.');
            loadInvoices();
        } catch(e) { alert('Error: ' + e.message); }
    }

    function filterInvoices() { displayInvoices(document.getElementById('searchInput').value.toLowerCase()); }
    function exportToCSV() {
        let csv = "Invoice No,Date,Supplier,Amount,Due Date\n";
        purchaseInvoices.forEach(i => {
            const invNo = i.invoiceNo || i.poNo || '';
            const sup = suppliers.find(s => s.email === i.supplierEmail);
            const supName = sup ? sup.name : (i.supplierEmail || '');
            csv += `"${invNo}",${i.date || ''},"${supName}",${i.total || i.grandTotal || 0},${i.dueDate || ''}\n`;
        });
        const blob = new Blob([csv], {type:'text/csv'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'purchase_invoices.csv'; a.click(); URL.revokeObjectURL(blob);
    }
    function toggleDebug() {
        const panel = document.getElementById('debugPanel');
        if (panel.style.display === 'none') {
            panel.innerHTML = `<strong>Raw purchaseInvoices (first):</strong><br><pre>${JSON.stringify(purchaseInvoices[0] || {}, null, 2)}</pre>`;
            panel.style.display = 'block';
        } else panel.style.display = 'none';
    }
    function escapeHtml(s) { if (!s) return ''; return s.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
    loadInvoices();
</script>
</body>
</html>
