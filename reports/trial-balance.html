<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Trial Balance</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><style>body{font-family:'Roboto',sans-serif;background:#0f172a;color:#e2e8f0;padding:1rem}.container{max-width:800px;margin:0 auto;background:#1e293b;padding:1.5rem;border-radius:1rem}h1{color:#facc15}table{width:100%;border-collapse:collapse;margin-top:1rem}th,td{border:1px solid #334155;padding:0.5rem;text-align:left}th{background:#0f172a;color:#facc15}.total-row{font-weight:bold;background:#0f172a}</style></head>
<body><div class="container"><h1><i class="fas fa-scale-balanced"></i> Trial Balance</h1><table id="tbTable"><thead><tr><th>Account</th><th>Debit (₹)</th><th>Credit (₹)</th></tr></thead><tbody></tbody><td></div>
<script>const inv=JSON.parse(localStorage.getItem('allInvoices')||'[]');const po=JSON.parse(localStorage.getItem('allPurchases')||'[]');const exp=JSON.parse(localStorage.getItem('expenses')||'[]');let sales=0,purch=0,exps=0;for(const i of inv)for(const it of i.items)sales+=it.price*it.qty;for(const p of po)for(const it of p.items)purch+=it.price*it.qty;for(const e of exp)exps+=e.amount;const tbody=document.querySelector('#tbTable tbody');const r1=tbody.insertRow();r1.insertCell(0).innerText='Sales Account';r1.insertCell(1).innerText='0';r1.insertCell(2).innerText=sales.toFixed(2);const r2=tbody.insertRow();r2.insertCell(0).innerText='Purchase Account';r2.insertCell(1).innerText=purch.toFixed(2);r2.insertCell(2).innerText='0';const r3=tbody.insertRow();r3.insertCell(0).innerText='Expenses Account';r3.insertCell(1).innerText=exps.toFixed(2);r3.insertCell(2).innerText='0';const totalDebit=purch+exps;const totalCredit=sales;const rTot=tbody.insertRow();rTot.classList.add('total-row');rTot.insertCell(0).innerText='TOTAL';rTot.insertCell(1).innerText=totalDebit.toFixed(2);rTot.insertCell(2).innerText=totalCredit.toFixed(2);if(Math.abs(totalDebit-totalCredit)>0.01){const rDiff=tbody.insertRow();rDiff.insertCell(0).innerText='Difference (Suspense)';if(totalDebit>totalCredit){rDiff.insertCell(1).innerText='0';rDiff.insertCell(2).innerText=(totalDebit-totalCredit).toFixed(2);}else{rDiff.insertCell(1).innerText=(totalCredit-totalDebit).toFixed(2);rDiff.insertCell(2).innerText='0';}}</script></body></html>
