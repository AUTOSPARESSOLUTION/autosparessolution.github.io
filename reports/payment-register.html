<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Payment Register</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><style>body{font-family:'Roboto',sans-serif;background:#0f172a;color:#e2e8f0;padding:1rem}.container{max-width:1200px;margin:0 auto;background:#1e293b;padding:1.5rem;border-radius:1rem}h1{color:#facc15}table{width:100%;border-collapse:collapse;margin-top:1rem}th,td{border:1px solid #334155;padding:0.5rem;text-align:left}th{background:#0f172a;color:#facc15}</style></head>
<body><div class="container"><h1><i class="fas fa-credit-card"></i> Payment Register</h1><table id="payTable"><thead><tr><th>Order ID</th><th>Payment ID</th><th>Amount</th><th>Charges</th><th>Settled</th><th>Date</th></tr></thead><tbody></tbody></table></div>
<script>const pay=JSON.parse(localStorage.getItem('razorpay_payments')||'[]');const tbody=document.querySelector('#payTable tbody');for(const p of pay){const r=tbody.insertRow();r.insertCell(0).innerText=p.orderId||'';r.insertCell(1).innerText=p.paymentId||'';r.insertCell(2).innerText=`₹${p.amount}`;r.insertCell(3).innerText=`₹${p.charges||0}`;r.insertCell(4).innerText=`₹${p.settledAmount||p.amount-(p.charges||0)}`;r.insertCell(5).innerText=new Date(p.date).toLocaleDateString();}</script></body></html>
