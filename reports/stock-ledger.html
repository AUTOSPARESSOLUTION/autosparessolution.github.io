<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Ledger</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Roboto', sans-serif; background: #0f172a; color: #e2e8f0; padding: 1rem; }
        .container { max-width: 1200px; margin: 0 auto; background: #1e293b; padding: 1.5rem; border-radius: 1rem; }
        h1 { color: #facc15; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; overflow-x: auto; display: block; }
        th, td { border: 1px solid #334155; padding: 0.5rem; text-align: left; }
        th { background: #0f172a; color: #facc15; }
        .empty-message { text-align: center; padding: 2rem; color: #94a3b8; }
    </style>
</head>
<body>
<div class="container">
    <h1><i class="fas fa-boxes"></i> Stock Ledger</h1>
    <div style="overflow-x: auto;" id="tableContainer">
        <table id="stockTable">
            <thead><tr><th>Part No</th><th>Product Name</th><th>Opening</th><th>Inward</th><th>Outward</th><th>Closing</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>
<script>
    async function loadStock() {
        try {
            const response = await fetch('prices.csv');
            const csv = await response.text();
            const rows = csv.split('\n').slice(1);
            const products = [];
            for (const row of rows) {
                const cols = row.split(',');
                if (cols[0]) {
                    products.push({ 
                        part: cols[0].trim(), 
                        stock: parseInt(cols[7] || 0), 
                        desc: cols[1]?.trim() || '' 
                    });
                }
            }
            
            const allInvoices = JSON.parse(localStorage.getItem('allInvoices') || '[]');
            const allPurchases = JSON.parse(localStorage.getItem('allPurchases') || '[]');
            
            const salesQty = {};
            const purchaseQty = {};
            
            for (const inv of allInvoices) {
                for (const item of inv.items) {
                    salesQty[item.part] = (salesQty[item.part] || 0) + item.qty;
                }
            }
            for (const po of allPurchases) {
                for (const item of po.items) {
                    purchaseQty[item.part] = (purchaseQty[item.part] || 0) + item.qty;
                }
            }
            
            const tbody = document.querySelector('#stockTable tbody');
            tbody.innerHTML = '';
            
            if (products.length === 0) {
                document.getElementById('tableContainer').innerHTML = '<div class="empty-message"><i class="fas fa-info-circle"></i> No products found in prices.csv</div>';
                return;
            }
            
            for (const p of products) {
                const inward = purchaseQty[p.part] || 0;
                const outward = salesQty[p.part] || 0;
                const opening = p.stock + outward - inward;
                const row = tbody.insertRow();
                row.insertCell(0).innerText = p.part;
                row.insertCell(1).innerText = p.desc;
                row.insertCell(2).innerText = opening;
                row.insertCell(3).innerText = inward;
                row.insertCell(4).innerText = outward;
                row.insertCell(5).innerText = p.stock;
            }
            
            if (tbody.rows.length === 0) {
                document.getElementById('tableContainer').innerHTML = '<div class="empty-message"><i class="fas fa-info-circle"></i> No stock data available</div>';
            }
        } catch(err) {
            console.error(err);
            document.getElementById('tableContainer').innerHTML = '<div class="empty-message"><i class="fas fa-exclamation-triangle"></i> Error loading stock data. Make sure prices.csv exists.</div>';
        }
    }
    
    loadStock();
</script>
</body>
</html>
