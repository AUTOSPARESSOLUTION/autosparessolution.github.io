<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Ledger – Auto Spares</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="data-manager.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background: #e9ecef; margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: auto; background: white; border-radius: 12px; padding: 20px; }
        h1 { color: #0a7c71; }
        .filter-box { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 20px; align-items: flex-end; }
        .filter-group { flex: 1; min-width: 200px; }
        label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 4px; }
        select, input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; }
        button { background: #0a7c71; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #dee2e6; padding: 10px; text-align: left; vertical-align: top; }
        th { background: #0a7c71; color: white; }
        .in { color: #28a745; font-weight: bold; }
        .out { color: #dc3545; font-weight: bold; }
        .export-btn { background: #6c757d; margin-top: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h1><i class="fas fa-boxes"></i> Stock Ledger</h1>
    <div class="filter-box">
        <div class="filter-group">
            <label>Filter by Brand</label>
            <select id="brandFilter">
                <option value="">-- All Brands --</option>
            </select>
        </div>
        <div class="filter-group">
            <label>Filter by Make</label>
            <select id="makeFilter">
                <option value="">-- All Makes --</option>
            </select>
        </div>
        <div class="filter-group">
            <label>Or Select a Product</label>
            <select id="productFilter">
                <option value="">-- All Products --</option>
            </select>
        </div>
        <div class="filter-group">
            <button onclick="loadLedger()"><i class="fas fa-sync-alt"></i> Refresh</button>
            <button onclick="exportToCSV()" class="export-btn"><i class="fas fa-file-csv"></i> Export CSV</button>
        </div>
    </div>
    <div id="ledgerTable">Loading...</div>
    <button onclick="window.location.href='index.html'" style="margin-top:20px;">Back to Dashboard</button>
</div>

<script>
    let products = [];
    let stockTransactions = [];

    // Convert any date to YYYY-MM-DD for sorting
    function toISODate(dateStr) {
        if (!dateStr) return '';
        if (/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) return dateStr;
        const parts = dateStr.split('/');
        if (parts.length === 3 && parts[0].length === 2 && parts[1].length === 2 && parts[2].length === 4) {
            return `${parts[2]}-${parts[1]}-${parts[0]}`;
        }
        const d = new Date(dateStr);
        if (!isNaN(d.getTime())) return d.toISOString().slice(0,10);
        return dateStr;
    }

    function loadData() {
        products = getProducts();
        // Normalise product IDs and sku to strings for matching
        products.forEach(p => {
            if (p.id !== undefined) p.id = String(p.id);
            if (p.sku !== undefined) p.sku = String(p.sku);
        });

        stockTransactions = [];

        // 1. Purchase invoices (stock IN)
        const purchaseInvoices = JSON.parse(localStorage.getItem('purchaseInvoices') || '[]');
        purchaseInvoices.forEach(inv => {
            const items = inv.items || [];
            items.forEach(item => {
                // In purchase invoices, productId may be the part number or sku
                let productId = item.productId || item.part;
                if (!productId) return;
                productId = String(productId);
                const qty = parseFloat(item.quantity) || 0;
                if (qty === 0) return;
                stockTransactions.push({
                    date: inv.date,
                    productId: productId,
                    type: 'Purchase',
                    inQty: qty,
                    outQty: 0,
                    ref: inv.invoiceNo || inv.poNo,
                });
            });
        });

        // 2. Sales invoices (stock OUT) – read exactly as Order History does
        const allInvoices = JSON.parse(localStorage.getItem('allInvoices') || '[]');
        allInvoices.forEach(inv => {
            const items = inv.items || [];
            items.forEach(item => {
                // Sales invoices use 'part' field (e.g., item.part)
                let productId = item.part || item.productId;
                if (!productId) return;
                productId = String(productId);
                const qty = parseFloat(item.qty) || 0;
                if (qty === 0) return;
                stockTransactions.push({
                    date: inv.date,
                    productId: productId,
                    type: 'Sales',
                    inQty: 0,
                    outQty: qty,
                    ref: inv.invoiceNo,
                });
            });
        });

        // Sort by date (ISO)
        stockTransactions.forEach(t => { t.isoDate = toISODate(t.date); });
        stockTransactions.sort((a,b) => a.isoDate.localeCompare(b.isoDate));

        // Debug: log first few transactions
        console.log('Stock transactions built:', stockTransactions.slice(0,5));

        populateFilters();
        displayLedger();
    }

    function populateFilters() {
        const brands = new Set();
        products.forEach(p => { if (p.brand) brands.add(p.brand); });
        const brandSelect = document.getElementById('brandFilter');
        brandSelect.innerHTML = '<option value="">-- All Brands --</option>';
        [...brands].sort().forEach(b => {
            brandSelect.innerHTML += `<option value="${escapeHtml(b)}">${escapeHtml(b)}</option>`;
        });

        const makes = new Set();
        products.forEach(p => { if (p.make) makes.add(p.make); });
        const makeSelect = document.getElementById('makeFilter');
        makeSelect.innerHTML = '<option value="">-- All Makes --</option>';
        [...makes].sort().forEach(m => {
            makeSelect.innerHTML += `<option value="${escapeHtml(m)}">${escapeHtml(m)}</option>`;
        });

        const productSelect = document.getElementById('productFilter');
        productSelect.innerHTML = '<option value="">-- All Products --</option>';
        products.forEach(p => {
            productSelect.innerHTML += `<option value="${p.id}">${escapeHtml(p.name)} (${p.sku})</option>`;
        });
    }

    function getFilteredProducts() {
        const brand = document.getElementById('brandFilter').value;
        const make = document.getElementById('makeFilter').value;
        const productId = document.getElementById('productFilter').value;
        if (productId) return products.filter(p => p.id === productId);
        return products.filter(p => 
            (!brand || p.brand === brand) &&
            (!make || p.make === make)
        );
    }

    function displayLedger() {
        const filteredProducts = getFilteredProducts();
        if (filteredProducts.length === 0) {
            document.getElementById('ledgerTable').innerHTML = '<p>No products match the filter.</p>';
            return;
        }

        let html = `<table class="ledger-table">
            <thead>
                <tr>
                    <th>Product</th><th>SKU</th><th>Brand</th><th>Make</th>
                    <th>Date</th><th>Transaction Type</th><th>In (+)</th><th>Out (-)</th>
                    <th>Running Balance</th><th>Reference</th>
                </tr>
            </thead>
            <tbody>`;

        for (let prod of filteredProducts) {
            // Match transactions by productId OR by sku (fallback)
            let prodTrans = stockTransactions.filter(t => 
                t.productId === prod.id || t.productId === prod.sku
            );
            if (prodTrans.length === 0) {
                html += `<tr><td colspan="10">No transactions for ${escapeHtml(prod.name)}</td></tr>`;
                continue;
            }
            // Sort by date
            prodTrans.sort((a,b) => a.isoDate.localeCompare(b.isoDate));
            let balance = 0;
            for (let t of prodTrans) {
                balance += t.inQty - t.outQty;
                const displayDate = t.date;
                const typeLabel = t.type === 'Purchase' ? 'Purchase' : 'Sales';
                html += `<tr>
                    <td><strong>${escapeHtml(prod.name)}</strong></td>
                    <td><strong>${escapeHtml(prod.sku)}</strong></td>
                    <td>${escapeHtml(prod.brand || '-')}</td>
                    <td>${escapeHtml(prod.make || '-')}</td>
                    <td>${displayDate}</td>
                    <td>${typeLabel}</td>
                    <td class="in">${t.inQty > 0 ? t.inQty : '-'}</td>
                    <td class="out">${t.outQty > 0 ? t.outQty : '-'}</td>
                    <td>${balance}</td>
                    <td>${escapeHtml(t.ref || '-')}</td>
                </tr>`;
            }
            // Separator between products
            html += '<tr style="background:#f1f3f5;"><td colspan="10" style="padding:2px;"></td></tr>';
        }
        html += '</tbody>\n</table>';
        document.getElementById('ledgerTable').innerHTML = html;
    }

    function loadLedger() {
        // Reload fresh data (same as loadData)
        products = getProducts();
        products.forEach(p => {
            if (p.id !== undefined) p.id = String(p.id);
            if (p.sku !== undefined) p.sku = String(p.sku);
        });
        stockTransactions = [];

        const purchaseInvoices = JSON.parse(localStorage.getItem('purchaseInvoices') || '[]');
        purchaseInvoices.forEach(inv => {
            (inv.items || []).forEach(item => {
                let productId = item.productId || item.part;
                if (!productId) return;
                productId = String(productId);
                const qty = parseFloat(item.quantity) || 0;
                if (qty === 0) return;
                stockTransactions.push({
                    date: inv.date, productId: productId, type: 'Purchase',
                    inQty: qty, outQty: 0, ref: inv.invoiceNo || inv.poNo
                });
            });
        });

        const allInvoices = JSON.parse(localStorage.getItem('allInvoices') || '[]');
        allInvoices.forEach(inv => {
            (inv.items || []).forEach(item => {
                let productId = item.part || item.productId;
                if (!productId) return;
                productId = String(productId);
                const qty = parseFloat(item.qty) || 0;
                if (qty === 0) return;
                stockTransactions.push({
                    date: inv.date, productId: productId, type: 'Sales',
                    inQty: 0, outQty: qty, ref: inv.invoiceNo
                });
            });
        });

        stockTransactions.forEach(t => { t.isoDate = toISODate(t.date); });
        stockTransactions.sort((a,b) => a.isoDate.localeCompare(b.isoDate));
        displayLedger();
    }

    function exportToCSV() {
        const filteredProducts = getFilteredProducts();
        if (filteredProducts.length === 0) return;
        let csv = "Product Name,SKU,Brand,Make,Date,Transaction Type,In,Out,Running Balance,Reference\n";
        for (let prod of filteredProducts) {
            let prodTrans = stockTransactions.filter(t => t.productId === prod.id || t.productId === prod.sku);
            if (prodTrans.length === 0) continue;
            prodTrans.sort((a,b) => a.isoDate.localeCompare(b.isoDate));
            let balance = 0;
            for (let t of prodTrans) {
                balance += t.inQty - t.outQty;
                csv += `"${escapeCsv(prod.name)}","${escapeCsv(prod.sku)}","${escapeCsv(prod.brand || '')}","${escapeCsv(prod.make || '')}",${t.date},${t.type},${t.inQty},${t.outQty},${balance},"${escapeCsv(t.ref || '')}"\n`;
            }
        }
        const blob = new Blob([csv], {type:'text/csv'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = 'stock_ledger.csv'; a.click(); URL.revokeObjectURL(url);
    }

    function escapeCsv(s) { return `"${(s || '').replace(/"/g, '""')}"`; }
    function escapeHtml(s) { return (s || '').replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }

    loadData();
</script>
</body>
</html>
