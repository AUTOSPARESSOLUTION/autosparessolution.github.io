<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Stock Ledger</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><style>body{font-family:'Roboto',sans-serif;background:#0f172a;color:#e2e8f0;padding:1rem}.container{max-width:1200px;margin:0 auto;background:#1e293b;padding:1.5rem;border-radius:1rem}h1{color:#facc15}table{width:100%;border-collapse:collapse;margin-top:1rem}th,td{border:1px solid #334155;padding:0.5rem;text-align:left}th{background:#0f172a;color:#facc15}</style></head>
<body><div class="container"><h1><i class="fas fa-boxes"></i> Stock Ledger</h1><table id="stockTable"><thead><tr><th>Part No</th><th>Description</th><th>Opening</th><th>Inward</th><th>Outward</th><th>Closing</th></tr></thead><tbody></tbody></table></div>
<script>fetch('prices.csv').then(r=>r.text()).then(csv=>{const rows=csv.split('\n').slice(1);const products=[];for(const r of rows){const c=r.split(',');if(c[0])products.push({part:c[0].trim(),stock:parseInt(c[7]||0),desc:c[1]?.trim()||''});}const inv=JSON.parse(localStorage.getItem('allInvoices')||'[]');const po=JSON.parse(localStorage.getItem('allPurchases')||'[]');const sales={},purch={};for(const i of inv)for(const it of i.items)sales[it.part]=(sales[it.part]||0)+it.qty;for(const p of po)for(const it of p.items)purch[it.part]=(purch[it.part]||0)+it.qty;const tbody=document.querySelector('#stockTable tbody');for(const p of products){const inw=purch[p.part]||0;const out=sales[p.part]||0;const opening=p.stock+out-inw;const row=tbody.insertRow();row.insertCell(0).innerText=p.part;row.insertCell(1).innerText=p.desc;row.insertCell(2).innerText=opening;row.insertCell(3).innerText=inw;row.insertCell(4).innerText=out;row.insertCell(5).innerText=p.stock;}});</script></body></html>
