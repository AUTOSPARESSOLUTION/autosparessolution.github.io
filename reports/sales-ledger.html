<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Sales Register</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><style>body{font-family:'Roboto',sans-serif;background:#0f172a;color:#e2e8f0;padding:1rem}.container{max-width:1400px;margin:0 auto;background:#1e293b;padding:1.5rem;border-radius:1rem}h1{color:#facc15}.summary{background:#0f172a;padding:1rem;border-radius:0.5rem;margin-bottom:1rem;display:flex;gap:2rem}table{width:100%;border-collapse:collapse;margin-top:1rem;overflow-x:auto;display:block}th,td{border:1px solid #334155;padding:0.5rem;text-align:left}th{background:#0f172a;color:#facc15}.btn{background:#3b82f6;color:white;padding:0.5rem 1rem;border:none;border-radius:0.5rem;cursor:pointer}</style></head>
<body><div class="container"><h1><i class="fas fa-book"></i> Sales Register</h1><div class="summary"><div><strong>Total Sales:</strong> ₹<span id="totalSales">0</span></div><div><strong>Total GST:</strong> ₹<span id="totalGST">0</span></div><div><strong>Grand Total:</strong> ₹<span id="grandTotal">0</span></div></div>
<table id="salesTable"><thead><tr><th>Invoice No</th><th>Date</th><th>Customer</th><th>Part No</th><th>Qty</th><th>Price</th><th>GST</th><th>Total</th></tr></thead><tbody></tbody></table><button class="btn" onclick="exportCSV()">Export CSV</button></div>
<script>function loadSales(){const inv=JSON.parse(localStorage.getItem('allInvoices')||'[]');let ts=0,tg=0,gt=0;const tbody=document.querySelector('#salesTable tbody');tbody.innerHTML='';for(const i of inv){for(const it of i.items){const sub=it.price*it.qty;const gst=sub*0.18;ts+=sub;tg+=gst;gt+=sub+gst;const r=tbody.insertRow();r.insertCell(0).innerText=i.invoiceNo||'N/A';r.insertCell(1).innerText=new Date(i.date).toLocaleDateString();r.insertCell(2).innerText=i.customerName||'Guest';r.insertCell(3).innerText=it.part;r.insertCell(4).innerText=it.qty;r.insertCell(5).innerText=`₹${it.price.toFixed(2)}`;r.insertCell(6).innerText=`₹${gst.toFixed(2)}`;r.insertCell(7).innerText=`₹${(sub+gst).toFixed(2)}`;}}document.getElementById('totalSales').innerText=ts.toFixed(2);document.getElementById('totalGST').innerText=tg.toFixed(2);document.getElementById('grandTotal').innerText=gt.toFixed(2);}function exportCSV(){let c="Invoice No,Date,Customer,Part No,Qty,Price,GST,Total\n";document.querySelectorAll('#salesTable tbody tr').forEach(r=>{const d=r.querySelectorAll('td');c+=`${d[0].innerText},${d[1].innerText},${d[2].innerText},${d[3].innerText},${d[4].innerText},${d[5].innerText},${d[6].innerText},${d[7].innerText}\n`;});const b=new Blob([c],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='sales_register.csv';a.click();URL.revokeObjectURL(b);}loadSales();</script></body></html>
