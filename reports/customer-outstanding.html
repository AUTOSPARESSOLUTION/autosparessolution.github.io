<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Customer Outstanding</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><style>body{font-family:'Roboto',sans-serif;background:#0f172a;color:#e2e8f0;padding:1rem}.container{max-width:1000px;margin:0 auto;background:#1e293b;padding:1.5rem;border-radius:1rem}h1{color:#facc15}table{width:100%;border-collapse:collapse;margin-top:1rem}th,td{border:1px solid #334155;padding:0.5rem;text-align:left}th{background:#0f172a;color:#facc15}</style></head>
<body><div class="container"><h1><i class="fas fa-users"></i> Customer Outstanding</h1><table id="outTable"><thead><tr><th>Customer</th><th>Invoice Amount</th><th>Paid</th><th>Outstanding</th></tr></thead><tbody></tbody></table></div>
<script>const inv=JSON.parse(localStorage.getItem('allInvoices')||'[]');const pay=JSON.parse(localStorage.getItem('razorpay_payments')||'[]');const custMap=new Map();for(const i of inv){const cust=i.customerName||i.customerEmail||'Guest';let total=0;for(const it of i.items)total+=it.price*it.qty*1.18;if(custMap.has(cust))custMap.get(cust).inv+=total;else custMap.set(cust,{inv:total,paid:0});}const totalPaid=pay.reduce((s,p)=>s+p.amount,0);if(custMap.has('Guest'))custMap.get('Guest').paid=totalPaid;const tbody=document.querySelector('#outTable tbody');for(const [c,d] of custMap){const out=d.inv-d.paid;if(out>0){const r=tbody.insertRow();r.insertCell(0).innerText=c;r.insertCell(1).innerText=`₹${d.inv.toFixed(2)}`;r.insertCell(2).innerText=`₹${d.paid.toFixed(2)}`;r.insertCell(3).innerText=`₹${out.toFixed(2)}`;}}</script></body></html>
