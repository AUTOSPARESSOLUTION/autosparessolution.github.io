<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GST Register – Auto Spares</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background: #e9ecef; margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: auto; background: white; border-radius: 12px; padding: 20px; }
        h1, h2 { color: #0a7c71; }
        .period-selector { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 20px; align-items: flex-end; }
        input, button { padding: 8px; border: 1px solid #ced4da; border-radius: 6px; }
        button { background: #0a7c71; color: white; border: none; cursor: pointer; margin-right: 5px; }
        .gst-summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .gst-card { background: #f8f9fa; padding: 15px; border-radius: 8px; text-align: center; border-left: 4px solid #0a7c71; }
        .gst-card .amount { font-size: 24px; font-weight: bold; color: #0a7c71; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #dee2e6; padding: 10px; text-align: left; }
        th { background: #0a7c71; color: white; }
        .export-btn { background: #6c757d; }
        .tab { overflow: hidden; border-bottom: 1px solid #dee2e6; margin-bottom: 20px; }
        .tab button { background: #f8f9fa; color: #495057; border: none; padding: 10px 20px; cursor: pointer; float: left; margin-right: 5px; border-radius: 8px 8px 0 0; }
        .tab button.active { background: #0a7c71; color: white; }
        .tabcontent { display: none; }
        .tabcontent.active { display: block; }
        .empty-message { text-align: center; padding: 40px; color: #6c757d; }
    </style>
</head>
<body>
<div class="container">
    <h1><i class="fas fa-file-invoice-dollar"></i> GST Register</h1>
    
    <div class="period-selector">
        <input type="date" id="fromDate">
        <input type="date" id="toDate">
        <button onclick="calculateGST()"><i class="fas fa-calculator"></i> Calculate</button>
        <button onclick="exportGSTR1()" class="export-btn"><i class="fas fa-download"></i> GSTR-1</button>
        <button onclick="exportGSTR3B()" class="export-btn"><i class="fas fa-download"></i> GSTR-3B</button>
        <button onclick="toggleDebug()" class="export-btn"><i class="fas fa-bug"></i> Debug</button>
    </div>
    
    <div class="tab">
        <button class="tablinks active" onclick="openTab(event, 'Summary')">Summary</button>
        <button class="tablinks" onclick="openTab(event, 'OutputGST')">Output GST (Sales)</button>
        <button class="tablinks" onclick="openTab(event, 'InputGST')">Input GST (Purchases)</button>
    </div>
    
    <div id="Summary" class="tabcontent active">
        <div class="gst-summary" id="summaryCards"></div>
        <div id="payableTable"></div>
    </div>
    
    <div id="OutputGST" class="tabcontent">
        <div style="overflow-x: auto;"><table id="outputTable"><thead><tr><th>Invoice No</th><th>Date</th><th>Customer</th><th>Part</th><th>Qty</th><th>Taxable</th><th>GST Rate</th><th>CGST</th><th>SGST</th><th>Total GST</th></tr></thead><tbody id="outputBody"></tbody></table></div>
    </div>
    
    <div id="InputGST" class="tabcontent">
        <div style="overflow-x: auto;"><table id="inputTable"><thead><tr><th>Invoice No</th><th>Date</th><th>Supplier</th><th>Part</th><th>Qty</th><th>Taxable</th><th>GST Rate</th><th>CGST</th><th>SGST</th><th>Total GST</th></tr></thead><tbody id="inputBody"></tbody></table></div>
    </div>
</div>

<script>
    let allInvoices = [], allPurchases = [];
    let outputDetails = [], inputDetails = [];
    let outputTotal = { taxable:0, cgst:0, sgst:0, total:0 };
    let inputTotal = { taxable:0, cgst:0, sgst:0, total:0 };
    
    // ----- Helper functions to safely extract fields -----
    function getItemPart(item) {
        return item.part || item.productId || item.sku || item.productName || 'N/A';
    }
    
    function getItemQty(item) {
        return item.qty || item.quantity || 0;
    }
    
    function getItemPrice(item) {
        return item.price || item.cost || 0;
    }
    
    function getInvoiceNo(inv) {
        return inv.invoiceNo || inv.poNo || 'N/A';
    }
    
    // PRIORITY: use customerName (already fixed), then email, then Guest
    function getCustomerDisplay(inv) {
        if (inv.customerName && inv.customerName !== 'Guest' && inv.customerName !== '') 
            return inv.customerName;
        if (inv.customerEmail) {
            const email = inv.customerEmail;
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const dealers = JSON.parse(localStorage.getItem('dealers') || '[]');
            let found = [...users, ...dealers].find(u => u.email === email);
            if (found) return found.business || found.name || email.split('@')[0];
            return email.split('@')[0];
        }
        return 'Guest';
    }
    
    function getSupplierDisplay(inv) {
        if (inv.supplierName && inv.supplierName !== '') 
            return inv.supplierName;
        if (inv.supplierEmail) {
            const email = inv.supplierEmail;
            const suppliers = JSON.parse(localStorage.getItem('suppliers') || '[]');
            let found = suppliers.find(s => s.email === email);
            if (found) return found.business || found.name || email.split('@')[0];
            return email.split('@')[0];
        }
        return 'Unknown';
    }
    
    // ----- Main calculation -----
    function calculateGST() {
        const from = document.getElementById('fromDate').value;
        const to = document.getElementById('toDate').value;
        if (!from || !to) { alert('Select date range'); return; }
        
        allInvoices = JSON.parse(localStorage.getItem('allInvoices') || '[]');
        allPurchases = JSON.parse(localStorage.getItem('purchaseInvoices') || '[]');
        if (allPurchases.length === 0) allPurchases = JSON.parse(localStorage.getItem('allPurchases') || '[]');
        
        const fromDate = new Date(from);
        const toDate = new Date(to);
        
        // --- Sales (Output GST) ---
        outputDetails = [];
        outputTotal = { taxable:0, cgst:0, sgst:0, total:0 };
        for (let inv of allInvoices) {
            const invDate = new Date(inv.date);
            if (invDate >= fromDate && invDate <= toDate) {
                for (let item of (inv.items || [])) {
                    const qty = getItemQty(item);
                    const price = getItemPrice(item);
                    const taxable = qty * price;
                    const gst = taxable * 0.18;
                    const cgst = gst/2, sgst = gst/2;
                    outputTotal.taxable += taxable;
                    outputTotal.cgst += cgst;
                    outputTotal.sgst += sgst;
                    outputTotal.total += gst;
                    outputDetails.push({
                        invoiceNo: getInvoiceNo(inv),
                        date: inv.date,
                        customer: getCustomerDisplay(inv),
                        part: getItemPart(item),
                        qty,
                        taxable, gstRate: 18, cgst, sgst, totalGST: gst
                    });
                }
            }
        }
        
        // --- Purchases (Input GST) ---
        inputDetails = [];
        inputTotal = { taxable:0, cgst:0, sgst:0, total:0 };
        for (let inv of allPurchases) {
            const invDate = new Date(inv.date);
            if (invDate >= fromDate && invDate <= toDate) {
                for (let item of (inv.items || [])) {
                    const qty = getItemQty(item);
                    const price = getItemPrice(item);
                    const taxable = qty * price;
                    const gst = taxable * 0.18;
                    const cgst = gst/2, sgst = gst/2;
                    inputTotal.taxable += taxable;
                    inputTotal.cgst += cgst;
                    inputTotal.sgst += sgst;
                    inputTotal.total += gst;
                    inputDetails.push({
                        invoiceNo: getInvoiceNo(inv),
                        date: inv.date,
                        supplier: getSupplierDisplay(inv),
                        part: getItemPart(item),
                        qty,
                        taxable, gstRate: 18, cgst, sgst, totalGST: gst
                    });
                }
            }
        }
        
        displaySummary();
        displayOutputTable();
        displayInputTable();
    }
    
    function displaySummary() {
        const payableCgst = outputTotal.cgst - inputTotal.cgst;
        const payableSgst = outputTotal.sgst - inputTotal.sgst;
        const payableTotal = outputTotal.total - inputTotal.total;
        document.getElementById('summaryCards').innerHTML = `
            <div class="gst-card"><h3>Output GST</h3><div class="amount">₹${outputTotal.total.toFixed(2)}</div><small>CGST: ₹${outputTotal.cgst.toFixed(2)} | SGST: ₹${outputTotal.sgst.toFixed(2)}</small></div>
            <div class="gst-card"><h3>Input GST (ITC)</h3><div class="amount">₹${inputTotal.total.toFixed(2)}</div><small>CGST: ₹${inputTotal.cgst.toFixed(2)} | SGST: ₹${inputTotal.sgst.toFixed(2)}</small></div>
            <div class="gst-card"><h3>GST Payable</h3><div class="amount">₹${payableTotal.toFixed(2)}</div><small>CGST: ₹${payableCgst.toFixed(2)} | SGST: ₹${payableSgst.toFixed(2)}</small></div>
        `;
        document.getElementById('payableTable').innerHTML = `
            <h3>Breakdown</h3>
            <table>
                <thead><tr><th>Component</th><th>CGST</th><th>SGST</th><th>Total</th></tr></thead>
                <tbody>
                    <tr><td>Output</strong></td><td>₹${outputTotal.cgst.toFixed(2)}</td><td>₹${outputTotal.sgst.toFixed(2)}</td><td>₹${outputTotal.total.toFixed(2)}</td></tr>
                    <tr><td>Input (ITC)</strong></td><td>₹${inputTotal.cgst.toFixed(2)}</td><td>₹${inputTotal.sgst.toFixed(2)}</td><td>₹${inputTotal.total.toFixed(2)}</td></tr>
                    <tr style="background:#f8f9fa;"><td><strong>Payable</strong></td><td><strong>₹${payableCgst.toFixed(2)}</strong></td><td><strong>₹${payableSgst.toFixed(2)}</strong></td><td><strong>₹${payableTotal.toFixed(2)}</strong></td></tr>
                </tbody>
            </table>
        `;
    }
    
    function displayOutputTable() {
        const tbody = document.getElementById('outputBody');
        tbody.innerHTML = '';
        if (outputDetails.length === 0) {
            tbody.innerHTML = '<tr><td colspan="10" class="empty-message">No sales in this period</td></tr>';
        } else {
            outputDetails.forEach(d => {
                const row = tbody.insertRow();
                row.insertCell(0).innerText = d.invoiceNo;
                row.insertCell(1).innerText = d.date;
                row.insertCell(2).innerText = d.customer;
                row.insertCell(3).innerText = d.part;
                row.insertCell(4).innerText = d.qty;
                row.insertCell(5).innerText = `₹${d.taxable.toFixed(2)}`;
                row.insertCell(6).innerText = `${d.gstRate}%`;
                row.insertCell(7).innerText = `₹${d.cgst.toFixed(2)}`;
                row.insertCell(8).innerText = `₹${d.sgst.toFixed(2)}`;
                row.insertCell(9).innerText = `₹${d.totalGST.toFixed(2)}`;
            });
        }
    }
    
    function displayInputTable() {
        const tbody = document.getElementById('inputBody');
        tbody.innerHTML = '';
        if (inputDetails.length === 0) {
            tbody.innerHTML = '<tr><td colspan="10" class="empty-message">No purchases in this period</td></tr>';
        } else {
            inputDetails.forEach(d => {
                const row = tbody.insertRow();
                row.insertCell(0).innerText = d.invoiceNo;
                row.insertCell(1).innerText = d.date;
                row.insertCell(2).innerText = d.supplier;
                row.insertCell(3).innerText = d.part;
                row.insertCell(4).innerText = d.qty;
                row.insertCell(5).innerText = `₹${d.taxable.toFixed(2)}`;
                row.insertCell(6).innerText = `${d.gstRate}%`;
                row.insertCell(7).innerText = `₹${d.cgst.toFixed(2)}`;
                row.insertCell(8).innerText = `₹${d.sgst.toFixed(2)}`;
                row.insertCell(9).innerText = `₹${d.totalGST.toFixed(2)}`;
            });
        }
    }
    
    function toggleDebug() {
        console.log('=== GST REGISTER DEBUG INFO ===');
        console.log('Purchase invoices count:', allPurchases.length);
        console.log('Input details count:', inputDetails.length);
        if (allPurchases.length > 0 && allPurchases[0].items && allPurchases[0].items[0]) {
            const sample = allPurchases[0].items[0];
            console.log('Sample purchase item fields:', Object.keys(sample));
            console.log('Sample purchase item:', sample);
        }
        alert('Debug info logged to console (F12). Look for "GST REGISTER DEBUG INFO".');
    }
    
    function exportGSTR1() {
        const from = document.getElementById('fromDate').value;
        const to = document.getElementById('toDate').value;
        if (!from || !to) { alert('Select date range'); return; }
        const gstin = document.getElementById('gstin')?.value || '19ANOPD3300R1ZO';
        const gstr1 = { version: '1.0.0', gstin, fp: `${from.slice(5,7)}${from.slice(0,4)}`, b2b: outputDetails.map(inv => ({
            ctin: '', inv: [{ inum: inv.invoiceNo, idt: inv.date, val: inv.taxable, itms: [{ num: 1, itm_det: { txval: inv.taxable, rt: inv.gstRate, camt: inv.cgst, samt: inv.sgst, iamt: 0, csamt: 0 } }] }]
        })) };
        downloadJSON(gstr1, `GSTR1_${from}_to_${to}`);
    }
    
    function exportGSTR3B() {
        const from = document.getElementById('fromDate').value;
        const gstin = document.getElementById('gstin')?.value || '19ANOPD3300R1ZO';
        const payableCgst = outputTotal.cgst - inputTotal.cgst;
        const payableSgst = outputTotal.sgst - inputTotal.sgst;
        const gstr3b = {
            version: '1.0.0', gstin, fp: `${from.slice(5,7)}${from.slice(0,4)}`,
            supply_attr: { os_sup_zero: { txval: 0 } },
            intr_attr: { intr_sup: { txval: outputTotal.taxable, iamt: 0, camt: outputTotal.cgst, samt: outputTotal.sgst, csamt: 0 } },
            itc_avl: { itc_avl: { iamt: 0, camt: inputTotal.cgst, samt: inputTotal.sgst, csamt: 0 } },
            net_taxpay_attr: { os_taxpay: { iamt: 0, camt: Math.max(0, payableCgst), samt: Math.max(0, payableSgst), csamt: 0 } }
        };
        downloadJSON(gstr3b, `GSTR3B_${from.slice(0,7)}`);
    }
    
    function downloadJSON(data, filename) {
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `${filename}.json`;
        a.click();
        URL.revokeObjectURL(blob);
    }
    
    function openTab(evt, tabName) {
        document.querySelectorAll('.tabcontent').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tablinks').forEach(btn => btn.classList.remove('active'));
        document.getElementById(tabName).classList.add('active');
        evt.currentTarget.classList.add('active');
    }
    
    // Set default dates (current month)
    const today = new Date();
    const firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
    document.getElementById('fromDate').value = firstDay.toISOString().slice(0,10);
    document.getElementById('toDate').value = today.toISOString().slice(0,10);
    calculateGST();
</script>
</body>
</html>
