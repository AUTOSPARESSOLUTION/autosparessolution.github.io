<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>GST Register</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><style>body{font-family:'Roboto',sans-serif;background:#0f172a;color:#e2e8f0;padding:1rem}.container{max-width:800px;margin:0 auto;background:#1e293b;padding:1.5rem;border-radius:1rem}h1{color:#facc15}.gst-box{background:#0f172a;padding:1rem;border-radius:0.5rem;margin:1rem 0;text-align:center}</style></head>
<body><div class="container"><h1><i class="fas fa-percent"></i> GST Register</h1><div class="gst-box"><h3>Output GST (Sales)</h3><p id="outputGST">₹0</p></div><div class="gst-box"><h3>Input GST (Purchase)</h3><p id="inputGST">₹0</p></div><div class="gst-box"><h3>GST Payable</h3><p id="gstPayable">₹0</p></div></div>
<script>const inv=JSON.parse(localStorage.getItem('allInvoices')||'[]');const po=JSON.parse(localStorage.getItem('allPurchases')||'[]');let out=0,inp=0;for(const i of inv)for(const it of i.items)out+=(it.price*it.qty)*0.18;for(const p of po)for(const it of p.items)inp+=(it.price*it.qty)*0.18;document.getElementById('outputGST').innerHTML=`₹${out.toFixed(2)}`;document.getElementById('inputGST').innerHTML=`₹${inp.toFixed(2)}`;document.getElementById('gstPayable').innerHTML=`₹${(out-inp).toFixed(2)}`;</script></body></html>
