<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Expense Entry</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><style>body{font-family:'Roboto',sans-serif;background:#0f172a;color:#e2e8f0;padding:1rem}.container{max-width:600px;margin:0 auto;background:#1e293b;padding:1.5rem;border-radius:1rem}h1{color:#facc15}input,select,textarea{width:100%;padding:0.5rem;margin-bottom:0.5rem;background:#0f172a;border:1px solid #334155;color:white;border-radius:0.5rem}button{background:#3b82f6;color:white;padding:0.5rem 1rem;border:none;border-radius:0.5rem;cursor:pointer}</style></head>
<body><div class="container"><h1><i class="fas fa-money-bill-wave"></i> Expense Entry</h1><form id="expForm"><input type="date" id="expDate" required><select id="expCat"><option>Courier Charges</option><option>Razorpay Charges</option><option>Packing Charges</option><option>Advertisement</option><option>Salary</option><option>Fuel</option><option>Other</option></select><input type="number" id="expAmt" step="0.01" placeholder="Amount" required><textarea id="expDesc" rows="2" placeholder="Description"></textarea><button type="submit">Save Expense</button></form><div id="msg"></div></div>
<script>document.getElementById('expForm').addEventListener('submit',(e)=>{e.preventDefault();const exp={date:document.getElementById('expDate').value,category:document.getElementById('expCat').value,amount:parseFloat(document.getElementById('expAmt').value),description:document.getElementById('expDesc').value,timestamp:new Date().toISOString()};let exps=JSON.parse(localStorage.getItem('expenses')||'[]');exps.push(exp);localStorage.setItem('expenses',JSON.stringify(exps));alert('Saved!');document.getElementById('expForm').reset();});</script></body></html>
