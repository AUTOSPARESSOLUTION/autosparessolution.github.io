<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Expense Report</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><style>body{font-family:'Roboto',sans-serif;background:#0f172a;color:#e2e8f0;padding:1rem}.container{max-width:1200px;margin:0 auto;background:#1e293b;padding:1.5rem;border-radius:1rem}h1{color:#facc15}.summary{background:#0f172a;padding:1rem;border-radius:0.5rem;margin-bottom:1rem}table{width:100%;border-collapse:collapse;margin-top:1rem}th,td{border:1px solid #334155;padding:0.5rem;text-align:left}th{background:#0f172a;color:#facc15}.btn{background:#3b82f6;color:white;padding:0.5rem 1rem;border:none;border-radius:0.5rem;cursor:pointer}</style></head>
<body><div class="container"><h1><i class="fas fa-chart-line"></i> Expense Report</h1><div class="summary"><strong>Total Expenses:</strong> ₹<span id="totalExp">0</span></div><table id="expTable"><thead><tr><th>Date</th><th>Category</th><th>Amount</th><th>Description</th></tr></thead><tbody></tbody></table><button class="btn" onclick="exportCSV()">Export CSV</button></div>
<script>function loadExp(){const exps=JSON.parse(localStorage.getItem('expenses')||'[]');let total=0;const tbody=document.querySelector('#expTable tbody');tbody.innerHTML='';for(const e of exps.reverse()){total+=e.amount;const r=tbody.insertRow();r.insertCell(0).innerText=e.date;r.insertCell(1).innerText=e.category;r.insertCell(2).innerText=`₹${e.amount.toFixed(2)}`;r.insertCell(3).innerText=e.description||'-';}document.getElementById('totalExp').innerText=total.toFixed(2);}function exportCSV(){let c="Date,Category,Amount,Description\n";const exps=JSON.parse(localStorage.getItem('expenses')||'[]');for(const e of exps)c+=`${e.date},${e.category},${e.amount},${e.description}\n`;const b=new Blob([c],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='expense_report.csv';a.click();URL.revokeObjectURL(b);}loadExp();</script></body></html>
