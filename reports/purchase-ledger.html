<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase Register</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Roboto', sans-serif; background: #0f172a; color: #e2e8f0; padding: 1rem; }
        .container { max-width: 1400px; margin: 0 auto; background: #1e293b; padding: 1.5rem; border-radius: 1rem; }
        h1 { color: #facc15; }
        .summary { background: #0f172a; padding: 1rem; border-radius: 0.5rem; margin-bottom: 1rem; display: flex; gap: 2rem; flex-wrap: wrap; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; overflow-x: auto; display: block; }
        th, td { border: 1px solid #334155; padding: 0.5rem; text-align: left; }
        th { background: #0f172a; color: #facc15; }
        .btn { background: #3b82f6; color: white; padding: 0.5rem 1rem; border: none; border-radius: 0.5rem; cursor: pointer; }
        .empty-message { text-align: center; padding: 2rem; color: #94a3b8; }
    </style>
</head>
<body>
<div class="container">
    <h1><i class="fas fa-truck"></i> Purchase Register</h1>
    <div class="summary">
        <div><strong>Total Purchase (Taxable):</strong> ₹<span id="totalPurchase">0</span></div>
        <div><strong>Total GST Paid:</strong> ₹<span id="totalGST">0</span></div>
        <div><strong>Grand Total:</strong> ₹<span id="grandTotal">0</span></div>
    </div>
    <div style="overflow-x: auto;" id="tableContainer">
        <table id="purchaseTable">
            <thead>
                <tr><th>PO No</th><th>Date</th><th>Supplier</th><th>Part No</th><th>Qty</th><th>Rate</th><th>GST</th><th>Total</th></tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    <button class="btn" onclick="exportToCSV()"><i class="fas fa-file-excel"></i> Export CSV</button>
</div>
<script>
    function loadPurchases() {
        const allPurchases = JSON.parse(localStorage.getItem('allPurchases') || '[]');
        const tbody = document.querySelector('#purchaseTable tbody');
        tbody.innerHTML = '';
        
        if (allPurchases.length === 0) {
            const container = document.getElementById('tableContainer');
            container.innerHTML = '<div class="empty-message"><i class="fas fa-info-circle"></i> No purchase invoices found.<br><br>Generate a purchase invoice from the main website to see data here.</div>';
            document.getElementById('totalPurchase').innerText = '0';
            document.getElementById('totalGST').innerText = '0';
            document.getElementById('grandTotal').innerText = '0';
            return;
        }
        
        let totalPurchase = 0, totalGST = 0, grandTotal = 0;
        for (const po of allPurchases) {
            const date = new Date(po.date).toLocaleDateString('en-IN');
            for (const item of po.items) {
                const subtotal = item.price * item.qty;
                const gst = subtotal * 0.18;
                const lineTotal = subtotal + gst;
                totalPurchase += subtotal;
                totalGST += gst;
                grandTotal += lineTotal;
                const row = tbody.insertRow();
                row.insertCell(0).innerText = po.poNo || 'N/A';
                row.insertCell(1).innerText = date;
                row.insertCell(2).innerText = po.supplierName || 'Unknown';
                row.insertCell(3).innerText = item.part;
                row.insertCell(4).innerText = item.qty;
                row.insertCell(5).innerText = `₹${item.price.toFixed(2)}`;
                row.insertCell(6).innerText = `₹${gst.toFixed(2)}`;
                row.insertCell(7).innerText = `₹${lineTotal.toFixed(2)}`;
            }
        }
        document.getElementById('totalPurchase').innerText = totalPurchase.toFixed(2);
        document.getElementById('totalGST').innerText = totalGST.toFixed(2);
        document.getElementById('grandTotal').innerText = grandTotal.toFixed(2);
    }
    
    function exportToCSV() {
        const allPurchases = JSON.parse(localStorage.getItem('allPurchases') || '[]');
        if (allPurchases.length === 0) { alert('No data to export'); return; }
        let csv = "PO No,Date,Supplier,Part No,Qty,Rate,GST,Total\n";
        for (const po of allPurchases) {
            const date = new Date(po.date).toLocaleDateString();
            for (const item of po.items) {
                const gst = (item.price * item.qty) * 0.18;
                csv += `${po.poNo},${date},${po.supplierName},${item.part},${item.qty},${item.price},${gst.toFixed(2)},${((item.price * item.qty) + gst).toFixed(2)}\n`;
            }
        }
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'purchase_register.csv';
        a.click();
        URL.revokeObjectURL(url);
    }
    
    loadPurchases();
</script>
</body>
</html>
