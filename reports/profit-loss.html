<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Profit & Loss</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><style>body{font-family:'Roboto',sans-serif;background:#0f172a;color:#e2e8f0;padding:1rem}.container{max-width:1000px;margin:0 auto;background:#1e293b;padding:1.5rem;border-radius:1rem}h1{color:#facc15}.section{margin-top:1.5rem;border-top:2px solid #334155;padding-top:1rem}.row{display:flex;justify-content:space-between;padding:0.5rem 0;border-bottom:1px solid #334155}.total-row{font-weight:bold;background:#0f172a;padding:0.75rem;border-radius:0.5rem;margin-top:0.5rem}.profit{color:#4ade80}.loss{color:#f87171}.period{display:flex;gap:1rem;margin-bottom:1.5rem}input,button{background:#0f172a;border:1px solid #facc15;color:white;padding:0.5rem;border-radius:0.5rem}button{background:#3b82f6;cursor:pointer}</style></head>
<body><div class="container"><h1><i class="fas fa-chart-line"></i> Profit & Loss</h1><div class="period"><input type="date" id="fromDate"><input type="date" id="toDate"><button onclick="loadPL()">Load</button><button onclick="exportCSV()">Export CSV</button></div><div id="pl"><div class="section"><h2>Income</h2><div id="incomeList"></div><div class="total-row" id="totalIncome">Total Income: ₹0</div></div><div class="section"><h2>Cost of Goods Sold</h2><div id="cogsList"></div><div class="total-row" id="totalCOGS">Total COGS: ₹0</div></div><div class="section"><h2>Expenses</h2><div id="expenseList"></div><div class="total-row" id="totalExpenses">Total Expenses: ₹0</div></div><div class="section"><h2>Profit Summary</h2><div class="row"><span>Gross Profit (Sales - COGS):</span><span id="grossProfit">₹0</span></div><div class="total-row" id="netProfitRow">Net Profit: ₹0</div></div></div></div>
<script>function loadPL(){const from=document.getElementById('fromDate').value,to=document.getElementById('toDate').value;if(!from||!to){alert('Select dates');return;}const inv=JSON.parse(localStorage.getItem('allInvoices')||'[]');const po=JSON.parse(localStorage.getItem('allPurchases')||'[]');const exp=JSON.parse(localStorage.getItem('expenses')||'[]');const f=new Date(from),t=new Date(to);let sales=0,purch=0,exps=0;for(const i of inv){if(new Date(i.date)>=f&&new Date(i.date)<=t)for(const it of i.items)sales+=it.price*it.qty;}for(const p of po){if(new Date(p.date)>=f&&new Date(p.date)<=t)for(const it of p.items)purch+=it.price*it.qty;}for(const e of exp){if(new Date(e.date)>=f&&new Date(e.date)<=t)exps+=e.amount;}const gp=sales-purch;const np=gp-exps;document.getElementById('totalIncome').innerHTML=`Total Income: ₹${sales.toFixed(2)}`;document.getElementById('totalCOGS').innerHTML=`Total COGS: ₹${purch.toFixed(2)}`;document.getElementById('totalExpenses').innerHTML=`Total Expenses: ₹${exps.toFixed(2)}`;document.getElementById('grossProfit').innerHTML=`₹${gp.toFixed(2)}`;const npEl=document.getElementById('netProfitRow');npEl.innerHTML=np>=0?`Net Profit: <span class="profit">₹${np.toFixed(2)}</span>`:`Net Loss: <span class="loss">₹${Math.abs(np).toFixed(2)}</span>`;document.getElementById('incomeList').innerHTML=`<div class="row"><span>Sales Revenue</span><span>₹${sales.toFixed(2)}</span></div>`;document.getElementById('cogsList').innerHTML=`<div class="row"><span>Purchases</span><span>₹${purch.toFixed(2)}</span></div>`;let expHtml='';const expCat=new Map();for(const e of exp)expCat.set(e.category,(expCat.get(e.category)||0)+e.amount);for(const [c,a] of expCat)expHtml+=`<div class="row"><span>${c}</span><span>₹${a.toFixed(2)}</span></div>`;document.getElementById('expenseList').innerHTML=expHtml||'<div class="row"><span>No expenses</span><span>₹0</span></div>';}function exportCSV(){let c="Profit & Loss Statement\n";c+=`Period: ${document.getElementById('fromDate').value} to ${document.getElementById('toDate').value}\n`;c+="Income,Sales Revenue,,"+document.getElementById('totalIncome').innerText.match(/[\d.]+/)[0]+"\n";c+="Expenses,,,"+document.getElementById('totalExpenses').innerText.match(/[\d.]+/)[0]+"\n";c+="Net Profit,,,"+document.getElementById('netProfitRow').innerText.match(/[\d.]+/)[0]+"\n";const b=new Blob([c],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='profit_loss.csv';a.click();URL.revokeObjectURL(b);}const today=new Date();const firstDay=new Date(today.getFullYear(),today.getMonth(),1);document.getElementById('fromDate').value=firstDay.toISOString().split('T')[0];document.getElementById('toDate').value=today.toISOString().split('T')[0];loadPL();</script></body></html>
