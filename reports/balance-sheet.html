<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Balance Sheet</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><style>body{font-family:'Roboto',sans-serif;background:#0f172a;color:#e2e8f0;padding:1rem}.container{max-width:1000px;margin:0 auto;background:#1e293b;padding:1.5rem;border-radius:1rem}h1{color:#facc15}.grid{display:grid;grid-template-columns:1fr 1fr;gap:2rem;margin-top:1rem}.section{background:#0f172a;padding:1rem;border-radius:0.5rem}.row{display:flex;justify-content:space-between;padding:0.5rem 0;border-bottom:1px solid #334155}.total-row{font-weight:bold;background:#1e293b;padding:0.75rem;border-radius:0.5rem;margin-top:0.5rem;border-top:2px solid #facc15}.period{margin-bottom:1rem;display:flex;gap:1rem}input,button{background:#0f172a;border:1px solid #facc15;color:white;padding:0.5rem;border-radius:0.5rem}button{background:#3b82f6;cursor:pointer}</style></head>
<body><div class="container"><h1><i class="fas fa-balance-scale"></i> Balance Sheet</h1><div class="period"><input type="date" id="asOnDate"><button onclick="loadBS()">Load</button><button onclick="checkBalance()">Check Balance</button></div><div class="grid"><div class="section"><h2>Assets</h2><div id="assetsList"></div><div id="totalAssets" class="total-row">Total Assets: ₹0</div></div><div class="section"><h2>Liabilities & Equity</h2><div id="liabilitiesList"></div><div id="totalLiabilities" class="total-row">Total Liabilities & Equity: ₹0</div></div></div><div id="balanceMsg" style="margin-top:1rem;text-align:center"></div></div>
<script>function loadBS(){const date=document.getElementById('asOnDate').value;if(!date){alert('Select date');return;}const inv=JSON.parse(localStorage.getItem('allInvoices')||'[]');const po=JSON.parse(localStorage.getItem('allPurchases')||'[]');const exp=JSON.parse(localStorage.getItem('expenses')||'[]');const asOn=new Date(date);let sales=0,purch=0,exps=0;for(const i of inv)if(new Date(i.date)<=asOn)for(const it of i.items)sales+=it.price*it.qty;for(const p of po)if(new Date(p.date)<=asOn)for(const it of p.items)purch+=it.price*it.qty;for(const e of exp)if(new Date(e.date)<=asOn)exps+=e.amount;const cash=sales-purch-exps;const stock=500000;const fixed=50000;const payables=purch;const gstPayable=(sales*0.18)-(purch*0.18);const capital=100000;const retainedEarnings=sales-purch-exps;const totalAssets=cash+stock+fixed;const totalLiabilities=payables+gstPayable+capital+retainedEarnings;document.getElementById('assetsList').innerHTML=`<div class="row"><span>Cash in Bank</span><span>₹${cash.toFixed(2)}</span></div><div class="row"><span>Stock</span><span>₹${stock.toFixed(2)}</span></div><div class="row"><span>Fixed Assets</span><span>₹${fixed.toFixed(2)}</span></div>`;document.getElementById('totalAssets').innerHTML=`Total Assets: ₹${totalAssets.toFixed(2)}`;document.getElementById('liabilitiesList').innerHTML=`<div class="row"><span>Payables</span><span>₹${payables.toFixed(2)}</span></div><div class="row"><span>GST Payable</span><span>₹${Math.max(0,gstPayable).toFixed(2)}</span></div><div class="row"><span>Capital</span><span>₹${capital.toFixed(2)}</span></div><div class="row"><span>Retained Earnings</span><span>₹${retainedEarnings.toFixed(2)}</span></div>`;document.getElementById('totalLiabilities').innerHTML=`Total Liabilities & Equity: ₹${totalLiabilities.toFixed(2)}`;}function checkBalance(){const tA=parseFloat(document.getElementById('totalAssets').innerText.match(/[\d.]+/)[0]);const tL=parseFloat(document.getElementById('totalLiabilities').innerText.match(/[\d.]+/)[0]);const diff=Math.abs(tA-tL);const msgDiv=document.getElementById('balanceMsg');if(diff<1)msgDiv.innerHTML='<span style="color:#4ade80;">✅ Balance Sheet is balanced!</span>';else msgDiv.innerHTML=`<span style="color:#f87171;">❌ Difference of ₹${diff.toFixed(2)}</span>`;}document.getElementById('asOnDate').value=new Date().toISOString().split('T')[0];loadBS();</script></body></html>
