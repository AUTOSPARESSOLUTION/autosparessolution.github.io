<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Report</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background: #e9ecef; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; border-radius: 12px; padding: 20px; }
        h1 { color: #0a7c71; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #dee2e6; padding: 10px; text-align: left; }
        th { background: #0a7c71; color: white; }
        .low-stock { background-color: #fff3cd; }
        button { background: #0a7c71; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; margin-bottom:15px; }
    </style>
    <script src="data-manager.js"></script>
</head>
<body>
<div class="container">
    <h1>Stock Report</h1>
    <button onclick="location.reload()">Refresh</button>
    <div id="stockTable"></div>
</div>
<script>
    function displayStock() {
        const products = getProducts();
        if (products.length === 0) { document.getElementById('stockTable').innerHTML = '<p>No products.</p>'; return; }
        let html = '<table><thead><tr><th>SKU</th><th>Product Name</th><th>Current Stock</th><th>Unit</th><th>Reorder Level</th><th>Status</th></tr></thead><tbody>';
        products.forEach(p => {
            const low = (p.currentStock || 0) <= (p.reorderLevel || 0);
            html += `<tr class="${low ? 'low-stock' : ''}">
                <td>${p.sku}</td><td>${p.name}</td><td>${p.currentStock}</td><td>${p.unit}</td><td>${p.reorderLevel}</td>
                <td>${low ? '⚠️ Low stock' : 'OK'}</td>
            </tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('stockTable').innerHTML = html;
    }
    displayStock();
</script>
</body>
</html>
