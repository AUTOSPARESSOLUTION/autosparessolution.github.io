<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Report – Auto Spares</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background: #e9ecef; margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: auto; background: white; border-radius: 12px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: #0a7c71; }
        .search-box { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; align-items: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #dee2e6; padding: 10px; text-align: left; vertical-align: top; }
        th { background: #0a7c71; color: white; }
        .low-stock { background-color: #fff3cd; }
        button { background: #0a7c71; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; margin: 2px; }
        .import-btn { background: #28a745; }
        .export-btn { background: #6c757d; }
        .debug { background: #e9ecef; padding: 10px; margin-bottom: 15px; font-family: monospace; font-size: 12px; display: none; }
        @media (max-width: 768px) { table { font-size: 12px; } }
    </style>
</head>
<body>
<div class="container">
    <h1><i class="fas fa-chart-line"></i> Stock Report</h1>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search by SKU, Name, Brand, Make..." style="flex:1; padding: 8px;">
        <button onclick="searchProducts()">🔍 Search</button>
        <button onclick="loadReport()">🔄 Refresh</button>
        <button onclick="importFromCSV()" class="import-btn"><i class="fas fa-file-csv"></i> Import CSV</button>
        <button onclick="exportToCSV()" class="export-btn">📄 Export CSV</button>
        <button onclick="toggleDebug()" style="background:#ffc107; color:#333;">🐞 Debug</button>
    </div>
    <div id="debugPanel" class="debug"></div>
    <div id="stockTable"></div>
    <button onclick="window.location.href='index.html'" style="margin-top:20px;">Back to Dashboard</button>
</div>

<script>
    // Helper: read products directly from localStorage (no data-manager.js dependency)
    function getLocalProducts() {
        const stored = localStorage.getItem('products');
        if (stored) {
            try {
                return JSON.parse(stored);
            } catch(e) { return []; }
        }
        return [];
    }

    function saveLocalProducts(products) {
        localStorage.setItem('products', JSON.stringify(products));
    }

    async function importFromCSV() {
        try {
            const res = await fetch('prices.csv');
            const csv = await res.text();
            const lines = csv.split('\n');
            const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
            const partIdx = headers.indexOf('part');
            const descIdx = headers.indexOf('desc') !== -1 ? headers.indexOf('desc') : headers.indexOf('description');
            const brandIdx = headers.indexOf('brand');
            const makeIdx = headers.indexOf('make');
            const priceIdx = headers.indexOf('price');
            const stockIdx = headers.indexOf('stock');
            let products = getLocalProducts();
            let imported = 0;
            for (let i = 1; i < lines.length; i++) {
                const cols = lines[i].split(',');
                const part = cols[partIdx]?.trim();
                if (!part) continue;
                if (!products.find(p => p.sku === part)) {
                    products.push({
                        id: Date.now() + Math.random(),
                        name: descIdx !== -1 ? cols[descIdx]?.trim() || part : part,
                        sku: part,
                        brand: brandIdx !== -1 ? cols[brandIdx]?.trim() : '',
                        make: makeIdx !== -1 ? cols[makeIdx]?.trim() : '',
                        price: priceIdx !== -1 ? parseFloat(cols[priceIdx]) || 0 : 0,
                        currentStock: stockIdx !== -1 ? parseInt(cols[stockIdx]) || 0 : 0,
                        reorderLevel: 10,
                        createdAt: new Date().toISOString()
                    });
                    imported++;
                }
            }
            if (imported > 0) {
                saveLocalProducts(products);
                alert(`${imported} products imported.`);
                loadReport();
            } else {
                alert('No new products found.');
            }
        } catch(e) {
            alert('Import error: ' + e.message);
        }
    }

    function loadReport() {
        const products = getLocalProducts();
        displayProducts(products, document.getElementById('searchInput').value);
    }

    function displayProducts(products, searchTerm = '') {
        let filtered = products;
        if (searchTerm) {
            const term = searchTerm.toLowerCase();
            filtered = products.filter(p =>
                (p.sku && p.sku.toLowerCase().includes(term)) ||
                (p.name && p.name.toLowerCase().includes(term)) ||
                (p.brand && p.brand.toLowerCase().includes(term)) ||
                (p.make && p.make.toLowerCase().includes(term))
            );
        }
        if (filtered.length === 0) {
            document.getElementById('stockTable').innerHTML = '<p>No products found. Click "Import CSV" to load from prices.csv.</p>';
            return;
        }
        let html = '<table><thead>
            <th>SKU</th><th>Product Name</th><th>Brand</th><th>Make</th><th>Stock</th><th>Price (₹)</th><th>Status</th>
        </table></thead><tbody>';
        filtered.forEach(p => {
            const low = (p.currentStock || 0) <= (p.reorderLevel || 0);
            html += `<tr class="${low ? 'low-stock' : ''}">
                <td>${escapeHtml(p.sku)}</strong></td>
                <td><strong>${escapeHtml(p.name)}</strong></td>
                <td>${escapeHtml(p.brand || '-')}</td>
                <td>${escapeHtml(p.make || '-')}</td>
                <td>${p.currentStock || 0}</td>
                <td>₹${(p.price || 0).toFixed(2)}</strong></td>
                <td>${low ? '<i class="fas fa-exclamation-triangle"></i> Low Stock' : 'OK'}</td>
            </tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('stockTable').innerHTML = html;
    }

    function searchProducts() {
        const products = getLocalProducts();
        const term = document.getElementById('searchInput').value;
        displayProducts(products, term);
    }

    function exportToCSV() {
        const products = getLocalProducts();
        if (!products.length) { alert('No data to export'); return; }
        let csv = "SKU,Product Name,Brand,Make,Stock,Price (₹),Status\n";
        products.forEach(p => {
            const status = (p.currentStock || 0) <= (p.reorderLevel || 0) ? 'Low Stock' : 'OK';
            csv += `"${escapeCsv(p.sku)}","${escapeCsv(p.name)}","${escapeCsv(p.brand || '')}","${escapeCsv(p.make || '')}",${p.currentStock || 0},${p.price || 0},"${status}"\n`;
        });
        const blob = new Blob([csv], {type:'text/csv'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'stock_report.csv'; a.click(); URL.revokeObjectURL(blob);
    }

    function toggleDebug() {
        const panel = document.getElementById('debugPanel');
        if (panel.style.display === 'none' || panel.style.display === '') {
            const products = getLocalProducts();
            panel.innerHTML = `<strong>Products in localStorage (key "products"):</strong> ${products.length}<br>
                               ${products.length > 0 ? `First product: ${JSON.stringify(products[0], null, 2)}` : 'No products.'}<br>
                               Use "Import CSV" to load.`;
            panel.style.display = 'block';
        } else {
            panel.style.display = 'none';
        }
    }

    function escapeHtml(s) { return s.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
    function escapeCsv(s) { return `"${s.replace(/"/g, '""')}"`; }

    loadReport();
</script>
</body>
</html>
