<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Report – Auto Spares</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="data-manager.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background: #e9ecef; margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: auto; background: white; border-radius: 12px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: #0a7c71; }
        .filter-box { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 20px; align-items: flex-end; }
        .filter-group { flex: 1; min-width: 180px; }
        label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 4px; }
        select, input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; }
        button { background: #0a7c71; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #dee2e6; padding: 10px; text-align: left; vertical-align: top; }
        th { background: #0a7c71; color: white; }
        .low-stock { background-color: #fff3cd; }
        .export-btn { background: #6c757d; }
        @media (max-width: 768px) { .filter-box { flex-direction: column; align-items: stretch; } }
    </style>
</head>
<body>
<div class="container">
    <h1><i class="fas fa-chart-line"></i> Stock Report</h1>
    <div class="filter-box">
        <div class="filter-group"><label>Brand</label><select id="brandFilter"><option value="">All</option></select></div>
        <div class="filter-group"><label>Make</label><select id="makeFilter"><option value="">All</option></select></div>
        <div class="filter-group"><label>Group (Category)</label><select id="groupFilter"><option value="">All</option></select></div>
        <div class="filter-group"><label>Line Code</label><input type="text" id="lineCodeFilter" placeholder="e.g., 1001"></div>
        <div class="filter-group">
            <button onclick="refreshReport()"><i class="fas fa-sync-alt"></i> Refresh</button>
            <button onclick="exportToCSV()" class="export-btn"><i class="fas fa-file-csv"></i> Export CSV</button>
        </div>
    </div>
    <div id="stockTable"></div>
    <button onclick="window.location.href='index.html'" style="margin-top:20px;">Back to Dashboard</button>
</div>

<script>
    function refreshReport() {
        let products = getProducts();
        const brand = document.getElementById('brandFilter').value;
        const make = document.getElementById('makeFilter').value;
        const group = document.getElementById('groupFilter').value;
        const lineCode = document.getElementById('lineCodeFilter').value.trim();
        let filtered = products;
        if (brand) filtered = filtered.filter(p => p.brand === brand);
        if (make) filtered = filtered.filter(p => p.make === make);
        if (group) filtered = filtered.filter(p => p.group === group);
        if (lineCode) filtered = filtered.filter(p => p.lineCode && p.lineCode.toString() === lineCode);
        filtered.sort((a,b) => a.name.localeCompare(b.name));
        if (filtered.length === 0) {
            document.getElementById('stockTable').innerHTML = '<p>No products match the filter.</p>';
            return;
        }
        let html = '</table><thead>
            <th>SKU</th><th>Product Name</th><th>Brand</th><th>Make</th><th>Group</th><th>Line Code</th><th>Stock</th><th>Price (₹)</th><th>Status</th>
        </tr></thead><tbody>';
        filtered.forEach(p => {
            const low = (p.currentStock || 0) <= (p.reorderLevel || 0);
            html += `<tr class="${low ? 'low-stock' : ''}">
                <td>${escapeHtml(p.sku)}</td>
                <td><strong>${escapeHtml(p.name)}</strong></td>
                <td>${escapeHtml(p.brand || '-')}</td>
                <td>${escapeHtml(p.make || '-')}</td>
                <td>${escapeHtml(p.group || '-')}</td>
                <td>${p.lineCode || '-'}</td>
                <td>${p.currentStock || 0}</td>
                <td>₹${(p.price || 0).toFixed(2)}</td>
                <td>${low ? '<i class="fas fa-exclamation-triangle"></i> Low Stock' : 'OK'}</td>
            </tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('stockTable').innerHTML = html;
    }

    function populateFilters() {
        const products = getProducts();
        const brands = [...new Set(products.map(p => p.brand).filter(b => b))].sort();
        const makes = [...new Set(products.map(p => p.make).filter(m => m))].sort();
        const groups = [...new Set(products.map(p => p.group).filter(g => g))].sort();
        const brandSelect = document.getElementById('brandFilter');
        brandSelect.innerHTML = '<option value="">All</option>' + brands.map(b => `<option value="${escapeHtml(b)}">${escapeHtml(b)}</option>`).join('');
        const makeSelect = document.getElementById('makeFilter');
        makeSelect.innerHTML = '<option value="">All</option>' + makes.map(m => `<option value="${escapeHtml(m)}">${escapeHtml(m)}</option>`).join('');
        const groupSelect = document.getElementById('groupFilter');
        groupSelect.innerHTML = '<option value="">All</option>' + groups.map(g => `<option value="${escapeHtml(g)}">${escapeHtml(g)}</option>`).join('');
    }

    function exportToCSV() {
        const table = document.getElementById('stockTable');
        if (!table || !table.querySelector('tbody tr')) {
            alert('No data to export');
            return;
        }
        let csv = "SKU,Product Name,Brand,Make,Group,Line Code,Stock,Price (₹),Status\n";
        const rows = table.querySelectorAll('tbody tr');
        rows.forEach(row => {
            const cells = row.querySelectorAll('td');
            if (cells.length) {
                csv += `"${escapeCsv(cells[0].innerText)}","${escapeCsv(cells[1].innerText)}","${escapeCsv(cells[2].innerText)}","${escapeCsv(cells[3].innerText)}","${escapeCsv(cells[4].innerText)}","${escapeCsv(cells[5].innerText)}","${cells[6].innerText}","${cells[7].innerText.replace('₹', '')}","${escapeCsv(cells[8].innerText)}"\n`;
            }
        });
        const blob = new Blob([csv], {type:'text/csv'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'stock_report.csv';
        a.click();
        URL.revokeObjectURL(url);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;');
    }
    function escapeCsv(str) {
        return `"${(str || '').replace(/"/g, '""')}"`;
    }

    populateFilters();
    refreshReport();
</script>
</body>
</html>
