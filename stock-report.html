<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Report – Auto Spares</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background: #e9ecef; margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: auto; background: white; border-radius: 12px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: #0a7c71; }
        .search-box { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; align-items: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #dee2e6; padding: 10px; text-align: left; vertical-align: top; }
        th { background: #0a7c71; color: white; }
        .low-stock { background-color: #fff3cd; }
        button { background: #0a7c71; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; margin: 2px; }
        .import-btn { background: #28a745; }
        .export-btn { background: #6c757d; }
        @media (max-width: 768px) { table { font-size: 12px; } }
    </style>
    <script src="data-manager.js"></script>
</head>
<body>
<div class="container">
    <h1><i class="fas fa-chart-line"></i> Stock Report (From Invoices)</h1>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search by SKU, Name..." style="flex:1; padding: 8px;">
        <button onclick="refreshReport()">🔄 Refresh</button>
        <button onclick="importFromCSV()" class="import-btn"><i class="fas fa-file-csv"></i> Import CSV</button>
        <button onclick="exportToCSV()" class="export-btn">📄 Export CSV</button>
    </div>
    <div id="stockTable"></div>
    <button onclick="window.location.href='index.html'" style="margin-top:20px;">Back to Dashboard</button>
</div>

<script>
    // ========== STOCK COMPUTATION FROM INVOICES ==========
    function computeStockFromTransactions() {
        // Get purchase invoices (stock in)
        const purchaseInvoices = JSON.parse(localStorage.getItem('purchaseInvoices') || '[]');
        // Get sales invoices (stock out) – try both common keys
        const allSales = JSON.parse(localStorage.getItem('allInvoices') || '[]');
        const salesInvoices = JSON.parse(localStorage.getItem('salesInvoices') || '[]');
        const combinedSales = [...allSales, ...salesInvoices];

        const stockMap = new Map(); // key: sku/part

        // Process purchases (IN)
        purchaseInvoices.forEach(inv => {
            (inv.items || []).forEach(item => {
                const sku = item.productId || item.part || item.sku;
                if (!sku) return;
                const qty = parseFloat(item.quantity || item.qty || 0);
                const cost = parseFloat(item.cost || item.price || 0);
                const desc = item.desc || item.productName || '';
                if (!stockMap.has(sku)) {
                    stockMap.set(sku, { sku, name: desc, stock: 0, price: cost });
                }
                const entry = stockMap.get(sku);
                entry.stock += qty;
                if (entry.price === 0 && cost > 0) entry.price = cost;
                if (!entry.name && desc) entry.name = desc;
            });
        });

        // Process sales (OUT)
        combinedSales.forEach(inv => {
            (inv.items || []).forEach(item => {
                const sku = item.productId || item.part || item.sku;
                if (!sku) return;
                const qty = parseFloat(item.quantity || item.qty || 0);
                const price = parseFloat(item.price || 0);
                const desc = item.desc || '';
                if (!stockMap.has(sku)) {
                    stockMap.set(sku, { sku, name: desc, stock: 0, price: price });
                }
                const entry = stockMap.get(sku);
                entry.stock -= qty;
                if (entry.price === 0 && price > 0) entry.price = price;
                if (!entry.name && desc) entry.name = desc;
            });
        });

        // Optional: enrich with product master (brand, make, group, lineCode) if available
        try {
            const masterProducts = JSON.parse(localStorage.getItem('products') || '[]');
            for (let [sku, entry] of stockMap.entries()) {
                const master = masterProducts.find(p => p.sku === sku);
                if (master) {
                    entry.name = master.name || entry.name;
                    entry.brand = master.brand || '';
                    entry.make = master.make || '';
                    entry.group = master.group || '';
                    entry.lineCode = master.lineCode || '';
                }
            }
        } catch(e) {}

        return Array.from(stockMap.values());
    }

    function refreshReport() {
        let stockData = computeStockFromTransactions();
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        let filtered = stockData;
        if (searchTerm) {
            filtered = stockData.filter(p =>
                p.sku.toLowerCase().includes(searchTerm) ||
                p.name.toLowerCase().includes(searchTerm)
            );
        }
        if (filtered.length === 0) {
            let msg = 'No stock data found. No purchase or sales invoices exist.';
            if (stockData.length === 0) {
                msg += ' Create a purchase or sales invoice first.';
            } else {
                msg += ' No product matches the search.';
            }
            document.getElementById('stockTable').innerHTML = `<p>${msg}</p>`;
            return;
        }
        let html = '<table><thead>
            <th>SKU</th><th>Product Name</th><th>Stock</th><th>Price (₹)</th><th>Status</th>
        </tr></thead><tbody>';
        filtered.forEach(p => {
            const low = (p.stock || 0) <= 10; // assume reorder level 10
            html += `<tr class="${low ? 'low-stock' : ''}">
                <td>${escapeHtml(p.sku)}</strong></td>
                <td><strong>${escapeHtml(p.name)}</strong></td>
                <td>${p.stock || 0}</td>
                <td>${p.price ? '₹' + p.price.toFixed(2) : '-'}</td>
                <td>${low ? '<i class="fas fa-exclamation-triangle"></i> Low Stock' : 'OK'}</td>
            </tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('stockTable').innerHTML = html;
    }

    // ========== IMPORT CSV (to optionally fill product master) ==========
    async function importFromCSV() {
        try {
            const res = await fetch('prices.csv');
            const csv = await res.text();
            const lines = csv.split('\n');
            const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
            const partIdx = headers.indexOf('part');
            const descIdx = headers.indexOf('desc') !== -1 ? headers.indexOf('desc') : headers.indexOf('description');
            const brandIdx = headers.indexOf('brand');
            const makeIdx = headers.indexOf('make');
            const priceIdx = headers.indexOf('price');
            const stockIdx = headers.indexOf('stock');
            let products = JSON.parse(localStorage.getItem('products') || '[]');
            let imported = 0;
            for (let i = 1; i < lines.length; i++) {
                const cols = lines[i].split(',');
                const part = cols[partIdx]?.trim();
                if (!part) continue;
                if (!products.find(p => p.sku === part)) {
                    products.push({
                        id: Date.now() + Math.random(),
                        name: descIdx !== -1 ? cols[descIdx]?.trim() || part : part,
                        sku: part,
                        brand: brandIdx !== -1 ? cols[brandIdx]?.trim() : '',
                        make: makeIdx !== -1 ? cols[makeIdx]?.trim() : '',
                        price: priceIdx !== -1 ? parseFloat(cols[priceIdx]) || 0 : 0,
                        currentStock: stockIdx !== -1 ? parseInt(cols[stockIdx]) || 0 : 0,
                        reorderLevel: 10,
                        createdAt: new Date().toISOString()
                    });
                    imported++;
                }
            }
            if (imported) {
                localStorage.setItem('products', JSON.stringify(products));
                alert(`${imported} products imported.`);
                refreshReport(); // refresh now that product names may be better
            } else {
                alert('No new products found.');
            }
        } catch(e) {
            alert('Import error: ' + e.message);
        }
    }

    function exportToCSV() {
        const table = document.getElementById('stockTable');
        if (!table) return;
        let csv = "SKU,Product Name,Stock,Price (₹),Status\n";
        const rows = table.querySelectorAll('tbody tr');
        rows.forEach(row => {
            const cols = row.querySelectorAll('td');
            if (cols.length) {
                csv += `"${escapeCsv(cols[0].innerText)}","${escapeCsv(cols[1].innerText)}",${cols[2].innerText},${cols[3].innerText},"${escapeCsv(cols[4].innerText)}"\n`;
            }
        });
        const blob = new Blob([csv], {type:'text/csv'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'stock_report.csv';
        a.click();
        URL.revokeObjectURL(blob);
    }

    function escapeHtml(s) { return s.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
    function escapeCsv(s) { return `"${s.replace(/"/g, '""')}"`; }

    refreshReport();
</script>
</body>
</html>
