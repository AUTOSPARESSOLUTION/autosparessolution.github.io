<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Purchase Invoice – Auto Spares</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="data-manager.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background: #e9ecef; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; border-radius: 12px; padding: 20px; }
        h1 { color: #0a7c71; }
        .form-row { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 15px; }
        .form-group { flex: 1; min-width: 180px; }
        label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 4px; }
        input, select, textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; }
        button { background: #0a7c71; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; margin-right: 10px; }
        table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        th, td { border: 1px solid #dee2e6; padding: 8px; text-align: left; }
        th { background: #f1f3f5; }
        .item-row { background: #f8f9fa; padding: 10px; border-radius: 6px; margin-bottom: 10px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
        .item-row input, .item-row select { flex: 1; min-width: 100px; }
        .remove-item { background: #dc3545; color: white; border: none; padding: 4px 8px; cursor: pointer; }
        .totals { text-align: right; margin-top: 20px; }
    </style>
</head>
<body>
<div class="container">
    <h1><i class="fas fa-edit"></i> Edit Purchase Invoice</h1>
    <div id="warningMsg" style="background:#fff3cd; padding:10px; display:none;"></div>

    <div class="form-row">
        <div class="form-group"><label>Invoice No (read‑only)</label><input type="text" id="invoiceNo" readonly></div>
        <div class="form-group"><label>Invoice Date</label><input type="date" id="invoiceDate"></div>
        <div class="form-group"><label>Due Date</label><input type="date" id="dueDate"></div>
    </div>
    <div class="form-row">
        <div class="form-group"><label>Supplier Name</label><input type="text" id="supplierName"></div>
        <div class="form-group"><label>Supplier Email</label><input type="email" id="supplierEmail"></div>
        <div class="form-group"><label>Supplier GSTIN</label><input type="text" id="supplierGstin"></div>
    </div>
    <div class="form-row">
        <div class="form-group"><label>Supplier Address</label><textarea id="supplierAddress" rows="2"></textarea></div>
        <div class="form-group"><label>Supplier Phone</label><input type="text" id="supplierPhone"></div>
    </div>

    <h3>Items Purchased</h3>
    <div id="itemsContainer"></div>
    <button class="add-item" onclick="addItem()">+ Add Item</button>

    <div class="totals">
        <p><strong>Subtotal:</strong> ₹<span id="subtotal">0.00</span></p>
        <p><strong>CGST (9%):</strong> ₹<span id="cgstTotal">0.00</span></p>
        <p><strong>SGST (9%):</strong> ₹<span id="sgstTotal">0.00</span></p>
        <p><strong>Grand Total:</strong> ₹<span id="grandTotal">0.00</span></p>
    </div>

    <button onclick="saveChanges()">Save Changes</button>
    <button onclick="window.close()">Cancel</button>
</div>

<script>
    let originalInvoice = null;
    let items = [];
    let products = [];
    let suppliers = [];

    function loadInvoice() {
        const invoiceId = localStorage.getItem('editPurchaseInvoiceId');
        if (!invoiceId) { alert('No invoice selected'); window.close(); return; }
        const purchaseInvoices = JSON.parse(localStorage.getItem('purchaseInvoices') || '[]');
        originalInvoice = purchaseInvoices.find(i => i.id == invoiceId);
        if (!originalInvoice) { alert('Invoice not found'); window.close(); return; }
        products = getProducts();
        suppliers = JSON.parse(localStorage.getItem('suppliers') || '[]');
        const supplier = suppliers.find(s => s.email === originalInvoice.supplierEmail) || originalInvoice.supplier || {};
        document.getElementById('invoiceNo').value = originalInvoice.invoiceNo || originalInvoice.poNo || '';
        document.getElementById('invoiceDate').value = originalInvoice.date;
        document.getElementById('dueDate').value = originalInvoice.dueDate || '';
        document.getElementById('supplierName').value = supplier.name || '';
        document.getElementById('supplierEmail').value = supplier.email || originalInvoice.supplierEmail || '';
        document.getElementById('supplierGstin').value = supplier.gstin || '';
        document.getElementById('supplierAddress').value = supplier.address || '';
        document.getElementById('supplierPhone').value = supplier.phone || '';
        // Convert original items to editable format
        items = (originalInvoice.items || []).map(item => ({
            productId: item.productId,
            productName: (products.find(p => p.id == item.productId) || {}).name || '',
            qty: item.quantity,
            cost: item.cost,
            discount: item.discount || 0,
            desc: item.desc || '',
            hsn: item.hsn || '',
            part: item.productId || item.part || ''
        }));
        renderItems();
        recalcTotals();
    }

    function addItem() {
        items.push({ productId: '', productName: '', qty: 1, cost: 0, discount: 0, desc: '', hsn: '', part: '' });
        renderItems();
    }

    function removeItem(idx) {
        items.splice(idx, 1);
        renderItems();
        recalcTotals();
    }

    function updateItem(idx, field, value) {
        items[idx][field] = value;
        if (field === 'productId') {
            const product = products.find(p => p.id == value);
            if (product) {
                items[idx].productName = product.name;
                items[idx].part = product.sku || product.id;
                items[idx].desc = product.name;
                items[idx].hsn = product.hsn || '';
            }
        }
        renderItems();
        recalcTotals();
    }

    function renderItems() {
        const container = document.getElementById('itemsContainer');
        container.innerHTML = '';
        items.forEach((item, idx) => {
            let productOptions = '<option value="">-- Select Product --</option>';
            products.forEach(p => {
                productOptions += `<option value="${p.id}" ${item.productId == p.id ? 'selected' : ''}>${p.name} (${p.sku}) - Stock: ${p.currentStock}</option>`;
            });
            const div = document.createElement('div');
            div.className = 'item-row';
            div.innerHTML = `
                <select onchange="updateItem(${idx}, 'productId', this.value)" style="flex:2;">${productOptions}</select>
                <input type="text" placeholder="Part No" value="${escapeHtml(item.part)}" onchange="updateItem(${idx}, 'part', this.value)" style="flex:1;">
                <input type="text" placeholder="Description" value="${escapeHtml(item.desc)}" onchange="updateItem(${idx}, 'desc', this.value)" style="flex:2;">
                <input type="text" placeholder="HSN" value="${escapeHtml(item.hsn)}" onchange="updateItem(${idx}, 'hsn', this.value)" style="flex:1;">
                <input type="number" placeholder="Qty" value="${item.qty}" onchange="updateItem(${idx}, 'qty', parseFloat(this.value))" style="flex:1;">
                <input type="number" placeholder="Cost (₹)" value="${item.cost}" step="0.01" onchange="updateItem(${idx}, 'cost', parseFloat(this.value))" style="flex:1;">
                <input type="number" placeholder="Disc %" value="${item.discount}" step="0.01" onchange="updateItem(${idx}, 'discount', parseFloat(this.value))" style="flex:1;">
                <button class="remove-item" onclick="removeItem(${idx})">X</button>
            `;
            container.appendChild(div);
        });
    }

    function recalcTotals() {
        let subtotal = 0;
        items.forEach(i => {
            const qty = i.qty || 0;
            const cost = i.cost || 0;
            const disc = i.discount || 0;
            const taxable = qty * cost * (1 - disc/100);
            subtotal += taxable;
        });
        const cgst = subtotal * 0.09;
        const sgst = subtotal * 0.09;
        const grand = subtotal + cgst + sgst;
        document.getElementById('subtotal').innerText = subtotal.toFixed(2);
        document.getElementById('cgstTotal').innerText = cgst.toFixed(2);
        document.getElementById('sgstTotal').innerText = sgst.toFixed(2);
        document.getElementById('grandTotal').innerText = grand.toFixed(2);
        return { subtotal, cgst, sgst, grand };
    }

    function saveChanges() {
        const newDate = document.getElementById('invoiceDate').value;
        const newDueDate = document.getElementById('dueDate').value;
        let supplierEmail = document.getElementById('supplierEmail').value.trim();
        const supplierName = document.getElementById('supplierName').value.trim();
        if (!supplierName && !supplierEmail) { alert('Supplier name or email required'); return; }
        // Ensure supplier exists
        let supplier = suppliers.find(s => s.email === supplierEmail || s.name === supplierName);
        if (!supplier) {
            supplier = {
                id: Date.now(),
                name: supplierName,
                email: supplierEmail || `temp_${Date.now()}@email.com`,
                phone: document.getElementById('supplierPhone').value,
                gstin: document.getElementById('supplierGstin').value,
                address: document.getElementById('supplierAddress').value,
                creditLimit: 50000,
                openingBalance: 0,
                outstanding: 0,
                status: 'active',
                supplierCode: 'SUP' + (suppliers.length + 1).toString().padStart(4,'0'),
                createdAt: new Date().toISOString()
            };
            suppliers.push(supplier);
            localStorage.setItem('suppliers', JSON.stringify(suppliers));
        }
        // Reverse old stock and outstanding
        let products = getProducts();
        for (let oldItem of originalInvoice.items) {
            let prod = products.find(p => p.id == oldItem.productId);
            if (prod) prod.currentStock -= oldItem.quantity;
        }
        let oldSupplier = suppliers.find(s => s.email === originalInvoice.supplierEmail);
        if (oldSupplier) oldSupplier.outstanding -= (originalInvoice.total || originalInvoice.grandTotal || 0);
        // Apply new stock and outstanding
        const totals = recalcTotals();
        const newInvoiceItems = [];
        for (let item of items) {
            if (!item.productId) continue;
            newInvoiceItems.push({
                productId: item.productId,
                quantity: item.qty,
                cost: item.cost,
                discount: item.discount,
                desc: item.desc,
                hsn: item.hsn,
                part: item.part
            });
            let prod = products.find(p => p.id == item.productId);
            if (prod) prod.currentStock += item.qty;
            else {
                // Create new product
                let newProd = {
                    id: item.productId,
                    name: item.desc || item.part,
                    sku: item.productId,
                    currentStock: item.qty,
                    unit: 'pc',
                    price: item.cost,
                    reorderLevel: 10,
                    createdAt: new Date().toISOString()
                };
                products.push(newProd);
            }
        }
        saveProducts(products);
        supplier.outstanding = (supplier.outstanding || 0) + totals.grand;
        localStorage.setItem('suppliers', JSON.stringify(suppliers));
        // Update invoice record
        const updatedInvoice = {
            ...originalInvoice,
            date: newDate,
            dueDate: newDueDate,
            supplierEmail: supplier.email,
            supplier: supplier,
            items: newInvoiceItems,
            total: totals.grand,
            grandTotal: totals.grand
        };
        let all = JSON.parse(localStorage.getItem('purchaseInvoices') || '[]');
        const index = all.findIndex(i => i.id == originalInvoice.id);
        if (index !== -1) all[index] = updatedInvoice;
        localStorage.setItem('purchaseInvoices', JSON.stringify(all));
        alert('Invoice updated successfully');
        window.close();
    }

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
    loadInvoice();
</script>
</body>
</html>
