<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Purchase Invoice</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="data-manager.js"></script>
    <style>
        body { font-family: 'Roboto', sans-serif; background: #e9ecef; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; border-radius: 12px; padding: 20px; }
        .form-row { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 15px; }
        .form-group { flex: 1; min-width: 180px; }
        label { font-weight: 600; display: block; margin-bottom: 4px; }
        input, select, textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; }
        button { background: #0a7c71; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; margin-right: 10px; }
        .item-row { background: #f8f9fa; padding: 10px; border-radius: 6px; margin-bottom: 10px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
        .item-row input { flex: 1; min-width: 80px; }
        .remove-item { background: #dc3545; color: white; border: none; padding: 4px 8px; cursor: pointer; }
        .totals { text-align: right; margin-top: 20px; }
        .totals p { margin: 5px 0; }
    </style>
</head>
<body>
<div class="container">
    <h1><i class="fas fa-edit"></i> Edit Purchase Invoice</h1>
    <div class="form-row">
        <div class="form-group"><label>Invoice No (read‑only)</label><input type="text" id="invoiceNo" readonly></div>
        <div class="form-group"><label>Invoice Date</label><input type="date" id="invoiceDate"></div>
        <div class="form-group"><label>Due Date</label><input type="date" id="dueDate"></div>
    </div>
    <div class="form-row">
        <div class="form-group"><label>Supplier Name</label><input type="text" id="supplierName"></div>
        <div class="form-group"><label>Supplier Email</label><input type="email" id="supplierEmail"></div>
        <div class="form-group"><label>Supplier GSTIN</label><input type="text" id="supplierGstin"></div>
    </div>
    <div class="form-row">
        <div class="form-group"><label>Supplier Address</label><textarea id="supplierAddress" rows="2"></textarea></div>
        <div class="form-group"><label>Supplier Phone</label><input type="text" id="supplierPhone"></div>
    </div>
    <h3>Items</h3>
    <div id="itemsContainer"></div>
    <button class="add-item" onclick="addItem()">+ Add Item</button>
    <div class="totals">
        <p><strong>Subtotal:</strong> ₹<span id="subtotal">0.00</span></p>
        <p><strong>CGST (9%):</strong> ₹<span id="cgstTotal">0.00</span></p>
        <p><strong>SGST (9%):</strong> ₹<span id="sgstTotal">0.00</span></p>
        <p><strong>Grand Total:</strong> ₹<span id="grandTotal">0.00</span></p>
    </div>
    <button onclick="saveChanges()">Save Changes</button>
    <button onclick="window.close()">Cancel</button>
</div>

<script>
    let originalInvoice = null;
    let items = [];
    let suppliers = [];
    let products = [];

    function loadInvoice() {
        const id = localStorage.getItem('editPurchaseInvoiceId');
        if (!id) { alert('No invoice selected'); window.close(); return; }
        const all = JSON.parse(localStorage.getItem('purchaseInvoices') || '[]');
        originalInvoice = all.find(i => i.id == id);
        if (!originalInvoice) { alert('Invoice not found'); window.close(); return; }
        suppliers = JSON.parse(localStorage.getItem('suppliers') || '[]');
        products = (typeof getProducts === 'function') ? getProducts() : [];
        const sup = suppliers.find(s => s.email === originalInvoice.supplierEmail) || originalInvoice.supplier || {};
        document.getElementById('invoiceNo').value = originalInvoice.invoiceNo || originalInvoice.poNo || '';
        document.getElementById('invoiceDate').value = originalInvoice.date;
        document.getElementById('dueDate').value = originalInvoice.dueDate || '';
        document.getElementById('supplierName').value = sup.name || '';
        document.getElementById('supplierEmail').value = sup.email || originalInvoice.supplierEmail || '';
        document.getElementById('supplierGstin').value = sup.gstin || '';
        document.getElementById('supplierAddress').value = sup.address || '';
        document.getElementById('supplierPhone').value = sup.phone || '';
        // Normalise items: if original has productId but no part/desc, try to fetch from products
        const rawItems = originalInvoice.items || [];
        if (rawItems.length === 0) {
            items = []; // start empty, user will add via button
        } else {
            items = rawItems.map(item => {
                let part = item.part || item.productId || '';
                let desc = item.desc || '';
                let hsn = item.hsn || '';
                let qty = item.quantity || item.qty || 1;
                let cost = item.cost || item.price || 0;
                let disc = item.discount || 0;
                // Try to fetch from products if description missing
                if (part && !desc && products) {
                    const prod = products.find(p => p.id == part || p.sku == part);
                    if (prod) desc = prod.name;
                }
                return { part, desc, hsn, qty, cost, discount: disc };
            });
        }
        if (items.length === 0) addItem(); // at least one row
        renderItems();
        recalcTotals();
    }

    function addItem() {
        items.push({ part: '', desc: '', hsn: '', qty: 1, cost: 0, discount: 0 });
        renderItems();
        recalcTotals();
    }

    function removeItem(idx) {
        items.splice(idx, 1);
        renderItems();
        recalcTotals();
    }

    function updateItem(idx, field, val) {
        items[idx][field] = val;
        if (field === 'part') {
            // auto-fetch description from products if available
            const prod = products.find(p => p.id == val || p.sku == val);
            if (prod && !items[idx].desc) items[idx].desc = prod.name;
            if (prod && !items[idx].hsn) items[idx].hsn = prod.hsn || '';
        }
        renderItems(); // re-render to reflect updated fields
        recalcTotals();
    }

    function renderItems() {
        const container = document.getElementById('itemsContainer');
        container.innerHTML = '';
        items.forEach((item, idx) => {
            const div = document.createElement('div');
            div.className = 'item-row';
            div.innerHTML = `
                <input type="text" placeholder="Part No" value="${escapeHtml(item.part)}" onchange="updateItem(${idx}, 'part', this.value)" style="flex:2;">
                <input type="text" placeholder="Description" value="${escapeHtml(item.desc)}" onchange="updateItem(${idx}, 'desc', this.value)" style="flex:2;">
                <input type="text" placeholder="HSN" value="${escapeHtml(item.hsn)}" onchange="updateItem(${idx}, 'hsn', this.value)" style="flex:1;">
                <input type="number" placeholder="Qty" value="${item.qty}" step="any" onchange="updateItem(${idx}, 'qty', parseFloat(this.value))" style="flex:1;">
                <input type="number" placeholder="Unit Cost" value="${item.cost}" step="0.01" onchange="updateItem(${idx}, 'cost', parseFloat(this.value))" style="flex:1;">
                <input type="number" placeholder="Disc %" value="${item.discount}" step="0.01" onchange="updateItem(${idx}, 'discount', parseFloat(this.value))" style="flex:1;">
                <button class="remove-item" onclick="removeItem(${idx})">X</button>
            `;
            container.appendChild(div);
        });
    }

    function recalcTotals() {
        let subtotal = 0;
        items.forEach(i => {
            const qty = i.qty || 0;
            const cost = i.cost || 0;
            const disc = i.discount || 0;
            const taxable = qty * cost * (1 - disc/100);
            subtotal += taxable;
        });
        const cgst = subtotal * 0.09;
        const sgst = subtotal * 0.09;
        const grand = subtotal + cgst + sgst;
        document.getElementById('subtotal').innerText = subtotal.toFixed(2);
        document.getElementById('cgstTotal').innerText = cgst.toFixed(2);
        document.getElementById('sgstTotal').innerText = sgst.toFixed(2);
        document.getElementById('grandTotal').innerText = grand.toFixed(2);
        return { subtotal, cgst, sgst, grand };
    }

    function saveChanges() {
        const newDate = document.getElementById('invoiceDate').value;
        const newDue = document.getElementById('dueDate').value;
        let supEmail = document.getElementById('supplierEmail').value.trim();
        let supName = document.getElementById('supplierName').value.trim();
        if (!supName && !supEmail) { alert('Supplier required'); return; }
        // Ensure supplier exists
        let supplier = suppliers.find(s => s.email === supEmail || s.name === supName);
        if (!supplier) {
            supplier = {
                id: Date.now(),
                name: supName,
                email: supEmail || `temp_${Date.now()}@email.com`,
                phone: document.getElementById('supplierPhone').value,
                gstin: document.getElementById('supplierGstin').value,
                address: document.getElementById('supplierAddress').value,
                creditLimit: 50000,
                openingBalance: 0,
                outstanding: 0,
                supplierCode: 'SUP' + (suppliers.length+1).toString().padStart(4,'0'),
                createdAt: new Date().toISOString()
            };
            suppliers.push(supplier);
            localStorage.setItem('suppliers', JSON.stringify(suppliers));
        }
        // Reverse old stock & outstanding
        let products = (typeof getProducts === 'function') ? getProducts() : [];
        for (let old of (originalInvoice.items || [])) {
            let oldPart = old.part || old.productId;
            if (!oldPart) continue;
            let prod = products.find(p => p.id == oldPart || p.sku == oldPart);
            if (prod) prod.currentStock -= (old.quantity || old.qty || 0);
        }
        let oldSupp = suppliers.find(s => s.email === originalInvoice.supplierEmail);
        if (oldSupp) oldSupp.outstanding -= (originalInvoice.total || originalInvoice.grandTotal || 0);
        // Apply new stock & outstanding
        const totals = recalcTotals();
        const newItems = items.filter(i => i.part).map(i => ({
            part: i.part, desc: i.desc, hsn: i.hsn, quantity: i.qty, cost: i.cost, discount: i.discount
        }));
        for (let it of newItems) {
            let prod = products.find(p => p.id == it.part || p.sku == it.part);
            if (prod) prod.currentStock += it.quantity;
            else {
                let newProd = {
                    id: it.part,
                    name: it.desc || it.part,
                    sku: it.part,
                    currentStock: it.quantity,
                    unit: 'pc',
                    price: it.cost,
                    reorderLevel: 10,
                    createdAt: new Date().toISOString()
                };
                products.push(newProd);
            }
        }
        if (typeof saveProducts === 'function') saveProducts(products);
        supplier.outstanding = (supplier.outstanding || 0) + totals.grand;
        localStorage.setItem('suppliers', JSON.stringify(suppliers));
        // Update invoice
        const updated = {
            ...originalInvoice,
            date: newDate,
            dueDate: newDue,
            supplierEmail: supplier.email,
            supplier: supplier,
            items: newItems,
            total: totals.grand,
            grandTotal: totals.grand
        };
        let all = JSON.parse(localStorage.getItem('purchaseInvoices') || '[]');
        const idx = all.findIndex(i => i.id == originalInvoice.id);
        if (idx !== -1) all[idx] = updated;
        localStorage.setItem('purchaseInvoices', JSON.stringify(all));
        alert('Invoice updated successfully');
        window.close();
    }

    function escapeHtml(s) { return s.replace(/[&<>]/g, m => m=='&'?'&amp;':m=='<'?'&lt;':'&gt;'); }
    loadInvoice();
</script>
</body>
    </html>
