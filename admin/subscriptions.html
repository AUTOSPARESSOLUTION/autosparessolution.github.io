<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Subscriptions – Admin</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><style>body{font-family:'Roboto',sans-serif;background:#0f172a;color:#e2e8f0}.container{max-width:1400px;margin:0 auto;padding:2rem}h1{color:#facc15}table{width:100%;border-collapse:collapse;margin-top:1rem}th,td{border:1px solid #334155;padding:0.5rem;text-align:left}th{background:#facc15;color:#0f172a}.summary{background:#1e293b;padding:1rem;border-radius:0.5rem;margin-bottom:1rem;display:flex;gap:2rem;flex-wrap:wrap}</style></head>
<body><div class="container"><h1><i class="fas fa-users"></i> Dealer Subscriptions</h1><div class="summary"><div><strong>Total Subscribers:</strong> <span id="totalSub">0</span></div><div><strong>Active Paid:</strong> <span id="activePaid">0</span></div><div><strong>Free Trial:</strong> <span id="trialUsers">0</span></div><div><strong>Monthly Revenue:</strong> ₹<span id="mrr">0</span></div></div>
<table id="subTable"><thead><tr><th>Dealer</th><th>Plan</th><th>Status</th><th>Start Date</th><th>Next Billing</th><th>Amount</th></tr></thead><tbody></tbody></table></div>
<script>const dealers=JSON.parse(localStorage.getItem('dealers')||'[]');let total=0,active=0,trial=0,mrr=0;const tbody=document.querySelector('#subTable tbody');for(const d of dealers){const s=JSON.parse(localStorage.getItem(`dealer_${d.email}_subscription`)||'{}');if(s.plan){total++;if(s.status==='active'){if(s.plan!=='free'){active++;mrr+=s.amount||0;}else trial++;}const row=tbody.insertRow();row.insertCell(0).innerText=d.name;row.insertCell(1).innerText=s.plan;row.insertCell(2).innerText=s.status||'active';row.insertCell(3).innerText=s.startDate?new Date(s.startDate).toLocaleDateString():'-';row.insertCell(4).innerText=s.nextBillingDate?new Date(s.nextBillingDate).toLocaleDateString():'-';row.insertCell(5).innerText=s.amount?`₹${s.amount}`:'-';}}document.getElementById('totalSub').innerText=total;document.getElementById('activePaid').innerText=active;document.getElementById('trialUsers').innerText=trial;document.getElementById('mrr').innerText=mrr.toFixed(2);</script></body></html>
