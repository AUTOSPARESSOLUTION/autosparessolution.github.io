<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order History - Auto Spares</title>
    <style>
        body { font-family: 'Roboto', sans-serif; background: #f4f4f4; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; border-radius: 10px; padding: 20px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { color: #0a7c71; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #0a7c71; color: white; }
        .search-box { margin-bottom: 20px; }
        button { background: #0a7c71; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; margin: 2px; }
        button:hover { background: #09645a; }
        .btn-edit { background: #17a2b8; }
        .btn-edit:hover { background: #138496; }
        .btn-delete { background: #dc3545; }
        .btn-delete:hover { background: #c82333; }
        .btn-pdf { background: #e67e22; }
        .btn-pdf:hover { background: #d35400; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
<div class="container">
    <h1>Order History (All Invoices)</h1>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search by Invoice No, Customer Name..." style="width: 300px; padding: 8px;">
        <button onclick="filterOrders()">Search</button>
        <button onclick="exportToCSV()">Export to CSV</button>
    </div>
    <div id="ordersTable"></div>
    <button onclick="window.location.href='index.html'">Back to Store</button>
</div>

<script>
    let allInvoices = JSON.parse(localStorage.getItem('allInvoices') || '[]');

    function displayOrders(filter = '') {
        let filtered = allInvoices;
        if (filter) {
            filtered = allInvoices.filter(inv => 
                inv.invoiceNo.toLowerCase().includes(filter) ||
                (inv.buyer?.name && inv.buyer.name.toLowerCase().includes(filter))
            );
        }
        if (filtered.length === 0) {
            document.getElementById('ordersTable').innerHTML = '<p>No invoices found.</p>';
            return;
        }
        let html = '<table><thead><tr><th>Invoice No</th><th>Date</th><th>Customer Name</th><th>Amount (₹)</th><th>Status</th><th>Type</th><th>Actions</th></tr></thead><tbody>';
        filtered.forEach(inv => {
            html += `<tr>
                <td>${inv.invoiceNo}</td>
                <td>${inv.date}</td>
                <td>${inv.buyer?.name || 'Guest'}</td>
                <td>₹${inv.grandTotal.toFixed(2)}</td>
                <td>${inv.status}</td>
                <td>${inv.invoiceType}</td>
                <td>
                    <button class="btn-edit" onclick="editInvoice('${inv.invoiceNo}')">Edit</button>
                    <button class="btn-delete" onclick="deleteInvoice('${inv.invoiceNo}')">Delete</button>
                    <button class="btn-pdf" onclick="downloadInvoicePDF('${inv.invoiceNo}')">PDF</button>
                </td>
            </tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('ordersTable').innerHTML = html;
    }

    function editInvoice(invoiceNo) {
        // Store the invoice to edit in localStorage and open edit page
        localStorage.setItem('editInvoiceNo', invoiceNo);
        window.open('edit-invoice.html', '_blank');
    }

    function deleteInvoice(invoiceNo) {
        if (!confirm(`Are you sure you want to delete invoice ${invoiceNo}? This action cannot be undone.`)) return;
        const invoice = allInvoices.find(i => i.invoiceNo === invoiceNo);
        if (!invoice) return;
        
        // Reverse ledger effect
        const customers = JSON.parse(localStorage.getItem('customers') || '[]');
        const customer = customers.find(c => c.email === invoice.buyer?.email);
        if (customer) {
            if (invoice.invoiceType === 'credit') {
                customer.outstanding -= invoice.grandTotal;
                if (customer.outstanding < 0) customer.outstanding = 0;
            }
            customer.totalPurchased -= invoice.grandTotal;
            localStorage.setItem('customers', JSON.stringify(customers));
        }
        
        // Remove invoice
        allInvoices = allInvoices.filter(i => i.invoiceNo !== invoiceNo);
        localStorage.setItem('allInvoices', JSON.stringify(allInvoices));
        alert(`Invoice ${invoiceNo} deleted successfully.`);
        displayOrders(document.getElementById('searchInput').value.toLowerCase());
    }

    function downloadInvoicePDF(invoiceNo) {
        const invoice = allInvoices.find(i => i.invoiceNo === invoiceNo);
        if (!invoice) { alert('Invoice not found'); return; }
        // Build PDF container (same as before)
        const container = document.createElement('div');
        container.style.padding = '20px';
        container.style.fontFamily = 'Roboto, sans-serif';
        container.style.maxWidth = '1200px';
        container.style.margin = '0 auto';
        container.style.backgroundColor = 'white';
        
        container.innerHTML = `
            <div style="background: #0a7c71; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 20px;">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <img src="images/ASS.jpg" alt="Logo" style="height: 60px;" onerror="this.src='https://via.placeholder.com/60'">
                    <div><h1 style="margin:0;">Auto Spares Solution</h1><p style="margin:0;">GSTIN: 19ANOPD3300R1ZO</p></div>
                </div>
                <div><h2>TAX INVOICE</h2><p>Invoice No: ${invoice.invoiceNo}<br>Date: ${invoice.date}<br>Due Date: ${invoice.dueDate}</p></div>
            </div>
            <div style="display:flex; gap:20px; flex-wrap:wrap; margin-bottom:20px;">
                <div style="flex:1; background:#f8f9fa; padding:10px;"><h3>Buyer</h3><p>${invoice.buyer?.name}<br>${invoice.buyer?.address}<br>GSTIN: ${invoice.buyer?.gstin}<br>Phone: ${invoice.buyer?.phone}</p></div>
                <div style="flex:1; background:#f8f9fa; padding:10px;"><h3>Consignee</h3><p>${invoice.consignee?.name}<br>${invoice.consignee?.address}<br>Phone: ${invoice.consignee?.phone}</p></div>
            </div>
            <table style="width:100%; border-collapse:collapse; margin:20px 0;"><thead><tr><th>#</th><th>Part No</th><th>Description</th><th>Qty</th><th>Price</th><th>Total</th></tr></thead><tbody>
                ${invoice.items.map((item, i) => `<tr><td>${i+1}</td><td>${item.part}</td><td>${item.desc}</td><td>${item.qty}</td><td>₹${item.price.toFixed(2)}</td><td>₹${item.total.toFixed(2)}</td></tr>`).join('')}
            </tbody></table>
            <div style="text-align:right;"><strong>Grand Total: ₹${invoice.grandTotal.toFixed(2)}</strong></div>
            <div style="margin-top:30px; border-top:1px solid #ccc; padding-top:15px;"><strong>Bank Details:</strong> Union Bank of India, A/c: 021111100007383, IFSC: UBINO802115<br><strong>Terms:</strong> Goods once sold will not be taken back.</div>
        `;
        const opt = { margin: [0.2,0.2,0.2,0.2], filename: `Invoice_${invoice.invoiceNo}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' } };
        html2pdf().set(opt).from(container).save();
    }

    function filterOrders() { const term = document.getElementById('searchInput').value.toLowerCase(); displayOrders(term); }
    function exportToCSV() {
        let csv = "Invoice No,Date,Customer,Amount,Status,Type\n";
        allInvoices.forEach(inv => { csv += `"${inv.invoiceNo}",${inv.date},"${inv.buyer?.name || 'Guest'}",${inv.grandTotal},${inv.status},${inv.invoiceType}\n`; });
        const blob = new Blob([csv], {type: 'text/csv'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = 'orders_backup.csv'; a.click(); URL.revokeObjectURL(url);
    }

    displayOrders();
</script>
</body>
</html>
