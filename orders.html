<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order History - Auto Spares</title>
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: auto;
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #0a7c71;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background: #0a7c71;
            color: white;
        }
        .search-box {
            margin-bottom: 20px;
        }
        button {
            background: #0a7c71;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            margin: 2px;
        }
        button:hover {
            background: #09645a;
        }
        .btn-pdf {
            background: #dc3545;
        }
        .btn-pdf:hover {
            background: #c82333;
        }
        .btn-view {
            background: #17a2b8;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
<div class="container">
    <h1>Order History (All Invoices)</h1>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search by Invoice No, Customer Name..." style="width: 300px; padding: 8px;">
        <button onclick="filterOrders()">Search</button>
        <button onclick="exportToCSV()">Export to CSV</button>
    </div>
    <div id="ordersTable"></div>
    <button onclick="window.location.href='index.html'">Back to Store</button>
</div>

<script>
    let allInvoices = JSON.parse(localStorage.getItem('allInvoices') || '[]');

    function displayOrders(filter = '') {
        let filtered = allInvoices;
        if (filter) {
            filtered = allInvoices.filter(inv => 
                inv.invoiceNo.toLowerCase().includes(filter) ||
                (inv.buyer?.name && inv.buyer.name.toLowerCase().includes(filter))
            );
        }
        if (filtered.length === 0) {
            document.getElementById('ordersTable').innerHTML = '<p>No invoices found.</p>';
            return;
        }
        let html = '<table><thead><tr><th>Invoice No</th><th>Date</th><th>Customer Name</th><th>Amount (₹)</th><th>Status</th><th>Type</th><th>Actions</th></tr></thead><tbody>';
        filtered.forEach(inv => {
            html += `<tr>
                <td>${inv.invoiceNo}</td>
                <td>${inv.date}</td>
                <td>${inv.buyer?.name || 'Guest'}</td>
                <td>₹${inv.grandTotal.toFixed(2)}</td>
                <td>${inv.status}</td>
                <td>${inv.invoiceType}</td>
                <td>
                    <button class="btn-view" onclick="viewInvoice('${inv.invoiceNo}')">View</button>
                    <button class="btn-pdf" onclick="downloadInvoicePDF('${inv.invoiceNo}')">PDF</button>
                </td>
            </tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('ordersTable').innerHTML = html;
    }

    function viewInvoice(invoiceNo) {
        const invoice = allInvoices.find(i => i.invoiceNo === invoiceNo);
        if (invoice) {
            localStorage.setItem('viewInvoice', JSON.stringify(invoice));
            window.open('view-invoice.html', '_blank');
        } else {
            alert('Invoice not found');
        }
    }

    // Generate and download PDF directly from invoice data
    function downloadInvoicePDF(invoiceNo) {
        const invoice = allInvoices.find(i => i.invoiceNo === invoiceNo);
        if (!invoice) {
            alert('Invoice not found');
            return;
        }

        // Build the invoice HTML dynamically
        const container = document.createElement('div');
        container.style.padding = '20px';
        container.style.fontFamily = 'Roboto, sans-serif';
        container.style.maxWidth = '1200px';
        container.style.margin = '0 auto';
        container.style.backgroundColor = 'white';
        
        // Company Header
        container.innerHTML = `
            <div style="background: #0a7c71; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 20px;">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <img src="images/ASS.jpg" alt="Logo" style="height: 60px;" onerror="this.src='https://via.placeholder.com/60'">
                    <div>
                        <h1 style="margin: 0; font-size: 24px;">Auto Spares Solution</h1>
                        <p style="margin: 3px 0 0; font-size: 12px;">GSTIN: 19ANOPD3300R1ZO</p>
                        <p style="margin: 3px 0 0; font-size: 12px;">101, 1st floor, 57/5, Q Road, Howrah, WB 711108</p>
                    </div>
                </div>
                <div style="text-align: right;">
                    <h2 style="margin: 0; font-size: 20px;">TAX INVOICE</h2>
                    <p style="margin: 5px 0; font-size: 12px;"><strong>Invoice No:</strong> ${invoice.invoiceNo}</p>
                    <p style="margin: 5px 0; font-size: 12px;"><strong>Date:</strong> ${invoice.date}</p>
                    <p style="margin: 5px 0; font-size: 12px;"><strong>Due Date:</strong> ${invoice.dueDate}</p>
                </div>
            </div>
        `;

        // Buyer and Consignee
        const buyer = invoice.buyer || {};
        const consignee = invoice.consignee || {};
        container.innerHTML += `
            <div style="display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 20px;">
                <div style="flex: 1; background: #f8f9fa; padding: 10px; border-radius: 6px;">
                    <h3 style="margin: 0 0 8px 0; font-size: 14px; color: #0a7c71;">Buyer (Bill to)</h3>
                    <div style="margin-bottom: 5px; font-size: 12px;"><strong>Name:</strong> ${buyer.name || ''}</div>
                    <div style="margin-bottom: 5px; font-size: 12px;"><strong>Address:</strong> ${buyer.address || ''}</div>
                    <div style="margin-bottom: 5px; font-size: 12px;"><strong>GSTIN:</strong> ${buyer.gstin || ''}</div>
                    <div style="margin-bottom: 5px; font-size: 12px;"><strong>State:</strong> ${buyer.state || ''}</div>
                    <div style="margin-bottom: 5px; font-size: 12px;"><strong>Contact:</strong> ${buyer.phone || ''}</div>
                    <div style="margin-bottom: 5px; font-size: 12px;"><strong>Email:</strong> ${buyer.email || ''}</div>
                </div>
                <div style="flex: 1; background: #f8f9fa; padding: 10px; border-radius: 6px;">
                    <h3 style="margin: 0 0 8px 0; font-size: 14px; color: #0a7c71;">Consignee (Ship to)</h3>
                    <div style="margin-bottom: 5px; font-size: 12px;"><strong>Name:</strong> ${consignee.name || ''}</div>
                    <div style="margin-bottom: 5px; font-size: 12px;"><strong>Address:</strong> ${consignee.address || ''}</div>
                    <div style="margin-bottom: 5px; font-size: 12px;"><strong>Contact:</strong> ${consignee.phone || ''}</div>
                </div>
            </div>
        `;

        // Order and Dispatch Details
        const order = invoice.orderDetails || {};
        const dispatch = invoice.dispatchDetails || {};
        container.innerHTML += `
            <div style="display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 20px;">
                <div style="flex: 1; background: #f8f9fa; padding: 10px; border-radius: 6px;">
                    <h3 style="margin: 0 0 8px 0; font-size: 14px; color: #0a7c71;">Order Details</h3>
                    <div style="margin-bottom: 5px; font-size: 12px;"><strong>Customer Code:</strong> ${order.customerCode || ''}</div>
                    <div style="margin-bottom: 5px; font-size: 12px;"><strong>Sales Order No:</strong> ${order.salesOrderNo || ''}</div>
                    <div style="margin-bottom: 5px; font-size: 12px;"><strong>Reference No:</strong> ${order.referenceNo || ''}</div>
                    <div style="margin-bottom: 5px; font-size: 12px;"><strong>Payment Terms:</strong> ${order.paymentTerms || ''}</div>
                </div>
                <div style="flex: 1; background: #f8f9fa; padding: 10px; border-radius: 6px;">
                    <h3 style="margin: 0 0 8px 0; font-size: 14px; color: #0a7c71;">Dispatch Details</h3>
                    <div style="margin-bottom: 5px; font-size: 12px;"><strong>Dispatch Doc No:</strong> ${dispatch.docNo || ''}</div>
                    <div style="margin-bottom: 5px; font-size: 12px;"><strong>Mode of Transport:</strong> ${dispatch.transportMode || ''}</div>
                    <div style="margin-bottom: 5px; font-size: 12px;"><strong>Vehicle No:</strong> ${dispatch.vehicleNo || ''}</div>
                </div>
            </div>
        `;

        // Items Table
        let itemsHtml = '<table style="width:100%; border-collapse: collapse; margin: 15px 0; font-size: 11px;"><thead><tr><th>#</th><th>Part No</th><th>Description</th><th>Qty</th><th>Unit Price (₹)</th><th>Taxable (₹)</th><th>GST%</th><th>CGST (₹)</th><th>SGST (₹)</th><th>Total (₹)</th></tr></thead><tbody>';
        invoice.items.forEach((item, idx) => {
            const taxable = item.price * item.qty;
            const cgst = taxable * 0.09;
            const sgst = taxable * 0.09;
            itemsHtml += `<tr>
                <td>${idx+1}</td>
                <td style="word-break:break-word;">${escapeHtml(item.part)}</td>
                <td style="word-break:break-word;">${escapeHtml(item.desc)}</td>
                <td>${item.qty}</td>
                <td>₹${item.price.toFixed(2)}</td>
                <td>₹${taxable.toFixed(2)}</td>
                <td>18%</td>
                <td>₹${cgst.toFixed(2)}</td>
                <td>₹${sgst.toFixed(2)}</td>
                <td>₹${(taxable+cgst+sgst).toFixed(2)}</td>
            </tr>`;
        });
        itemsHtml += '</tbody></table>';
        container.innerHTML += itemsHtml;

        // Totals
        container.innerHTML += `
            <div style="text-align: right; margin-top: 15px;">
                <table style="width: 280px; margin-left: auto;">
                    <tr><td style="text-align:right;">Subtotal:</td><td>₹${invoice.subtotal.toFixed(2)}</td></tr>
                    <tr><td style="text-align:right;">CGST (9%):</td><td>₹${invoice.cgst.toFixed(2)}</td></tr>
                    <tr><td style="text-align:right;">SGST (9%):</td><td>₹${invoice.sgst.toFixed(2)}</td></tr>
                    <tr><td style="text-align:right;">Round Off:</td><td>₹${invoice.roundOff.toFixed(2)}</td></tr>
                    <tr style="font-weight:bold;"><td style="text-align:right;">Grand Total:</td><td>₹${invoice.grandTotal.toFixed(2)}</td></tr>
                </table>
            </div>
        `;

        // Bank Details & Signature
        container.innerHTML += `
            <div style="margin-top: 20px; font-size: 11px; border-top: 1px solid #dee2e6; padding-top: 15px;">
                <p><strong>Bank Details:</strong> Auto Spares Solution, Union Bank of India, A/c: 021111100007383, IFSC: UBINO802115, UPI: ass08@uboi</p>
                <p><strong>Terms:</strong> Goods once sold will not be taken back. Interest @24% on bills unpaid after 30 days.</p>
            </div>
            <div style="margin-top: 30px; text-align: right;">
                <div style="width: 250px; border-top: 1px solid #333; padding-top: 5px; margin-left: auto; text-align: center;">
                    For Auto Spares Solution<br>
                    (Authorised Signatory)<br>
                    <span style="font-size: 10px;">(Stamp & Signature)</span>
                </div>
            </div>
        `;

        // Generate PDF using html2pdf
        const opt = {
            margin: [0.2, 0.2, 0.2, 0.2],
            filename: `Invoice_${invoice.invoiceNo}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, letterRendering: true },
            jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(container).save();
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function filterOrders() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        displayOrders(term);
    }

    function exportToCSV() {
        let csv = "Invoice No,Date,Customer,Amount,Status,Type\n";
        allInvoices.forEach(inv => {
            csv += `"${inv.invoiceNo}",${inv.date},"${inv.buyer?.name || 'Guest'}",${inv.grandTotal},${inv.status},${inv.invoiceType}\n`;
        });
        const blob = new Blob([csv], {type: 'text/csv'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'orders_backup.csv';
        a.click();
        URL.revokeObjectURL(url);
    }

    displayOrders();
</script>
</body>
</html>
