<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order History - Auto Spares</title>
    <style>
        body { font-family: 'Roboto', sans-serif; background: #f4f4f4; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; border-radius: 10px; padding: 20px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { color: #0a7c71; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; border: 1px solid #dee2e6; }
        th, td { border: 1px solid #dee2e6; padding: 8px; text-align: left; vertical-align: top; }
        th { background: #0a7c71; color: white; }
        .search-box { margin-bottom: 20px; }
        button { background: #0a7c71; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; margin: 2px; }
        button:hover { background: #09645a; }
        .btn-edit { background: #17a2b8; }
        .btn-edit:hover { background: #138496; }
        .btn-delete { background: #dc3545; }
        .btn-delete:hover { background: #c82333; }
        .btn-pdf { background: #e67e22; }
        .btn-pdf:hover { background: #d35400; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
<div class="container">
    <h1>Order History (All Invoices)</h1>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search by Invoice No, Customer Name..." style="width: 300px; padding: 8px;">
        <button onclick="filterOrders()">Search</button>
        <button onclick="exportToCSV()">Export to CSV</button>
    </div>
    <div id="ordersTable"></div>
    <button onclick="window.location.href='index.html'">Back to Store</button>
</div>

<script>
    let allInvoices = JSON.parse(localStorage.getItem('allInvoices') || '[]');

    function displayOrders(filter = '') {
        let filtered = allInvoices;
        if (filter) {
            filtered = allInvoices.filter(inv => 
                inv.invoiceNo.toLowerCase().includes(filter) ||
                (inv.buyer?.name && inv.buyer.name.toLowerCase().includes(filter))
            );
        }
        if (filtered.length === 0) {
            document.getElementById('ordersTable').innerHTML = '<p>No invoices found.</p>';
            return;
        }
        let html = '<table><thead><tr><th>Invoice No</th><th>Date</th><th>Customer Name</th><th>Amount (₹)</th><th>Status</th><th>Type</th><th>Actions</th></tr></thead><tbody>';
        filtered.forEach(inv => {
            html += `<tr>
                <td>${inv.invoiceNo}</td>
                <td>${inv.date}</td>
                <td>${inv.buyer?.name || 'Guest'}</td>
                <td>₹${inv.grandTotal.toFixed(2)}</td>
                <td>${inv.status}</td>
                <td>${inv.invoiceType}</td>
                <td>
                    <button class="btn-edit" onclick="editInvoice('${inv.invoiceNo}')">Edit</button>
                    <button class="btn-delete" onclick="deleteInvoice('${inv.invoiceNo}')">Delete</button>
                    <button class="btn-pdf" onclick="downloadInvoicePDF('${inv.invoiceNo}')">PDF</button>
                </td>
            </tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('ordersTable').innerHTML = html;
    }

    function editInvoice(invoiceNo) {
        localStorage.setItem('editInvoiceNo', invoiceNo);
        window.open('edit-invoice.html', '_blank');
    }

    function deleteInvoice(invoiceNo) {
        if (!confirm(`Delete invoice ${invoiceNo}?`)) return;
        const invoice = allInvoices.find(i => i.invoiceNo === invoiceNo);
        if (!invoice) return;
        const customers = JSON.parse(localStorage.getItem('customers') || '[]');
        const customer = customers.find(c => c.email === invoice.buyer?.email);
        if (customer) {
            if (invoice.invoiceType === 'credit') customer.outstanding -= invoice.grandTotal;
            if (customer.outstanding < 0) customer.outstanding = 0;
            customer.totalPurchased -= invoice.grandTotal;
            localStorage.setItem('customers', JSON.stringify(customers));
        }
        let deletedNumbers = JSON.parse(localStorage.getItem('deletedInvoiceNumbers') || '[]');
        let number = parseInt(invoice.invoiceNo.split('/').pop());
        deletedNumbers.push({ type: invoice.invoiceType, finYear: invoice.finYear, number: number });
        localStorage.setItem('deletedInvoiceNumbers', JSON.stringify(deletedNumbers));
        allInvoices = allInvoices.filter(i => i.invoiceNo !== invoiceNo);
        localStorage.setItem('allInvoices', JSON.stringify(allInvoices));
        alert(`Invoice ${invoiceNo} deleted.`);
        displayOrders(document.getElementById('searchInput').value.toLowerCase());
    }

    // ========== PDF GENERATION WITH WRAPPING & LOGO ==========
    function downloadInvoicePDF(invoiceNo) {
        const invoice = allInvoices.find(i => i.invoiceNo === invoiceNo);
        if (!invoice) { alert('Invoice not found'); return; }

        const pdfDiv = document.createElement('div');
        pdfDiv.style.width = '100%';
        pdfDiv.style.maxWidth = '800px';
        pdfDiv.style.margin = '0 auto';
        pdfDiv.style.padding = '10px';
        pdfDiv.style.fontFamily = 'Arial, sans-serif';
        pdfDiv.style.fontSize = '11px';
        pdfDiv.style.backgroundColor = 'white';
        pdfDiv.style.color = 'black';

        const esc = (str) => (str || '').replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;');

        const isLocalGst = invoice.buyer?.gstin && invoice.buyer.gstin.startsWith('19');
        
        let subtotal = 0;
        invoice.items.forEach(item => {
            const taxable = item.price * item.qty * (1 - (item.discount || 0) / 100);
            subtotal += taxable;
        });
        const cgst = isLocalGst ? subtotal * 0.09 : 0;
        const sgst = isLocalGst ? subtotal * 0.09 : 0;
        const igst = isLocalGst ? 0 : subtotal * 0.18;
        let grand = subtotal + cgst + sgst + igst;
        const roundOff = Math.round(grand) - grand;
        grand = Math.round(grand);

        // Build items rows with forced wrapping
        let itemsRows = '';
        invoice.items.forEach((item, i) => {
            const taxable = item.price * item.qty * (1 - (item.discount || 0) / 100);
            const itemCgst = isLocalGst ? taxable * 0.09 : 0;
            const itemSgst = isLocalGst ? taxable * 0.09 : 0;
            const itemIgst = isLocalGst ? 0 : taxable * 0.18;
            const totalItem = taxable + itemCgst + itemSgst + itemIgst;
            itemsRows += `<tr>
                <td style="border:1px solid #aaa; padding:4px; text-align:center; width:5%;">${i+1}</td>
                <td style="border:1px solid #aaa; padding:4px; word-wrap:break-word; white-space:normal; width:12%;">${esc(item.part)}</td>
                <td style="border:1px solid #aaa; padding:4px; word-wrap:break-word; white-space:normal; width:18%;">${esc(item.desc)}</td>
                <td style="border:1px solid #aaa; padding:4px; width:8%;">${esc(item.hsn || '')}</td>
                <td style="border:1px solid #aaa; padding:4px; text-align:center; width:5%;">${item.qty}</td>
                <td style="border:1px solid #aaa; padding:4px; text-align:right; width:8%;">₹${item.price.toFixed(2)}</td>
                <td style="border:1px solid #aaa; padding:4px; text-align:center; width:6%;">${item.discount || 0}%</td>
                <td style="border:1px solid #aaa; padding:4px; text-align:right; width:8%;">₹${taxable.toFixed(2)}</td>
                <td style="border:1px solid #aaa; padding:4px; text-align:center; width:5%;">18%</td>
                <td style="border:1px solid #aaa; padding:4px; text-align:right; width:8%;">${isLocalGst ? '₹'+itemCgst.toFixed(2) : '₹'+itemIgst.toFixed(2)}</td>
                ${isLocalGst ? `<td style="border:1px solid #aaa; padding:4px; text-align:right; width:8%;">₹${itemSgst.toFixed(2)}</td>` : ''}
                <td style="border:1px solid #aaa; padding:4px; text-align:right; width:9%;">₹${totalItem.toFixed(2)}</td>
            </tr>`;
        });

        pdfDiv.innerHTML = `
            <div style="background:#0a7c71; color:white; padding:8px 12px; margin-bottom:15px; display:flex; align-items:center; gap:15px;">
                <img src="images/ASS.jpg" alt="Logo" style="height:50px;" onerror="this.style.display='none'">
                <div>
                    <div style="font-size:20px; font-weight:bold;">Auto Spares Solution</div>
                    <div>GSTIN: 19ANOPD3300R1ZO | 101, 1st floor, 57/5, Q Road, Howrah, WB 711108</div>
                </div>
            </div>
            <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                <div><strong>Invoice No:</strong> ${invoice.invoiceNo}<br><strong>Date:</strong> ${invoice.date}<br><strong>Due Date:</strong> ${invoice.dueDate}</div>
                <div style="text-align:right;"><strong>TAX INVOICE</strong></div>
            </div>
            <div style="display:flex; gap:15px; margin-bottom:15px; flex-wrap:wrap;">
                <div style="flex:1; background:#f8f9fa; padding:6px; border-radius:4px;">
                    <strong>Buyer:</strong><br>${esc(invoice.buyer?.name)}<br>${esc(invoice.buyer?.address)}<br>GSTIN: ${esc(invoice.buyer?.gstin)}<br>Phone: ${esc(invoice.buyer?.phone)}
                </div>
                <div style="flex:1; background:#f8f9fa; padding:6px; border-radius:4px;">
                    <strong>Consignee:</strong><br>${esc(invoice.consignee?.name)}<br>${esc(invoice.consignee?.address)}<br>Phone: ${esc(invoice.consignee?.phone)}
                </div>
            </div>
            <table style="width:100%; border-collapse:collapse; font-size:10px; table-layout:fixed;">
                <thead>
                    <tr style="background:#f0f0f0;">
                        <th style="border:1px solid #aaa; padding:4px; width:5%;">#</th>
                        <th style="border:1px solid #aaa; padding:4px; width:12%;">Part No</th>
                        <th style="border:1px solid #aaa; padding:4px; width:18%;">Description</th>
                        <th style="border:1px solid #aaa; padding:4px; width:8%;">HSN</th>
                        <th style="border:1px solid #aaa; padding:4px; width:5%;">Qty</th>
                        <th style="border:1px solid #aaa; padding:4px; width:8%;">Price</th>
                        <th style="border:1px solid #aaa; padding:4px; width:6%;">Disc%</th>
                        <th style="border:1px solid #aaa; padding:4px; width:8%;">Taxable</th>
                        <th style="border:1px solid #aaa; padding:4px; width:5%;">GST%</th>
                        <th style="border:1px solid #aaa; padding:4px; width:8%;">${isLocalGst ? 'CGST' : 'IGST'}</th>
                        ${isLocalGst ? '<th style="border:1px solid #aaa; padding:4px; width:8%;">SGST</th>' : ''}
                        <th style="border:1px solid #aaa; padding:4px; width:9%;">Total</th>
                    </tr>
                </thead>
                <tbody>${itemsRows}</tbody>
            </table>
            <div style="text-align:right; margin-top:10px;">
                <table style="width:250px; margin-left:auto; border-collapse:collapse;">
                    <tr><td style="padding:2px;">Subtotal:</td><td style="text-align:right;">₹${subtotal.toFixed(2)}</td></tr>
                    <tr><td style="padding:2px;">${isLocalGst ? 'CGST (9%):' : 'IGST (18%):'}</td><td style="text-align:right;">₹${isLocalGst ? cgst.toFixed(2) : igst.toFixed(2)}</td></tr>
                    ${isLocalGst ? `<tr><td style="padding:2px;">SGST (9%):</td><td style="text-align:right;">₹${sgst.toFixed(2)}</td></tr>` : ''}
                    <tr><td style="padding:2px;">Round Off:</td><td style="text-align:right;">₹${roundOff.toFixed(2)}</td></tr>
                    <tr style="font-weight:bold;"><td style="padding:2px;">Grand Total:</td><td style="text-align:right;">₹${grand.toFixed(2)}</td></tr>
                </table>
            </div>
            <div style="margin-top:20px; border-top:1px solid #aaa; padding-top:8px; text-align:center; font-size:9px;">
                Bank: Union Bank of India | A/c: 021111100007383 | IFSC: UBINO802115 | UPI: ass08@uboi<br>
                This is a computer generated invoice. All disputes subject to Howrah jurisdiction only.
            </div>
        `;

        const opt = {
            margin: [0.2, 0.2, 0.2, 0.2],
            filename: `Invoice_${invoice.invoiceNo}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, letterRendering: true, useCORS: true },
            jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(pdfDiv).save();
    }

    function filterOrders() { displayOrders(document.getElementById('searchInput').value.toLowerCase()); }
    function exportToCSV() {
        let csv = "Invoice No,Date,Customer,Amount,Status,Type\n";
        allInvoices.forEach(inv => { csv += `"${inv.invoiceNo}",${inv.date},"${inv.buyer?.name || 'Guest'}",${inv.grandTotal},${inv.status},${inv.invoiceType}\n`; });
        const blob = new Blob([csv], {type: 'text/csv'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = 'orders_backup.csv'; a.click(); URL.revokeObjectURL(url);
    }
    displayOrders();
</script>
</body>
</html>
