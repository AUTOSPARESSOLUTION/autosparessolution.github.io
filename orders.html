<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order History - Auto Spares</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background: #e9ecef; margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: auto; background: white; border-radius: 12px; padding: 20px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { color: #0a7c71; }
        .tab { overflow: hidden; border-bottom: 1px solid #ccc; margin-bottom: 20px; }
        .tab button { background: #f1f1f1; float: left; border: none; outline: none; cursor: pointer; padding: 10px 16px; margin-right: 5px; font-size: 14px; }
        .tab button.active { background: #0a7c71; color: white; }
        .tabcontent { display: none; padding: 10px 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; border: 1px solid #dee2e6; }
        th, td { border: 1px solid #dee2e6; padding: 8px; text-align: left; vertical-align: top; }
        th { background: #0a7c71; color: white; }
        .search-box { margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        button { background: #0a7c71; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; margin: 2px; }
        button:hover { background: #09645a; }
        .btn-edit { background: #17a2b8; }
        .btn-delete { background: #dc3545; }
        .btn-pdf { background: #e67e22; }
        .btn-sync { background: #6c757d; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
<div class="container">
    <h1>Order History</h1>
    <div style="margin-bottom: 20px;">
        <button class="btn-sync" onclick="syncCountersFromInvoices()">🔄 Sync Counters from Existing Invoices</button>
        <button onclick="exportAllToCSV()">📄 Export All CSV</button>
    </div>

    <div class="tab">
        <button class="tablinks active" onclick="openTab(event, 'Cash')">Cash Bills</button>
        <button class="tablinks" onclick="openTab(event, 'Credit')">Credit Bills</button>
    </div>

    <div id="Cash" class="tabcontent" style="display:block;">
        <div class="search-box">
            <input type="text" id="searchCash" placeholder="Search by Invoice No, Customer..." style="width: 250px;">
            <button onclick="filterCash()">Search</button>
            <button onclick="exportCashToCSV()">Export CSV</button>
        </div>
        <div id="cashTable"></div>
    </div>

    <div id="Credit" class="tabcontent">
        <div class="search-box">
            <input type="text" id="searchCredit" placeholder="Search by Invoice No, Customer..." style="width: 250px;">
            <button onclick="filterCredit()">Search</button>
            <button onclick="exportCreditToCSV()">Export CSV</button>
        </div>
        <div id="creditTable"></div>
    </div>
    <button onclick="window.location.href='index.html'">Back to Store</button>
</div>

<script>
    let allInvoices = JSON.parse(localStorage.getItem('allInvoices') || '[]');

    // Helper to get financial year from date string (DD/MM/YYYY)
    function getFinancialYearFromDate(dateStr) {
        if (!dateStr) return null;
        const parts = dateStr.split('/');
        if (parts.length !== 3) return null;
        const year = parseInt(parts[2]);
        const month = parseInt(parts[1]);
        if (month >= 4) return `${year}-${(year+1).toString().slice(-2)}`;
        else return `${year-1}-${year.toString().slice(-2)}`;
    }

    // Sync counters: scan all invoices, find max number per type/year, update localStorage
    function syncCountersFromInvoices() {
        const cashMax = { max: 0, finYear: null };
        const creditMax = { max: 0, finYear: null };

        allInvoices.forEach(inv => {
            const finYear = getFinancialYearFromDate(inv.date);
            if (!finYear) return;
            if (inv.invoiceType === 'cash') {
                const match = inv.invoiceNo.match(/CASH\/(\d+)$/);
                if (match) {
                    const num = parseInt(match[1]);
                    if (num > cashMax.max) {
                        cashMax.max = num;
                        cashMax.finYear = finYear;
                    }
                }
            } else if (inv.invoiceType === 'credit') {
                const match = inv.invoiceNo.match(/\/(\d+)$/);
                if (match) {
                    const num = parseInt(match[1]);
                    if (num > creditMax.max) {
                        creditMax.max = num;
                        creditMax.finYear = finYear;
                    }
                }
            }
        });

        if (cashMax.finYear) {
            localStorage.setItem(`cashCounter_${cashMax.finYear}`, cashMax.max + 1);
            console.log(`Cash counter set to ${cashMax.max + 1} for ${cashMax.finYear}`);
        }
        if (creditMax.finYear) {
            localStorage.setItem(`creditCounter_${creditMax.finYear}`, creditMax.max + 1);
            console.log(`Credit counter set to ${creditMax.max + 1} for ${creditMax.finYear}`);
        }
        alert('Counters synced. Next invoices will continue from last number.');
        filterCash();
        filterCredit();
    }

    // Display cash bills
    function displayCash(filter = '') {
        let cashInvoices = allInvoices.filter(inv => inv.invoiceType === 'cash');
        if (filter) {
            cashInvoices = cashInvoices.filter(inv => 
                inv.invoiceNo.toLowerCase().includes(filter) ||
                (inv.buyer?.name && inv.buyer.name.toLowerCase().includes(filter))
            );
        }
        if (cashInvoices.length === 0) {
            document.getElementById('cashTable').innerHTML = '<p>No cash bills found.</p>';
            return;
        }
        let html = '<table><thead><tr><th>Invoice No</th><th>Date</th><th>Customer</th><th>Amount (₹)</th><th>Status</th><th>Actions</th></tr></thead><tbody>';
        cashInvoices.forEach(inv => {
            html += `<tr>
                <td>${inv.invoiceNo}</td>
                <td>${inv.date}</td>
                <td>${inv.buyer?.name || 'Guest'}</td>
                <td>₹${inv.grandTotal.toFixed(2)}</td>
                <td>${inv.status}</td>
                <td>
                    <button class="btn-edit" onclick="editInvoice('${inv.invoiceNo}')">Edit</button>
                    <button class="btn-delete" onclick="deleteInvoice('${inv.invoiceNo}')">Delete</button>
                    <button class="btn-pdf" onclick="downloadInvoicePDF('${inv.invoiceNo}')">PDF</button>
                </td>
            </tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('cashTable').innerHTML = html;
    }

    // Display credit bills
    function displayCredit(filter = '') {
        let creditInvoices = allInvoices.filter(inv => inv.invoiceType === 'credit');
        if (filter) {
            creditInvoices = creditInvoices.filter(inv => 
                inv.invoiceNo.toLowerCase().includes(filter) ||
                (inv.buyer?.name && inv.buyer.name.toLowerCase().includes(filter))
            );
        }
        if (creditInvoices.length === 0) {
            document.getElementById('creditTable').innerHTML = '<p>No credit bills found.</p>';
            return;
        }
        let html = '<table><thead><tr><th>Invoice No</th><th>Date</th><th>Customer</th><th>Amount (₹)</th><th>Status</th><th>Actions</th></tr></thead><tbody>';
        creditInvoices.forEach(inv => {
            html += `<tr>
                <td>${inv.invoiceNo}</td>
                <td>${inv.date}</td>
                <td>${inv.buyer?.name || 'Guest'}</td>
                <td>₹${inv.grandTotal.toFixed(2)}</td>
                <td>${inv.status}</td>
                <td>
                    <button class="btn-edit" onclick="editInvoice('${inv.invoiceNo}')">Edit</button>
                    <button class="btn-delete" onclick="deleteInvoice('${inv.invoiceNo}')">Delete</button>
                    <button class="btn-pdf" onclick="downloadInvoicePDF('${inv.invoiceNo}')">PDF</button>
                </td>
            </tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('creditTable').innerHTML = html;
    }

    function filterCash() { displayCash(document.getElementById('searchCash').value.toLowerCase()); }
    function filterCredit() { displayCredit(document.getElementById('searchCredit').value.toLowerCase()); }

    function openTab(evt, tabName) {
        document.querySelectorAll('.tabcontent').forEach(div => div.style.display = 'none');
        document.querySelectorAll('.tablinks').forEach(btn => btn.classList.remove('active'));
        document.getElementById(tabName).style.display = 'block';
        evt.currentTarget.classList.add('active');
        if (tabName === 'Cash') filterCash();
        else filterCredit();
    }

    function editInvoice(invoiceNo) {
        localStorage.setItem('editInvoiceNo', invoiceNo);
        window.open('edit-invoice.html', '_blank');
    }

    function deleteInvoice(invoiceNo) {
        if (!confirm(`Delete invoice ${invoiceNo}?`)) return;
        const invoice = allInvoices.find(i => i.invoiceNo === invoiceNo);
        if (!invoice) return;
        const customers = JSON.parse(localStorage.getItem('customers') || '[]');
        const customer = customers.find(c => c.email === invoice.buyer?.email);
        if (customer) {
            if (invoice.invoiceType === 'credit') customer.outstanding -= invoice.grandTotal;
            if (customer.outstanding < 0) customer.outstanding = 0;
            customer.totalPurchased -= invoice.grandTotal;
            localStorage.setItem('customers', JSON.stringify(customers));
        }
        let deletedNumbers = JSON.parse(localStorage.getItem('deletedInvoiceNumbers') || '[]');
        let number = parseInt(invoice.invoiceNo.split('/').pop());
        deletedNumbers.push({ type: invoice.invoiceType, finYear: invoice.finYear, number: number });
        localStorage.setItem('deletedInvoiceNumbers', JSON.stringify(deletedNumbers));
        allInvoices = allInvoices.filter(i => i.invoiceNo !== invoiceNo);
        localStorage.setItem('allInvoices', JSON.stringify(allInvoices));
        alert(`Invoice ${invoiceNo} deleted.`);
        filterCash();
        filterCredit();
    }

    // ==================== PDF GENERATION (identical to working version) ====================
    function downloadInvoicePDF(invoiceNo) {
        const invoice = allInvoices.find(i => i.invoiceNo === invoiceNo);
        if (!invoice) { alert('Invoice not found'); return; }

        const isLocalGst = invoice.buyer?.gstin && invoice.buyer.gstin.startsWith('19');
        
        // Recalculate totals
        let subtotal = 0;
        let taxGroups = {};
        invoice.items.forEach(item => {
            const taxable = item.price * item.qty * (1 - (item.discount || 0) / 100);
            subtotal += taxable;
            let cgst = 0, sgst = 0, igst = 0;
            if (isLocalGst) {
                cgst = taxable * 0.09;
                sgst = taxable * 0.09;
            } else {
                igst = taxable * 0.18;
            }
            const hsn = item.hsn || '';
            if (!taxGroups[hsn]) taxGroups[hsn] = { taxable: 0, cgst: 0, sgst: 0, igst: 0 };
            taxGroups[hsn].taxable += taxable;
            taxGroups[hsn].cgst += cgst;
            taxGroups[hsn].sgst += sgst;
            taxGroups[hsn].igst += igst;
        });
        let cgstTotal = 0, sgstTotal = 0, igstTotal = 0;
        for (let hsn in taxGroups) {
            cgstTotal += taxGroups[hsn].cgst;
            sgstTotal += taxGroups[hsn].sgst;
            igstTotal += taxGroups[hsn].igst;
        }
        let grand = subtotal + (isLocalGst ? cgstTotal + sgstTotal : igstTotal);
        const roundOff = Math.round(grand) - grand;
        grand = Math.round(grand);

        // Build items table with forced wrap
        let itemsHtml = '';
        invoice.items.forEach((item, idx) => {
            const taxable = item.price * item.qty * (1 - (item.discount || 0) / 100);
            let cgst = 0, sgst = 0, igst = 0;
            if (isLocalGst) {
                cgst = taxable * 0.09;
                sgst = taxable * 0.09;
            } else {
                igst = taxable * 0.18;
            }
            const totalItem = taxable + (isLocalGst ? cgst + sgst : igst);
            itemsHtml += `<tr>
                <td style="border:1px solid #dee2e6; padding:6px 4px; text-align:center; width:5%;">${idx+1}</td>
                <td style="border:1px solid #dee2e6; padding:6px 4px; word-break:break-word; white-space:normal; width:12%;">${escapeHtml(item.part)}</td>
                <td style="border:1px solid #dee2e6; padding:6px 4px; word-break:break-word; white-space:normal; width:18%;">${escapeHtml(item.desc)}</td>
                <td style="border:1px solid #dee2e6; padding:6px 4px; width:8%;">${escapeHtml(item.hsn || '')}</td>
                <td style="border:1px solid #dee2e6; padding:6px 4px; text-align:center; width:5%;">${item.qty}</td>
                <td style="border:1px solid #dee2e6; padding:6px 4px; text-align:right; width:8%;">₹${item.price.toFixed(2)}</td>
                <td style="border:1px solid #dee2e6; padding:6px 4px; text-align:center; width:6%;">${item.discount || 0}%</td>
                <td style="border:1px solid #dee2e6; padding:6px 4px; text-align:right; width:8%;">₹${taxable.toFixed(2)}</td>
                <td style="border:1px solid #dee2e6; padding:6px 4px; text-align:center; width:5%;">18%</td>
                <td style="border:1px solid #dee2e6; padding:6px 4px; text-align:right; width:8%;">${isLocalGst ? '₹'+cgst.toFixed(2) : '₹'+igst.toFixed(2)}</td>
                ${isLocalGst ? `<td style="border:1px solid #dee2e6; padding:6px 4px; text-align:right; width:8%;">₹${sgst.toFixed(2)}</td>` : ''}
                <td style="border:1px solid #dee2e6; padding:6px 4px; text-align:right; width:9%;">₹${totalItem.toFixed(2)}</td>
            </tr>`;
        });

        // Tax summary
        let taxHtml = '';
        for (let hsn in taxGroups) {
            const g = taxGroups[hsn];
            const totalTax = g.cgst + g.sgst + g.igst;
            taxHtml += `<tr>
                <td style="border:1px solid #dee2e6; padding:6px 4px;">${hsn || 'N/A'}</td>
                <td style="border:1px solid #dee2e6; padding:6px 4px; text-align:right;">₹${g.taxable.toFixed(2)}</td>
                <td style="border:1px solid #dee2e6; padding:6px 4px; text-align:right;">${isLocalGst ? '₹'+g.cgst.toFixed(2) : '-'}</td>
                ${isLocalGst ? `<td style="border:1px solid #dee2e6; padding:6px 4px; text-align:right;">₹${g.sgst.toFixed(2)}</td>` : ''}
                <td style="border:1px solid #dee2e6; padding:6px 4px; text-align:right;">${!isLocalGst ? '₹'+g.igst.toFixed(2) : '-'}</td>
                <td style="border:1px solid #dee2e6; padding:6px 4px; text-align:right;">₹${totalTax.toFixed(2)}</td>
            </tr>`;
        }

        // Build clean container – company name always visible
        const container = document.createElement('div');
        container.style.maxWidth = '1200px';
        container.style.margin = '0 auto';
        container.style.backgroundColor = 'white';
        container.style.border = '1px solid #dee2e6';
        container.style.padding = '0 15px 15px 15px';
        container.style.fontFamily = 'Roboto, sans-serif';

        container.innerHTML = `
            <div style="background: #0a7c71; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin: 0 -15px 15px -15px;">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <img src="images/ASS.jpg" alt="Logo" style="height: 60px;" onerror="this.style.display='none'">
                    <div>
                        <div style="font-size: 24px; font-weight: bold; margin: 0;">Auto Spares Solution</div>
                        <div style="font-size: 12px;">GSTIN: 19ANOPD3300R1ZO</div>
                        <div style="font-size: 12px;">101, 1st floor, 57/5, Q Road, Howrah, WB 711108</div>
                    </div>
                </div>
                <div style="text-align: right;">
                    <div style="font-size: 20px; font-weight: bold;">TAX INVOICE</div>
                    <div><strong>Invoice No:</strong> ${invoice.invoiceNo}</div>
                    <div><strong>Date:</strong> ${invoice.date}</div>
                    <div><strong>Due Date:</strong> ${invoice.dueDate || ''}</div>
                </div>
            </div>

            <!-- Buyer & Consignee -->
            <div style="display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 15px;">
                <div style="flex: 1; background: #f8f9fa; border-radius: 6px; padding: 10px;">
                    <div style="font-weight: bold; color: #0a7c71; margin-bottom: 8px;">Buyer (Bill to)</div>
                    <div>${escapeHtml(invoice.buyer?.name)}</div>
                    <div>${escapeHtml(invoice.buyer?.address)}</div>
                    <div>GSTIN: ${escapeHtml(invoice.buyer?.gstin)}</div>
                    <div>State: ${escapeHtml(invoice.buyer?.state)}</div>
                    <div>Phone: ${escapeHtml(invoice.buyer?.phone)}</div>
                    <div>Email: ${escapeHtml(invoice.buyer?.email)}</div>
                </div>
                <div style="flex: 1; background: #f8f9fa; border-radius: 6px; padding: 10px;">
                    <div style="font-weight: bold; color: #0a7c71; margin-bottom: 8px;">Consignee (Ship to)</div>
                    <div>${escapeHtml(invoice.consignee?.name)}</div>
                    <div>${escapeHtml(invoice.consignee?.address)}</div>
                    <div>Phone: ${escapeHtml(invoice.consignee?.phone)}</div>
                </div>
            </div>

            <!-- Order & Dispatch Details -->
            <div style="display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 15px;">
                <div style="flex: 1; background: #f8f9fa; border-radius: 6px; padding: 10px;">
                    <div style="font-weight: bold; color: #0a7c71; margin-bottom: 8px;">Order Details</div>
                    <div>Customer Code: ${escapeHtml(invoice.orderDetails?.customerCode)}</div>
                    <div>SO No: ${escapeHtml(invoice.orderDetails?.salesOrderNo)}</div>
                    <div>Ref No: ${escapeHtml(invoice.orderDetails?.referenceNo)}</div>
                    <div>Payment Terms: ${escapeHtml(invoice.orderDetails?.paymentTerms)}</div>
                </div>
                <div style="flex: 1; background: #f8f9fa; border-radius: 6px; padding: 10px;">
                    <div style="font-weight: bold; color: #0a7c71; margin-bottom: 8px;">Dispatch Details</div>
                    <div>Doc No: ${escapeHtml(invoice.dispatchDetails?.docNo)}</div>
                    <div>Mode: ${escapeHtml(invoice.dispatchDetails?.transportMode)}</div>
                    <div>Vehicle No: ${escapeHtml(invoice.dispatchDetails?.vehicleNo)}</div>
                    <div>Cartons: ${escapeHtml(invoice.dispatchDetails?.cartons)}</div>
                </div>
            </div>

            <!-- Items Table -->
            <table style="width:100%; border-collapse:collapse; margin:15px 0; font-size:11px; table-layout:fixed;">
                <thead>
                    <tr style="background:#f8f9fa;">
                        <th style="border:1px solid #dee2e6; padding:6px 4px; width:5%;">#</th>
                        <th style="border:1px solid #dee2e6; padding:6px 4px; width:12%;">Part No</th>
                        <th style="border:1px solid #dee2e6; padding:6px 4px; width:18%;">Description</th>
                        <th style="border:1px solid #dee2e6; padding:6px 4px; width:8%;">HSN</th>
                        <th style="border:1px solid #dee2e6; padding:6px 4px; width:5%;">Qty</th>
                        <th style="border:1px solid #dee2e6; padding:6px 4px; width:8%;">Unit Price</th>
                        <th style="border:1px solid #dee2e6; padding:6px 4px; width:6%;">Disc%</th>
                        <th style="border:1px solid #dee2e6; padding:6px 4px; width:8%;">Taxable</th>
                        <th style="border:1px solid #dee2e6; padding:6px 4px; width:5%;">GST%</th>
                        <th style="border:1px solid #dee2e6; padding:6px 4px; width:8%;">${isLocalGst ? 'CGST' : 'IGST'}</th>
                        ${isLocalGst ? '<th style="border:1px solid #dee2e6; padding:6px 4px; width:8%;">SGST</th>' : ''}
                        <th style="border:1px solid #dee2e6; padding:6px 4px; width:9%;">Total</th>
                    </tr>
                </thead>
                <tbody>${itemsHtml}</tbody>
            </table>

            <!-- Tax Summary -->
            <table style="width:100%; border-collapse:collapse; margin:15px 0; font-size:11px;">
                <thead><tr style="background:#f8f9fa;"><th>HSN</th><th>Taxable Value</th><th>${isLocalGst ? 'CGST' : 'IGST'}</th>${isLocalGst ? '<th>SGST</th>' : ''}<th>Total Tax</th></tr></thead>
                <tbody>${taxHtml}</tbody>
            </table>

            <!-- Totals -->
            <div style="text-align:right; margin-top:15px;">
                <table style="width:280px; margin-left:auto;">
                    <tr><td style="text-align:right;">Subtotal (after discount):</td><td style="text-align:right;">₹${subtotal.toFixed(2)}</td></tr>
                    <tr><td style="text-align:right;">${isLocalGst ? 'CGST (9%):' : 'IGST (18%):'}</td><td style="text-align:right;">${isLocalGst ? '₹'+cgstTotal.toFixed(2) : '₹'+igstTotal.toFixed(2)}</td></tr>
                    ${isLocalGst ? `<tr><td style="text-align:right;">SGST (9%):</td><td style="text-align:right;">₹${sgstTotal.toFixed(2)}</td></tr>` : ''}
                    <tr><td style="text-align:right;">Round Off:</td><td style="text-align:right;">₹${roundOff.toFixed(2)}</td></tr>
                    <tr style="font-weight:bold;"><td style="text-align:right;">Grand Total:</td><td style="text-align:right;">₹${grand.toFixed(2)}</td></tr>
                </table>
            </div>

            <!-- QR & Bank Details -->
            <div style="background:#f8f9fa; border-radius:6px; padding:10px; margin:12px 0; border:1px solid #dee2e6;">
                <div style="display:flex; flex-wrap:wrap; gap:20px; align-items:center;">
                    <div><img src="images/ASS.QR.jpg" alt="Payment QR" style="max-width:120px;" onerror="this.style.display='none'"></div>
                    <div><strong>Bank Details:</strong><br>Account Name: Auto Spares Solution<br>Bank: Union Bank of India<br>Account No: 021111100007383<br>IFSC: UBINO802115<br>UPI: ass08@uboi</div>
                </div>
            </div>

            <!-- Signatures -->
            <div style="display:flex; justify-content:space-between; margin-top:20px;">
                <div style="text-align:center; width:45%; border-top:1px solid #333; padding-top:5px;">
                    Customer's Stamp & Signature<br><span style="font-size:10px;">(Receiver's acknowledgment)</span>
                </div>
                <div style="text-align:center; width:45%; border-top:1px solid #333; padding-top:5px;">
                    For Auto Spares Solution<br>(Authorised Signatory)<br><span style="font-size:10px;">(Stamp & Signature)</span>
                </div>
            </div>

            <!-- Footer -->
            <div style="font-size:9px; text-align:center; margin-top:20px; color:#555; border-top:1px solid #dee2e6; padding-top:10px;">
                This is a computer generated invoice. All disputes are subject to Howrah jurisdiction only.
            </div>
        `;

        const opt = {
            margin: [0.2, 0.2, 0.2, 0.2],
            filename: `Invoice_${invoice.invoiceNo}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, letterRendering: true, useCORS: true },
            jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(container).save();
    }

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }

    // CSV exports
    function exportAllToCSV() {
        let csv = "Invoice No,Date,Customer,Amount,Status,Type\n";
        allInvoices.forEach(inv => { csv += `"${inv.invoiceNo}",${inv.date},"${inv.buyer?.name || 'Guest'}",${inv.grandTotal},${inv.status},${inv.invoiceType}\n`; });
        downloadCSV(csv, 'all_invoices.csv');
    }
    function exportCashToCSV() {
        let csv = "Invoice No,Date,Customer,Amount,Status\n";
        allInvoices.filter(inv => inv.invoiceType === 'cash').forEach(inv => { csv += `"${inv.invoiceNo}",${inv.date},"${inv.buyer?.name || 'Guest'}",${inv.grandTotal},${inv.status}\n`; });
        downloadCSV(csv, 'cash_bills.csv');
    }
    function exportCreditToCSV() {
        let csv = "Invoice No,Date,Customer,Amount,Status\n";
        allInvoices.filter(inv => inv.invoiceType === 'credit').forEach(inv => { csv += `"${inv.invoiceNo}",${inv.date},"${inv.buyer?.name || 'Guest'}",${inv.grandTotal},${inv.status}\n`; });
        downloadCSV(csv, 'credit_bills.csv');
    }
    function downloadCSV(content, filename) {
        const blob = new Blob([content], {type: 'text/csv'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        a.click();
        URL.revokeObjectURL(url);
    }

    // Initial load
    displayCash();
    displayCredit();
</script>
</body>
</html>
