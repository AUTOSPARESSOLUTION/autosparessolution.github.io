<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order History - Auto Spares</title>
    <style>
        body { font-family: 'Roboto', sans-serif; background: #f4f4f4; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; border-radius: 10px; padding: 20px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { color: #0a7c71; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; border: 1px solid #dee2e6; }
        th, td { border: 1px solid #dee2e6; padding: 8px; text-align: left; vertical-align: top; }
        th { background: #0a7c71; color: white; }
        .search-box { margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
        button { background: #0a7c71; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; margin: 2px; }
        .diagnostic { background: #f8f9fa; border: 1px solid #ccc; padding: 10px; margin-bottom: 20px; font-family: monospace; font-size: 12px; display: none; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
<div class="container">
    <h1>Order History (All Invoices)</h1>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search by Invoice No, Customer..." style="width: 300px; padding: 8px;">
        <button onclick="filterOrders()">Search</button>
        <button onclick="exportToCSV()">Export CSV</button>
        <button onclick="showDiagnostic()">🔧 Diagnose</button>
        <button onclick="refreshInvoices()">Refresh</button>
    </div>
    <div id="diagnostic" class="diagnostic"></div>
    <div id="ordersTable"></div>
    <button onclick="window.location.href='index.html'">Back to Store</button>
</div>

<script>
    let allInvoices = [];

    // Try multiple possible localStorage keys
    function getAllInvoicesFromStorage() {
        const possibleKeys = ['salesInvoices', 'allInvoices', 'invoices', 'customerInvoices'];
        let combined = [];
        for (let key of possibleKeys) {
            const data = localStorage.getItem(key);
            if (data) {
                try {
                    const parsed = JSON.parse(data);
                    if (Array.isArray(parsed) && parsed.length) {
                        combined = combined.concat(parsed);
                    }
                } catch(e) {}
            }
        }
        // Remove duplicates by invoiceNo (or id if invoiceNo missing)
        const unique = [];
        const seen = new Set();
        for (let inv of combined) {
            let id = inv.invoiceNo || inv.id;
            if (!seen.has(id)) {
                seen.add(id);
                unique.push(inv);
            }
        }
        return unique;
    }

    function refreshInvoices() {
        allInvoices = getAllInvoicesFromStorage();
        displayOrders();
        // Show diagnostic info if no invoices found
        if (allInvoices.length === 0) {
            document.getElementById('diagnostic').style.display = 'block';
            document.getElementById('diagnostic').innerHTML = `⚠️ No invoices found in localStorage.<br>
            Checked keys: salesInvoices, allInvoices, invoices, customerInvoices.<br>
            Raw localStorage contents: <br>${JSON.stringify(localStorage, null, 2)}`;
        } else {
            document.getElementById('diagnostic').style.display = 'none';
        }
    }

    function displayOrders(filter = '') {
        let filtered = allInvoices;
        if (filter) {
            filtered = allInvoices.filter(inv => 
                (inv.invoiceNo && inv.invoiceNo.toLowerCase().includes(filter)) ||
                (inv.customerEmail && inv.customerEmail.toLowerCase().includes(filter)) ||
                (inv.buyer?.name && inv.buyer.name.toLowerCase().includes(filter))
            );
        }
        if (filtered.length === 0) {
            document.getElementById('ordersTable').innerHTML = '<p>No invoices found. Click "Diagnose" to see storage details.</p>';
            return;
        }
        let html = '<table><thead><tr>
            <th>Invoice No</th><th>Date</th><th>Customer</th><th>Amount (₹)</th><th>Status</th><th>Type</th><th>Actions</th>
        </tr></thead><tbody>';
        filtered.forEach(inv => {
            const invoiceNo = inv.invoiceNo || inv.id || 'N/A';
            const date = inv.date || (inv.createdAt ? new Date(inv.createdAt).toLocaleDateString() : '');
            const customerName = inv.buyer?.name || inv.customerEmail || inv.customerName || 'Guest';
            const amount = inv.grandTotal || inv.total || 0;
            const status = inv.status || (inv.invoiceType === 'cash' ? 'Paid' : 'Pending');
            const type = inv.invoiceType || (inv.status === 'paid' ? 'cash' : 'credit');
            html += `<tr>
                <td>${escapeHtml(invoiceNo)}</td>
                <td>${escapeHtml(date)}</td>
                <td>${escapeHtml(customerName)}</td>
                <td>₹${parseFloat(amount).toFixed(2)}</td>
                <td>${escapeHtml(status)}</td>
                <td>${escapeHtml(type)}</td>
                <td>
                    <button class="btn-edit" onclick="editInvoice('${invoiceNo}')">Edit</button>
                    <button class="btn-delete" onclick="deleteInvoice('${invoiceNo}')">Delete</button>
                    <button class="btn-pdf" onclick="downloadInvoicePDF('${invoiceNo}')">PDF</button>
                 </td>
            </tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('ordersTable').innerHTML = html;
    }

    function editInvoice(invoiceNo) {
        localStorage.setItem('editInvoiceNo', invoiceNo);
        window.open('edit-invoice.html', '_blank');
    }

    function deleteInvoice(invoiceNo) {
        if (!confirm(`Delete invoice ${invoiceNo}?`)) return;
        const invoice = allInvoices.find(i => (i.invoiceNo || i.id) === invoiceNo);
        if (!invoice) return;

        // Remove from all localStorage keys that contain it
        const possibleKeys = ['salesInvoices', 'allInvoices', 'invoices'];
        for (let key of possibleKeys) {
            let data = localStorage.getItem(key);
            if (data) {
                let arr = JSON.parse(data);
                if (Array.isArray(arr)) {
                    const newArr = arr.filter(i => (i.invoiceNo || i.id) !== invoiceNo);
                    localStorage.setItem(key, JSON.stringify(newArr));
                }
            }
        }
        refreshInvoices();
        alert(`Invoice ${invoiceNo} deleted.`);
    }

    function downloadInvoicePDF(invoiceNo) {
        const invoice = allInvoices.find(i => (i.invoiceNo || i.id) === invoiceNo);
        if (!invoice) { alert('Invoice not found'); return; }

        const isLocalGst = invoice.buyer?.gstin && invoice.buyer.gstin.startsWith('19');
        const items = invoice.items || [];
        
        // Calculate totals
        let subtotal = 0;
        items.forEach(item => {
            const qty = item.qty || 1;
            const price = item.price || 0;
            const discount = item.discount || 0;
            const taxable = price * qty * (1 - discount / 100);
            subtotal += taxable;
        });
        const cgstTotal = subtotal * 0.09;
        const sgstTotal = subtotal * 0.09;
        const igstTotal = subtotal * 0.18;
        let grand = isLocalGst ? subtotal + cgstTotal + sgstTotal : subtotal + igstTotal;
        const roundOff = Math.round(grand) - grand;
        grand = Math.round(grand);

        // Build items HTML
        let itemsHtml = '';
        items.forEach((item, idx) => {
            const qty = item.qty || 1;
            const price = item.price || 0;
            const discount = item.discount || 0;
            const taxable = price * qty * (1 - discount / 100);
            const cgst = isLocalGst ? taxable * 0.09 : 0;
            const sgst = isLocalGst ? taxable * 0.09 : 0;
            const igst = isLocalGst ? 0 : taxable * 0.18;
            const totalItem = taxable + cgst + sgst + igst;
            itemsHtml += `<tr>
                <td style="border:1px solid #dee2e6; padding:4px; text-align:center;">${idx+1}</td>
                <td style="border:1px solid #dee2e6; padding:4px; word-break:break-word;">${escapeHtml(item.part || '')}</td>
                <td style="border:1px solid #dee2e6; padding:4px; word-break:break-word;">${escapeHtml(item.desc || '')}</td>
                <td style="border:1px solid #dee2e6; padding:4px;">${escapeHtml(item.hsn || '')}</td>
                <td style="border:1px solid #dee2e6; padding:4px; text-align:center;">${qty}</td>
                <td style="border:1px solid #dee2e6; padding:4px; text-align:right;">₹${price.toFixed(2)}</td>
                <td style="border:1px solid #dee2e6; padding:4px; text-align:center;">${discount}%</td>
                <td style="border:1px solid #dee2e6; padding:4px; text-align:right;">₹${taxable.toFixed(2)}</td>
                <td style="border:1px solid #dee2e6; padding:4px; text-align:center;">18%</td>
                <td style="border:1px solid #dee2e6; padding:4px; text-align:right;">${isLocalGst ? '₹'+cgst.toFixed(2) : '₹'+igst.toFixed(2)}</td>
                ${isLocalGst ? `<td style="border:1px solid #dee2e6; padding:4px; text-align:right;">₹${sgst.toFixed(2)}</td>` : ''}
                <td style="border:1px solid #dee2e6; padding:4px; text-align:right;">₹${totalItem.toFixed(2)}</td>
             </tr>`;
        });

        const container = document.createElement('div');
        container.style.padding = '15px';
        container.style.fontFamily = 'Roboto, sans-serif';
        container.style.maxWidth = '1100px';
        container.style.margin = '0 auto';
        container.style.backgroundColor = 'white';
        container.innerHTML = `
            <div style="background: #0a7c71; color: white; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
                <div>
                    <h1 style="margin:0; font-size:22px;">Auto Spares Solution</h1>
                    <p style="margin:2px 0 0;">GSTIN: 19ANOPD3300R1ZO</p>
                    <p style="margin:0;">101, 1st floor, 57/5, Q Road, Howrah, WB 711108</p>
                </div>
                <div style="text-align:right;">
                    <h2 style="margin:0; font-size:18px;">TAX INVOICE</h2>
                    <p><strong>Invoice No:</strong> ${invoice.invoiceNo || invoice.id}<br>
                    <strong>Date:</strong> ${invoice.date}<br>
                    <strong>Due Date:</strong> ${invoice.dueDate || ''}</p>
                </div>
            </div>
            <div style="display:flex; gap:15px; margin:15px 0;">
                <div style="flex:1; background:#f8f9fa; padding:8px;">
                    <h3 style="margin:0 0 5px;">Buyer (Bill to)</h3>
                    <p>${escapeHtml(invoice.buyer?.name || invoice.customerEmail)}<br>${escapeHtml(invoice.buyer?.address || '')}<br>GSTIN: ${escapeHtml(invoice.buyer?.gstin || '')}<br>Phone: ${escapeHtml(invoice.buyer?.phone || '')}</p>
                </div>
                <div style="flex:1; background:#f8f9fa; padding:8px;">
                    <h3 style="margin:0 0 5px;">Consignee (Ship to)</h3>
                    <p>${escapeHtml(invoice.consignee?.name || '')}<br>${escapeHtml(invoice.consignee?.address || '')}<br>Phone: ${escapeHtml(invoice.consignee?.phone || '')}</p>
                </div>
            </div>
            <table style="width:100%; border-collapse:collapse; font-size:10px;">${itemsHtml}</table>
            <div style="text-align:right; margin-top:10px;">
                <table style="width:280px; margin-left:auto;">
                    <tr><td>Subtotal:</td><td>₹${subtotal.toFixed(2)}</td></tr>
                    <tr><td>${isLocalGst ? 'CGST (9%):' : 'IGST (18%):'}</td><td>${isLocalGst ? '₹'+cgstTotal.toFixed(2) : '₹'+igstTotal.toFixed(2)}</td></tr>
                    ${isLocalGst ? `<tr><td>SGST (9%):</td><td>₹${sgstTotal.toFixed(2)}</td></tr>` : ''}
                    <tr><td>Round Off:</td><td>₹${roundOff.toFixed(2)}</td></tr>
                    <tr style="font-weight:bold;"><td>Grand Total:</td><td>₹${grand.toFixed(2)}</td></tr>
                </table>
            </div>
            <div style="margin-top:15px; border-top:1px solid #ccc; padding-top:10px; text-align:center; font-size:9px;">
                This is a computer generated invoice. All disputes subject to Howrah jurisdiction only.
            </div>
        `;

        html2pdf().set({ margin: 0.2, filename: `Invoice_${invoice.invoiceNo || invoice.id}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' } }).from(container).save();
    }

    function showDiagnostic() {
        const diag = document.getElementById('diagnostic');
        diag.style.display = 'block';
        const keys = ['salesInvoices', 'allInvoices', 'invoices', 'customerInvoices'];
        let info = '<strong>Storage Diagnostic</strong><br>';
        for (let k of keys) {
            const val = localStorage.getItem(k);
            info += `${k}: ${val ? val.substring(0, 200) + '...' : 'empty'}<br>`;
        }
        diag.innerHTML = info;
    }

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
    function filterOrders() { displayOrders(document.getElementById('searchInput').value.toLowerCase()); }
    function exportToCSV() {
        let csv = "Invoice No,Date,Customer,Amount,Status,Type\n";
        allInvoices.forEach(inv => {
            csv += `"${inv.invoiceNo || inv.id}",${inv.date},"${inv.buyer?.name || inv.customerEmail}",${inv.grandTotal || inv.total},${inv.status},${inv.invoiceType}\n`;
        });
        const blob = new Blob([csv], {type: 'text/csv'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = 'orders.csv'; a.click(); URL.revokeObjectURL(url);
    }
    
    refreshInvoices();
</script>
</body>
</html>
