<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supplier Master – Auto Spares</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Roboto', sans-serif;
            background: #e9ecef;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 1px solid #dee2e6;
        }
        h1, h2 {
            color: #0a7c71;
        }
        .form-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            border: 1px solid #dee2e6;
        }
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 15px;
        }
        .form-group {
            flex: 1;
            min-width: 180px;
        }
        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #555;
        }
        input, select, textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-family: inherit;
        }
        button {
            background: #0a7c71;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin-right: 10px;
        }
        button:hover {
            background: #09645a;
        }
        .btn-danger {
            background: #dc3545;
        }
        .btn-danger:hover {
            background: #c82333;
        }
        .btn-warning {
            background: #ffc107;
            color: #333;
        }
        .btn-warning:hover {
            background: #e0a800;
        }
        .search-box {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .search-box input {
            flex: 1;
            min-width: 200px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #dee2e6;
            padding: 10px;
            text-align: left;
            vertical-align: top;
        }
        th {
            background: #0a7c71;
            color: white;
        }
        .action-buttons {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }
        .status-active {
            color: #28a745;
            font-weight: bold;
        }
        .status-inactive {
            color: #dc3545;
            font-weight: bold;
        }
        @media (max-width: 768px) {
            .form-row {
                flex-direction: column;
            }
            table {
                font-size: 12px;
            }
            th, td {
                padding: 6px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h1>Supplier Master</h1>
        <a href="index.html" style="background: #6c757d; color: white; padding: 8px 16px; border-radius: 6px; text-decoration: none;">🏠 Home</a>
    </div>

    <!-- Add/Edit Supplier Form -->
    <div class="form-section">
        <h2 id="formTitle">Add New Supplier</h2>
        <div class="form-row">
            <div class="form-group">
                <label>Supplier Name *</label>
                <input type="text" id="suppName" placeholder="Enter supplier name">
            </div>
            <div class="form-group">
                <label>Email *</label>
                <input type="email" id="suppEmail" placeholder="supplier@example.com">
            </div>
            <div class="form-group">
                <label>Phone *</label>
                <input type="text" id="suppPhone" placeholder="Phone number">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Contact Person</label>
                <input type="text" id="suppContactPerson" placeholder="Contact person name">
            </div>
            <div class="form-group">
                <label>Address</label>
                <textarea id="suppAddress" rows="2" placeholder="Full address"></textarea>
            </div>
            <div class="form-group">
                <label>PIN Code</label>
                <input type="text" id="suppPincode" placeholder="PIN code">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>GSTIN</label>
                <input type="text" id="suppGstin" placeholder="GSTIN (optional)">
            </div>
            <div class="form-group">
                <label>State</label>
                <input type="text" id="suppState" placeholder="State">
            </div>
            <div class="form-group">
                <label>Business Name</label>
                <input type="text" id="suppBusiness" placeholder="Business / Company name">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Credit Limit (₹)</label>
                <input type="number" id="suppCreditLimit" step="1000" value="50000" placeholder="Credit limit">
            </div>
            <div class="form-group">
                <label>Opening Balance (₹)</label>
                <input type="number" id="suppOpeningBalance" step="1000" value="0" placeholder="Opening balance">
            </div>
            <div class="form-group">
                <label>Status</label>
                <select id="suppStatus">
                    <option value="active">Active</option>
                    <option value="inactive">Inactive</option>
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Supplier Code (Auto-generated)</label>
                <input type="text" id="suppCode" readonly style="background:#e9ecef;">
            </div>
            <div class="form-group">
                <label>Payment Terms</label>
                <select id="suppPaymentTerms">
                    <option value="net30">Net 30 Days</option>
                    <option value="net15">Net 15 Days</option>
                    <option value="cod">Cash on Delivery</option>
                    <option value="advance">Advance Payment</option>
                </select>
            </div>
        </div>
        <div class="form-row">
            <button onclick="saveSupplier()">💾 Save Supplier</button>
            <button class="btn-warning" onclick="clearForm()">Clear Form</button>
            <button id="cancelEditBtn" class="btn-danger" style="display:none;" onclick="cancelEdit()">Cancel Edit</button>
        </div>
    </div>

    <!-- Search and Supplier List -->
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search by Name, Email, Phone, GSTIN, Code...">
        <button onclick="searchSuppliers()">🔍 Search</button>
        <button onclick="loadSuppliers()">🔄 Refresh</button>
        <button onclick="exportToCSV()">📄 Export CSV</button>
    </div>

    <div id="suppliersTable"></div>
</div>

<script>
    let suppliers = [];
    let editId = null;

    function loadSuppliers() {
        suppliers = JSON.parse(localStorage.getItem('suppliers') || '[]');
        let changed = false;
        suppliers.forEach(s => {
            if (!s.supplierCode) {
                s.supplierCode = generateSupplierCode();
                changed = true;
            }
            if (s.outstanding === undefined) s.outstanding = s.openingBalance || 0;
        });
        if (changed) localStorage.setItem('suppliers', JSON.stringify(suppliers));
        displaySuppliers();
    }

    function generateSupplierCode() {
        const count = suppliers.length + 1;
        return 'SUP' + count.toString().padStart(4, '0');
    }

    function displaySuppliers() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        let filtered = suppliers;
        if (searchTerm) {
            filtered = suppliers.filter(s => 
                s.name?.toLowerCase().includes(searchTerm) ||
                s.email?.toLowerCase().includes(searchTerm) ||
                s.phone?.includes(searchTerm) ||
                s.gstin?.toLowerCase().includes(searchTerm) ||
                s.supplierCode?.toLowerCase().includes(searchTerm) ||
                s.contactPerson?.toLowerCase().includes(searchTerm)
            );
        }

        if (filtered.length === 0) {
            document.getElementById('suppliersTable').innerHTML = '<p>No suppliers found.</p>';
            return;
        }

        let html = '<tr><thead><tr><th>Code</th><th>Name</th><th>Email</th><th>Phone</th><th>Contact Person</th><th>GSTIN</th><th>Credit Limit</th><th>Outstanding</th><th>Status</th><th>Actions</th></tr></thead><tbody>';
        filtered.forEach(s => {
            const outstanding = s.outstanding || 0;
            const creditLimit = s.creditLimit || 50000;
            html += `<tr>
                <td>${escapeHtml(s.supplierCode || '')}</td>
                <td><strong>${escapeHtml(s.name)}</strong></td>
                <td>${escapeHtml(s.email)}</td>
                <td>${escapeHtml(s.phone)}</td>
                <td>${escapeHtml(s.contactPerson || '-')}</td>
                <td>${escapeHtml(s.gstin || '-')}</td>
                <td>₹${creditLimit.toLocaleString()}</td>
                <td style="color:${outstanding>0?'#dc3545':'#28a745'}">₹${outstanding.toLocaleString()}</td>
                <td class="${s.status === 'active' ? 'status-active' : 'status-inactive'}">${s.status || 'active'}</td>
                <td class="action-buttons">
                    <button onclick="editSupplier('${s.id}')" style="background:#17a2b8;">✏️ Edit</button>
                    <button onclick="viewSupplierLedger('${s.email}')" style="background:#e67e22;">📊 Ledger</button>
                    <button onclick="deleteSupplier('${s.id}')" class="btn-danger">🗑️ Delete</button>
                </td>
            </tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('suppliersTable').innerHTML = html;
    }

    function viewSupplierLedger(email) {
        localStorage.setItem('viewSupplierEmail', email);
        window.open('supplier-ledger.html', '_blank');
    }

    function saveSupplier() {
        const name = document.getElementById('suppName').value.trim();
        const email = document.getElementById('suppEmail').value.trim();
        const phone = document.getElementById('suppPhone').value.trim();

        if (!name || !email || !phone) {
            alert('Please fill Supplier Name, Email, and Phone');
            return;
        }

        if (editId === null && suppliers.some(s => s.email === email)) {
            alert('Supplier with this email already exists!');
            return;
        }

        const supplierData = {
            id: editId || Date.now(),
            name: name,
            email: email,
            phone: phone,
            contactPerson: document.getElementById('suppContactPerson').value,
            address: document.getElementById('suppAddress').value,
            pincode: document.getElementById('suppPincode').value,
            gstin: document.getElementById('suppGstin').value,
            state: document.getElementById('suppState').value,
            business: document.getElementById('suppBusiness').value,
            creditLimit: parseFloat(document.getElementById('suppCreditLimit').value) || 50000,
            openingBalance: parseFloat(document.getElementById('suppOpeningBalance').value) || 0,
            outstanding: parseFloat(document.getElementById('suppOpeningBalance').value) || 0,
            status: document.getElementById('suppStatus').value,
            paymentTerms: document.getElementById('suppPaymentTerms').value,
            supplierCode: document.getElementById('suppCode').value || generateSupplierCode(),
            updatedAt: new Date().toISOString()
        };

        if (editId === null) {
            supplierData.createdAt = new Date().toISOString();
            suppliers.push(supplierData);
        } else {
            const oldSupplier = suppliers.find(s => s.id == editId);
            if (oldSupplier) {
                supplierData.createdAt = oldSupplier.createdAt;
                // preserve existing outstanding from ledger if any
                supplierData.outstanding = oldSupplier.outstanding;
            }
            const index = suppliers.findIndex(s => s.id == editId);
            suppliers[index] = supplierData;
        }

        localStorage.setItem('suppliers', JSON.stringify(suppliers));
        alert('Supplier saved successfully!');
        clearForm();
        loadSuppliers();
    }

    function editSupplier(id) {
        const supplier = suppliers.find(s => s.id == id);
        if (!supplier) return;

        editId = id;
        document.getElementById('formTitle').innerHTML = 'Edit Supplier';
        document.getElementById('suppName').value = supplier.name;
        document.getElementById('suppEmail').value = supplier.email;
        document.getElementById('suppPhone').value = supplier.phone;
        document.getElementById('suppContactPerson').value = supplier.contactPerson || '';
        document.getElementById('suppAddress').value = supplier.address || '';
        document.getElementById('suppPincode').value = supplier.pincode || '';
        document.getElementById('suppGstin').value = supplier.gstin || '';
        document.getElementById('suppState').value = supplier.state || '';
        document.getElementById('suppBusiness').value = supplier.business || '';
        document.getElementById('suppCreditLimit').value = supplier.creditLimit || 50000;
        document.getElementById('suppOpeningBalance').value = supplier.openingBalance || 0;
        document.getElementById('suppStatus').value = supplier.status || 'active';
        document.getElementById('suppPaymentTerms').value = supplier.paymentTerms || 'net30';
        document.getElementById('suppCode').value = supplier.supplierCode || '';
        document.getElementById('cancelEditBtn').style.display = 'inline-block';

        document.querySelector('.form-section').scrollIntoView({ behavior: 'smooth' });
    }

    function cancelEdit() {
        clearForm();
    }

    function clearForm() {
        editId = null;
        document.getElementById('formTitle').innerHTML = 'Add New Supplier';
        document.getElementById('suppName').value = '';
        document.getElementById('suppEmail').value = '';
        document.getElementById('suppPhone').value = '';
        document.getElementById('suppContactPerson').value = '';
        document.getElementById('suppAddress').value = '';
        document.getElementById('suppPincode').value = '';
        document.getElementById('suppGstin').value = '';
        document.getElementById('suppState').value = '';
        document.getElementById('suppBusiness').value = '';
        document.getElementById('suppCreditLimit').value = '50000';
        document.getElementById('suppOpeningBalance').value = '0';
        document.getElementById('suppStatus').value = 'active';
        document.getElementById('suppPaymentTerms').value = 'net30';
        document.getElementById('suppCode').value = '';
        document.getElementById('cancelEditBtn').style.display = 'none';
    }

    function deleteSupplier(id) {
        if (!confirm('Delete this supplier? This will NOT affect purchase records.')) return;
        suppliers = suppliers.filter(s => s.id != id);
        localStorage.setItem('suppliers', JSON.stringify(suppliers));
        loadSuppliers();
    }

    function searchSuppliers() {
        displaySuppliers();
    }

    function exportToCSV() {
        let csv = "Supplier Code,Name,Email,Phone,Contact Person,Address,PIN,GSTIN,State,Business Name,Credit Limit,Opening Balance,Outstanding,Status,Payment Terms\n";
        suppliers.forEach(s => {
            csv += `"${s.supplierCode || ''}","${s.name}","${s.email}","${s.phone}","${s.contactPerson || ''}","${s.address || ''}","${s.pincode || ''}","${s.gstin || ''}","${s.state || ''}","${s.business || ''}",${s.creditLimit || 0},${s.openingBalance || 0},${s.outstanding || 0},${s.status || 'active'},"${s.paymentTerms || ''}"\n`;
        });
        const blob = new Blob([csv], {type: 'text/csv'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'suppliers_master.csv';
        a.click();
        URL.revokeObjectURL(url);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;');
    }

    loadSuppliers();
</script>
</body>
            </html>
