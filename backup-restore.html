<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backup & Restore – Auto Spares</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Roboto', sans-serif;
            background: #e9ecef;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        h1 { color: #0a7c71; }
        .backup-section, .restore-section {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid #dee2e6;
        }
        button {
            background: #0a7c71;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin-right: 10px;
        }
        button:hover { background: #09645a; }
        .btn-backup { background: #28a745; }
        .btn-restore { background: #17a2b8; }
        .btn-danger { background: #dc3545; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
        }
        th, td {
            border: 1px solid #dee2e6;
            padding: 8px;
            text-align: left;
        }
        th { background: #e9ecef; }
        .status { margin-top: 15px; padding: 10px; border-radius: 6px; display: none; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        .key-list { font-family: monospace; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h1><i class="fas fa-database"></i> Backup & Restore</h1>
    <p>This tool exports all your ERP data (customers, suppliers, products, invoices, payments, ledgers) into a single file. You can use this file to restore data on another device.</p>

    <!-- Backup Section -->
    <div class="backup-section">
        <h2><i class="fas fa-download"></i> Backup Data</h2>
        <button class="btn-backup" onclick="backupData()"><i class="fas fa-file-export"></i> Download Full Backup</button>
        <div id="backupStatus" class="status"></div>
        <div id="backupSummary" class="key-list"></div>
    </div>

    <!-- Restore Section -->
    <div class="restore-section">
        <h2><i class="fas fa-upload"></i> Restore Data</h2>
        <input type="file" id="restoreFile" accept=".json" style="margin-bottom: 10px;">
        <button class="btn-restore" onclick="restoreData()"><i class="fas fa-file-import"></i> Restore from Backup</button>
        <button class="btn-danger" onclick="clearAllData()" style="background:#dc3545;"><i class="fas fa-trash"></i> Clear All Data (Caution!)</button>
        <div id="restoreStatus" class="status"></div>
        <div id="restoreSummary" class="key-list"></div>
    </div>

    <button onclick="window.location.href='index.html'">Back to Dashboard</button>
</div>

<script>
    // Define all localStorage keys used in the ERP
    const storageKeys = [
        'customers',
        'suppliers',
        'products',
        'allInvoices',
        'salesInvoices',
        'purchaseInvoices',
        'customerPayments',
        'supplierPayments',
        'customerLedger',
        'supplierLedger',
        'inventoryTransactions',
        'proformas',
        'quotations',
        'users',
        'cashCounter_*',      // wildcard for financial year counters
        'creditCounter_*',
        'deletedInvoiceNumbers',
        'supplierCreditNotes'
    ];

    // Helper to get all matching keys (for wildcard)
    function getAllMatchingKeys(prefixPattern) {
        const pattern = prefixPattern.replace('*', '');
        return Object.keys(localStorage).filter(key => key.startsWith(pattern));
    }

    // Get all data to backup
    function getAllBackupData() {
        const backup = {};
        for (let key of storageKeys) {
            if (key.includes('*')) {
                const matchedKeys = getAllMatchingKeys(key);
                for (let mk of matchedKeys) {
                    backup[mk] = localStorage.getItem(mk);
                }
            } else {
                backup[key] = localStorage.getItem(key);
            }
        }
        // Also include any other keys that might be relevant but not listed
        // (like counters for proforma, quotation, etc. – but they are covered by wildcard)
        return backup;
    }

    // Backup function
    function backupData() {
        const backupData = getAllBackupData();
        const timestamp = new Date().toISOString().slice(0,19).replace(/:/g, '-');
        const fileName = `autospares_backup_${timestamp}.json`;
        const jsonStr = JSON.stringify(backupData, null, 2);
        const blob = new Blob([jsonStr], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = fileName;
        a.click();
        URL.revokeObjectURL(url);

        // Show summary
        let summary = '<strong>Backup created with keys:</strong><br>';
        for (let key in backupData) {
            const value = backupData[key];
            let count = 0;
            if (value) {
                try {
                    const parsed = JSON.parse(value);
                    if (Array.isArray(parsed)) count = parsed.length;
                    else if (typeof parsed === 'object') count = Object.keys(parsed).length;
                } catch(e) { count = value.length; }
            }
            summary += `${key}: ${count} records<br>`;
        }
        const statusDiv = document.getElementById('backupStatus');
        statusDiv.innerHTML = `<i class="fas fa-check-circle"></i> Backup created: ${fileName}`;
        statusDiv.className = 'status success';
        statusDiv.style.display = 'block';
        document.getElementById('backupSummary').innerHTML = summary;
        setTimeout(() => statusDiv.style.display = 'none', 5000);
    }

    // Restore function
    function restoreData() {
        const fileInput = document.getElementById('restoreFile');
        if (!fileInput.files.length) {
            alert('Please select a backup file first.');
            return;
        }
        const file = fileInput.files[0];
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const backupData = JSON.parse(e.target.result);
                let restoredCount = 0;
                for (let key in backupData) {
                    localStorage.setItem(key, backupData[key]);
                    restoredCount++;
                }
                const statusDiv = document.getElementById('restoreStatus');
                statusDiv.innerHTML = `<i class="fas fa-check-circle"></i> Restored ${restoredCount} keys successfully. Please refresh the page to see changes.`;
                statusDiv.className = 'status success';
                statusDiv.style.display = 'block';
                // Show summary
                let summary = '<strong>Restored keys:</strong><br>';
                for (let key in backupData) {
                    const value = backupData[key];
                    let count = 0;
                    if (value) {
                        try {
                            const parsed = JSON.parse(value);
                            if (Array.isArray(parsed)) count = parsed.length;
                            else if (typeof parsed === 'object') count = Object.keys(parsed).length;
                        } catch(e) { count = value.length; }
                    }
                    summary += `${key}: ${count} records<br>`;
                }
                document.getElementById('restoreSummary').innerHTML = summary;
                setTimeout(() => statusDiv.style.display = 'none', 5000);
            } catch(err) {
                const statusDiv = document.getElementById('restoreStatus');
                statusDiv.innerHTML = `<i class="fas fa-exclamation-triangle"></i> Error parsing backup file: ${err.message}`;
                statusDiv.className = 'status error';
                statusDiv.style.display = 'block';
                setTimeout(() => statusDiv.style.display = 'none', 5000);
            }
        };
        reader.readAsText(file);
    }

    // Clear all data (dangerous, with confirmation)
    function clearAllData() {
        if (!confirm('⚠️ WARNING: This will erase ALL your data (customers, suppliers, products, invoices, payments, etc.). This action cannot be undone. Are you ABSOLUTELY sure?')) {
            return;
        }
        if (!confirm('Second confirmation: Type "DELETE" to proceed.')) {
            return;
        }
        const confirmation = prompt('Type "DELETE" to confirm:');
        if (confirmation !== 'DELETE') {
            alert('Clear cancelled.');
            return;
        }
        const backupData = getAllBackupData();
        for (let key in backupData) {
            localStorage.removeItem(key);
        }
        alert('All data cleared. The page will now reload.');
        window.location.reload();
    }

    // On page load, show current data summary
    function showCurrentDataSummary() {
        const backupData = getAllBackupData();
        let summary = '<strong>Current data in localStorage:</strong><br>';
        for (let key in backupData) {
            const value = backupData[key];
            let count = 0;
            if (value) {
                try {
                    const parsed = JSON.parse(value);
                    if (Array.isArray(parsed)) count = parsed.length;
                    else if (typeof parsed === 'object') count = Object.keys(parsed).length;
                } catch(e) { count = value.length; }
            }
            summary += `${key}: ${count} records<br>`;
        }
        document.getElementById('backupSummary').innerHTML = summary;
    }

    showCurrentDataSummary();
</script>
</body>
</html>
