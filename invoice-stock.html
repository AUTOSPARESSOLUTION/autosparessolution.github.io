<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Auto Spares – Professional Invoice (Stock Integrated)</title>
    <style>
        /* ... (all existing styles remain the same) ... */
    </style>
    <script src="data-manager.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
<div class="invoice-container" id="invoiceContainer">
    <!-- ... (all existing HTML remains the same) ... -->
</div>

<div class="actions no-print">
    <button id="saveInvoiceBtn" onclick="saveInvoice()">💾 Save Invoice & Update Ledger</button>
    <button onclick="printInvoice()">🖨️ Print</button>
    <button onclick="generatePDF()">📄 Save as PDF</button>
    <button onclick="window.close()">❌ Close</button>
</div>

<script>
    // ========== GLOBAL VARIABLES ==========
    let isSaving = false;
    let invoiceAlreadySaved = false;

    // ========== UPDATED INVOICE NUMBER LOGIC ==========
    function getFinancialYear() {
        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth() + 1;
        if (month >= 4) return `${year}-${(year+1).toString().slice(-2)}`;
        else return `${year-1}-${year.toString().slice(-2)}`;
    }

    // NEW: Get the base prefix for cash bills with CH and initial numbering
    function getCashBillBasePrefix() {
        return `ASS/26-27/CH/`;
    }

    // NEW: Get the current maximum number for cash bills
    function getMaxCashBillNumber() {
        const allInvoices = JSON.parse(localStorage.getItem('allInvoices') || '[]');
        const prefix = getCashBillBasePrefix();
        let maxNumber = 0;
        
        allInvoices.forEach(inv => {
            if (inv.invoiceType === 'cash' && inv.invoiceNo && inv.invoiceNo.startsWith(prefix)) {
                const match = inv.invoiceNo.match(/(\d+)$/);
                if (match) {
                    const num = parseInt(match[1]);
                    if (num > maxNumber) maxNumber = num;
                }
            }
        });
        return maxNumber;
    }

    // NEW: Get next cash bill number with CH/XXX format
    function getNextCashBillNumber() {
        const maxNum = getMaxCashBillNumber();
        const nextNumber = maxNum + 1;
        const prefix = getCashBillBasePrefix();
        // Start from 004 if no existing cash bills
        const startNumber = 4;
        const currentNumber = Math.max(nextNumber, startNumber);
        return prefix + currentNumber.toString().padStart(3, '0');
    }

    // UPDATED: Main invoice number generation function
    function getNextInvoiceNumber(type) {
        if (type === 'cash') {
            return getNextCashBillNumber();
        } else {
            // Credit bills remain unchanged
            const allInvoices = JSON.parse(localStorage.getItem('allInvoices') || '[]');
            const finYear = getFinancialYear();
            let prefix = `ASS/${finYear}/CREDIT/`;
            let maxNumber = 0;
            allInvoices.forEach(inv => {
                if (inv.invoiceType === 'credit' && inv.invoiceNo && inv.invoiceNo.startsWith(prefix)) {
                    const match = inv.invoiceNo.match(/(\d+)$/);
                    if (match) {
                        const num = parseInt(match[1]);
                        if (num > maxNumber) maxNumber = num;
                    }
                }
            });
            const nextNumber = maxNumber + 1;
            return prefix + nextNumber.toString().padStart(4, '0');
        }
    }

    // ========== CART DATA ==========
    let cart = JSON.parse(localStorage.getItem('invoiceCart') || '[]');
    if (cart.length === 0) {
        cart.push({ part: '', desc: '', hsn: '', qty: 1, price: 0, discount: 0, unit: 'pc' });
    }

    const allProducts = getProducts();
    cart = cart.map(item => {
        if (!item.unit) {
            const prod = allProducts.find(p => p.sku === item.part);
            item.unit = prod ? (prod.unit || 'pc') : 'pc';
        }
        return { ...item, hsn: item.hsn || '' };
    });

    let currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
    let customers = JSON.parse(localStorage.getItem('customers') || '[]');

    // ========== HELPER FUNCTIONS (unchanged) ==========
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;');
    }

    function addNewItem() {
        cart.push({ part: '', desc: '', hsn: '', qty: 1, price: 0, discount: 0, unit: 'pc' });
        renderItemsAndTaxSummary();
        localStorage.setItem('invoiceCart', JSON.stringify(cart));
    }

    function calculatePackingCharges() {
        const cartons = parseFloat(document.getElementById('packingCartons').value) || 0;
        const rate = parseFloat(document.getElementById('packingRate').value) || 0;
        const total = cartons * rate;
        document.getElementById('packingTotal').value = total.toFixed(2);
        document.getElementById('packingChargeDisplay').innerText = total.toFixed(2);
        updateTotalsWithPackingAndRound();
    }

    function getPackingCharge() {
        return parseFloat(document.getElementById('packingTotal').value) || 0;
    }

    function isLocalGst() {
        const state = (document.getElementById('buyerState').value || '').trim().toLowerCase();
        const localStates = ['west bengal', 'wb', 'westbengal', 'kolkata', 'howrah', 'siliguri', 'darjeeling', 'asansol', 'hooghly', 'bardhaman'];
        return localStates.some(ls => state.includes(ls));
    }

    function updateGstDisplay() {
        const isLocal = isLocalGst();
        const cgstRow = document.getElementById('cgstRow');
        const sgstRow = document.getElementById('sgstRow');
        const igstRow = document.getElementById('igstRow');
        if (isLocal) {
            cgstRow.style.display = 'table-row';
            sgstRow.style.display = 'table-row';
            igstRow.style.display = 'none';
        } else {
            cgstRow.style.display = 'none';
            sgstRow.style.display = 'none';
            igstRow.style.display = 'table-row';
        }
        renderItemsAndTaxSummary();
    }

    document.getElementById('buyerState').addEventListener('input', updateGstDisplay);
    document.getElementById('buyerGstin').addEventListener('input', updateGstDisplay);

    function computeDueDate(invoiceDate, type, paymentTermsDays) {
        const date = new Date(invoiceDate);
        if (type === 'cash') return date;
        if (paymentTermsDays && !isNaN(paymentTermsDays)) date.setDate(date.getDate() + paymentTermsDays);
        else date.setDate(date.getDate() + 30);
        return date;
    }

    function formatDate(d) { return new Date(d).toLocaleDateString('en-IN'); }

    function updateDueDate() {
        const invoiceDateStr = document.getElementById('invoiceDate').innerText;
        const parts = invoiceDateStr.split('/');
        const invoiceDate = new Date(parts[2], parts[1]-1, parts[0]);
        const type = document.querySelector('input[name="invoiceType"]:checked').value;
        let paymentTermsDays = parseInt(document.getElementById('paymentTerms').value);
        if (isNaN(paymentTermsDays)) paymentTermsDays = 30;
        const dueDate = computeDueDate(invoiceDate, type, paymentTermsDays);
        document.getElementById('dueDate').innerText = formatDate(dueDate);
    }

    function setDates() {
        const invoiceDate = new Date();
        document.getElementById('invoiceDate').innerText = formatDate(invoiceDate);
        updateDueDate();
    }

    function updateInvoiceNumberDisplay() {
        const type = document.querySelector('input[name="invoiceType"]:checked').value;
        document.getElementById('invoiceNo').innerText = getNextInvoiceNumber(type);
    }

    function calculateTaxableTotals() {
        let sub = 0;
        let taxGroups = {};
        const isLocal = isLocalGst();
        if (!cart || cart.length === 0) {
            return { subtotal: 0, cgstTotal: 0, sgstTotal: 0, igstTotal: 0, taxGroups: {}, isLocal: isLocal };
        }
        cart.forEach(i => {
            const hsn = i.hsn || '';
            const taxable = (i.price * i.qty) * (1 - (i.discount || 0) / 100);
            sub += taxable;
            let cgst = 0, sgst = 0, igst = 0;
            if (isLocal) {
                cgst = taxable * 0.09;
                sgst = taxable * 0.09;
            } else {
                igst = taxable * 0.18;
            }
            if (!taxGroups[hsn]) taxGroups[hsn] = { taxable: 0, cgst: 0, sgst: 0, igst: 0 };
            taxGroups[hsn].taxable += taxable;
            taxGroups[hsn].cgst += cgst;
            taxGroups[hsn].sgst += sgst;
            taxGroups[hsn].igst += igst;
        });
        let cgstTotal = 0, sgstTotal = 0, igstTotal = 0;
        for (let hsn in taxGroups) {
            cgstTotal += taxGroups[hsn].cgst;
            sgstTotal += taxGroups[hsn].sgst;
            igstTotal += taxGroups[hsn].igst;
        }
        return { subtotal: sub, cgstTotal, sgstTotal, igstTotal, taxGroups, isLocal };
    }

    function getGSTApplicableTotal() {
        const taxableTotals = calculateTaxableTotals();
        const gstTotal = taxableTotals.isLocal ? taxableTotals.cgstTotal + taxableTotals.sgstTotal : taxableTotals.igstTotal;
        return (taxableTotals.subtotal || 0) + (gstTotal || 0);
    }

    function updateTotalsWithPackingAndRound() {
        const taxableTotals = calculateTaxableTotals();
        const gstApplicable = getGSTApplicableTotal();
        const packing = getPackingCharge() || 0;
        const roundedGSTApplicable = Math.round(gstApplicable || 0);
        const roundOff = (roundedGSTApplicable - (gstApplicable || 0));
        const grandTotal = roundedGSTApplicable + packing;
        
        document.getElementById('subtotal').innerText = (taxableTotals.subtotal || 0).toFixed(2);
        document.getElementById('cgstTotal').innerText = (taxableTotals.cgstTotal || 0).toFixed(2);
        document.getElementById('sgstTotal').innerText = (taxableTotals.sgstTotal || 0).toFixed(2);
        document.getElementById('igstTotal').innerText = (taxableTotals.igstTotal || 0).toFixed(2);
        document.getElementById('packingChargeDisplay').innerText = (packing || 0).toFixed(2);
        document.getElementById('roundOff').innerText = (roundOff || 0).toFixed(2);
        document.getElementById('grandTotal').innerText = (grandTotal || 0).toFixed(2);
    }

    function renderItemsAndTaxSummary() {
        const isLocal = isLocalGst();
        const thead = document.getElementById('itemsTableHead');
        const tbody = document.getElementById('itemsBody');
        
        let headers = ['#', 'Part No', 'Description', 'HSN/SAC', 'UOM', 'Qty', 'Unit Price (₹)', 'Disc %', 'Taxable (₹)', 'GST%'];
        if (isLocal) {
            headers.push('CGST (₹)', 'SGST (₹)', 'Total (₹)');
        } else {
            headers.push('IGST (₹)', 'Total (₹)');
        }
        thead.innerHTML = '<tr>' + headers.map(h => `<th>${h}</th>`).join('') + '</tr>';
        
        let itemsHtml = '';
        cart.forEach((item, idx) => {
            const discount = item.discount || 0;
            const taxable = (item.price * item.qty) * (1 - discount / 100);
            let cgst = 0, sgst = 0, igst = 0;
            if (isLocal) {
                cgst = taxable * 0.09;
                sgst = taxable * 0.09;
            } else {
                igst = taxable * 0.18;
            }
            const totalItem = taxable + (isLocal ? cgst + sgst : igst);
            let row = `<tr>
                <td style="text-align:center;">${idx+1}</td>
                <td><input type="text" value="${escapeHtml(item.part)}" style="width:100%; background:#fff9e0;" onchange="updatePart('${idx}', this.value)"></td>
                <td><input type="text" value="${escapeHtml(item.desc)}" style="width:100%; background:#fff9e0;" onchange="updateDesc('${idx}', this.value)"></td>
                <td><input type="text" value="${escapeHtml(item.hsn || '')}" style="width:100%; background:#fff9e0;" onchange="updateHsnByIndex('${idx}', this.value)"></td>
                <td><input type="text" value="${escapeHtml(item.unit || 'pc')}" style="width:100%; background:#fff9e0;" onchange="updateUnitByIndex('${idx}', this.value)"></td>
                <td style="text-align:center;"><input type="number" step="0.01" value="${item.qty}" style="width:80px;" onchange="updateQtyByIndex('${idx}', this.value)"></td>
                <td style="text-align:right;"><input type="number" step="0.01" value="${item.price}" style="width:100px;" onchange="updatePriceByIndex('${idx}', this.value)"></td>
                <td style="text-align:center;"><input type="number" step="0.01" value="${discount}" style="width:60px;" onchange="updateDiscountByIndex('${idx}', this.value)">%</strong></td>
                <td style="text-align:right;">₹${taxable.toFixed(2)}</strong></td>
                <td style="text-align:center;">18%</strong></td>`;
            if (isLocal) {
                row += `<td style="text-align:right;">₹${cgst.toFixed(2)}</strong><td style="text-align:right;">₹${sgst.toFixed(2)}</strong><td style="text-align:right;">₹${totalItem.toFixed(2)}</strong></td>`;
            } else {
                row += `<td style="text-align:right;">₹${igst.toFixed(2)}</strong><td style="text-align:right;">₹${totalItem.toFixed(2)}</strong></td>`;
            }
            row += `</tr>`;
            itemsHtml += row;
        });
        tbody.innerHTML = itemsHtml;
        
        const totals = calculateTaxableTotals();
        let taxHtml = '';
        for (let hsn in totals.taxGroups) {
            const g = totals.taxGroups[hsn];
            const totalTax = g.cgst + g.sgst + g.igst;
            taxHtml += `<tr>
                <td style="word-wrap:break-word;">${hsn || 'N/A'}</td>
                <td style="text-align:right;">₹${g.taxable.toFixed(2)}</strong></td>
                <td style="text-align:right;">${totals.isLocal ? '₹'+g.cgst.toFixed(2) : '-'}</strong></td>
                ${totals.isLocal ? `<td style="text-align:right;">₹${g.sgst.toFixed(2)}</strong></td>` : ''}
                <td style="text-align:right;">${!totals.isLocal ? '₹'+g.igst.toFixed(2) : '-'}</strong></td>
                <td style="text-align:right;">₹${totalTax.toFixed(2)}</strong></td>
            </tr>`;
        }
        document.getElementById('taxSummaryBody').innerHTML = taxHtml;
        updateTotalsWithPackingAndRound();
        localStorage.setItem('invoiceCart', JSON.stringify(cart));
    }

    function updatePart(idx, value) { if (cart[idx]) { cart[idx].part = value; renderItemsAndTaxSummary(); } }
    function updateDesc(idx, value) { if (cart[idx]) { cart[idx].desc = value; renderItemsAndTaxSummary(); } }
    function updateHsnByIndex(idx, value) { if (cart[idx]) { cart[idx].hsn = value; renderItemsAndTaxSummary(); } }
    function updateUnitByIndex(idx, value) { if (cart[idx]) { cart[idx].unit = value; renderItemsAndTaxSummary(); } }
    function updateQtyByIndex(idx, value) { if (cart[idx]) { cart[idx].qty = parseFloat(value) || 0; renderItemsAndTaxSummary(); } }
    function updatePriceByIndex(idx, value) { if (cart[idx]) { cart[idx].price = parseFloat(value) || 0; renderItemsAndTaxSummary(); } }
    function updateDiscountByIndex(idx, value) { if (cart[idx]) { cart[idx].discount = parseFloat(value) || 0; renderItemsAndTaxSummary(); } }

    function ensureProductInMaster(sku, name, hsn, price) {
        let products = getProducts();
        let existing = products.find(p => p.sku === sku);
        if (!existing) {
            const newProduct = {
                id: sku,
                sku: sku,
                name: name && name.trim() !== '' ? name : sku,
                hsn: hsn || '',
                unit: 'pc',
                price: price || 0,
                currentStock: 0,
                reorderLevel: 10,
                createdAt: new Date().toISOString()
            };
            products.push(newProduct);
            saveProducts(products);
        } else {
            let updated = false;
            if (hsn && (!existing.hsn || existing.hsn === '')) { existing.hsn = hsn; updated = true; }
            if (name && name.trim() !== '' && (existing.name === sku || existing.name === `Product ${sku}`)) { existing.name = name; updated = true; }
            if (updated) saveProducts(products);
        }
        return true;
    }

    // ========== RESET BUTTON FUNCTION ==========
    function resetSaveButton() {
        const saveBtn = document.getElementById('saveInvoiceBtn');
        saveBtn.disabled = false;
        saveBtn.classList.remove('disabled-btn');
        saveBtn.textContent = "💾 Save Invoice & Update Ledger";
        isSaving = false;
    }

    // ========== UPDATED SAVE INVOICE FUNCTION ==========
    function saveInvoice() {
        const saveBtn = document.getElementById('saveInvoiceBtn');
        
        // HARD LOCK
        if (saveBtn.disabled || isSaving || invoiceAlreadySaved) {
            return;
        }
        
        saveBtn.disabled = true;
        saveBtn.classList.add('disabled-btn');
        saveBtn.textContent = "Saving...";
        isSaving = true;
        
        try {
            // VALIDATE ITEMS
            const validCart = cart.filter(item => item.part && item.part.trim() !== '');
            if (validCart.length === 0) {
                alert('Please add at least one item with a Part No.');
                resetSaveButton();
                return;
            }
            
            const type = document.querySelector('input[name="invoiceType"]:checked').value;
            
            // ALWAYS READ LATEST STORAGE
            let allInvoices = JSON.parse(localStorage.getItem('allInvoices') || '[]');
            
            // GENERATE INVOICE NUMBER
            let proposedNo = getNextInvoiceNumber(type);
            
            // DUPLICATE CHECK
            const alreadyExists = allInvoices.some(inv => inv.invoiceNo === proposedNo);
            
            // AUTO FIX DUPLICATE NUMBER
            if (alreadyExists) {
                if (type === 'cash') {
                    // For cash bills, increment the CH number
                    let counter = 1;
                    let newNo;
                    const prefix = getCashBillBasePrefix();
                    do {
                        const match = proposedNo.match(/(\d+)$/);
                        const current = parseInt(match[1]) + counter;
                        newNo = prefix + current.toString().padStart(3, '0');
                        counter++;
                    } while (allInvoices.some(inv => inv.invoiceNo === newNo));
                    proposedNo = newNo;
                } else {
                    // For credit bills
                    let counter = 1;
                    let newNo;
                    do {
                        const match = proposedNo.match(/(\d+)$/);
                        const current = parseInt(match[1]) + counter;
                        newNo = proposedNo.replace(/\d+$/, current.toString().padStart(4, '0'));
                        counter++;
                    } while (allInvoices.some(inv => inv.invoiceNo === newNo));
                    proposedNo = newNo;
                }
            }
            
            // PRODUCT MASTER UPDATE
            for (let item of validCart) {
                ensureProductInMaster(item.part, item.desc, item.hsn, item.price);
            }
            
            // BUYER DETAILS
            const buyer = {
                name: document.getElementById('buyerName').value.trim(),
                email: document.getElementById('buyerEmail').value.trim(),
                address: document.getElementById('buyerAddress').value,
                phone: document.getElementById('buyerPhone').value.trim(),
                gstin: document.getElementById('buyerGstin').value.trim(),
                state: document.getElementById('buyerState').value.trim()
            };
            
            // EMAIL REQUIRED
            if (!buyer.email) {
                alert('Customer email is required.');
                resetSaveButton();
                return;
            }
            
            // CUSTOMER SAVE
            let customersList = JSON.parse(localStorage.getItem('customers') || '[]');
            let existingCustomer = customersList.find(c => c.email === buyer.email);
            if (!existingCustomer && buyer.email) {
                const newCust = {
                    id: Date.now(),
                    name: buyer.name,
                    email: buyer.email,
                    phone: buyer.phone,
                    address: buyer.address,
                    gstin: buyer.gstin,
                    state: buyer.state,
                    outstanding: 0,
                    totalPurchased: 0,
                    creditLimit: 50000,
                    status: 'active',
                    customerCode: 'CUST' + (customersList.length + 1).toString().padStart(4, '0'),
                    createdAt: new Date().toISOString()
                };
                customersList.push(newCust);
                localStorage.setItem('customers', JSON.stringify(customersList));
            }
            
            // TOTALS
            const taxableTotals = calculateTaxableTotals();
            const gstApplicable = getGSTApplicableTotal();
            const packing = getPackingCharge();
            const roundedGSTApplicable = Math.round(gstApplicable);
            const roundOff = roundedGSTApplicable - gstApplicable;
            const grandTotal = roundedGSTApplicable + packing;
            
            // DATE FORMAT
            const dateParts = document.getElementById('invoiceDate').innerText.split('/');
            const invoiceDateFormatted = `${dateParts[2]}-${dateParts[1]}-${dateParts[0]}`;
            
            // CREATE INVOICE OBJECT (using proposedNo as ID)
            const invoice = {
                id: proposedNo,
                date: invoiceDateFormatted,
                customerEmail: buyer.email,
                invoiceNo: proposedNo,
                invoiceType: type,
                status: type === 'cash' ? 'Paid' : 'Pending',
                grandTotal: grandTotal,
                packingCharges: packing,
                cartonQty: parseFloat(document.getElementById('packingCartons').value) || 0,
                packingRate: parseFloat(document.getElementById('packingRate').value) || 0,
                roundOff: roundOff,
                buyer: buyer,
                consignee: {
                    name: document.getElementById('consigneeName').value,
                    address: document.getElementById('consigneeAddress').value,
                    phone: document.getElementById('consigneePhone').value
                },
                orderDetails: {
                    customerCode: document.getElementById('customerCode').value,
                    salesOrderNo: document.getElementById('salesOrderNo').value,
                    referenceNo: document.getElementById('referenceNo').value,
                    paymentTerms: document.getElementById('paymentTermsField').value
                },
                dispatchDetails: {
                    docNo: document.getElementById('dispatchDocNo').value,
                    transportMode: document.getElementById('transportMode').value,
                    vehicleNo: document.getElementById('vehicleNo').value,
                    cartons: document.getElementById('cartons').value
                },
                dueDate: document.getElementById('dueDate').innerText,
                finYear: getFinancialYear(),
                items: validCart.map(item => ({
                    part: item.part,
                    desc: item.desc,
                    hsn: item.hsn || '',
                    qty: item.qty,
                    price: item.price,
                    discount: item.discount || 0,
                    unit: item.unit || 'pc'
                }))
            };
            
            // FINAL STORAGE CHECK
            allInvoices = JSON.parse(localStorage.getItem('allInvoices') || '[]');
            if (allInvoices.some(inv => inv.invoiceNo === proposedNo)) {
                alert('Duplicate invoice prevented.');
                resetSaveButton();
                return;
            }
            
            // SAVE MAIN INVOICE
            allInvoices.push(invoice);
            localStorage.setItem('allInvoices', JSON.stringify(allInvoices));
            
            // SAVE SALES INVOICE
            let salesInvoices = JSON.parse(localStorage.getItem('salesInvoices') || '[]');
            if (!salesInvoices.some(inv => inv.invoiceNo === proposedNo)) {
                salesInvoices.push(invoice);
                localStorage.setItem('salesInvoices', JSON.stringify(salesInvoices));
            }
            
            // OPTIONAL EXTERNAL FUNCTION
            if (typeof createSalesInvoice === 'function') {
                try {
                    const existsAlready = salesInvoices.some(inv => inv.invoiceNo === proposedNo);
                    if (!existsAlready) {
                        createSalesInvoice(invoice);
                    }
                } catch (e) {
                    console.warn(e);
                }
            }
            
            // CUSTOMER LEDGER UPDATE
            const custIndex = customersList.findIndex(c => c.email === buyer.email);
            if (custIndex !== -1) {
                customersList[custIndex].outstanding = (customersList[custIndex].outstanding || 0) + invoice.grandTotal;
                customersList[custIndex].totalPurchased = (customersList[custIndex].totalPurchased || 0) + invoice.grandTotal;
                localStorage.setItem('customers', JSON.stringify(customersList));
            }
            
            // SUCCESS
            invoiceAlreadySaved = true;
            localStorage.setItem('invoiceCart', '[]');
            alert(`Invoice ${proposedNo} saved successfully!`);
            saveBtn.textContent = "Saved Successfully";
            setTimeout(() => window.close(), 1000);
        } catch (err) {
            alert("Error: " + err.message);
            resetSaveButton();
        }
    }

    // ========== PRINT AND PDF FUNCTIONS ==========
    function printInvoice() {
        if (!invoiceAlreadySaved && !confirm("Invoice not saved yet. Print anyway? Data won't be stored.")) return;
        const inputs = document.querySelectorAll('#invoiceContainer input, #invoiceContainer textarea, #invoiceContainer select');
        const replacements = [];
        inputs.forEach(el => {
            const span = document.createElement('span');
            span.className = 'info-value-text';
            span.style.whiteSpace = 'pre-wrap';
            if (el.tagName === 'TEXTAREA') span.innerText = el.value;
            else if (el.tagName === 'SELECT') span.innerText = el.options[el.selectedIndex]?.text || '';
            else span.innerText = el.value;
            const styles = window.getComputedStyle(el);
            span.style.fontSize = styles.fontSize;
            span.style.fontFamily = styles.fontFamily;
            span.style.color = '#333';
            span.style.display = 'inline-block';
            span.style.width = '100%';
            span.style.padding = styles.padding;
            span.style.backgroundColor = 'transparent';
            const parent = el.parentNode;
            parent.replaceChild(span, el);
            replacements.push({ original: el, span: span, parent: parent });
        });
        window.print();
        setTimeout(() => replacements.forEach(rep => rep.parent.replaceChild(rep.original, rep.span)), 100);
    }

    function generatePDF() {
        if (!invoiceAlreadySaved && !confirm("Invoice not saved yet. Generate PDF anyway? Data won't be stored.")) return;
        const originalContainer = document.getElementById('invoiceContainer');
        const clone = originalContainer.cloneNode(true);
        clone.querySelectorAll('input, textarea, select').forEach(el => {
            const span = document.createElement('span');
            span.className = 'info-value-text';
            span.style.whiteSpace = 'pre-wrap';
            if (el.tagName === 'TEXTAREA') span.innerText = el.value;
            else if (el.tagName === 'SELECT') span.innerText = el.options[el.selectedIndex]?.text || '';
            else span.innerText = el.value;
            span.style.fontSize = window.getComputedStyle(el).fontSize;
            span.style.fontFamily = window.getComputedStyle(el).fontFamily;
            span.style.color = '#333';
            span.style.display = 'inline-block';
            span.style.width = '100%';
            el.parentNode.replaceChild(span, el);
        });
        clone.querySelectorAll('.editable').forEach(el => el.classList.remove('editable'));
        const typeSelector = clone.querySelector('.invoice-type');
        if (typeSelector) typeSelector.style.display = 'none';
        originalContainer.style.display = 'none';
        document.body.appendChild(clone);
        const opt = {
            margin: [0.3, 0.3, 0.3, 0.3],
            filename: `Invoice_${document.getElementById('invoiceNo').innerText}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, letterRendering: true, useCORS: true },
            jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(clone).save().then(() => {
            document.body.removeChild(clone);
            originalContainer.style.display = '';
        });
    }

    // ========== CUSTOMER DROPDOWN (ADMIN) ==========
    function populateCustomerSelect() {
        const select = document.getElementById('quickCustomerSelect');
        customers = JSON.parse(localStorage.getItem('customers') || '[]');
        select.innerHTML = '<option value="">-- Select Customer (Admin only) --</option>';
        customers.forEach(c => {
            select.innerHTML += `<option value="${c.email}">${c.name} (${c.email})</option>`;
        });
    }

    function loadCustomerData() {
        const select = document.getElementById('quickCustomerSelect');
        const email = select.value;
        if (!email) return;
        const cust = customers.find(c => c.email === email);
        if (cust) {
            document.getElementById('buyerName').value = cust.name || '';
            document.getElementById('buyerAddress').value = cust.address || '';
            document.getElementById('buyerPhone').value = cust.phone || '';
            document.getElementById('buyerEmail').value = cust.email || '';
            document.getElementById('buyerGstin').value = cust.gstin || '';
            document.getElementById('buyerState').value = cust.state || '';
            document.getElementById('customerCode').value = cust.customerCode || '';
            document.getElementById('consigneeName').value = cust.name || '';
            document.getElementById('consigneeAddress').value = cust.address || '';
            document.getElementById('consigneePhone').value = cust.phone || '';
            updateGstDisplay();
        }
    }

    // ========== INITIALISATION ==========
    if (currentUser) {
        document.getElementById('buyerName').value = currentUser.name || '';
        document.getElementById('buyerAddress').value = currentUser.address || '';
        document.getElementById('buyerPhone').value = currentUser.phone || '';
        document.getElementById('buyerEmail').value = currentUser.email || '';
        document.getElementById('buyerGstin').value = currentUser.gstin || '';
        document.getElementById('buyerState').value = currentUser.state || '';
        document.getElementById('consigneeName').value = currentUser.name || '';
        document.getElementById('consigneeAddress').value = currentUser.address || '';
        document.getElementById('consigneePhone').value = currentUser.phone || '';
    }

    if (currentUser && (currentUser.role === 'admin' || currentUser.isAdmin)) {
        document.getElementById('adminCustomerSelect').style.display = 'flex';
        populateCustomerSelect();
    }

    document.querySelectorAll('input[name="invoiceType"]').forEach(radio => {
        radio.addEventListener('change', function() {
            document.getElementById('creditFields').style.display = (this.value === 'credit') ? 'flex' : 'none';
            updateInvoiceNumberDisplay();
            updateDueDate();
            updateGstDisplay();
        });
    });

    document.getElementById('paymentTerms')?.addEventListener('change', updateDueDate);
    setDates();
    renderItemsAndTaxSummary();
    updateInvoiceNumberDisplay();
    updateGstDisplay();
    calculatePackingCharges();

    // Date picker
    (function addDateEdit() {
        const editBtn = document.getElementById('editDateBtn');
        if (!editBtn) return;
        editBtn.addEventListener('click', function(e) {
            e.preventDefault();
            const currentDateStr = document.getElementById('invoiceDate').innerText;
            const parts = currentDateStr.split('/');
            let currentDate = new Date(parts[2], parts[1]-1, parts[0]);
            if (isNaN(currentDate.getTime())) currentDate = new Date();
            const tempDiv = document.createElement('div');
            tempDiv.className = 'date-picker-temp';
            tempDiv.style.position = 'absolute';
            tempDiv.style.top = (editBtn.offsetTop + 30) + 'px';
            tempDiv.style.left = editBtn.offsetLeft + 'px';
            const dateInput = document.createElement('input');
            dateInput.type = 'date';
            const yyyy = currentDate.getFullYear();
            const mm = String(currentDate.getMonth() + 1).padStart(2, '0');
            const dd = String(currentDate.getDate()).padStart(2, '0');
            dateInput.value = `${yyyy}-${mm}-${dd}`;
            tempDiv.appendChild(dateInput);
            document.body.appendChild(tempDiv);
            dateInput.focus();
            dateInput.addEventListener('change', function() {
                if (dateInput.value) {
                    const [y, m, d] = dateInput.value.split('-');
                    const newDate = new Date(parseInt(y), parseInt(m)-1, parseInt(d));
                    if (!isNaN(newDate.getTime())) {
                        const formatted = newDate.toLocaleDateString('en-IN');
                        document.getElementById('invoiceDate').innerText = formatted;
                        updateDueDate();
                    }
                }
                document.body.removeChild(tempDiv);
            });
            dateInput.addEventListener('blur', function() { if (document.body.contains(tempDiv)) document.body.removeChild(tempDiv); });
            const outsideClickHandler = function(ev) {
                if (!tempDiv.contains(ev.target) && ev.target !== editBtn) {
                    if (document.body.contains(tempDiv)) document.body.removeChild(tempDiv);
                    document.removeEventListener('click', outsideClickHandler);
                }
            };
            setTimeout(() => document.addEventListener('click', outsideClickHandler), 100);
        });
    })();
</script>
