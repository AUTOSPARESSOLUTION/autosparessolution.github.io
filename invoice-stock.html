    <style>
        /* YOUR EXISTING STYLES – EXACTLY AS BEFORE (no changes) */
        * { box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background: #e9ecef; margin: 0; padding: 20px; }
        .invoice-container { max-width: 1300px; margin: 0 auto; background: white; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 0 15px 15px 15px; border: 1px solid #dee2e6; }
        @media print { .no-print, .actions, .invoice-type, button, input, textarea, select, .edit-date-btn, .date-picker-temp { display: none !important; } body { background: white; padding: 0; margin: 0; } .invoice-container { box-shadow: none; border-radius: 0; padding: 0 10px 5px 10px; margin: 0; border: none; } .company-header { -webkit-print-color-adjust: exact; print-color-adjust: exact; background: #0a7c71; color: white; margin: 0 -10px 10px -10px; } .items-table th, .tax-summary-table th { background: #f8f9fa !important; } .qr-box, .signature-row, .packing-section, .totals, .info-box { page-break-inside: avoid; break-inside: avoid; } .company-header, .totals { page-break-after: avoid; break-after: avoid; } .invoice-container { font-size: 10pt; } .info-box, .packing-section { padding: 5px 8px; margin-bottom: 8px; } .items-table td, .items-table th { padding: 4px 3px; font-size: 9pt; } .totals table { width: 300px; margin-left: auto; } .totals td { border: none; padding: 3px; } .qr-box img { max-width: 80px; } .signature-box { padding-top: 3px; } .footer-legal { margin-top: 8px; padding-top: 5px; } }

        .add-item-btn { background: #28a745; margin-right: 10px; }

<body>
<div class="invoice-container" id="invoiceContainer">
    <!-- YOUR EXACT HTML (same as before) – omitted for brevity but you must keep your full HTML -->
    <!-- ... All your existing HTML content ... -->
    <!-- Since I cannot paste the entire 800+ lines again, I will assume you keep your HTML exactly as you had. -->
    <!-- Only the JavaScript part changes below. -->
</div>
<div class="actions no-print">
    <button id="saveInvoiceBtn" onclick="saveInvoice()">💾 Save Invoice & Update Ledger</button>
    <button onclick="printInvoice()">🖨️ Print</button>
    <button onclick="generatePDF()">📄 Save as PDF</button>
    <button onclick="window.close()">❌ Close</button>
</div>

<script>
    // ========== ORIGINAL INVOICE NUMBER LOGIC (SCANS EXISTING INVOICES) – UNCHANGED ==========
    function getFinancialYear() {
        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth() + 1;
        if (month >= 4) return `${year}-${(year+1).toString().slice(-2)}`;
        else return `${year-1}-${year.toString().slice(-2)}`;
    }

    function getNextInvoiceNumber(type) {
        const allInvoices = JSON.parse(localStorage.getItem('allInvoices') || '[]');
        const finYear = getFinancialYear();
        let prefix = (type === 'credit') ? `ASS/${finYear}/` : `ASS/${finYear}/CASH/`;
        let maxNumber = 0;
        allInvoices.forEach(inv => {
            if (inv.invoiceType === type && inv.invoiceNo && inv.invoiceNo.startsWith(prefix)) {
                const match = inv.invoiceNo.match(/(\d+)$/);
                if (match) {
                    const num = parseInt(match[1]);
                    if (num > maxNumber) maxNumber = num;
                }
            }
        });
        const nextNumber = maxNumber + 1;
        return prefix + nextNumber.toString().padStart(4, '0');
    }

    // ========== GLOBAL LOCKS ==========
    let isSaving = false;
    let invoiceAlreadySaved = false;
    let processingNumbers = new Set();

    // ========== LOAD CART (keep your existing cart loading code – unchanged) ==========
    let cart = JSON.parse(localStorage.getItem('invoiceCart') || '[]');
    if (cart.length === 0) cart.push({ part: '', desc: '', hsn: '', qty: 1, price: 0, discount: 0, unit: 'pc' });
    const allProducts = getProducts();
    cart = cart.map(item => {
        if (!item.unit) {
            const prod = allProducts.find(p => p.sku === item.part);
            item.unit = prod ? (prod.unit || 'pc') : 'pc';
        }
        return { ...item, hsn: item.hsn || '' };
    });
    let currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
    let customers = JSON.parse(localStorage.getItem('customers') || '[]');

    // ========== BULLETPROOF SAVE FUNCTION – DISABLES BUTTON AND REMOVES CLICK HANDLER ==========
    function saveInvoice() {
        // ** FIRST LINE: DISABLE BUTTON AND REMOVE ONCLICK **
        const saveBtn = document.getElementById('saveInvoiceBtn');
        if (saveBtn.disabled) return;          // already disabled
        saveBtn.disabled = true;
        saveBtn.onclick = null;                 // remove the click handler entirely
        saveBtn.classList.add('disabled-btn');
        saveBtn.textContent = "Saving...";

        // Additional flag check (extra safety)
        if (isSaving || invoiceAlreadySaved) {
            // Should not happen because button is already disabled, but just in case
            return;
        }
        isSaving = true;

        // Validate cart
        const validCart = cart.filter(item => item.part && item.part.trim() !== '');
        if (validCart.length === 0) {
            alert('Please add at least one item with a Part No.');
            // re-enable button (though page may not close)
            saveBtn.disabled = false;
            saveBtn.onclick = saveInvoice;
            saveBtn.textContent = "💾 Save Invoice & Update Ledger";
            saveBtn.classList.remove('disabled-btn');
            isSaving = false;
            return;
        }

        const type = document.querySelector('input[name="invoiceType"]:checked').value;
        const proposedNo = getNextInvoiceNumber(type);

        if (processingNumbers.has(proposedNo)) {
            alert(`Invoice number ${proposedNo} is already being processed.`);
            saveBtn.disabled = false;
            saveBtn.onclick = saveInvoice;
            saveBtn.textContent = "💾 Save Invoice & Update Ledger";
            saveBtn.classList.remove('disabled-btn');
            isSaving = false;
            return;
        }
        processingNumbers.add(proposedNo);

        // Proceed with save (all your existing logic)
        try {
            for (let item of validCart) {
                if (!item.part) continue;
                ensureProductInMaster(item.part, item.desc, item.hsn, item.price);
            }

            const buyer = {
                name: document.getElementById('buyerName').value.trim(),
                email: document.getElementById('buyerEmail').value.trim(),
                address: document.getElementById('buyerAddress').value,
                phone: document.getElementById('buyerPhone').value.trim(),
                gstin: document.getElementById('buyerGstin').value.trim(),
                state: document.getElementById('buyerState').value.trim()
            };

            let customersList = JSON.parse(localStorage.getItem('customers') || '[]');
            let existingCustomer = customersList.find(c => c.email === buyer.email);
            if (!existingCustomer && buyer.email) {
                const newCust = {
                    id: Date.now(),
                    name: buyer.name,
                    email: buyer.email,
                    phone: buyer.phone,
                    address: buyer.address,
                    gstin: buyer.gstin,
                    state: buyer.state,
                    outstanding: 0,
                    totalPurchased: 0,
                    creditLimit: 50000,
                    status: 'active',
                    customerCode: 'CUST' + (customersList.length + 1).toString().padStart(4, '0'),
                    createdAt: new Date().toISOString()
                };
                customersList.push(newCust);
                localStorage.setItem('customers', JSON.stringify(customersList));
            }

            if (!buyer.email) {
                alert('Customer email is required.');
                // re-enable button
                saveBtn.disabled = false;
                saveBtn.onclick = saveInvoice;
                saveBtn.textContent = "💾 Save Invoice & Update Ledger";
                saveBtn.classList.remove('disabled-btn');
                processingNumbers.delete(proposedNo);
                isSaving = false;
                return;
            }

            const taxableTotals = calculateTaxableTotals();
            const gstApplicable = getGSTApplicableTotal();
            const packing = getPackingCharge();
            const roundedGSTApplicable = Math.round(gstApplicable);
            const roundOff = roundedGSTApplicable - gstApplicable;
            const grandTotal = roundedGSTApplicable + packing;

            const dateParts = document.getElementById('invoiceDate').innerText.split('/');
            const invoiceDateFormatted = `${dateParts[2]}-${dateParts[1]}-${dateParts[0]}`;

            const invoice = {
                id: Date.now() + Math.random(),
                date: invoiceDateFormatted,
                customerEmail: buyer.email,
                invoiceNo: proposedNo,
                invoiceType: type,
                status: type === 'cash' ? 'Paid' : 'Pending',
                grandTotal: grandTotal,
                packingCharges: packing,
                cartonQty: parseFloat(document.getElementById('packingCartons').value) || 0,
                packingRate: parseFloat(document.getElementById('packingRate').value) || 0,
                roundOff: roundOff,
                buyer: buyer,
                consignee: {
                    name: document.getElementById('consigneeName').value,
                    address: document.getElementById('consigneeAddress').value,
                    phone: document.getElementById('consigneePhone').value
                },
                orderDetails: {
                    customerCode: document.getElementById('customerCode').value,
                    salesOrderNo: document.getElementById('salesOrderNo').value,
                    referenceNo: document.getElementById('referenceNo').value,
                    paymentTerms: document.getElementById('paymentTermsField').value
                },
                dispatchDetails: {
                    docNo: document.getElementById('dispatchDocNo').value,
                    transportMode: document.getElementById('transportMode').value,
                    vehicleNo: document.getElementById('vehicleNo').value,
                    cartons: document.getElementById('cartons').value
                },
                dueDate: document.getElementById('dueDate').innerText,
                finYear: getFinancialYear(),
                items: validCart.map(item => ({
                    part: item.part,
                    desc: item.desc,
                    hsn: item.hsn || '',
                    qty: item.qty,
                    price: item.price,
                    discount: item.discount || 0,
                    unit: item.unit || 'pc'
                }))
            };

            let allInvoices = JSON.parse(localStorage.getItem('allInvoices') || '[]');
            allInvoices = allInvoices.filter(inv => inv.id !== invoice.id);
            allInvoices.push(invoice);
            localStorage.setItem('allInvoices', JSON.stringify(allInvoices));
            
            let salesInvoices = JSON.parse(localStorage.getItem('salesInvoices') || '[]');
            salesInvoices = salesInvoices.filter(inv => inv.id !== invoice.id);
            salesInvoices.push(invoice);
            localStorage.setItem('salesInvoices', JSON.stringify(salesInvoices));
            
            const custIndex = customersList.findIndex(c => c.email === buyer.email);
            if (custIndex !== -1) {
                customersList[custIndex].outstanding = (customersList[custIndex].outstanding || 0) + invoice.grandTotal;
                customersList[custIndex].totalPurchased = (customersList[custIndex].totalPurchased || 0) + invoice.grandTotal;
                localStorage.setItem('customers', JSON.stringify(customersList));
            }
            
            if (typeof createSalesInvoice === 'function') {
                try { createSalesInvoice(invoice); } catch(e) { console.warn(e); }
            }

            alert(`Invoice ${proposedNo} saved successfully!\n\nPacking: ₹${packing.toFixed(2)}\nRound Off: ₹${roundOff.toFixed(2)}`);
            localStorage.setItem('invoiceCart', '[]');
            invoiceAlreadySaved = true;
            saveBtn.classList.add('disabled-btn');
            setTimeout(() => window.close(), 1000);
        } catch (err) {
            alert("Error: " + err.message);
            // re-enable button on error
            saveBtn.disabled = false;
            saveBtn.onclick = saveInvoice;
            saveBtn.textContent = "💾 Save Invoice & Update Ledger";
            saveBtn.classList.remove('disabled-btn');
            processingNumbers.delete(proposedNo);
            isSaving = false;
        }
    }

    // ========== KEEP ALL YOUR EXISTING HELPER FUNCTIONS (render, calculate, etc.) ==========
    // They are unchanged – only the save function above is modified.
    // (For brevity, I have not pasted the ~200 lines of your existing helper functions.
    //  You must keep them exactly as they were in your working version.)
</script>
