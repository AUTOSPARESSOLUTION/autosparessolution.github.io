<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase Entry – Supplier Bill / Credit Note (Stock Integrated)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Roboto', sans-serif;
            background: #e9ecef;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: auto;
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        h1, h2, h3 { color: #0a7c71; }
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
        }
        .form-group {
            flex: 1;
            min-width: 200px;
        }
        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #555;
        }
        input, select, textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-family: inherit;
        }
        .item-row {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        .item-row input { flex: 1; min-width: 100px; }
        .remove-item { background: #dc3545; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; }
        .add-item { background: #28a745; margin-bottom: 15px; }
        .totals { text-align: right; margin-top: 20px; }
        .totals table { width: 300px; margin-left: auto; }
        .totals td { padding: 5px; }
        button { background: #0a7c71; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; margin-right: 10px; }
        button:hover { background: #09645a; }
        .btn-danger { background: #6c757d; }
        .credit-note-section { margin-top: 20px; border-top: 1px solid #dee2e6; padding-top: 20px; }
        hr { margin: 20px 0; }
    </style>
    <script src="data-manager.js"></script>
</head>
<body>
<div class="container">
    <h1>Purchase Entry (Stock Integrated)</h1>
    <hr>

    <!-- Supplier Details -->
    <div class="form-row">
        <div class="form-group">
            <label>Supplier *</label>
            <!-- Admin quick-select (visible only to admin) -->
            <div id="adminSupplierSelect" style="display:none;">
                <select id="quickSupplierSelect" onchange="loadSupplierData()" style="margin-bottom:5px;">
                    <option value="">-- Quick Select (Admin only) --</option>
                </select>
            </div>
            <select id="supplierSelect">
                <option value="">-- Select existing or type new --</option>
            </select>
            <input type="text" id="supplierName" placeholder="Or enter new supplier name" style="margin-top:5px;">
        </div>
        <div class="form-group"><label>Supplier GSTIN</label><input type="text" id="supplierGstin"></div>
        <div class="form-group"><label>Supplier Phone</label><input type="text" id="supplierPhone"></div>
    </div>
    <div class="form-row">
        <div class="form-group"><label>Supplier Address</label><textarea id="supplierAddress" rows="2"></textarea></div>
    </div>

    <!-- Bill Details -->
    <div class="form-row">
        <div class="form-group"><label>Purchase Invoice No *</label><input type="text" id="purchaseInvoiceNo" placeholder="Leave blank for auto‑generated"></div>
        <div class="form-group"><label>Invoice Date</label><input type="date" id="purchaseDate"></div>
        <div class="form-group"><label>Due Date</label><input type="date" id="purchaseDueDate"></div>
        <div class="form-group"><label>Payment Terms (days)</label><input type="number" id="paymentTerms" value="30"></div>
    </div>

    <!-- Items Table (fully manual entry) -->
    <h3>Items Purchased</h3>
    <div id="itemsContainer"></div>
    <button class="add-item" onclick="addItemRow()"><i class="fas fa-plus"></i> Add Item</button>

    <!-- Totals -->
    <div class="totals">
        <table>
            <tr><td style="text-align:right;">Subtotal: </td><td style="text-align:right;">₹<span id="subtotal">0.00</span></td></tr>
            <tr><td style="text-align:right;">CGST (9%): </td><td style="text-align:right;">₹<span id="cgstTotal">0.00</span></td></tr>
            <tr><td style="text-align:right;">SGST (9%): </td><td style="text-align:right;">₹<span id="sgstTotal">0.00</span></td></tr>
            <tr style="font-weight:bold;"><td style="text-align:right;">Grand Total: </td><td style="text-align:right;">₹<span id="grandTotal">0.00</span></td></tr>
        </table>
    </div>

    <div>
        <button onclick="savePurchaseInvoice()">💾 Save Purchase Invoice</button>
        <button class="btn-danger" onclick="window.close()">Cancel</button>
    </div>

    <!-- Credit Note Entry Section -->
    <div class="credit-note-section">
        <h3>Record Credit Note (Supplier Return)</h3>
        <div class="form-row">
            <div class="form-group"><label>Credit Note Date</label><input type="date" id="creditDate"></div>
            <div class="form-group"><label>Amount (₹)</label><input type="number" id="creditAmount" step="0.01" placeholder="Enter amount"></div>
            <div class="form-group"><label>Against Invoice (optional)</label><select id="creditInvoiceSelect"><option value="">All outstanding</option></select></div>
            <div class="form-group"><label>Reason / Remarks</label><input type="text" id="creditRemarks" placeholder="Return reason"></div>
            <div class="form-group"><button onclick="recordCreditNote()">Record Credit Note</button></div>
        </div>
    </div>
</div>

<script>
    let items = [];              // each item: { part, desc, hsn, qty, cost, discount }
    let suppliers = [];
    let purchaseInvoices = [];

    // ---------- Financial Year & Auto‑Numbering ----------
    function getFinancialYear() {
        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth() + 1;
        if (month >= 4) return `${year}-${(year+1).toString().slice(-2)}`;
        else return `${year-1}-${year.toString().slice(-2)}`;
    }

    function getNextPurchaseInvoiceNumber() {
        const finYear = getFinancialYear();
        const all = JSON.parse(localStorage.getItem('purchaseInvoices') || '[]');
        let maxNum = 0;
        const prefix = `PUR/${finYear}/`;
        all.forEach(inv => {
            const invNo = inv.invoiceNo || inv.poNo || '';
            if (invNo.startsWith(prefix)) {
                const match = invNo.match(/\/(\d+)$/);
                if (match) {
                    const num = parseInt(match[1]);
                    if (!isNaN(num) && num > maxNum) maxNum = num;
                }
            }
        });
        const nextNum = maxNum + 1;
        return prefix + nextNum.toString().padStart(4, '0');
    }

    // ---------- Load cart from localStorage (set by index.html) ----------
    function loadCartItems() {
        const cart = JSON.parse(localStorage.getItem('invoiceCart') || '[]');
        if (cart.length > 0) {
            items = cart.map(item => ({
                part: item.part,
                desc: item.desc,
                hsn: item.hsn || '',
                qty: item.qty,
                cost: item.price,       // purchase cost
                discount: item.discount || 0
            }));
            console.log('Loaded purchase cart:', items);
        } else {
            addItemRow(); // start with one empty row
        }
        renderItems();
        recalcTotals();
    }

    // ---------- Load suppliers & populate dropdown ----------
    function loadSupplierData() {
        suppliers = JSON.parse(localStorage.getItem('suppliers') || '[]');
        const supplierSelect = document.getElementById('supplierSelect');
        supplierSelect.innerHTML = '<option value="">-- Select existing supplier --</option>';
        suppliers.forEach(sup => {
            supplierSelect.innerHTML += `<option value="${sup.email}" data-name="${sup.name}" data-gstin="${sup.gstin || ''}" data-phone="${sup.phone || ''}" data-address="${sup.address || ''}">${sup.name} (${sup.email})</option>`;
        });
        supplierSelect.addEventListener('change', function() {
            const selected = supplierSelect.options[supplierSelect.selectedIndex];
            if (selected.value) {
                document.getElementById('supplierName').value = selected.dataset.name || '';
                document.getElementById('supplierGstin').value = selected.dataset.gstin || '';
                document.getElementById('supplierPhone').value = selected.dataset.phone || '';
                document.getElementById('supplierAddress').value = selected.dataset.address || '';
            } else {
                document.getElementById('supplierName').value = '';
                document.getElementById('supplierGstin').value = '';
                document.getElementById('supplierPhone').value = '';
                document.getElementById('supplierAddress').value = '';
            }
            populateInvoiceDropdown();
        });

        // Admin quick-select
        const currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
        if (currentUser && (currentUser.role === 'admin' || currentUser.isAdmin)) {
            document.getElementById('adminSupplierSelect').style.display = 'block';
            const quickSelect = document.getElementById('quickSupplierSelect');
            quickSelect.innerHTML = '<option value="">-- Quick Select (Admin only) --</option>';
            suppliers.forEach(sup => {
                quickSelect.innerHTML += `<option value="${sup.email}" data-name="${sup.name}" data-gstin="${sup.gstin || ''}" data-phone="${sup.phone || ''}" data-address="${sup.address || ''}">${sup.name} (${sup.email})</option>`;
            });
        }
    }

    function loadSupplierDataFromQuick() {
        const email = document.getElementById('quickSupplierSelect').value;
        if (!email) return;
        const sup = suppliers.find(s => s.email === email);
        if (sup) {
            document.getElementById('supplierName').value = sup.name;
            document.getElementById('supplierGstin').value = sup.gstin || '';
            document.getElementById('supplierPhone').value = sup.phone || '';
            document.getElementById('supplierAddress').value = sup.address || '';
            // Also set the main select
            const mainSelect = document.getElementById('supplierSelect');
            mainSelect.value = email;
        }
    }

    // ---------- Items UI ----------
    function addItemRow() {
        items.push({ part: '', desc: '', hsn: '', qty: 1, cost: 0, discount: 0 });
        renderItems();
        recalcTotals();
    }

    function removeItemRow(idx) {
        items.splice(idx, 1);
        renderItems();
        recalcTotals();
    }

    function updateItem(idx, field, value) {
        items[idx][field] = value;
        recalcTotals();
    }

    function renderItems() {
        const container = document.getElementById('itemsContainer');
        container.innerHTML = '';
        items.forEach((item, idx) => {
            const div = document.createElement('div');
            div.className = 'item-row';
            div.innerHTML = `
                <input type="text" placeholder="Part No" value="${escapeHtml(item.part)}" onchange="updateItem(${idx}, 'part', this.value)" style="flex:2;">
                <input type="text" placeholder="Description" value="${escapeHtml(item.desc)}" onchange="updateItem(${idx}, 'desc', this.value)" style="flex:3;">
                <input type="text" placeholder="HSN" value="${escapeHtml(item.hsn)}" onchange="updateItem(${idx}, 'hsn', this.value)" style="flex:1;">
                <input type="number" placeholder="Qty" value="${item.qty}" onchange="updateItem(${idx}, 'qty', parseFloat(this.value))" style="flex:1;">
                <input type="number" placeholder="Cost (₹)" value="${item.cost}" step="0.01" onchange="updateItem(${idx}, 'cost', parseFloat(this.value))" style="flex:1;">
                <input type="number" placeholder="Disc %" value="${item.discount}" step="0.01" onchange="updateItem(${idx}, 'discount', parseFloat(this.value))" style="flex:1;">
                <button class="remove-item" onclick="removeItemRow(${idx})">X</button>
            `;
            container.appendChild(div);
        });
    }

    function recalcTotals() {
        let subtotal = 0;
        items.forEach(item => {
            const qty = item.qty || 0;
            const cost = item.cost || 0;
            const disc = item.discount || 0;
            const taxable = qty * cost * (1 - disc / 100);
            subtotal += taxable;
        });
        const cgst = subtotal * 0.09;
        const sgst = subtotal * 0.09;
        const grand = Math.round(subtotal + cgst + sgst);
        document.getElementById('subtotal').innerText = subtotal.toFixed(2);
        document.getElementById('cgstTotal').innerText = cgst.toFixed(2);
        document.getElementById('sgstTotal').innerText = sgst.toFixed(2);
        document.getElementById('grandTotal').innerText = grand.toFixed(2);
    }

    // ---------- Save Purchase Invoice ----------
    function savePurchaseInvoice() {
        let supplierEmail = document.getElementById('supplierSelect').value;
        let supplierName = document.getElementById('supplierName').value.trim();
        if (!supplierName && !supplierEmail) {
            alert('Please select or enter a supplier name');
            return;
        }
        let invoiceNo = document.getElementById('purchaseInvoiceNo').value.trim();
        if (!invoiceNo) {
            invoiceNo = getNextPurchaseInvoiceNumber();
            document.getElementById('purchaseInvoiceNo').value = invoiceNo;
        }
        if (items.length === 0 || items.every(i => !i.part)) {
            alert('Please add at least one item (Part No required)');
            return;
        }

        // Find or create supplier
        let supplier = suppliers.find(s => s.email === supplierEmail || s.name === supplierName);
        if (!supplier) {
            supplier = {
                id: Date.now(),
                name: supplierName,
                email: supplierEmail || `supp_${Date.now()}@temp.com`,
                phone: document.getElementById('supplierPhone').value,
                gstin: document.getElementById('supplierGstin').value,
                address: document.getElementById('supplierAddress').value,
                state: '',  // optional
                creditLimit: 50000,
                openingBalance: 0,
                outstanding: 0,
                status: 'active',
                supplierCode: 'SUP' + (suppliers.length + 1).toString().padStart(4, '0'),
                createdAt: new Date().toISOString()
            };
            suppliers.push(supplier);
            localStorage.setItem('suppliers', JSON.stringify(suppliers));
        }

        // Build purchase items (productId will be part number)
        const purchaseItems = [];
        for (let item of items) {
            if (!item.part) continue;
            purchaseItems.push({
                productId: item.part,
                quantity: item.qty,
                cost: item.cost,
                discount: item.discount,
                desc: item.desc,
                hsn: item.hsn
            });
        }

        const purchaseDate = document.getElementById('purchaseDate').value || new Date().toISOString().split('T')[0];
        const dueDate = document.getElementById('purchaseDueDate').value;

        const purchase = {
            id: Date.now(),
            date: purchaseDate,
            supplierEmail: supplier.email,
            items: purchaseItems,
            total: parseFloat(document.getElementById('grandTotal').innerText),
            invoiceNo: invoiceNo,
            poNo: invoiceNo,
            dueDate: dueDate,
            finYear: getFinancialYear()
        };

        try {
            createPurchaseInvoice(purchase); // defined in data-manager.js
            alert(`Purchase invoice ${invoiceNo} saved! Stock increased, supplier outstanding updated.`);
            // Clear cart from localStorage and close
            localStorage.setItem('invoiceCart', '[]');
            window.close();
        } catch (err) {
            alert('Error saving purchase invoice: ' + err.message);
        }
    }

    // ---------- Credit Note ----------
    function recordCreditNote() {
        const supplierName = document.getElementById('supplierName').value.trim();
        if (!supplierName) { alert('Select a supplier first'); return; }
        const creditDate = document.getElementById('creditDate').value;
        const amount = parseFloat(document.getElementById('creditAmount').value);
        const invoiceNo = document.getElementById('creditInvoiceSelect').value;
        const remarks = document.getElementById('creditRemarks').value;
        if (!creditDate || isNaN(amount) || amount <= 0) { alert('Enter valid date and amount'); return; }

        let supplier = suppliers.find(s => s.name === supplierName);
        if (!supplier) { alert('Supplier not found in master'); return; }

        supplier.outstanding = Math.max(0, (supplier.outstanding || 0) - amount);
        localStorage.setItem('suppliers', JSON.stringify(suppliers));

        let supplierCreditNotes = JSON.parse(localStorage.getItem('supplierCreditNotes') || '[]');
        supplierCreditNotes.push({
            id: Date.now(),
            supplierName: supplierName,
            date: creditDate,
            amount: amount,
            invoiceNo: invoiceNo || null,
            remarks: remarks || 'Credit Note',
            type: 'credit_note'
        });
        localStorage.setItem('supplierCreditNotes', JSON.stringify(supplierCreditNotes));
        alert('Credit note recorded. Supplier outstanding reduced.');
        document.getElementById('creditAmount').value = '';
        document.getElementById('creditRemarks').value = '';
    }

    function populateInvoiceDropdown() {
        const supplierName = document.getElementById('supplierName').value.trim();
        const select = document.getElementById('creditInvoiceSelect');
        if (!supplierName) { select.innerHTML = '<option value="">All outstanding</option>'; return; }
        const invoices = purchaseInvoices.filter(inv => inv.supplier?.name === supplierName);
        select.innerHTML = '<option value="">All outstanding</option>';
        invoices.forEach(inv => {
            select.innerHTML += `<option value="${inv.invoiceNo}">${inv.invoiceNo} - ₹${inv.total.toFixed(2)} (Due: ${inv.dueDate})</option>`;
        });
    }

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }

    // ---------- Initialisation ----------
    document.getElementById('purchaseDate').valueAsDate = new Date();
    const due = new Date(); due.setDate(due.getDate() + 30);
    document.getElementById('purchaseDueDate').valueAsDate = due;
    document.getElementById('creditDate').valueAsDate = new Date();

    loadSupplierData();
    loadCartItems();   // loads items from invoiceCart (set by index.html)
    purchaseInvoices = JSON.parse(localStorage.getItem('purchaseInvoices') || '[]');
</script>
</body>
    </html>
