<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase Invoice (Stock Integrated) – Auto Spares</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background: #e9ecef; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; border-radius: 12px; padding: 20px; }
        h1, h2 { color: #0a7c71; }
        .form-row { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 15px; }
        .form-group { flex: 1; min-width: 180px; }
        label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 4px; }
        input, select, textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; }
        button { background: #0a7c71; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        th, td { border: 1px solid #dee2e6; padding: 8px; text-align: left; }
        th { background: #f1f3f5; }
        .remove-btn { background: #dc3545; color: white; border: none; padding: 4px 8px; cursor: pointer; }
        .total { font-size: 18px; font-weight: bold; text-align: right; margin-top: 15px; }
        .item-row { background: #f8f9fa; padding: 10px; border-radius: 6px; margin-bottom: 10px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
        .item-row input, .item-row select { flex: 1; min-width: 100px; }
    </style>
    <script src="data-manager.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
<div class="container">
    <h1>Purchase Invoice (Stock Integrated)</h1>
    <div class="form-row">
        <div class="form-group">
            <label>Supplier *</label>
            <!-- Supplier Quick Select for Admin -->
            <div id="adminSupplierSelect" style="display:none;">
                <select id="quickSupplierSelect" onchange="loadSupplierData()" style="margin-bottom:5px;">
                    <option value="">-- Select Supplier (Admin only) --</option>
                </select>
            </div>
            <select id="supplierEmail">
                <option value="">-- Select Supplier --</option>
            </select>
            <input type="text" id="supplierName" placeholder="Or enter new supplier name" style="margin-top:5px;">
        </div>
        <div class="form-group"><label>Supplier GSTIN</label><input type="text" id="supplierGstin"></div>
        <div class="form-group"><label>Supplier Phone</label><input type="text" id="supplierPhone"></div>
    </div>
    <div class="form-row">
        <div class="form-group"><label>Supplier Address</label><textarea id="supplierAddress" rows="2"></textarea></div>
    </div>
    <div class="form-row">
        <div class="form-group"><label>Purchase Invoice No *</label><input type="text" id="purchaseInvoiceNo"></div>
        <div class="form-group"><label>Invoice Date</label><input type="date" id="purchaseDate"></div>
        <div class="form-group"><label>Due Date</label><input type="date" id="purchaseDueDate"></div>
        <div class="form-group"><label>Payment Terms (days)</label><input type="number" id="paymentTerms" value="30"></div>
    </div>

    <h3>Items Purchased</h3>
    <div id="itemsContainer"></div>
    <button class="add-item" onclick="addItem()">+ Add Item</button>

    <div class="totals">
        <table>
            <tr><td style="text-align:right;">Subtotal: </td><td style="text-align:right;">₹<span id="subtotal">0.00</span></td></table>
            <tr><td style="text-align:right;">CGST (9%): </td><td style="text-align:right;">₹<span id="cgstTotal">0.00</span></td></tr>
            <tr><td style="text-align:right;">SGST (9%): </td><td style="text-align:right;">₹<span id="sgstTotal">0.00</span></td></tr>
            <tr style="font-weight:bold;"><td style="text-align:right;">Grand Total: </td><td style="text-align:right;">₹<span id="grandTotal">0.00</span></td></tr>
        </table>
    </div>

    <div>
        <button onclick="savePurchaseInvoice()">💾 Save Purchase Invoice</button>
        <button onclick="window.close()">Cancel</button>
    </div>
</div>

<script>
    let items = [];
    let products = [];
    let suppliers = [];

    function loadData() {
        products = getProducts();
        suppliers = JSON.parse(localStorage.getItem('suppliers') || '[]');
        populateSupplierDropdown();
        // Check admin
        let currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
        if (currentUser && (currentUser.role === 'admin' || currentUser.isAdmin)) {
            document.getElementById('adminSupplierSelect').style.display = 'block';
            populateSupplierQuickSelect();
        }
    }

    function populateSupplierDropdown() {
        const supplierSelect = document.getElementById('supplierEmail');
        supplierSelect.innerHTML = '<option value="">-- Select Supplier --</option>';
        suppliers.forEach(sup => {
            supplierSelect.innerHTML += `<option value="${sup.email}" data-name="${sup.name}" data-gstin="${sup.gstin || ''}" data-phone="${sup.phone || ''}" data-address="${sup.address || ''}">${sup.name} (${sup.email})</option>`;
        });
        supplierSelect.addEventListener('change', function() {
            const selected = supplierSelect.options[supplierSelect.selectedIndex];
            if (selected.value) {
                document.getElementById('supplierName').value = selected.dataset.name || '';
                document.getElementById('supplierGstin').value = selected.dataset.gstin || '';
                document.getElementById('supplierPhone').value = selected.dataset.phone || '';
                document.getElementById('supplierAddress').value = selected.dataset.address || '';
            } else {
                document.getElementById('supplierName').value = '';
                document.getElementById('supplierGstin').value = '';
                document.getElementById('supplierPhone').value = '';
                document.getElementById('supplierAddress').value = '';
            }
        });
    }

    function populateSupplierQuickSelect() {
        const select = document.getElementById('quickSupplierSelect');
        select.innerHTML = '<option value="">-- Select Supplier (Admin only) --</option>';
        suppliers.forEach(sup => {
            select.innerHTML += `<option value="${sup.email}">${sup.name} (${sup.email})</option>`;
        });
    }

    function loadSupplierData() {
        const select = document.getElementById('quickSupplierSelect');
        const email = select.value;
        if (!email) return;
        const sup = suppliers.find(s => s.email === email);
        if (sup) {
            document.getElementById('supplierName').value = sup.name;
            document.getElementById('supplierGstin').value = sup.gstin || '';
            document.getElementById('supplierPhone').value = sup.phone || '';
            document.getElementById('supplierAddress').value = sup.address || '';
            // Also set the dropdown to match
            const supplierSelect = document.getElementById('supplierEmail');
            supplierSelect.value = email;
        }
    }

    function addItem() {
        items.push({ productId: '', productName: '', qty: 1, cost: 0 });
        renderItems();
    }

    function removeItem(idx) {
        items.splice(idx, 1);
        renderItems();
        recalcTotals();
    }

    function updateItem(idx, field, value) {
        items[idx][field] = value;
        if (field === 'productId') {
            const product = products.find(p => p.id == value);
            if (product) {
                items[idx].productName = product.name;
                items[idx].cost = product.price || 0;
            } else {
                items[idx].productName = '';
            }
        }
        renderItems();
        recalcTotals();
    }

    function renderItems() {
        const container = document.getElementById('itemsContainer');
        container.innerHTML = '';
        items.forEach((item, idx) => {
            const div = document.createElement('div');
            div.className = 'item-row';
            let productOptions = '<option value="">-- Select Product --</option>';
            products.forEach(p => {
                productOptions += `<option value="${p.id}" ${item.productId == p.id ? 'selected' : ''}>${p.name} (${p.sku}) - Stock: ${p.currentStock}</option>`;
            });
            div.innerHTML = `
                <select onchange="updateItem(${idx}, 'productId', this.value)" style="flex:2;">${productOptions}</select>
                <input type="text" placeholder="Product Name" value="${escapeHtml(item.productName)}" readonly style="flex:2; background:#e9ecef;">
                <input type="number" placeholder="Qty" value="${item.qty}" onchange="updateItem(${idx}, 'qty', parseFloat(this.value))" style="flex:1;">
                <input type="number" placeholder="Cost (₹)" value="${item.cost}" step="0.01" onchange="updateItem(${idx}, 'cost', parseFloat(this.value))" style="flex:1;">
                <button class="remove-item" onclick="removeItem(${idx})">X</button>
            `;
            container.appendChild(div);
        });
    }

    function recalcTotals() {
        let subtotal = 0;
        items.forEach(item => subtotal += (item.qty || 0) * (item.cost || 0));
        const cgst = subtotal * 0.09;
        const sgst = subtotal * 0.09;
        const grand = subtotal + cgst + sgst;
        document.getElementById('subtotal').innerText = subtotal.toFixed(2);
        document.getElementById('cgstTotal').innerText = cgst.toFixed(2);
        document.getElementById('sgstTotal').innerText = sgst.toFixed(2);
        document.getElementById('grandTotal').innerText = grand.toFixed(2);
    }

    function savePurchaseInvoice() {
        let supplierEmail = document.getElementById('supplierEmail').value;
        const supplierName = document.getElementById('supplierName').value.trim();
        if (!supplierEmail && !supplierName) { alert('Please select or enter supplier name'); return; }
        const purchaseInvoiceNo = document.getElementById('purchaseInvoiceNo').value.trim();
        if (!purchaseInvoiceNo) { alert('Enter purchase invoice number'); return; }
        if (items.length === 0) { alert('Add at least one item'); return; }

        // Find or create supplier
        let supplier = suppliers.find(s => s.email === supplierEmail || s.name === supplierName);
        if (!supplier) {
            supplier = {
                id: Date.now(),
                name: supplierName,
                email: supplierEmail || `supplier_${Date.now()}@temp.com`,
                phone: document.getElementById('supplierPhone').value,
                gstin: document.getElementById('supplierGstin').value,
                address: document.getElementById('supplierAddress').value,
                creditLimit: 50000,
                openingBalance: 0,
                outstanding: 0,
                status: 'active',
                supplierCode: 'SUP' + (suppliers.length + 1).toString().padStart(4,'0'),
                createdAt: new Date().toISOString()
            };
            suppliers.push(supplier);
            localStorage.setItem('suppliers', JSON.stringify(suppliers));
        }

        const purchaseItems = [];
        for (let item of items) {
            if (!item.productId) { alert('Please select a product for each item'); return; }
            purchaseItems.push({
                productId: parseInt(item.productId),
                quantity: item.qty,
                cost: item.cost
            });
        }

        const purchaseDate = document.getElementById('purchaseDate').value || new Date().toISOString().split('T')[0];
        const purchase = {
            id: Date.now(),
            date: purchaseDate,
            supplierEmail: supplier.email,
            items: purchaseItems,
            total: parseFloat(document.getElementById('grandTotal').innerText),
            poNo: purchaseInvoiceNo,
            dueDate: document.getElementById('purchaseDueDate').value
        };

        try {
            createPurchaseInvoice(purchase);
            alert(`Purchase invoice ${purchaseInvoiceNo} saved! Stock increased and supplier outstanding updated.`);
            window.close();
        } catch (err) {
            alert('Error: ' + err.message);
        }
    }

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }

    document.getElementById('purchaseDate').valueAsDate = new Date();
    const due = new Date(); due.setDate(due.getDate() + 30);
    document.getElementById('purchaseDueDate').valueAsDate = due;
    loadData();
    addItem();
</script>
</body>
    </html>
