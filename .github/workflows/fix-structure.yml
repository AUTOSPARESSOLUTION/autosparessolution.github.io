name: Fix folder structure

on:
  workflow_dispatch:

jobs:
  restructure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Move AI files to correct location
        run: |
          mkdir -p js/ai
          # Move all .js files from the nested folder
          mv js/js/ai/js/ai/*.js js/ai/ || true
          # Move reorder files if they were inside the same nested folder
          mv js/js/ai/js/reorder-*.js js/ || true
          # Remove the now-empty nested folders
          rm -rf js/js
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "Fix folder structure: move AI files to js/ai/"
          git push
