<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Master – Auto Spares</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Roboto', sans-serif;
            background: #e9ecef;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 1px solid #dee2e6;
        }
        h1, h2 { color: #0a7c71; }
        .form-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            border: 1px solid #dee2e6;
        }
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 15px;
        }
        .form-group {
            flex: 1;
            min-width: 180px;
        }
        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #555;
        }
        input, select, textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-family: inherit;
        }
        button {
            background: #0a7c71;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin-right: 10px;
        }
        button:hover { background: #09645a; }
        .btn-danger { background: #dc3545; }
        .btn-danger:hover { background: #c82333; }
        .btn-warning { background: #ffc107; color: #333; }
        .btn-warning:hover { background: #e0a800; }
        .btn-info { background: #17a2b8; }
        .btn-info:hover { background: #138496; }
        .btn-success { background: #28a745; }
        .btn-success:hover { background: #218838; }
        .search-box {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .bulk-section {
            background: #e8f4f8;
            border: 2px dashed #0a7c71;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .bulk-section h3 { margin-top: 0; color: #0a7c71; }
        .template-link {
            display: inline-block;
            margin: 10px 0;
            color: #0a7c71;
            cursor: pointer;
            text-decoration: underline;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            overflow-x: auto;
            display: block;
        }
        th, td {
            border: 1px solid #dee2e6;
            padding: 10px;
            text-align: left;
            vertical-align: top;
        }
        th { background: #0a7c71; color: white; }
        .credit-warning { background: #fff3cd; }
        .action-buttons { display: flex; gap: 5px; flex-wrap: wrap; }
        .status-active { color: #28a745; font-weight: bold; }
        .status-inactive { color: #dc3545; font-weight: bold; }
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .nav-bar a {
            background: #6c757d;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            text-decoration: none;
        }
        .file-input-label {
            background: #0a7c71;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            display: inline-block;
            margin-right: 10px;
        }
        .file-input-label:hover { background: #09645a; }
        #bulkExcelFile { display: none; }
        .phone-hint {
            font-size: 11px;
            color: #6c757d;
            margin-top: 3px;
        }
        @media (max-width: 768px) {
            .form-row { flex-direction: column; }
            table { font-size: 12px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="nav-bar">
        <h1><i class="fas fa-users"></i> Customer Master</h1>
        <div>
            <a href="index.html"><i class="fas fa-home"></i> Home</a>
            <a href="distributor-stock-viewer.html" style="margin-left: 10px;"><i class="fas fa-warehouse"></i> Stock</a>
        </div>
    </div>

    <!-- Bulk Upload Section -->
    <div class="bulk-section">
        <h3><i class="fas fa-upload"></i> Bulk Customer Upload</h3>
        <p>Upload Excel file with columns: <strong>Name, Email, Phone, Mobile No, District, Address, PIN Code, GSTIN, State, Business Name, Credit Limit</strong></p>
        <label class="file-input-label" for="bulkExcelFile">
            <i class="fas fa-file-excel"></i> Select Excel File
        </label>
        <input type="file" id="bulkExcelFile" accept=".xlsx,.xls,.csv">
        <button class="btn-success" onclick="uploadBulkCustomers()"><i class="fas fa-cloud-upload-alt"></i> Upload & Add Customers</button>
        <button class="btn-info" onclick="downloadTemplate()"><i class="fas fa-download"></i> Download Template</button>
        <div id="bulkStatus" style="margin-top: 10px; font-size: 14px; color: #666;"></div>
    </div>

    <!-- Add/Edit Customer Form -->
    <div class="form-section">
        <h2 id="formTitle"><i class="fas fa-user-plus"></i> Add New Customer</h2>
        <div class="form-row">
            <div class="form-group">
                <label>Customer Name *</label>
                <input type="text" id="custName" placeholder="Enter customer name">
            </div>
            <div class="form-group">
                <label>Email *</label>
                <input type="email" id="custEmail" placeholder="customer@example.com">
            </div>
            <div class="form-group">
                <label>Mobile No / Phone *</label>
                <input type="text" id="custMobile" placeholder="Mobile number (10 digits)">
                <div class="phone-hint">⚠️ This number will be used for WhatsApp offers</div>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>District</label>
                <input type="text" id="custDistrict" placeholder="District">
                <div class="phone-hint">📍 Used for location-based offers</div>
            </div>
            <div class="form-group">
                <label>Address</label>
                <textarea id="custAddress" rows="2" placeholder="Full address"></textarea>
            </div>
            <div class="form-group">
                <label>PIN Code</label>
                <input type="text" id="custPincode" placeholder="PIN code">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>GSTIN</label>
                <input type="text" id="custGstin" placeholder="GSTIN (optional)">
            </div>
            <div class="form-group">
                <label>State</label>
                <input type="text" id="custState" placeholder="State">
            </div>
            <div class="form-group">
                <label>Business Name</label>
                <input type="text" id="custBusiness" placeholder="Business name">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Credit Limit (₹)</label>
                <input type="number" id="custCreditLimit" step="1000" value="50000">
            </div>
            <div class="form-group">
                <label>Status</label>
                <select id="custStatus">
                    <option value="active">Active</option>
                    <option value="inactive">Inactive</option>
                </select>
            </div>
            <div class="form-group">
                <label>Customer Code (Auto)</label>
                <input type="text" id="custCode" readonly style="background:#e9ecef;">
            </div>
        </div>
        <div class="form-row">
            <button onclick="saveCustomer()"><i class="fas fa-save"></i> Save Customer</button>
            <button class="btn-warning" onclick="clearForm()"><i class="fas fa-eraser"></i> Clear Form</button>
            <button id="cancelEditBtn" class="btn-danger" style="display:none;" onclick="cancelEdit()"><i class="fas fa-times"></i> Cancel Edit</button>
        </div>
    </div>

    <!-- Search Box -->
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search by Name, Email, Mobile, Code, District...">
        <button onclick="searchCustomers()"><i class="fas fa-search"></i> Search</button>
        <button onclick="loadCustomers()"><i class="fas fa-sync-alt"></i> Refresh</button>
        <button onclick="exportToCSV()"><i class="fas fa-file-csv"></i> Export CSV</button>
        <button onclick="fixMissingPhones()" style="background:#17a2b8;"><i class="fas fa-mobile-alt"></i> Fix Missing Phones</button>
    </div>

    <div id="customersTable"></div>
</div>

<script>
    let customers = [];
    let editId = null;

    // ============================================================
    // LOAD CUSTOMERS
    // ============================================================
    function loadCustomers() {
        customers = JSON.parse(localStorage.getItem('customers') || '[]');
        customers.forEach(c => {
            if (!c.customerCode) c.customerCode = generateCustomerCode();
            if (c.outstanding === undefined) c.outstanding = 0;
            if (c.totalPurchased === undefined) c.totalPurchased = 0;
            
            // IMPORTANT: Ensure BOTH phone and mobileNo fields exist for compatibility
            if (c.mobileNo && !c.phone) {
                c.phone = c.mobileNo;
            }
            if (c.phone && !c.mobileNo) {
                c.mobileNo = c.phone;
            }
        });
        localStorage.setItem('customers', JSON.stringify(customers));
        displayCustomers();
    }

    function generateCustomerCode() {
        let maxNum = 0;
        customers.forEach(c => {
            let num = parseInt((c.customerCode || 'CUST0').replace('CUST', ''));
            if (!isNaN(num) && num > maxNum) maxNum = num;
        });
        return 'CUST' + (maxNum + 1).toString().padStart(4, '0');
    }

    // ============================================================
    // FIX MISSING PHONES - Scan and update
    // ============================================================
    function fixMissingPhones() {
        let fixed = 0;
        customers.forEach(c => {
            // Ensure both fields exist
            if (c.mobileNo && !c.phone) {
                c.phone = c.mobileNo;
                fixed++;
            }
            if (c.phone && !c.mobileNo) {
                c.mobileNo = c.phone;
                fixed++;
            }
        });
        if (fixed > 0) {
            localStorage.setItem('customers', JSON.stringify(customers));
            loadCustomers();
            alert(`✅ Fixed ${fixed} customers with missing phone fields`);
        } else {
            alert('All customers already have both phone and mobileNo fields');
        }
    }

    // ============================================================
    // DISPLAY CUSTOMERS
    // ============================================================
    function displayCustomers() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        let filtered = customers;
        if (searchTerm) {
            filtered = customers.filter(c => 
                (c.name && c.name.toLowerCase().includes(searchTerm)) ||
                (c.email && c.email.toLowerCase().includes(searchTerm)) ||
                ((c.mobileNo || c.phone) && (c.mobileNo || c.phone).includes(searchTerm)) ||
                (c.gstin && c.gstin.toLowerCase().includes(searchTerm)) ||
                (c.customerCode && c.customerCode.toLowerCase().includes(searchTerm)) ||
                (c.district && c.district.toLowerCase().includes(searchTerm))
            );
        }
        if (filtered.length === 0) {
            document.getElementById('customersTable').innerHTML = '<p>No customers found.</p>';
            return;
        }
        let html = '<div style="overflow-x: auto;"><table><thead><tr>' +
            '<th>Code</th><th>Name</th><th>Email</th><th>Mobile No</th><th>District</th>' +
            '<th>GSTIN</th><th>Credit Limit</th><th>Outstanding</th><th>Status</th><th>Actions</th>' +
            '</tr></thead><tbody>';
        
        filtered.forEach(c => {
            const outstanding = c.outstanding || 0;
            const creditLimit = c.creditLimit || 50000;
            const isOverLimit = outstanding > creditLimit;
            const displayPhone = c.mobileNo || c.phone || '-';
            const hasPhone = !!(c.mobileNo || c.phone);
            
            html += `<tr class="${isOverLimit ? 'credit-warning' : ''}" style="${!hasPhone ? 'background:#fff3cd' : ''}">
                <td>${escapeHtml(c.customerCode)}</td>
                <td><strong>${escapeHtml(c.name)}</strong>${!hasPhone ? '<br><small style="color:#dc3545;">⚠️ No Phone</small>' : ''}</td>
                <td>${escapeHtml(c.email)}</td>
                <td style="${hasPhone ? 'color:#28a745;font-weight:bold;' : 'color:#dc3545;'}">${escapeHtml(displayPhone)}</td>
                <td>${escapeHtml(c.district || '-')}</td>
                <td>${escapeHtml(c.gstin || '-')}</td>
                <td>₹${creditLimit.toLocaleString()}</td>
                <td style="color:${outstanding>0?'#dc3545':'#28a745'}">₹${outstanding.toLocaleString()}</td>
                <td class="${c.status === 'active' ? 'status-active' : 'status-inactive'}">${c.status || 'active'}</td>
                <td class="action-buttons">
                    <button onclick="editCustomer(${c.id})" style="background:#17a2b8;"><i class="fas fa-edit"></i> Edit</button>
                    <button onclick="viewLedger('${c.email}')" style="background:#e67e22;"><i class="fas fa-book"></i> Ledger</button>
                    <button onclick="deleteCustomer(${c.id})" class="btn-danger"><i class="fas fa-trash"></i> Delete</button>
                </td>
            </tr>`;
        });
        html += '</tbody></table></div>';
        document.getElementById('customersTable').innerHTML = html;
        
        // Show summary
        const withPhone = customers.filter(c => c.mobileNo || c.phone).length;
        const withoutPhone = customers.length - withPhone;
        if (withoutPhone > 0) {
            console.warn(`⚠️ ${withoutPhone} customers missing phone numbers`);
        }
    }

    // ============================================================
    // SAVE SINGLE CUSTOMER (UPDATED to save BOTH fields)
    // ============================================================
    function saveCustomer() {
        const name = document.getElementById('custName').value.trim();
        const email = document.getElementById('custEmail').value.trim();
        const mobileNo = document.getElementById('custMobile').value.trim();
        
        if (!name || !email || !mobileNo) {
            alert('Please fill Name, Email, and Mobile No');
            return;
        }
        
        if (mobileNo.length < 10) {
            alert('Please enter a valid 10-digit mobile number');
            return;
        }
        
        if (editId === null && customers.some(c => c.email === email)) {
            alert('Customer with this email already exists!');
            return;
        }
        
        const customerData = {
            id: editId || Date.now(),
            name: name,
            email: email,
            mobileNo: mobileNo,
            phone: mobileNo,  // IMPORTANT: Save BOTH fields for compatibility
            district: document.getElementById('custDistrict').value,
            address: document.getElementById('custAddress').value,
            pincode: document.getElementById('custPincode').value,
            gstin: document.getElementById('custGstin').value,
            state: document.getElementById('custState').value,
            creditLimit: parseFloat(document.getElementById('custCreditLimit').value) || 50000,
            business: document.getElementById('custBusiness').value,
            status: document.getElementById('custStatus').value,
            customerCode: document.getElementById('custCode').value || generateCustomerCode(),
            updatedAt: new Date().toISOString()
        };
        
        if (editId === null) {
            customerData.createdAt = new Date().toISOString();
            customerData.outstanding = 0;
            customerData.totalPurchased = 0;
            customers.push(customerData);
        } else {
            const old = customers.find(c => c.id == editId);
            if (old) {
                customerData.outstanding = old.outstanding;
                customerData.totalPurchased = old.totalPurchased;
                customerData.createdAt = old.createdAt;
            }
            const index = customers.findIndex(c => c.id == editId);
            customers[index] = customerData;
        }
        
        localStorage.setItem('customers', JSON.stringify(customers));
        syncToUsers(customerData);
        alert('Customer saved successfully! Phone number saved in both phone and mobileNo fields.');
        clearForm();
        loadCustomers();
    }

    // ============================================================
    // BULK UPLOAD CUSTOMERS (UPDATED to save BOTH fields)
    // ============================================================
    async function uploadBulkCustomers() {
        const fileInput = document.getElementById('bulkExcelFile');
        const file = fileInput.files[0];
        
        if (!file) {
            alert('Please select an Excel file first');
            return;
        }
        
        const statusDiv = document.getElementById('bulkStatus');
        statusDiv.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
        
        try {
            const data = await file.arrayBuffer();
            const workbook = XLSX.read(data, { type: 'array' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(sheet);
            
            let added = 0;
            let skipped = 0;
            let errors = [];
            
            for (const row of rows) {
                const name = row['Name'] || row['name'] || row['Customer Name'];
                const email = row['Email'] || row['email'];
                // Try multiple phone column names
                const mobileNo = row['Mobile No'] || row['mobileNo'] || row['Mobile'] || row['phone'] || row['Phone'];
                const district = row['District'] || row['district'] || '';
                const address = row['Address'] || row['address'] || '';
                const pincode = row['PIN Code'] || row['pincode'] || '';
                const gstin = row['GSTIN'] || row['gstin'] || '';
                const state = row['State'] || row['state'] || '';
                const business = row['Business Name'] || row['business'] || '';
                const creditLimit = parseFloat(row['Credit Limit'] || row['creditLimit'] || 50000);
                const status = row['Status'] === 'inactive' ? 'inactive' : 'active';
                
                if (!name || !email || !mobileNo) {
                    skipped++;
                    errors.push(`Missing required fields: ${JSON.stringify(row)}`);
                    continue;
                }
                
                if (mobileNo && mobileNo.toString().length < 10) {
                    skipped++;
                    errors.push(`Invalid mobile number for ${name}: ${mobileNo}`);
                    continue;
                }
                
                // Check if customer already exists
                const existing = customers.find(c => c.email === email);
                if (existing) {
                    skipped++;
                    continue;
                }
                
                const cleanMobile = mobileNo.toString();
                const newCustomer = {
                    id: Date.now() + added,
                    name: name,
                    email: email,
                    mobileNo: cleanMobile,
                    phone: cleanMobile,  // IMPORTANT: Save BOTH fields
                    district: district,
                    address: address,
                    pincode: pincode,
                    gstin: gstin,
                    state: state,
                    business: business,
                    creditLimit: creditLimit,
                    status: status,
                    customerCode: generateCustomerCode(),
                    outstanding: 0,
                    totalPurchased: 0,
                    createdAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString()
                };
                
                customers.push(newCustomer);
                syncToUsers(newCustomer);
                added++;
            }
            
            localStorage.setItem('customers', JSON.stringify(customers));
            loadCustomers();
            
            statusDiv.innerHTML = `<i class="fas fa-check-circle"></i> Bulk upload complete! Added: ${added}, Skipped: ${skipped}`;
            if (errors.length > 0 && errors.length < 5) {
                statusDiv.innerHTML += `<br>Errors: ${errors.join('; ')}`;
            }
            fileInput.value = '';
            alert(`Added ${added} new customers. Phone numbers saved in both phone and mobileNo fields.`);
            
        } catch(err) {
            console.error(err);
            statusDiv.innerHTML = `<i class="fas fa-exclamation-triangle"></i> Error: ${err.message}`;
            alert('Error processing file: ' + err.message);
        }
    }

    // ============================================================
    // DOWNLOAD TEMPLATE (UPDATED)
    // ============================================================
    function downloadTemplate() {
        const templateData = [
            ['Name', 'Email', 'Phone', 'Mobile No', 'District', 'Address', 'PIN Code', 'GSTIN', 'State', 'Business Name', 'Credit Limit', 'Status'],
            ['ABC Motors', 'abc@example.com', '9876543210', '9876543210', 'Mumbai City', '123 Main Street', '400001', '27ABCDE1234F1Z', 'Maharashtra', 'ABC Motors Pvt Ltd', '50000', 'active'],
            ['XYZ Spares', 'xyz@example.com', '9876543211', '9876543211', 'Thane', '456 Park Road', '400601', '', 'Maharashtra', 'XYZ Auto Spares', '75000', 'active']
        ];
        
        const ws = XLSX.utils.aoa_to_sheet(templateData);
        ws['!cols'] = [{wch:20},{wch:25},{wch:15},{wch:15},{wch:15},{wch:30},{wch:12},{wch:18},{wch:15},{wch:25},{wch:12},{wch:10}];
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Customer Template');
        XLSX.writeFile(wb, 'customer_master_template.xlsx');
    }

    // ============================================================
    // SYNC TO USERS (UPDATED)
    // ============================================================
    function syncToUsers(customer) {
        let users = JSON.parse(localStorage.getItem('users') || '[]');
        const idx = users.findIndex(u => u.email === customer.email);
        const userData = {
            name: customer.name,
            email: customer.email,
            password: customer.email.split('@')[0] + '123',
            phone: customer.mobileNo || customer.phone,
            mobile: customer.mobileNo || customer.phone,
            business: customer.business,
            gstin: customer.gstin,
            address: customer.address,
            pincode: customer.pincode,
            state: customer.state,
            district: customer.district,
            role: 'customer'
        };
        if (idx !== -1) users[idx] = { ...users[idx], ...userData };
        else users.push(userData);
        localStorage.setItem('users', JSON.stringify(users));
        
        // Also update dealers for compatibility
        let dealers = JSON.parse(localStorage.getItem('dealers') || '[]');
        const dealerIdx = dealers.findIndex(d => d.email === customer.email);
        const dealerData = {
            name: customer.name,
            business: customer.business,
            email: customer.email,
            phone: customer.mobileNo || customer.phone,
            mobile: customer.mobileNo || customer.phone,
            district: customer.district,
            address: customer.address,
            status: customer.status
        };
        if (dealerIdx !== -1) dealers[dealerIdx] = { ...dealers[dealerIdx], ...dealerData };
        else dealers.push(dealerData);
        localStorage.setItem('dealers', JSON.stringify(dealers));
    }

    // ============================================================
    // EDIT, DELETE, LEDGER FUNCTIONS
    // ============================================================
    function editCustomer(id) {
        const c = customers.find(c => c.id == id);
        if (!c) return;
        editId = id;
        document.getElementById('formTitle').innerHTML = '<i class="fas fa-user-edit"></i> Edit Customer';
        document.getElementById('custName').value = c.name;
        document.getElementById('custEmail').value = c.email;
        document.getElementById('custMobile').value = c.mobileNo || c.phone || '';
        document.getElementById('custDistrict').value = c.district || '';
        document.getElementById('custAddress').value = c.address || '';
        document.getElementById('custPincode').value = c.pincode || '';
        document.getElementById('custGstin').value = c.gstin || '';
        document.getElementById('custState').value = c.state || '';
        document.getElementById('custBusiness').value = c.business || '';
        document.getElementById('custCreditLimit').value = c.creditLimit || 50000;
        document.getElementById('custStatus').value = c.status || 'active';
        document.getElementById('custCode').value = c.customerCode || '';
        document.getElementById('cancelEditBtn').style.display = 'inline-block';
        document.querySelector('.form-section').scrollIntoView({ behavior: 'smooth' });
    }

    function cancelEdit() { clearForm(); }

    function clearForm() {
        editId = null;
        document.getElementById('formTitle').innerHTML = '<i class="fas fa-user-plus"></i> Add New Customer';
        document.getElementById('custName').value = '';
        document.getElementById('custEmail').value = '';
        document.getElementById('custMobile').value = '';
        document.getElementById('custDistrict').value = '';
        document.getElementById('custAddress').value = '';
        document.getElementById('custPincode').value = '';
        document.getElementById('custGstin').value = '';
        document.getElementById('custState').value = '';
        document.getElementById('custBusiness').value = '';
        document.getElementById('custCreditLimit').value = '50000';
        document.getElementById('custStatus').value = 'active';
        document.getElementById('custCode').value = '';
        document.getElementById('cancelEditBtn').style.display = 'none';
    }

    function deleteCustomer(id) {
        if (!confirm('Delete this customer? This will NOT delete invoices.')) return;
        customers = customers.filter(c => c.id != id);
        localStorage.setItem('customers', JSON.stringify(customers));
        loadCustomers();
    }

    function viewLedger(email) {
        localStorage.setItem('viewCustomerEmail', email);
        window.open('customer-ledger.html', '_blank');
    }

    function searchCustomers() { displayCustomers(); }

    function exportToCSV() {
        let csv = "Customer Code,Name,Email,Phone,Mobile No,District,Address,PIN Code,GSTIN,State,Business Name,Credit Limit,Outstanding,Status\n";
        customers.forEach(c => {
            const phoneNum = c.mobileNo || c.phone || '';
            csv += `"${c.customerCode}","${c.name}","${c.email}","${phoneNum}","${phoneNum}","${c.district || ''}","${c.address || ''}","${c.pincode || ''}","${c.gstin || ''}","${c.state || ''}","${c.business || ''}",${c.creditLimit || 0},${c.outstanding || 0},${c.status}\n`;
        });
        const blob = new Blob([csv], {type: 'text/csv'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'customers_master.csv';
        a.click();
        URL.revokeObjectURL(url);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;');
    }

    // Initialize
    loadCustomers();
</script>
</body>
    </html>
