<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Master – Auto Spares</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Roboto', sans-serif;
            background: #e9ecef;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 1px solid #dee2e6;
        }
        h1, h2 { color: #0a7c71; }
        .form-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            border: 1px solid #dee2e6;
        }
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 15px;
        }
        .form-group {
            flex: 1;
            min-width: 180px;
        }
        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #555;
        }
        input, select, textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-family: inherit;
        }
        button {
            background: #0a7c71;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin-right: 10px;
        }
        button:hover { background: #09645a; }
        .btn-danger { background: #dc3545; }
        .btn-danger:hover { background: #c82333; }
        .btn-warning { background: #ffc107; color: #333; }
        .btn-warning:hover { background: #e0a800; }
        .search-box {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #dee2e6;
            padding: 10px;
            text-align: left;
            vertical-align: top;
        }
        th { background: #0a7c71; color: white; }
        .credit-warning { background: #fff3cd; }
        .action-buttons { display: flex; gap: 5px; flex-wrap: wrap; }
        .status-active { color: #28a745; font-weight: bold; }
        .status-inactive { color: #dc3545; font-weight: bold; }
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .nav-bar a {
            background: #6c757d;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            text-decoration: none;
        }
        @media (max-width: 768px) {
            .form-row { flex-direction: column; }
            table { font-size: 12px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="nav-bar">
        <h1><i class="fas fa-users"></i> Customer Master</h1>
        <a href="index.html"><i class="fas fa-home"></i> Home</a>
    </div>

    <!-- Add/Edit Customer Form -->
    <div class="form-section">
        <h2 id="formTitle"><i class="fas fa-user-plus"></i> Add New Customer</h2>
        <div class="form-row">
            <div class="form-group">
                <label>Customer Name *</label>
                <input type="text" id="custName" placeholder="Enter customer name">
            </div>
            <div class="form-group">
                <label>Email *</label>
                <input type="email" id="custEmail" placeholder="customer@example.com">
            </div>
            <div class="form-group">
                <label>Phone *</label>
                <input type="text" id="custPhone" placeholder="Phone number">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Address</label>
                <textarea id="custAddress" rows="2" placeholder="Full address"></textarea>
            </div>
            <div class="form-group">
                <label>PIN Code</label>
                <input type="text" id="custPincode" placeholder="PIN code">
            </div>
            <div class="form-group">
                <label>GSTIN</label>
                <input type="text" id="custGstin" placeholder="GSTIN (optional)">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>State</label>
                <input type="text" id="custState" placeholder="State">
            </div>
            <div class="form-group">
                <label>Credit Limit (₹)</label>
                <input type="number" id="custCreditLimit" step="1000" value="50000">
            </div>
            <div class="form-group">
                <label>Business Name</label>
                <input type="text" id="custBusiness" placeholder="Business name (optional)">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Status</label>
                <select id="custStatus">
                    <option value="active">Active</option>
                    <option value="inactive">Inactive</option>
                </select>
            </div>
            <div class="form-group">
                <label>Customer Code (Auto-generated)</label>
                <input type="text" id="custCode" readonly style="background:#e9ecef;">
            </div>
        </div>
        <div class="form-row">
            <button onclick="saveCustomer()"><i class="fas fa-save"></i> Save Customer</button>
            <button class="btn-warning" onclick="clearForm()"><i class="fas fa-eraser"></i> Clear Form</button>
            <button id="cancelEditBtn" class="btn-danger" style="display:none;" onclick="cancelEdit()"><i class="fas fa-times"></i> Cancel Edit</button>
        </div>
    </div>

    <!-- Search Box -->
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search by Name, Email, Phone, GSTIN, Code...">
        <button onclick="searchCustomers()"><i class="fas fa-search"></i> Search</button>
        <button onclick="loadCustomers()"><i class="fas fa-sync-alt"></i> Refresh</button>
        <button onclick="exportToCSV()"><i class="fas fa-file-csv"></i> Export CSV</button>
    </div>

    <div id="customersTable"></div>
</div>

<script>
    let customers = [];
    let editId = null;

    function loadCustomers() {
        customers = JSON.parse(localStorage.getItem('customers') || '[]');
        customers.forEach(c => {
            if (!c.customerCode) c.customerCode = generateCustomerCode();
            if (c.outstanding === undefined) c.outstanding = 0;
            if (c.totalPurchased === undefined) c.totalPurchased = 0;
        });
        localStorage.setItem('customers', JSON.stringify(customers));
        displayCustomers();
    }

    function generateCustomerCode() {
        let maxNum = 0;
        customers.forEach(c => {
            let num = parseInt((c.customerCode || 'CUST0').replace('CUST', ''));
            if (!isNaN(num) && num > maxNum) maxNum = num;
        });
        return 'CUST' + (maxNum + 1).toString().padStart(4, '0');
    }

    function displayCustomers() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        let filtered = customers;
        if (searchTerm) {
            filtered = customers.filter(c => 
                (c.name && c.name.toLowerCase().includes(searchTerm)) ||
                (c.email && c.email.toLowerCase().includes(searchTerm)) ||
                (c.phone && c.phone.includes(searchTerm)) ||
                (c.gstin && c.gstin.toLowerCase().includes(searchTerm)) ||
                (c.customerCode && c.customerCode.toLowerCase().includes(searchTerm))
            );
        }
        if (filtered.length === 0) {
            document.getElementById('customersTable').innerHTML = '<p>No customers found.</p>';
            return;
        }
        let html = '<table><thead><tr><th>Code</th><th>Name</th><th>Email</th><th>Phone</th><th>GSTIN</th><th>Credit Limit</th><th>Outstanding</th><th>Status</th><th>Actions</th></tr></thead><tbody>';
        filtered.forEach(c => {
            const outstanding = c.outstanding || 0;
            const creditLimit = c.creditLimit || 50000;
            const isOverLimit = outstanding > creditLimit;
            html += `<tr class="${isOverLimit ? 'credit-warning' : ''}">
                <td>${escapeHtml(c.customerCode)}</td>
                <td><strong>${escapeHtml(c.name)}</strong></td>
                <td>${escapeHtml(c.email)}</td>
                <td>${escapeHtml(c.phone)}</td>
                <td>${escapeHtml(c.gstin || '-')}</td>
                <td>₹${creditLimit.toLocaleString()}</td>
                <td style="color:${outstanding>0?'#dc3545':'#28a745'}">₹${outstanding.toLocaleString()}</td>
                <td class="${c.status === 'active' ? 'status-active' : 'status-inactive'}">${c.status || 'active'}</td>
                <td class="action-buttons">
                    <button onclick="editCustomer('${c.id}')" style="background:#17a2b8;"><i class="fas fa-edit"></i> Edit</button>
                    <button onclick="viewLedger('${c.email}')" style="background:#e67e22;"><i class="fas fa-book"></i> Ledger</button>
                    <button onclick="deleteCustomer('${c.id}')" class="btn-danger"><i class="fas fa-trash"></i> Delete</button>
                </td>
            </tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('customersTable').innerHTML = html;
    }

    function saveCustomer() {
        const name = document.getElementById('custName').value.trim();
        const email = document.getElementById('custEmail').value.trim();
        const phone = document.getElementById('custPhone').value.trim();
        if (!name || !email || !phone) {
            alert('Please fill Name, Email, and Phone');
            return;
        }
        if (editId === null && customers.some(c => c.email === email)) {
            alert('Customer with this email already exists!');
            return;
        }
        const customerData = {
            id: editId || Date.now(),
            name: name,
            email: email,
            phone: phone,
            address: document.getElementById('custAddress').value,
            pincode: document.getElementById('custPincode').value,
            gstin: document.getElementById('custGstin').value,
            state: document.getElementById('custState').value,
            creditLimit: parseFloat(document.getElementById('custCreditLimit').value) || 50000,
            business: document.getElementById('custBusiness').value,
            status: document.getElementById('custStatus').value,
            customerCode: document.getElementById('custCode').value || generateCustomerCode(),
            updatedAt: new Date().toISOString()
        };
        if (editId === null) {
            customerData.createdAt = new Date().toISOString();
            customerData.outstanding = 0;
            customerData.totalPurchased = 0;
            customers.push(customerData);
        } else {
            const old = customers.find(c => c.id == editId);
            if (old) {
                customerData.outstanding = old.outstanding;
                customerData.totalPurchased = old.totalPurchased;
                customerData.createdAt = old.createdAt;
            }
            const index = customers.findIndex(c => c.id == editId);
            customers[index] = customerData;
        }
        localStorage.setItem('customers', JSON.stringify(customers));
        syncToUsers(customerData);
        alert('Customer saved successfully!');
        clearForm();
        loadCustomers();
    }

    function syncToUsers(customer) {
        let users = JSON.parse(localStorage.getItem('users') || '[]');
        const idx = users.findIndex(u => u.email === customer.email);
        const userData = {
            name: customer.name,
            email: customer.email,
            password: customer.email.split('@')[0] + '123',
            phone: customer.phone,
            business: customer.business,
            gstin: customer.gstin,
            address: customer.address,
            pincode: customer.pincode,
            state: customer.state,
            role: 'customer'
        };
        if (idx !== -1) users[idx] = { ...users[idx], ...userData };
        else users.push(userData);
        localStorage.setItem('users', JSON.stringify(users));
    }

    function editCustomer(id) {
        const c = customers.find(c => c.id == id);
        if (!c) return;
        editId = id;
        document.getElementById('formTitle').innerHTML = '<i class="fas fa-user-edit"></i> Edit Customer';
        document.getElementById('custName').value = c.name;
        document.getElementById('custEmail').value = c.email;
        document.getElementById('custPhone').value = c.phone;
        document.getElementById('custAddress').value = c.address || '';
        document.getElementById('custPincode').value = c.pincode || '';
        document.getElementById('custGstin').value = c.gstin || '';
        document.getElementById('custState').value = c.state || '';
        document.getElementById('custCreditLimit').value = c.creditLimit || 50000;
        document.getElementById('custBusiness').value = c.business || '';
        document.getElementById('custStatus').value = c.status || 'active';
        document.getElementById('custCode').value = c.customerCode || '';
        document.getElementById('cancelEditBtn').style.display = 'inline-block';
        document.querySelector('.form-section').scrollIntoView({ behavior: 'smooth' });
    }

    function cancelEdit() { clearForm(); }

    function clearForm() {
        editId = null;
        document.getElementById('formTitle').innerHTML = '<i class="fas fa-user-plus"></i> Add New Customer';
        document.getElementById('custName').value = '';
        document.getElementById('custEmail').value = '';
        document.getElementById('custPhone').value = '';
        document.getElementById('custAddress').value = '';
        document.getElementById('custPincode').value = '';
        document.getElementById('custGstin').value = '';
        document.getElementById('custState').value = '';
        document.getElementById('custCreditLimit').value = '50000';
        document.getElementById('custBusiness').value = '';
        document.getElementById('custStatus').value = 'active';
        document.getElementById('custCode').value = '';
        document.getElementById('cancelEditBtn').style.display = 'none';
    }

    function deleteCustomer(id) {
        if (!confirm('Delete this customer? This will NOT delete invoices.')) return;
        customers = customers.filter(c => c.id != id);
        localStorage.setItem('customers', JSON.stringify(customers));
        loadCustomers();
    }

    function viewLedger(email) {
        localStorage.setItem('viewCustomerEmail', email);
        window.open('customer-ledger.html', '_blank');
    }

    function searchCustomers() { displayCustomers(); }

    function exportToCSV() {
        let csv = "Customer Code,Name,Email,Phone,Address,PIN,GSTIN,State,Business,Credit Limit,Outstanding,Status\n";
        customers.forEach(c => {
            csv += `"${c.customerCode}","${c.name}","${c.email}","${c.phone}","${c.address || ''}","${c.pincode || ''}","${c.gstin || ''}","${c.state || ''}","${c.business || ''}",${c.creditLimit || 0},${c.outstanding || 0},${c.status}\n`;
        });
        const blob = new Blob([csv], {type: 'text/csv'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'customers_master.csv';
        a.click();
        URL.revokeObjectURL(url);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;');
    }

    loadCustomers();
</script>
</body>
</html>
