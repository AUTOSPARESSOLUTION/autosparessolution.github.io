<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proforma Invoices – Auto Spares</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="data-manager.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Roboto', sans-serif;
            background: #e9ecef;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        h1 { color: #0a7c71; }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #dee2e6;
            padding: 10px;
            text-align: left;
            vertical-align: top;
        }
        th { background: #0a7c71; color: white; }
        button {
            background: #0a7c71;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            margin: 2px;
        }
        .btn-pdf { background: #e67e22; }
        .btn-edit { background: #17a2b8; }
        .btn-delete { background: #dc3545; }
        .btn-convert { background: #28a745; }
        .btn-new { background: #6c757d; }
        .action-buttons { display: flex; gap: 5px; flex-wrap: wrap; }
    </style>
</head>
<body>
<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h1><i class="fas fa-file-invoice"></i> Proforma Invoices</h1>
        <a href="proforma-invoice.html" class="btn-new" style="background: #6c757d; color: white; padding: 8px 16px; border-radius: 6px; text-decoration: none;"><i class="fas fa-plus"></i> New Proforma</a>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search by Proforma No, Customer Name, Email..." style="flex:1; padding: 8px;">
        <button onclick="filterProformas()"><i class="fas fa-search"></i> Search</button>
        <button onclick="loadProformas()"><i class="fas fa-sync-alt"></i> Refresh</button>
        <button onclick="exportToCSV()"><i class="fas fa-file-csv"></i> Export CSV</button>
    </div>

    <div id="proformasTable"></div>
    <button onclick="window.location.href='index.html'" style="margin-top: 20px;">Back to Dashboard</button>
</div>

<script>
    let proformas = [];

    function loadProformas() {
        proformas = JSON.parse(localStorage.getItem('proformas') || '[]');
        displayProformas();
    }

    function displayProformas(filter = '') {
        let filtered = proformas;
        if (filter) {
            const term = filter.toLowerCase();
            filtered = proformas.filter(p => 
                p.proformaNo.toLowerCase().includes(term) ||
                (p.customer.name && p.customer.name.toLowerCase().includes(term)) ||
                (p.customer.email && p.customer.email.toLowerCase().includes(term))
            );
        }
        if (filtered.length === 0) {
            document.getElementById('proformasTable').innerHTML = '<p>No proforma invoices found.</p>';
            return;
        }
        // Sort by proformaNo descending (newest first)
        filtered.sort((a,b) => b.proformaNo.localeCompare(a.proformaNo));
        let html = '<table><thead>运转<th>#</th><th>Proforma No</th><th>Date</th><th>Customer Name</th><th>Amount (₹)</th><th>Valid Until</th><th>Actions</th></tr></thead><tbody>';
        filtered.forEach((p, idx) => {
            html += `<tr>
                <td>${idx+1}</td>
                <td><strong>${escapeHtml(p.proformaNo)}</strong></td>
                <td>${p.date}</td>
                <td>${escapeHtml(p.customer.name)}</strong></td>
                <td>₹${p.grandTotal.toFixed(2)}</strong></td>
                <td>${p.validUntil || '-'}</td>
                <td><div class="action-buttons">
                    <button class="btn-pdf" onclick="generatePDF('${p.id}')"><i class="fas fa-file-pdf"></i> PDF</button>
                    <button class="btn-convert" onclick="convertToInvoice('${p.id}')"><i class="fas fa-exchange-alt"></i> Convert</button>
                    <button class="btn-edit" onclick="editProforma('${p.id}')"><i class="fas fa-edit"></i> Edit</button>
                    <button class="btn-delete" onclick="deleteProforma('${p.id}')"><i class="fas fa-trash"></i> Delete</button>
                 </div></td>
            </tr>`;
        });
        html += '</tbody><table>';
        document.getElementById('proformasTable').innerHTML = html;
    }

    // Generate PDF from saved proforma data (recreate the same layout)
    function generatePDF(id) {
        const proforma = proformas.find(p => p.id == id);
        if (!proforma) { alert('Proforma not found'); return; }
        const container = document.createElement('div');
        container.style.maxWidth = '1200px';
        container.style.margin = '0 auto';
        container.style.backgroundColor = 'white';
        container.style.padding = '0 15px 15px 15px';
        container.style.fontFamily = 'Roboto, sans-serif';
        
        // Build item rows
        let itemsHtml = '';
        proforma.items.forEach((item, idx) => {
            const taxable = (item.qty * item.price) * (1 - (item.discount || 0)/100);
            const cgst = taxable * 0.09;
            const sgst = taxable * 0.09;
            const total = taxable + cgst + sgst;
            itemsHtml += `<tr>
                <td style="border:1px solid #dee2e6; padding:4px;">${idx+1}</td>
                <td style="border:1px solid #dee2e6; padding:4px;">${escapeHtml(item.part)}</td>
                <td style="border:1px solid #dee2e6; padding:4px;">${escapeHtml(item.desc)}</td>
                <td style="border:1px solid #dee2e6; padding:4px;">${escapeHtml(item.hsn)}</td>
                <td style="border:1px solid #dee2e6; padding:4px; text-align:center;">${item.qty}</td>
                <td style="border:1px solid #dee2e6; padding:4px; text-align:right;">₹${item.price.toFixed(2)}</td>
                <td style="border:1px solid #dee2e6; padding:4px; text-align:center;">${item.discount||0}%</td>
                <td style="border:1px solid #dee2e6; padding:4px; text-align:right;">₹${taxable.toFixed(2)}</td>
                <td style="border:1px solid #dee2e6; padding:4px; text-align:center;">18%</td>
                <td style="border:1px solid #dee2e6; padding:4px; text-align:right;">₹${cgst.toFixed(2)}</td>
                <td style="border:1px solid #dee2e6; padding:4px; text-align:right;">₹${sgst.toFixed(2)}</td>
                <td style="border:1px solid #dee2e6; padding:4px; text-align:right;">₹${total.toFixed(2)}</td>
            </tr>`;
        });
        
        container.innerHTML = `
            <div style="background:#0a7c71; color:white; padding:15px 20px; display:flex; justify-content:space-between; margin:0 -15px 15px -15px;">
                <div><div style="font-size:24px;">Auto Spares Solution</div><div>GSTIN: 19ANOPD3300R1ZO</div><div>101, 1st floor, Howrah, WB 711108</div></div>
                <div style="text-align:right;"><div style="font-size:20px;">PROFORMA INVOICE</div><div>${proforma.proformaNo}</div><div>${proforma.date}</div><div>Valid Till: ${proforma.validUntil}</div></div>
            </div>
            <div style="background:#f8f9fa; padding:10px; margin-bottom:15px;">
                <strong>Customer:</strong> ${escapeHtml(proforma.customer.name)}<br>
                ${escapeHtml(proforma.customer.address)}<br>
                GSTIN: ${escapeHtml(proforma.customer.gstin)} | State: ${escapeHtml(proforma.customer.state)}<br>
                Phone: ${escapeHtml(proforma.customer.phone)} | Email: ${escapeHtml(proforma.customer.email)}
            </div>
            <table style="width:100%; border-collapse:collapse; font-size:11px;">
                <thead><tr style="background:#f8f9fa;"><th>#</th><th>Part No</th><th>Description</th><th>HSN</th><th>Qty</th><th>Price</th><th>Disc%</th><th>Taxable</th><th>GST%</th><th>CGST</th><th>SGST</th><th>Total</th></tr></thead>
                <tbody>${itemsHtml}</tbody>
            </table>
            <div style="text-align:right; margin-top:10px;">
                <table style="width:280px; margin-left:auto;">
                    <tr><td style="text-align:right;">Subtotal:</td><td>₹${proforma.subtotal.toFixed(2)}</td></tr>
                    <tr><td style="text-align:right;">CGST (9%):</td><td>₹${proforma.cgst.toFixed(2)}</td></tr>
                    <tr><td style="text-align:right;">SGST (9%):</td><td>₹${proforma.sgst.toFixed(2)}</td></tr>
                    <tr style="font-weight:bold;"><td style="text-align:right;">Grand Total:</td><td>₹${proforma.grandTotal.toFixed(2)}</td></tr>
                </table>
            </div>
            <div style="margin-top:20px; border-top:1px solid #aaa; padding-top:10px; text-align:center; font-size:10px;">
                This is a proforma invoice – not a tax invoice. Valid for 15 days. Thank you for your business.
            </div>
        `;
        html2pdf().set({ margin: 0.2, filename: `Proforma_${proforma.proformaNo}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'a4' } }).from(container).save();
    }

    // Convert to sales invoice (uses createSalesInvoice)
    function convertToInvoice(id) {
        const proforma = proformas.find(p => p.id == id);
        if (!proforma) { alert('Proforma not found'); return; }
        if (!proforma.customer.email) { alert('Customer email missing. Cannot convert.'); return; }
        
        // Build invoice data
        const invoiceItems = proforma.items.map(item => ({
            productId: item.part,
            quantity: item.qty,
            price: item.price
        }));
        const invoice = {
            id: Date.now(),
            date: new Date().toISOString().slice(0,10),
            customerEmail: proforma.customer.email,
            items: invoiceItems,
            total: proforma.grandTotal,
            invoiceNo: 'INV-' + Date.now(), // will be replaced by invoice-stock.html's numbering
            status: 'pending'
        };
        try {
            createSalesInvoice(invoice);
            alert('Proforma converted to Sales Invoice! Stock & customer outstanding updated.');
            // Optionally, delete the proforma or mark as converted
            if (confirm('Delete this proforma after conversion?')) {
                deleteProforma(id, false);
            }
            loadProformas();
        } catch(err) {
            alert('Error: ' + err.message);
        }
    }

    function editProforma(id) {
        // Store the proforma id and open edit page
        localStorage.setItem('editProformaId', id);
        window.open('edit-proforma.html', '_blank');
    }

    function deleteProforma(id, askConfirm = true) {
        if (askConfirm && !confirm('Delete this proforma invoice?')) return;
        proformas = proformas.filter(p => p.id != id);
        localStorage.setItem('proformas', JSON.stringify(proformas));
        loadProformas();
    }

    function filterProformas() {
        displayProformas(document.getElementById('searchInput').value.toLowerCase());
    }

    function exportToCSV() {
        if (proformas.length === 0) return;
        let csv = "Proforma No,Date,Customer Email,Amount,Valid Until\n";
        proformas.forEach(p => {
            csv += `"${p.proformaNo}",${p.date},"${p.customer.email}",${p.grandTotal},${p.validUntil}\n`;
        });
        const blob = new Blob([csv], {type:'text/csv'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'proformas_list.csv';
        a.click();
        URL.revokeObjectURL(blob);
    }

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }

    loadProformas();
</script>
</body>
</html>
