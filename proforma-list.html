<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proforma Invoices – Auto Spares</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="data-manager.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Roboto', sans-serif;
            background: #e9ecef;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        h1 { color: #0a7c71; }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #dee2e6;
            padding: 10px;
            text-align: left;
            vertical-align: top;
        }
        th { background: #0a7c71; color: white; }
        button {
            background: #0a7c71;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            margin: 2px;
        }
        .btn-pdf { background: #e67e22; }
        .btn-edit { background: #17a2b8; }
        .btn-delete { background: #dc3545; }
        .btn-convert { background: #28a745; }
        .debug {
            background: #fff3cd;
            border: 1px solid #ffeeba;
            padding: 10px;
            margin-bottom: 20px;
            font-family: monospace;
            font-size: 12px;
            display: none;
        }
        /* Modal styles (same as quotations) */
        .modal {
            display: none;
            position: fixed;
            z-index: 10000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 25px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .modal-content h3 {
            margin-top: 0;
            color: #0a7c71;
        }
        .modal-options {
            margin: 20px 0;
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        .modal-options label {
            font-size: 16px;
            cursor: pointer;
        }
        .modal-buttons button {
            margin: 0 10px;
            padding: 8px 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h1><i class="fas fa-file-invoice"></i> Proforma Invoices</h1>
        <a href="proforma-invoice.html" style="background: #6c757d; color: white; padding: 8px 16px; border-radius: 6px; text-decoration: none;"><i class="fas fa-plus"></i> New Proforma</a>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search by Proforma No, Customer..." style="flex:1; padding: 8px;">
        <button onclick="filterProformas()"><i class="fas fa-search"></i> Search</button>
        <button onclick="loadProformas()"><i class="fas fa-sync-alt"></i> Refresh</button>
        <button onclick="exportToCSV()"><i class="fas fa-file-csv"></i> Export CSV</button>
        <button onclick="toggleDebug()"><i class="fas fa-bug"></i> Debug</button>
    </div>

    <div id="debugPanel" class="debug"></div>
    <div id="proformasTable"></div>
    <button onclick="window.location.href='index.html'" style="margin-top: 20px;">Back to Dashboard</button>
</div>

<!-- Modal for selecting invoice type (same as quotations) -->
<div id="invoiceTypeModal" class="modal">
    <div class="modal-content">
        <h3><i class="fas fa-file-invoice"></i> Select Invoice Type</h3>
        <div class="modal-options">
            <label><input type="radio" name="invType" value="cash" checked> Cash Bill</label>
            <label><input type="radio" name="invType" value="credit"> Credit Bill</label>
        </div>
        <div class="modal-buttons">
            <button onclick="proceedConversion()">Convert</button>
            <button onclick="closeModal()">Cancel</button>
        </div>
    </div>
</div>

<script>
    let proformas = [];
    let pendingProformaId = null;

    function loadProformas() {
        let raw = localStorage.getItem('proformas');
        if (!raw) raw = '[]';
        try {
            proformas = JSON.parse(raw);
        } catch(e) { proformas = []; }
        
        proformas = proformas.map(p => {
            let customer = p.customer || {};
            if (!customer.name && p.customerName) customer.name = p.customerName;
            if (!customer.email && p.customerEmail) customer.email = p.customerEmail;
            if (!customer.phone && p.customerPhone) customer.phone = p.customerPhone;
            if (!customer.address && p.customerAddress) customer.address = p.customerAddress;
            if (!customer.gstin && p.customerGstin) customer.gstin = p.customerGstin;
            if (!customer.state && p.customerState) customer.state = p.customerState;
            
            return {
                id: String(p.id || p.proformaId || Date.now()),
                proformaNo: p.proformaNo || p.invoiceNo || 'N/A',
                date: p.date || (p.createdAt ? p.createdAt.slice(0,10) : 'N/A'),
                validUntil: p.validUntil || p.validTill || '',
                customer: customer,
                items: p.items || [],
                subtotal: p.subtotal || 0,
                cgst: p.cgst || 0,
                sgst: p.sgst || 0,
                grandTotal: p.grandTotal || p.total || 0
            };
        });
        
        localStorage.setItem('proformas', JSON.stringify(proformas));
        displayProformas();
    }

    function displayProformas(filter = '') {
        if (proformas.length === 0) {
            document.getElementById('proformasTable').innerHTML = '<p>No proforma invoices found. Click "Debug" to see raw storage.</p>';
            return;
        }
        
        let filtered = proformas;
        if (filter) {
            const term = filter.toLowerCase();
            filtered = proformas.filter(p => 
                p.proformaNo.toLowerCase().includes(term) ||
                (p.customer.name && p.customer.name.toLowerCase().includes(term)) ||
                (p.customer.email && p.customer.email.toLowerCase().includes(term))
            );
        }
        
        if (filtered.length === 0) {
            document.getElementById('proformasTable').innerHTML = '<p>No matching proformas found.</p>';
            return;
        }
        
        filtered.sort((a,b) => b.proformaNo.localeCompare(a.proformaNo));
        let html = '<table><thead>运转<th>#</th><th>Proforma No</th><th>Date</th><th>Customer</th><th>Amount (₹)</th><th>Valid Until</th><th>Actions</th></tr></thead><tbody>';
        filtered.forEach((p, idx) => {
            html += `<tr>
                <td>${idx+1}</td>
                <td><strong>${escapeHtml(p.proformaNo)}</strong></td>
                <td>${p.date}</td>
                <td>${escapeHtml(p.customer.name || p.customer.email || '?')}</td>
                <td>₹${p.grandTotal.toFixed(2)}</strong></td>
                <td>${p.validUntil || '-'}</td>
                <td><div style="display:flex; gap:5px; flex-wrap:wrap;">
                    <button class="btn-pdf" onclick="generatePDF('${p.id}')"><i class="fas fa-file-pdf"></i> PDF</button>
                    <button class="btn-convert" onclick="openTypeModal('${p.id}')"><i class="fas fa-exchange-alt"></i> Convert</button>
                    <button class="btn-edit" onclick="editProforma('${p.id}')"><i class="fas fa-edit"></i> Edit</button>
                    <button class="btn-delete" onclick="deleteProforma('${p.id}')"><i class="fas fa-trash"></i> Delete</button>
                </div></td>
            </tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('proformasTable').innerHTML = html;
    }

    function generatePDF(id) {
        const proforma = proformas.find(p => p.id == id);
        if (!proforma) { alert('Proforma not found'); return; }
        const container = document.createElement('div');
        container.style.maxWidth = '1200px';
        container.style.margin = '0 auto';
        container.style.backgroundColor = 'white';
        container.style.padding = '0 15px 15px 15px';
        container.style.fontFamily = 'Roboto, sans-serif';
        
        let itemsHtml = '';
        (proforma.items || []).forEach((item, idx) => {
            const qty = item.qty || 1;
            const price = item.price || 0;
            const disc = item.discount || 0;
            const taxable = qty * price * (1 - disc/100);
            const cgst = taxable * 0.09;
            const sgst = taxable * 0.09;
            const total = taxable + cgst + sgst;
            itemsHtml += `<tr>
                <td style="border:1px solid #dee2e6; padding:4px;">${idx+1}</td>
                <td style="border:1px solid #dee2e6; padding:4px;">${escapeHtml(item.part || '')}</td>
                <td style="border:1px solid #dee2e6; padding:4px;">${escapeHtml(item.desc || '')}</td>
                <td style="border:1px solid #dee2e6; padding:4px;">${escapeHtml(item.hsn || '')}</td>
                <td style="border:1px solid #dee2e6; padding:4px; text-align:center;">${qty}</td>
                <td style="border:1px solid #dee2e6; padding:4px; text-align:right;">₹${price.toFixed(2)}</td>
                <td style="border:1px solid #dee2e6; padding:4px; text-align:center;">${disc}%</strong></td>
                <td style="border:1px solid #dee2e6; padding:4px; text-align:right;">₹${taxable.toFixed(2)}</strong></td>
                <td style="border:1px solid #dee2e6; padding:4px; text-align:center;">18%</strong></td>
                <td style="border:1px solid #dee2e6; padding:4px; text-align:right;">₹${cgst.toFixed(2)}</strong></td>
                <td style="border:1px solid #dee2e6; padding:4px; text-align:right;">₹${sgst.toFixed(2)}</strong></td>
                <td style="border:1px solid #dee2e6; padding:4px; text-align:right;">₹${total.toFixed(2)}</strong></td>
            </tr>`;
        });
        
        container.innerHTML = `
            <div style="background:#0a7c71; color:white; padding:15px 20px; display:flex; justify-content:space-between; margin:0 -15px 15px -15px;">
                <div><div style="font-size:24px;">Auto Spares Solution</div><div>GSTIN: 19ANOPD3300R1ZO</div><div>101, 1st floor, Howrah, WB 711108</div></div>
                <div style="text-align:right;"><div style="font-size:20px;">PROFORMA INVOICE</div><div>${proforma.proformaNo}</div><div>${proforma.date}</div><div>Valid Till: ${proforma.validUntil}</div></div>
            </div>
            <div style="background:#f8f9fa; padding:10px; margin-bottom:15px;">
                <strong>Customer:</strong> ${escapeHtml(proforma.customer.name)}<br>
                ${escapeHtml(proforma.customer.address)}<br>
                GSTIN: ${escapeHtml(proforma.customer.gstin)} | State: ${escapeHtml(proforma.customer.state)}<br>
                Phone: ${escapeHtml(proforma.customer.phone)} | Email: ${escapeHtml(proforma.customer.email)}
            </div>
            <table style="width:100%; border-collapse:collapse; font-size:11px;">
                <thead><tr style="background:#f8f9fa;"><th>#</th><th>Part No</th><th>Description</th><th>HSN</th><th>Qty</th><th>Price</th><th>Disc%</th><th>Taxable</th><th>GST%</th><th>CGST</th><th>SGST</th><th>Total</th></tr></thead>
                <tbody>${itemsHtml}</tbody>
            </table>
            <div style="text-align:right; margin-top:10px;">
                <table style="width:280px; margin-left:auto;">
                    <tr><td style="text-align:right;">Subtotal: </td><td style="text-align:right;">₹${proforma.subtotal.toFixed(2)}</strong></td></tr>
                    <tr><td style="text-align:right;">CGST (9%): </td><td style="text-align:right;">₹${proforma.cgst.toFixed(2)}</strong></td></tr>
                    <tr><td style="text-align:right;">SGST (9%): </td><td style="text-align:right;">₹${proforma.sgst.toFixed(2)}</strong></td></tr>
                    <tr style="font-weight:bold;"><td style="text-align:right;">Grand Total: </td><td style="text-align:right;">₹${proforma.grandTotal.toFixed(2)}</strong></td></tr>
                60
            </div>
            <div style="margin-top:20px; border-top:1px solid #aaa; padding-top:10px; text-align:center; font-size:10px;">
                This is a proforma invoice – not a tax invoice. Valid for 15 days. Thank you for your business.
            </div>
        `;
        html2pdf().set({ margin: 0.2, filename: `Proforma_${proforma.proformaNo}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'a4' } }).from(container).save();
    }

    // --- MODIFIED CONVERSION: modal + redirect (same as quotations) ---
    function openTypeModal(proformaId) {
        const proforma = proformas.find(p => p.id == proformaId);
        if (!proforma) {
            loadProformas();
            return;
        }
        pendingProformaId = String(proformaId);
        document.getElementById('invoiceTypeModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('invoiceTypeModal').style.display = 'none';
        pendingProformaId = null;
    }

    function proceedConversion() {
        if (!pendingProformaId) {
            closeModal();
            return;
        }
        const proforma = proformas.find(p => p.id === pendingProformaId);
        if (!proforma) {
            alert('Proforma not found. It may have been deleted.');
            loadProformas();
            closeModal();
            return;
        }

        const invType = document.querySelector('input[name="invType"]:checked').value;
        closeModal();

        if (!proforma.customer.email) {
            alert('Customer email missing. Cannot convert to invoice.');
            return;
        }

        // Prepare data for the professional invoice page
        const conversionData = {
            source: 'proforma',               // <-- tells invoice page it's from proforma
            proformaId: proforma.id,
            proformaNo: proforma.proformaNo,
            invoiceType: invType,
            customer: {
                name: proforma.customer.name || '',
                email: proforma.customer.email,
                phone: proforma.customer.phone || '',
                address: proforma.customer.address || '',
                gstin: proforma.customer.gstin || '',
                state: proforma.customer.state || ''
            },
            items: proforma.items.map(item => ({
                part: item.part,
                desc: item.desc,
                hsn: item.hsn || '',
                qty: item.qty,
                price: item.price,
                discount: item.discount || 0
            })),
            grandTotal: proforma.grandTotal
        };

        localStorage.setItem('pendingQuotationConversion', JSON.stringify(conversionData));
        window.location.href = 'invoice.html?fromProforma=1';
    }

    function editProforma(id) {
        localStorage.setItem('editProformaId', id);
        window.open('edit-proforma.html', '_blank');
    }

    function deleteProforma(id, ask = true) {
        if (ask && !confirm('Delete this proforma?')) return;
        proformas = proformas.filter(p => p.id != id);
        localStorage.setItem('proformas', JSON.stringify(proformas));
        loadProformas();
    }

    function filterProformas() {
        displayProformas(document.getElementById('searchInput').value.toLowerCase());
    }

    function exportToCSV() {
        if (!proformas.length) return;
        let csv = "Proforma No,Date,Customer,Amount,Valid Until\n";
        proformas.forEach(p => {
            csv += `"${p.proformaNo}",${p.date},"${p.customer.name || p.customer.email}",${p.grandTotal},${p.validUntil}\n`;
        });
        const blob = new Blob([csv], {type:'text/csv'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'proformas_list.csv';
        a.click();
        URL.revokeObjectURL(blob);
    }

    function toggleDebug() {
        const panel = document.getElementById('debugPanel');
        if (panel.style.display === 'none' || panel.style.display === '') {
            let raw = localStorage.getItem('proformas');
            panel.innerHTML = `<strong>Raw localStorage 'proformas':</strong><br>${raw || 'null'}`;
            panel.style.display = 'block';
        } else {
            panel.style.display = 'none';
        }
    }

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }

    loadProformas();
</script>
</body>
            </html>
