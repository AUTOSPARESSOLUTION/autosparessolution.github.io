<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Ledger – Auto Spares</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Roboto', sans-serif;
            background: #e9ecef;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        h1 { color: #0a7c71; }
        .customer-info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #0a7c71;
        }
        .search-box {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #dee2e6;
            padding: 10px;
            text-align: left;
            vertical-align: top;
        }
        th { background: #0a7c71; color: white; }
        .balance-positive { color: #28a745; font-weight: bold; }
        .balance-negative { color: #dc3545; font-weight: bold; }
        button {
            background: #0a7c71;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
        }
        button:hover { background: #09645a; }
        input, select {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }
        .date-range {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; }
            .container { box-shadow: none; padding: 10px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h1><i class="fas fa-book"></i> Customer Ledger</h1>
        <a href="customer-master.html" style="background:#6c757d; color:white; padding:8px 16px; border-radius:6px; text-decoration:none;"><i class="fas fa-arrow-left"></i> Back</a>
    </div>

    <div id="customerInfo" class="customer-info">Select or enter customer email</div>

    <div class="search-box no-print">
        <select id="customerSelect" style="flex:1;">
            <option value="">-- Select Customer --</option>
        </select>
        <span style="color:#555;">OR</span>
        <input type="email" id="customerEmailInput" placeholder="Enter customer email directly" style="flex:1;">
        <button onclick="loadLedger()"><i class="fas fa-chart-line"></i> Load Ledger</button>
        <button onclick="refreshDropdown()"><i class="fas fa-sync-alt"></i> Refresh List</button>
        <button onclick="refreshLedger()" style="background:#17a2b8;"><i class="fas fa-undo-alt"></i> Refresh</button>
    </div>

    <div class="search-box no-print">
        <div class="date-range">
            <label>From:</label>
            <input type="date" id="startDate">
            <label>To:</label>
            <input type="date" id="endDate">
            <button onclick="applyDateFilter()"><i class="fas fa-calendar-alt"></i> Filter</button>
            <button onclick="clearDateFilter()"><i class="fas fa-undo-alt"></i> Clear</button>
        </div>
        <input type="text" id="searchRef" placeholder="Search by reference...">
        <button onclick="filterLedger()"><i class="fas fa-search"></i> Search</button>
        <button onclick="exportLedger()"><i class="fas fa-file-csv"></i> Export CSV</button>
        <button onclick="downloadPDF()"><i class="fas fa-file-pdf"></i> Download PDF</button>
    </div>

    <div id="ledgerTable"></div>
</div>

<script>
    let currentCustomer = null;
    let allTransactions = [];
    let filteredTransactions = [];
    let currentFilterStart = null;
    let currentFilterEnd = null;

    function refreshDropdown() {
        const customers = JSON.parse(localStorage.getItem('customers') || '[]');
        const select = document.getElementById('customerSelect');
        select.innerHTML = '<option value="">-- Select Customer --</option>';
        customers.forEach(c => {
            select.innerHTML += `<option value="${c.email}">${escapeHtml(c.name)} (${c.email})</option>`;
        });
        const viewEmail = localStorage.getItem('viewCustomerEmail');
        if (viewEmail) {
            select.value = viewEmail;
            localStorage.removeItem('viewCustomerEmail');
            loadLedger();
        }
    }

    function refreshLedger() {
        if (currentCustomer) {
            loadLedger();
        } else {
            alert('Please load a customer first.');
        }
    }

    function normalizeEmail(email) {
        if (!email) return '';
        return String(email).trim().toLowerCase();
    }

    function matchesCustomer(invoice, customerEmail) {
        const normTarget = normalizeEmail(customerEmail);
        return (invoice.buyer?.email && normalizeEmail(invoice.buyer.email) === normTarget) ||
               (invoice.customerEmail && normalizeEmail(invoice.customerEmail) === normTarget);
    }

    function loadLedger() {
        let email = document.getElementById('customerSelect').value;
        if (!email) email = document.getElementById('customerEmailInput').value.trim();
        if (!email) {
            alert('Please select or enter a customer email');
            return;
        }

        const customers = JSON.parse(localStorage.getItem('customers') || '[]');
        currentCustomer = customers.find(c => normalizeEmail(c.email) === normalizeEmail(email));
        if (!currentCustomer) {
            alert(`Customer with email "${email}" not found.`);
            return;
        }

        document.getElementById('customerInfo').innerHTML = `
            <strong>${escapeHtml(currentCustomer.name)}</strong><br>
            Email: ${escapeHtml(currentCustomer.email)} | Phone: ${escapeHtml(currentCustomer.phone)}<br>
            Outstanding in Master: <strong>₹${(currentCustomer.outstanding || 0).toLocaleString()}</strong>
        `;

        const transactions = [];

        // 1. Invoices – read from allInvoices (same as order-history)
        const allInvoices = JSON.parse(localStorage.getItem('allInvoices') || '[]');
        const customerInvoices = allInvoices.filter(inv => matchesCustomer(inv, currentCustomer.email));
        customerInvoices.forEach(inv => {
            const amount = inv.grandTotal || inv.total || 0;
            if (amount === 0) return;
            transactions.push({
                date: inv.date,
                type: 'Invoice',
                ref: inv.invoiceNo,
                debit: amount,
                credit: 0,
                narration: `Sales Invoice`
            });
        });

        // 2. Payments
        const allPayments = JSON.parse(localStorage.getItem('customerPayments') || '[]');
        const customerPayments = allPayments.filter(p => normalizeEmail(p.customerEmail) === normalizeEmail(currentCustomer.email));
        customerPayments.forEach(p => {
            transactions.push({
                date: p.date,
                type: 'Payment',
                ref: p.reference || `Payment-${p.id}`,
                debit: 0,
                credit: p.amount,
                narration: `Payment via ${p.mode || 'cash'}`
            });
        });

        transactions.sort((a,b) => new Date(a.date) - new Date(b.date));
        allTransactions = transactions;

        // Reset date filter
        document.getElementById('startDate').value = '';
        document.getElementById('endDate').value = '';
        currentFilterStart = null;
        currentFilterEnd = null;
        filteredTransactions = [...allTransactions];

        if (allTransactions.length === 0) {
            document.getElementById('ledgerTable').innerHTML = '<p>No transactions found for this customer.</p>';
        } else {
            displayLedger();
        }
    }

    function applyDateFilter() {
        if (!currentCustomer) return;
        let start = document.getElementById('startDate').value;
        let end = document.getElementById('endDate').value;
        currentFilterStart = start;
        currentFilterEnd = end;
        if (!start && !end) {
            filteredTransactions = [...allTransactions];
        } else {
            filteredTransactions = allTransactions.filter(t => {
                if (start && t.date < start) return false;
                if (end && t.date > end) return false;
                return true;
            });
        }
        displayLedger();
    }

    function clearDateFilter() {
        document.getElementById('startDate').value = '';
        document.getElementById('endDate').value = '';
        applyDateFilter();
    }

    function getOpeningBalanceBeforeDate(date) {
        if (!date) return 0;
        let balance = 0;
        for (let t of allTransactions) {
            if (t.date >= date) break;
            balance += t.debit - t.credit;
        }
        return balance;
    }

    function displayLedger() {
        if (!currentCustomer) return;
        if (filteredTransactions.length === 0) {
            document.getElementById('ledgerTable').innerHTML = '<p>No transactions in selected period.</p>';
            return;
        }

        let openingBalance = getOpeningBalanceBeforeDate(currentFilterStart);
        let running = openingBalance;
        let html = '<table class="ledger-table">\n<thead>\n<tr>\n<th>Date</th>\n<th>Type</th>\n<th>Reference</th>\n<th style="text-align:right">Debit (₹)</th>\n<th style="text-align:right">Credit (₹)</th>\n<th style="text-align:right">Balance (₹)</th>\n<th>Narration</th>\n</tr>\n</thead>\n<tbody>';

        if (openingBalance !== 0 && currentFilterStart) {
            html += `<tr>
                <td>${currentFilterStart || 'Before start'}</td>
                <td>Opening Balance</td>
                <td>-</td>
                <td style="text-align:right">${openingBalance > 0 ? '₹' + openingBalance.toLocaleString() : '-'}</td>
                <td style="text-align:right">${openingBalance < 0 ? '₹' + (-openingBalance).toLocaleString() : '-'}</td>
                <td style="text-align:right" class="${openingBalance >= 0 ? 'balance-positive' : 'balance-negative'}">₹${openingBalance.toLocaleString()}</td>
                <td>Opening Balance (before selected period)</td>
            </tr>`;
        }

        for (let t of filteredTransactions) {
            running += t.debit - t.credit;
            html += `<tr>
                <td>${t.date}</td>
                <td>${t.type}</td>
                <td><strong>${escapeHtml(t.ref)}</strong></td>
                <td style="text-align:right">${t.debit ? '₹' + t.debit.toLocaleString() : '-'}</td>
                <td style="text-align:right">${t.credit ? '₹' + t.credit.toLocaleString() : '-'}</td>
                <td style="text-align:right" class="${running >= 0 ? 'balance-positive' : 'balance-negative'}">₹${running.toLocaleString()}</td>
                <td>${escapeHtml(t.narration)}</td>
            </tr>`;
        }
        html += '</tbody>\n</table>';
        document.getElementById('ledgerTable').innerHTML = html;

        const finalBalance = running;
        const masterOutstanding = currentCustomer.outstanding || 0;
        if (Math.abs(finalBalance - masterOutstanding) > 1) {
            const warning = `<div style="background:#fff3cd; padding:10px; margin-top:10px; border:1px solid #ffeeba;">
                ⚠️ Ledger closing balance (₹${finalBalance.toLocaleString()}) differs from Master outstanding (₹${masterOutstanding.toLocaleString()}).
                Click "Refresh" after editing invoices to reload.
            </div>`;
            document.getElementById('ledgerTable').innerHTML += warning;
        }
    }

    function filterLedger() {
        let term = document.getElementById('searchRef').value.toLowerCase();
        if (!term) { displayLedger(); return; }
        let filtered = filteredTransactions.filter(t =>
            (t.ref && t.ref.toLowerCase().includes(term)) ||
            t.type.toLowerCase().includes(term) ||
            (t.narration && t.narration.toLowerCase().includes(term))
        );
        if (filtered.length === 0) {
            document.getElementById('ledgerTable').innerHTML = '<p>No matching transactions.</p>';
            return;
        }
        let openingBalance = getOpeningBalanceBeforeDate(currentFilterStart);
        let running = openingBalance;
        let html = '<table class="ledger-table">\n<thead>\n<tr>\n<th>Date</th>\n<th>Type</th>\n<th>Reference</th>\n<th style="text-align:right">Debit (₹)</th>\n<th style="text-align:right">Credit (₹)</th>\n<th style="text-align:right">Balance (₹)</th>\n<th>Narration</th>\n</tr>\n</thead>\n<tbody>';
        filtered.forEach(t => {
            running += t.debit - t.credit;
            html += `<tr>
                <td>${t.date}</td>
                <td>${t.type}</td>
                <td><strong>${escapeHtml(t.ref)}</strong></td>
                <td style="text-align:right">${t.debit ? '₹' + t.debit.toLocaleString() : '-'}</td>
                <td style="text-align:right">${t.credit ? '₹' + t.credit.toLocaleString() : '-'}</td>
                <td style="text-align:right" class="${running >= 0 ? 'balance-positive' : 'balance-negative'}">₹${running.toLocaleString()}</td>
                <td>${escapeHtml(t.narration)}</td>
            </tr>`;
        });
        html += '</tbody>\n</table>';
        document.getElementById('ledgerTable').innerHTML = html;
    }

    function exportLedger() {
        if (!filteredTransactions.length) { alert('No data to export'); return; }
        let csv = "Date,Type,Reference,Debit,Credit,Balance,Narration\n";
        let openingBalance = getOpeningBalanceBeforeDate(currentFilterStart);
        let running = openingBalance;
        if (openingBalance !== 0 && currentFilterStart) {
            csv += `"${currentFilterStart || 'Before start'}","Opening Balance","-",${openingBalance>0?openingBalance:0},${openingBalance<0?-openingBalance:0},${openingBalance},"Opening Balance"\n`;
        }
        for (let t of filteredTransactions) {
            running += t.debit - t.credit;
            csv += `"${t.date}","${t.type}","${t.ref}",${t.debit},${t.credit},${running},"${t.narration}"\n`;
        }
        const blob = new Blob([csv], {type:'text/csv'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `customer_ledger_${currentCustomer.email}.csv`;
        a.click();
        URL.revokeObjectURL(url);
    }

    // ------------- FIXED PDF DOWNLOAD (includes selected period) -------------
    function downloadPDF() {
        if (!currentCustomer) { alert('Load a customer first'); return; }
        const container = document.getElementById('ledgerTable');
        const clone = container.cloneNode(true);
        const info = document.getElementById('customerInfo').cloneNode(true);
        const title = document.createElement('h2');
        title.innerText = 'Customer Ledger Statement';
        const period = document.createElement('p');
        let fromDate = currentFilterStart || 'All';
        let toDate = currentFilterEnd || 'All';
        period.innerHTML = `<strong>Selected Period:</strong> ${fromDate} to ${toDate}`;
        const pdfDiv = document.createElement('div');
        pdfDiv.style.padding = '20px';
        pdfDiv.style.fontFamily = 'Roboto';
        pdfDiv.appendChild(title);
        pdfDiv.appendChild(info);
        pdfDiv.appendChild(period);
        pdfDiv.appendChild(clone);
        const header = document.createElement('div');
        header.style.backgroundColor = '#0a7c71';
        header.style.color = 'white';
        header.style.padding = '10px';
        header.style.textAlign = 'center';
        header.innerHTML = '<h2>Auto Spares Solution</h2><p>GSTIN: 19ANOPD3300R1ZO | Howrah, WB</p>';
        pdfDiv.prepend(header);
        html2pdf().set({ margin: 0.3, filename: `Customer_Ledger_${currentCustomer.name}_${fromDate}_to_${toDate}.pdf`, image: { quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'a4', orientation: 'landscape' } }).from(pdfDiv).save();
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;');
    }

    refreshDropdown();
</script>
</body>
                                                                                        </html>
