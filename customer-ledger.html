<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Ledger</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background: #e9ecef; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; border-radius: 12px; padding: 20px; }
        h1 { color: #0a7c71; }
        .customer-info { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 4px solid #0a7c71; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #dee2e6; padding: 10px; text-align: left; }
        th { background: #0a7c71; color: white; }
        .balance-positive { color: #28a745; font-weight: bold; }
        .balance-negative { color: #dc3545; font-weight: bold; }
        button { background: #0a7c71; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        .search-box { margin-bottom: 20px; display: flex; gap: 10px; }
    </style>
    <script src="data-manager.js"></script>
</head>
<body>
<div class="container">
    <h1>Customer Ledger</h1>
    <div id="customerInfo" class="customer-info">Loading...</div>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search by ref, type...">
        <button onclick="filterLedger()">🔍 Search</button>
        <button onclick="loadLedger()">🔄 Refresh</button>
        <button onclick="exportToCSV()">📄 Export CSV</button>
    </div>
    <div id="ledgerTable"></div>
    <button onclick="window.location.href='customer-master.html'">← Back to Customers</button>
</div>
<script>
    let customerEmail = localStorage.getItem('viewCustomerEmail');
    let ledger = [];
    let filtered = [];
    let customer = null;

    function loadLedger() {
        if (!customerEmail) { document.getElementById('customerInfo').innerHTML = '<p style="color:red;">No customer selected.</p>'; return; }
        let customers = JSON.parse(localStorage.getItem('customers') || '[]');
        customer = customers.find(c => c.email === customerEmail);
        if (customer) {
            document.getElementById('customerInfo').innerHTML = `<strong>${customer.name}</strong> (${customer.email})<br>Outstanding: ₹${(customer.outstanding || 0).toLocaleString()}`;
        } else {
            document.getElementById('customerInfo').innerHTML = '<p>Customer not found</p>';
            return;
        }
        ledger = JSON.parse(localStorage.getItem('customerLedger') || '[]');
        ledger = ledger.filter(e => e.customerEmail === customerEmail).sort((a,b) => new Date(a.date) - new Date(b.date));
        filtered = [...ledger];
        displayLedger();
    }

    function displayLedger() {
        let html = '<table><thead><tr><th>Date</th><th>Type</th><th>Reference</th><th>Debit (₹)</th><th>Credit (₹)</th><th>Running Balance</th><th>Narration</th></tr></thead><tbody>';
        let balance = 0;
        filtered.forEach(entry => {
            if (entry.type === 'invoice') balance += entry.debit;
            else if (entry.type === 'payment') balance -= entry.credit;
            else balance += (entry.debit - entry.credit);
            html += `<tr>
                <td>${entry.date}</td>
                <td>${entry.type}</td>
                <td>${entry.ref || '-'}</td>
                <td>${entry.debit ? '₹' + entry.debit.toLocaleString() : '-'}</td>
                <td>${entry.credit ? '₹' + entry.credit.toLocaleString() : '-'}</td>
                <td class="${balance>=0?'balance-positive':'balance-negative'}">₹${balance.toLocaleString()}</td>
                <td>${entry.narration || '-'}</td>
            </tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('ledgerTable').innerHTML = html || '<p>No transactions.</p>';
    }

    function filterLedger() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        if (!term) filtered = [...ledger];
        else filtered = ledger.filter(e => (e.ref && e.ref.toLowerCase().includes(term)) || e.type.toLowerCase().includes(term));
        displayLedger();
    }

    function exportToCSV() {
        let csv = "Date,Type,Reference,Debit,Credit,Running Balance,Narration\n";
        let balance = 0;
        filtered.forEach(e => {
            if (e.type === 'invoice') balance += e.debit;
            else if (e.type === 'payment') balance -= e.credit;
            else balance += (e.debit - e.credit);
            csv += `"${e.date}","${e.type}","${e.ref || ''}",${e.debit || 0},${e.credit || 0},${balance},"${e.narration || ''}"\n`;
        });
        const blob = new Blob([csv], {type:'text/csv'}); const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = `customer_ledger_${customerEmail}.csv`; a.click(); URL.revokeObjectURL(url);
    }
    loadLedger();
</script>
</body>
</html>
