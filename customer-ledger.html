<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Ledger – Auto Spares</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background: #e9ecef; margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; background: white; border-radius: 12px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: #0a7c71; }
        .customer-info { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 4px solid #0a7c71; }
        .search-box { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #dee2e6; padding: 10px; text-align: left; vertical-align: top; }
        th { background: #0a7c71; color: white; }
        .balance-positive { color: #28a745; font-weight: bold; }
        .balance-negative { color: #dc3545; font-weight: bold; }
        button { background: #0a7c71; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        button:hover { background: #09645a; }
        input, select { padding: 8px; border: 1px solid #ccc; border-radius: 6px; }
        .date-range { display: flex; gap: 10px; align-items: center; }
        .debug-panel { background: #f8f9fa; border: 1px solid #dee2e6; padding: 10px; margin-bottom: 15px; font-family: monospace; font-size: 11px; display: none; max-height: 300px; overflow: auto; }
        @media print { .no-print { display: none !important; } body { background: white; padding: 0; } .container { box-shadow: none; padding: 10px; } }
        .recalc-btn { background: #fd7e14; }
        .recalc-btn:hover { background: #e06c0e; }
    </style>
</head>
<body>
<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h1><i class="fas fa-book"></i> Customer Ledger</h1>
        <a href="customer-master.html" style="background:#6c757d; color:white; padding:8px 16px; border-radius:6px; text-decoration:none;"><i class="fas fa-arrow-left"></i> Back</a>
    </div>

    <div id="customerInfo" class="customer-info">Select or enter customer email</div>
    
    <div class="search-box no-print">
        <select id="customerSelect" style="flex:1;">
            <option value="">-- Select Customer --</option>
        </select>
        <span>OR</span>
        <input type="email" id="customerEmailInput" placeholder="Enter customer email" style="flex:1;">
        <button onclick="loadLedger()">Load Ledger</button>
        <button onclick="refreshDropdown()">Refresh List</button>
        <button onclick="toggleDebug()" style="background:#6c757d;">Toggle Debug</button>
        <button onclick="recalculateOutstanding()" class="recalc-btn" style="background:#fd7e14;">Recalc Outstanding</button>
    </div>

    <div id="debugPanel" class="debug-panel"></div>

    <div class="search-box no-print">
        <div class="date-range">
            <label>From:</label>
            <input type="date" id="startDate">
            <label>To:</label>
            <input type="date" id="endDate">
            <button onclick="applyDateFilter()">Filter</button>
            <button onclick="clearDateFilter()">Clear</button>
        </div>
        <input type="text" id="searchRef" placeholder="Search by ref...">
        <button onclick="filterLedger()">Search</button>
        <button onclick="exportLedger()">Export CSV</button>
        <button onclick="downloadPDF()">Download PDF</button>
    </div>

    <div id="ledgerTable"></div>
</div>

<script>
    let currentCustomer = null;
    let allTransactions = [];
    let filteredTransactions = [];
    let currentFilterStart = null;
    let currentFilterEnd = null;

    function toggleDebug() {
        const panel = document.getElementById('debugPanel');
        panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
    }

    function logDebug(msg) {
        const panel = document.getElementById('debugPanel');
        panel.innerHTML += new Date().toLocaleTimeString() + ' - ' + msg + '<br>';
        console.log(msg);
    }

    function refreshDropdown() {
        const customers = JSON.parse(localStorage.getItem('customers') || '[]');
        const select = document.getElementById('customerSelect');
        select.innerHTML = '<option value="">-- Select Customer --</option>';
        customers.forEach(c => {
            select.innerHTML += `<option value="${c.email}">${escapeHtml(c.name)} (${c.email})</option>`;
        });
        const viewEmail = localStorage.getItem('viewCustomerEmail');
        if (viewEmail) {
            select.value = viewEmail;
            localStorage.removeItem('viewCustomerEmail');
            loadLedger();
        }
        const today = new Date();
        const start = new Date(); start.setDate(today.getDate() - 90);
        document.getElementById('startDate').value = start.toISOString().slice(0,10);
        document.getElementById('endDate').value = today.toISOString().slice(0,10);
    }

    // Check if a transaction matches a given customer email (case-insensitive)
    function matchesCustomerEmail(obj, customerEmail) {
        if (!obj) return false;
        const checkFields = ['customerEmail', 'customer.email', 'buyer.email', 'email'];
        for (let field of checkFields) {
            let value = field.includes('.') ? 
                field.split('.').reduce((o, k) => o?.[k], obj) : 
                obj[field];
            if (value && String(value).toLowerCase() === String(customerEmail).toLowerCase()) {
                return true;
            }
        }
        return false;
    }

    function loadLedger() {
        let email = document.getElementById('customerSelect').value;
        if (!email) email = document.getElementById('customerEmailInput').value.trim();
        if (!email) { alert('Please select or enter a customer email'); return; }

        const customers = JSON.parse(localStorage.getItem('customers') || '[]');
        currentCustomer = customers.find(c => c.email.toLowerCase() === email.toLowerCase());
        if (!currentCustomer) { alert('Customer not found.'); return; }

        document.getElementById('customerInfo').innerHTML = `
            <strong>${escapeHtml(currentCustomer.name)}</strong><br>
            Email: ${escapeHtml(currentCustomer.email)} | Phone: ${escapeHtml(currentCustomer.phone)}<br>
            Outstanding in Master: <strong>₹${(currentCustomer.outstanding || 0).toLocaleString()}</strong>
        `;

        document.getElementById('debugPanel').innerHTML = '';
        logDebug(`Loading ledger for ${currentCustomer.email}`);

        let transactions = [];

        // Helper to add invoice (debit)
        function addInvoice(inv, source) {
            let amount = inv.grandTotal || inv.total || 0;
            if (amount === 0) return;
            // Avoid duplicate by reference
            if (transactions.some(t => t.ref === inv.invoiceNo && t.type === 'Invoice')) return;
            transactions.push({
                date: inv.date,
                type: 'Invoice',
                ref: inv.invoiceNo,
                debit: amount,
                credit: 0,
                narration: `Invoice from ${source}`
            });
            logDebug(`Added invoice ${inv.invoiceNo} amount ₹${amount} (${source})`);
        }

        // 1. Check salesInvoices
        let salesInvoices = JSON.parse(localStorage.getItem('salesInvoices') || '[]');
        let matchedSales = salesInvoices.filter(inv => matchesCustomerEmail(inv, currentCustomer.email));
        matchedSales.forEach(inv => addInvoice(inv, 'salesInvoices'));
        logDebug(`Found ${matchedSales.length} invoices in salesInvoices`);

        // 2. Check allInvoices (fallback)
        let allInvoices = JSON.parse(localStorage.getItem('allInvoices') || '[]');
        let matchedAll = allInvoices.filter(inv => matchesCustomerEmail(inv, currentCustomer.email));
        matchedAll.forEach(inv => addInvoice(inv, 'allInvoices'));
        logDebug(`Found ${matchedAll.length} invoices in allInvoices`);

        // 3. Check legacy invoices (if any)
        let legacyInvoices = JSON.parse(localStorage.getItem('invoices') || '[]');
        let matchedLegacy = legacyInvoices.filter(inv => matchesCustomerEmail(inv, currentCustomer.email));
        matchedLegacy.forEach(inv => addInvoice(inv, 'invoices'));
        logDebug(`Found ${matchedLegacy.length} invoices in invoices (legacy)`);

        // 4. Payments
        let payments = JSON.parse(localStorage.getItem('customerPayments') || '[]');
        let matchedPayments = payments.filter(p => p.customerEmail && p.customerEmail.toLowerCase() === currentCustomer.email.toLowerCase());
        matchedPayments.forEach(p => {
            transactions.push({
                date: p.date,
                type: 'Payment',
                ref: p.reference || 'Payment',
                debit: 0,
                credit: p.amount,
                narration: `Payment via ${p.mode || 'cash'}`
            });
            logDebug(`Added payment ${p.reference} amount ₹${p.amount}`);
        });
        logDebug(`Found ${matchedPayments.length} payments`);

        // Sort by date
        transactions.sort((a,b) => new Date(a.date) - new Date(b.date));
        allTransactions = transactions;
        logDebug(`Total transactions: ${allTransactions.length}`);
        
        if (allTransactions.length === 0) {
            document.getElementById('ledgerTable').innerHTML = '<p>No transactions found for this customer. Create a sales invoice or record a payment.</p>';
        } else {
            applyDateFilter();
        }
    }

    function applyDateFilter() {
        if (!currentCustomer) return;
        let start = document.getElementById('startDate').value;
        let end = document.getElementById('endDate').value;
        currentFilterStart = start;
        currentFilterEnd = end;
        if (!start && !end) {
            filteredTransactions = [...allTransactions];
        } else {
            filteredTransactions = allTransactions.filter(t => {
                if (start && t.date < start) return false;
                if (end && t.date > end) return false;
                return true;
            });
        }
        displayLedger();
    }

    function clearDateFilter() {
        document.getElementById('startDate').value = '';
        document.getElementById('endDate').value = '';
        applyDateFilter();
    }

    function calculateOutstandingFromTransactions() {
        let totalDebit = 0, totalCredit = 0;
        for (let t of allTransactions) {
            totalDebit += t.debit;
            totalCredit += t.credit;
        }
        return totalDebit - totalCredit;
    }

    function recalculateOutstanding() {
        if (!currentCustomer) { alert('Load a customer first'); return; }
        let calculated = calculateOutstandingFromTransactions();
        if (confirm(`Recalculate outstanding for ${currentCustomer.name}?\nCurrent master outstanding: ₹${(currentCustomer.outstanding||0).toLocaleString()}\nLedger calculated: ₹${calculated.toLocaleString()}\n\nUpdate master to ₹${calculated.toLocaleString()}?`)) {
            let customers = JSON.parse(localStorage.getItem('customers') || '[]');
            let idx = customers.findIndex(c => c.email.toLowerCase() === currentCustomer.email.toLowerCase());
            if (idx !== -1) {
                customers[idx].outstanding = calculated;
                localStorage.setItem('customers', JSON.stringify(customers));
                currentCustomer.outstanding = calculated;
                document.getElementById('customerInfo').innerHTML = `
                    <strong>${escapeHtml(currentCustomer.name)}</strong><br>
                    Email: ${escapeHtml(currentCustomer.email)} | Phone: ${escapeHtml(currentCustomer.phone)}<br>
                    Outstanding in Master: <strong>₹${(currentCustomer.outstanding || 0).toLocaleString()}</strong>
                `;
                alert('Outstanding updated from ledger.');
                displayLedger(); // refresh display to remove warning
            }
        }
    }

    function displayLedger() {
        if (!currentCustomer) {
            document.getElementById('ledgerTable').innerHTML = '<p>No customer selected.</p>';
            return;
        }
        if (filteredTransactions.length === 0) {
            document.getElementById('ledgerTable').innerHTML = '<p>No transactions in selected period.</p>';
            return;
        }

        // Calculate opening balance
        let opening = 0;
        for (let t of allTransactions) {
            if (currentFilterStart && t.date < currentFilterStart) {
                opening += t.debit - t.credit;
            }
        }

        let balance = opening;
        let html = `<table class="ledger-table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Type</th>
                    <th>Reference</th>
                    <th>Debit (₹)</th>
                    <th>Credit (₹)</th>
                    <th>Balance (₹)</th>
                    <th>Narration</th>
                </tr>
            </thead>
            <tbody>`;

        // Opening balance row
        if (opening !== 0) {
            html += `<tr>
                <td>${currentFilterStart || 'Before start'}</td>
                <td>Opening Balance</td>
                <td>-</td>
                <td style="text-align:right">${opening > 0 ? '₹' + opening.toLocaleString() : '-'}</td>
                <td style="text-align:right">${opening < 0 ? '₹' + (-opening).toLocaleString() : '-'}</td>
                <td style="text-align:right" class="${opening >= 0 ? 'balance-positive' : 'balance-negative'}">₹${opening.toLocaleString()}</td>
                <td>Opening Balance</td>
            </tr>`;
        }

        for (let t of filteredTransactions) {
            balance += t.debit - t.credit;
            html += `<tr>
                <td>${t.date}</td>
                <td>${t.type}</td>
                <td>${escapeHtml(t.ref)}</td>
                <td style="text-align:right">${t.debit ? '₹' + t.debit.toLocaleString() : '-'}</td>
                <td style="text-align:right">${t.credit ? '₹' + t.credit.toLocaleString() : '-'}</td>
                <td style="text-align:right" class="${balance >= 0 ? 'balance-positive' : 'balance-negative'}">₹${balance.toLocaleString()}</td>
                <td>${escapeHtml(t.narration)}</td>
            </tr>`;
        }
        html += '</tbody></table>';
        document.getElementById('ledgerTable').innerHTML = html;

        // Compare with master
        const finalBalance = balance;
        const masterOutstanding = currentCustomer.outstanding || 0;
        if (Math.abs(finalBalance - masterOutstanding) > 1) {
            const warning = `<div style="background:#fff3cd; padding:10px; margin-top:10px; border:1px solid #ffeeba; border-radius:6px;">
                ⚠️ <strong>Mismatch detected:</strong> Ledger closing balance (₹${finalBalance.toLocaleString()}) differs from Master outstanding (₹${masterOutstanding.toLocaleString()}). 
                Use the <strong>"Recalc Outstanding"</strong> button above to fix.
            </div>`;
            document.getElementById('ledgerTable').innerHTML += warning;
        }
    }

    function filterLedger() {
        let term = document.getElementById('searchRef').value.toLowerCase();
        if (!term) { displayLedger(); return; }
        let filtered = filteredTransactions.filter(t =>
            (t.ref && t.ref.toLowerCase().includes(term)) ||
            t.type.toLowerCase().includes(term) ||
            (t.narration && t.narration.toLowerCase().includes(term))
        );
        if (filtered.length === 0) {
            document.getElementById('ledgerTable').innerHTML = '<p>No matching transactions.</p>';
            return;
        }
        let opening = 0;
        for (let t of allTransactions) {
            if (currentFilterStart && t.date < currentFilterStart) opening += t.debit - t.credit;
        }
        let balance = opening;
        let html = `<table><thead>…</thead><tbody>`;
        if (opening !== 0) {
            html += `<tr><td>${currentFilterStart || 'Before start'}</td><td>Opening Balance</td><td>-</td><td style="text-align:right">${opening>0?'₹'+opening.toLocaleString():'-'}</td><td style="text-align:right">${opening<0?'₹'+(-opening).toLocaleString():'-'}</td><td class="${opening>=0?'balance-positive':'balance-negative'}" style="text-align:right">₹${opening.toLocaleString()}</td><td>Opening</td></tr>`;
        }
        for (let t of filtered) {
            balance += t.debit - t.credit;
            html += `<tr><td>${t.date}</td><td>${t.type}</td><td>${escapeHtml(t.ref)}</td><td style="text-align:right">${t.debit?'₹'+t.debit.toLocaleString():'-'}</td><td style="text-align:right">${t.credit?'₹'+t.credit.toLocaleString():'-'}</td><td style="text-align:right" class="${balance>=0?'balance-positive':'balance-negative'}">₹${balance.toLocaleString()}</td><td>${escapeHtml(t.narration)}</td></tr>`;
        }
        html += '</tbody></table>';
        document.getElementById('ledgerTable').innerHTML = html;
    }

    function exportLedger() {
        if (!filteredTransactions.length) { alert('No data to export'); return; }
        let csv = "Date,Type,Reference,Debit,Credit,Balance,Narration\n";
        let opening = 0;
        for (let t of allTransactions) {
            if (currentFilterStart && t.date < currentFilterStart) opening += t.debit - t.credit;
        }
        let balance = opening;
        if (opening !== 0) csv += `"${currentFilterStart || 'Before start'}","Opening Balance","-",${opening>0?opening:0},${opening<0?-opening:0},${opening},"Opening Balance"\n`;
        for (let t of filteredTransactions) {
            balance += t.debit - t.credit;
            csv += `"${t.date}","${t.type}","${t.ref}",${t.debit},${t.credit},${balance},"${t.narration}"\n`;
        }
        const blob = new Blob([csv], {type:'text/csv'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `customer_ledger_${currentCustomer.email}.csv`;
        a.click();
        URL.revokeObjectURL(url);
    }

    function downloadPDF() {
        if (!currentCustomer) { alert('Load a customer first'); return; }
        const container = document.getElementById('ledgerTable');
        const clone = container.cloneNode(true);
        const info = document.getElementById('customerInfo').cloneNode(true);
        const title = document.createElement('h2');
        title.innerText = 'Customer Ledger Statement';
        const period = document.createElement('p');
        period.innerHTML = `<strong>Period:</strong> ${currentFilterStart || 'All'} to ${currentFilterEnd || 'All'}`;
        const pdfDiv = document.createElement('div');
        pdfDiv.style.padding = '20px';
        pdfDiv.style.fontFamily = 'Roboto';
        pdfDiv.appendChild(title);
        pdfDiv.appendChild(info);
        pdfDiv.appendChild(period);
        pdfDiv.appendChild(clone);
        const header = document.createElement('div');
        header.style.backgroundColor = '#0a7c71';
        header.style.color = 'white';
        header.style.padding = '10px';
        header.style.textAlign = 'center';
        header.innerHTML = '<h2>Auto Spares Solution</h2><p>GSTIN: 19ANOPD3300R1ZO | Howrah, WB</p>';
        pdfDiv.prepend(header);
        html2pdf().set({ margin: 0.3, filename: `Customer_Ledger_${currentCustomer.name}.pdf`, image: { quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'a4', orientation: 'landscape' } }).from(pdfDiv).save();
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;');
    }

    refreshDropdown();
</script>
</body>
</html>
