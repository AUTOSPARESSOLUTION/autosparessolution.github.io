<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Payment Receipts – Auto Spares</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Roboto', sans-serif;
            background: #e9ecef;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .company-header {
            background: #0a7c71;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            border-radius: 8px;
            margin-bottom: 25px;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .logo-area img { height: 50px; object-fit: contain; }
        .company-details h1 { margin: 0; font-size: 22px; }
        .company-details p { margin: 2px 0 0; font-size: 11px; opacity: 0.9; }
        .page-title h2 { margin: 0; font-size: 18px; }
        .form-section, .table-section {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid #dee2e6;
        }
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 15px;
            align-items: flex-end;
        }
        .form-group { flex: 1; min-width: 180px; }
        label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 4px; }
        input, select, textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; }
        button {
            background: #0a7c71;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
        }
        .btn-pdf { background: #e67e22; }
        .btn-edit { background: #17a2b8; }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            border: 1px solid #dee2e6;
            padding: 10px;
            text-align: left;
            vertical-align: top;
        }
        th { background: #0a7c71; color: white; }
        .modal {
            display: none;
            position: fixed;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }
        .modal-content {
            background: white;
            margin: 5% auto;
            width: 90%;
            max-width: 600px;
            border-radius: 12px;
            padding: 20px;
            position: relative;
        }
        .close-modal {
            position: absolute;
            right: 15px;
            top: 10px;
            font-size: 24px;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Company Header -->
    <div class="company-header">
        <div class="logo-area">
            <img src="images/ASS.jpg" alt="Logo" onerror="this.style.display='none'">
            <div class="company-details">
                <h1>Auto Spares Solution</h1>
                <p>GSTIN: 19ANOPD3300R1ZO | 101, 1st floor, 57/5, Q Road, Howrah, WB 711108</p>
            </div>
        </div>
        <div class="page-title">
            <h2><i class="fas fa-receipt"></i> Payment Receipts</h2>
        </div>
    </div>

    <!-- Add / New Receipt Form -->
    <div class="form-section">
        <h3><i class="fas fa-plus-circle"></i> Record New Payment</h3>
        <div class="form-row">
            <div class="form-group">
                <label>Customer *</label>
                <select id="customerSelect">
                    <option value="">-- Select Customer --</option>
                </select>
                <button type="button" style="margin-top:5px; background:#28a745; padding:4px 8px;" onclick="showAddCustomerModal()"><i class="fas fa-user-plus"></i> New Customer</button>
            </div>
            <div class="form-group"><label>Date</label><input type="date" id="paymentDate"></div>
            <div class="form-group"><label>Amount (₹)</label><input type="number" id="amount" step="0.01"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>Mode</label><select id="mode"><option>Cash</option><option>Bank Transfer</option><option>Cheque</option><option>UPI</option></select></div>
            <div class="form-group"><label>Reference</label><input type="text" id="reference" placeholder="Cheque/UTR"></div>
            <div class="form-group"><label>Remarks</label><textarea id="remarks" rows="1"></textarea></div>
        </div>
        <button onclick="addPayment()"><i class="fas fa-save"></i> Save Receipt</button>
        <button onclick="clearForm()">Clear</button>
        <button onclick="addSampleReceipt()" style="background:#6c757d;"><i class="fas fa-flask"></i> Add Sample Receipt</button>
    </div>

    <!-- All Receipts Table -->
    <div class="table-section">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search by Receipt No, Customer..." style="flex:1;">
            <button onclick="filterReceipts()"><i class="fas fa-search"></i> Search</button>
            <button onclick="loadReceipts()"><i class="fas fa-sync-alt"></i> Refresh</button>
            <button onclick="exportToCSV()"><i class="fas fa-file-csv"></i> Export CSV</button>
        </div>
        <div id="receiptsTable"></div>
    </div>
</div>

<!-- Modals -->
<div id="addCustomerModal" class="modal"><div class="modal-content"><span class="close-modal" onclick="closeAddCustomerModal()">&times;</span><h3>Add Customer</h3><input type="text" id="newName" placeholder="Name*"><br><br><input type="email" id="newEmail" placeholder="Email*"><br><br><input type="text" id="newPhone" placeholder="Phone"><br><br><button onclick="saveNewCustomer()">Save</button><button onclick="closeAddCustomerModal()">Cancel</button></div></div>
<div id="editModal" class="modal"><div class="modal-content"><span class="close-modal" onclick="closeEditModal()">&times;</span><h3>Edit Receipt</h3><input type="hidden" id="editId"><label>Receipt No</label><input type="text" id="editReceiptNo" readonly><br><label>Customer Email</label><input type="email" id="editCustomerEmail" readonly><br><label>Date</label><input type="date" id="editDate"><br><label>Amount (₹)</label><input type="number" id="editAmount" step="0.01"><br><label>Mode</label><select id="editMode"><option>Cash</option><option>Bank Transfer</option><option>Cheque</option><option>UPI</option></select><br><label>Reference</label><input type="text" id="editReference"><br><label>Remarks</label><textarea id="editRemarks" rows="2"></textarea><br><button onclick="saveEdit()">Save Changes</button><button onclick="closeEditModal()">Cancel</button></div></div>

<script>
    let receipts = [];
    let customers = [];

    function getFinancialYear() {
        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth() + 1;
        return (month >= 4) ? `${year}-${(year+1).toString().slice(-2)}` : `${year-1}-${year.toString().slice(-2)}`;
    }

    function getNextReceiptNumber() {
        const finYear = getFinancialYear();
        let max = 0;
        receipts.forEach(r => {
            if (r.receiptNo && r.receiptNo.startsWith(`PR/${finYear}/`)) {
                let num = parseInt(r.receiptNo.split('/').pop());
                if (!isNaN(num) && num > max) max = num;
            }
        });
        return `PR/${finYear}/` + (max + 1).toString().padStart(4, '0');
    }

    function loadReceipts() {
        receipts = JSON.parse(localStorage.getItem('customerPayments') || '[]');
        customers = JSON.parse(localStorage.getItem('customers') || '[]');
        populateCustomerDropdown();
        displayReceipts();
    }

    function populateCustomerDropdown() {
        let select = document.getElementById('customerSelect');
        select.innerHTML = '<option value="">-- Select Customer --</option>';
        customers.forEach(c => select.innerHTML += `<option value="${c.email}">${c.name} (${c.email})</option>`);
    }

    function displayReceipts(filter = '') {
        let filtered = receipts;
        if (filter) {
            const term = filter.toLowerCase();
            filtered = receipts.filter(r => {
                let cust = customers.find(c => c.email === r.customerEmail);
                return r.receiptNo.toLowerCase().includes(term) || (cust && cust.name.toLowerCase().includes(term)) || (r.reference && r.reference.toLowerCase().includes(term));
            });
        }
        if (filtered.length === 0) {
            document.getElementById('receiptsTable').innerHTML = '<p>No receipts found. Click "Add Sample Receipt" to test.</p>';
            return;
        }
        filtered.sort((a,b) => b.receiptNo.localeCompare(a.receiptNo));
        let html = '<table><thead>运转<th>#</th><th>Receipt No</th><th>Date</th><th>Customer</th><th>Amount (₹)</th><th>Mode</th><th>Reference</th><th>Actions</th></tr></thead><tbody>';
        filtered.forEach((r, i) => {
            let cust = customers.find(c => c.email === r.customerEmail);
            let customerName = cust ? cust.name : r.customerEmail;
            html += `<tr>
                <td>${i+1}</td>
                <td><strong>${escapeHtml(r.receiptNo)}</strong></td>
                <td>${r.date}</td>
                <td>${escapeHtml(customerName)}</td>
                <td>₹${r.amount.toFixed(2)}</td>
                <td>${r.mode || 'Cash'}</td>
                <td>${escapeHtml(r.reference || '-')}</td>
                <td>
                    <button class="btn-edit" onclick="openEditModal('${r.id}')"><i class="fas fa-edit"></i> Edit</button>
                    <button class="btn-pdf" onclick="generateReceiptPDF('${r.id}')"><i class="fas fa-file-pdf"></i> PDF</button>
                </td>
            </tr>`;
        });
        html += '</tbody><table>';
        document.getElementById('receiptsTable').innerHTML = html;
    }

    function addPayment() {
        let email = document.getElementById('customerSelect').value;
        if (!email) { alert('Select a customer'); return; }
        let amount = parseFloat(document.getElementById('amount').value);
        if (isNaN(amount) || amount <= 0) { alert('Valid amount required'); return; }
        let cust = customers.find(c => c.email === email);
        if (!cust) { alert('Customer not found'); return; }
        let receiptNo = getNextReceiptNumber();
        let payment = {
            id: Date.now(),
            receiptNo: receiptNo,
            date: document.getElementById('paymentDate').value || new Date().toISOString().slice(0,10),
            customerEmail: email,
            amount: amount,
            reference: document.getElementById('reference').value.trim() || 'N/A',
            mode: document.getElementById('mode').value,
            remarks: document.getElementById('remarks').value
        };
        // Update outstanding
        cust.outstanding = (cust.outstanding || 0) - amount;
        if (cust.outstanding < 0) cust.outstanding = 0;
        localStorage.setItem('customers', JSON.stringify(customers));
        receipts.push(payment);
        localStorage.setItem('customerPayments', JSON.stringify(receipts));
        // Update ledger
        let ledger = JSON.parse(localStorage.getItem('customerLedger') || '[]');
        ledger.push({ id: Date.now(), customerEmail: email, date: payment.date, type: 'payment', ref: receiptNo, debit: 0, credit: amount, balance: cust.outstanding, narration: payment.remarks });
        localStorage.setItem('customerLedger', JSON.stringify(ledger));
        alert(`Receipt ${receiptNo} saved`);
        clearForm();
        loadReceipts();
    }

    function clearForm() {
        document.getElementById('customerSelect').value = '';
        document.getElementById('amount').value = '';
        document.getElementById('reference').value = '';
        document.getElementById('remarks').value = '';
        document.getElementById('paymentDate').value = new Date().toISOString().slice(0,10);
    }

    function addSampleReceipt() {
        // Create a sample customer if none exists
        if (customers.length === 0) {
            let sampleCust = { id: Date.now(), name: 'Sample Customer', email: 'sample@test.com', phone: '9999999999', address: 'Test Address', outstanding: 0, totalPurchased: 0, creditLimit: 50000, status: 'active', customerCode: 'CUST0001', createdAt: new Date().toISOString() };
            customers.push(sampleCust);
            localStorage.setItem('customers', JSON.stringify(customers));
        }
        let cust = customers[0];
        let receiptNo = getNextReceiptNumber();
        let payment = {
            id: Date.now(),
            receiptNo: receiptNo,
            date: new Date().toISOString().slice(0,10),
            customerEmail: cust.email,
            amount: 1000,
            reference: 'SAMPLE123',
            mode: 'Cash',
            remarks: 'Sample receipt for testing'
        };
        // Update outstanding
        cust.outstanding = (cust.outstanding || 0) - 1000;
        if (cust.outstanding < 0) cust.outstanding = 0;
        localStorage.setItem('customers', JSON.stringify(customers));
        receipts.push(payment);
        localStorage.setItem('customerPayments', JSON.stringify(receipts));
        alert('Sample receipt added');
        loadReceipts();
    }

    function openEditModal(id) {
        let r = receipts.find(r => r.id == id);
        if (!r) return;
        document.getElementById('editId').value = r.id;
        document.getElementById('editReceiptNo').value = r.receiptNo;
        document.getElementById('editCustomerEmail').value = r.customerEmail;
        document.getElementById('editDate').value = r.date;
        document.getElementById('editAmount').value = r.amount;
        document.getElementById('editMode').value = r.mode || 'Cash';
        document.getElementById('editReference').value = r.reference || '';
        document.getElementById('editRemarks').value = r.remarks || '';
        document.getElementById('editModal').style.display = 'block';
    }
    function closeEditModal() { document.getElementById('editModal').style.display = 'none'; }
    function saveEdit() {
        let id = document.getElementById('editId').value;
        let idx = receipts.findIndex(r => r.id == id);
        if (idx === -1) return;
        let old = receipts[idx];
        let newAmount = parseFloat(document.getElementById('editAmount').value);
        if (isNaN(newAmount) || newAmount <= 0) { alert('Invalid amount'); return; }
        let newDate = document.getElementById('editDate').value;
        let newMode = document.getElementById('editMode').value;
        let newRef = document.getElementById('editReference').value.trim() || 'N/A';
        let newRemarks = document.getElementById('editRemarks').value;
        let amountDiff = old.amount - newAmount;
        if (amountDiff !== 0) {
            let cust = customers.find(c => c.email === old.customerEmail);
            if (cust) {
                cust.outstanding += amountDiff;
                if (cust.outstanding < 0) cust.outstanding = 0;
                localStorage.setItem('customers', JSON.stringify(customers));
            }
        }
        old.date = newDate;
        old.amount = newAmount;
        old.mode = newMode;
        old.reference = newRef;
        old.remarks = newRemarks;
        localStorage.setItem('customerPayments', JSON.stringify(receipts));
        // Update ledger
        let ledger = JSON.parse(localStorage.getItem('customerLedger') || '[]');
        let ledgerEntry = ledger.find(l => l.ref === old.receiptNo && l.type === 'payment');
        if (ledgerEntry) {
            ledgerEntry.credit = newAmount;
            let cust = customers.find(c => c.email === old.customerEmail);
            ledgerEntry.balance = cust ? cust.outstanding : 0;
            ledgerEntry.narration = newRemarks || 'Payment edited';
            localStorage.setItem('customerLedger', JSON.stringify(ledger));
        }
        alert('Receipt updated');
        closeEditModal();
        loadReceipts();
    }

    function generateReceiptPDF(id) {
        let r = receipts.find(r => r.id == id);
        if (!r) return;
        let cust = customers.find(c => c.email === r.customerEmail);
        if (!cust) return;
        let pdfDiv = document.createElement('div');
        pdfDiv.style.padding = '20px';
        pdfDiv.style.fontFamily = 'Roboto, sans-serif';
        pdfDiv.style.backgroundColor = 'white';
        pdfDiv.style.maxWidth = '800px';
        pdfDiv.style.margin = '0 auto';
        pdfDiv.innerHTML = `
            <div style="background:#0a7c71; color:white; padding:15px; display:flex; justify-content:space-between; align-items:center;">
                <div><img src="images/ASS.jpg" style="height:50px;" onerror="this.style.display='none'"> <span style="font-size:20px; font-weight:bold;">Auto Spares Solution</span><br>GSTIN: 19ANOPD3300R1ZO<br>101, 1st floor, Howrah, WB 711108</div>
                <div><div style="font-size:18px;">PAYMENT RECEIPT</div><div>${r.receiptNo}</div></div>
            </div>
            <div><h3>Customer</h3><p>${escapeHtml(cust.name)}<br>${escapeHtml(cust.email)}<br>${escapeHtml(cust.phone)}<br>${escapeHtml(cust.address || '')}</p></div>
            <div><h3>Payment</h3><p>Date: ${r.date}<br>Amount: ₹${r.amount.toFixed(2)}<br>Mode: ${r.mode}<br>Ref: ${escapeHtml(r.reference)}<br>Remarks: ${escapeHtml(r.remarks)}</p></div>
            <div style="margin-top:20px; text-align:center;">Thank you for your business!</div>
        `;
        html2pdf().set({ margin: 0.2, filename: `Receipt_${r.receiptNo}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'a4' } }).from(pdfDiv).save();
    }

    function filterReceipts() { displayReceipts(document.getElementById('searchInput').value.toLowerCase()); }
    function exportToCSV() {
        if (!receipts.length) return;
        let csv = "Receipt No,Date,Customer Email,Amount,Mode,Reference,Remarks\n";
        receipts.forEach(r => csv += `"${r.receiptNo}",${r.date},"${r.customerEmail}",${r.amount},"${r.mode}","${r.reference}","${r.remarks}"\n`);
        let blob = new Blob([csv], {type:'text/csv'});
        let a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'payment_receipts.csv'; a.click(); URL.revokeObjectURL(blob);
    }
    function showAddCustomerModal() { document.getElementById('addCustomerModal').style.display = 'block'; }
    function closeAddCustomerModal() { document.getElementById('addCustomerModal').style.display = 'none'; }
    function saveNewCustomer() {
        let name = document.getElementById('newName').value.trim(), email = document.getElementById('newEmail').value.trim();
        if (!name || !email) { alert('Name and Email required'); return; }
        if (customers.find(c => c.email === email)) { alert('Email exists'); return; }
        let newCust = { id: Date.now(), name, email, phone: document.getElementById('newPhone').value, address: '', gstin: '', state: '', creditLimit: 50000, outstanding: 0, totalPurchased: 0, status: 'active', customerCode: 'CUST' + (customers.length+1).toString().padStart(4,'0'), createdAt: new Date().toISOString() };
        customers.push(newCust);
        localStorage.setItem('customers', JSON.stringify(customers));
        populateCustomerDropdown();
        closeAddCustomerModal();
        alert('Customer added');
    }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }

    document.getElementById('paymentDate').value = new Date().toISOString().slice(0,10);
    loadReceipts();
</script>
</body>
    </html>
