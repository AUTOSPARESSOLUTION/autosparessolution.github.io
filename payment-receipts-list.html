<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Receipts – Auto Spares</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background: #e9ecef; margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: auto; background: white; border-radius: 12px; padding: 20px; }
        h1, h2 { color: #0a7c71; }
        .form-section, .table-section {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid #dee2e6;
        }
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 15px;
        }
        .form-group {
            flex: 1;
            min-width: 180px;
        }
        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        input, select, textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }
        button {
            background: #0a7c71;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
        }
        .btn-pdf { background: #e67e22; }
        .btn-edit { background: #17a2b8; }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            border: 1px solid #dee2e6;
            padding: 10px;
            text-align: left;
            vertical-align: top;
        }
        th { background: #0a7c71; color: white; }
        .debug { background: #fff3cd; padding: 10px; font-family: monospace; font-size: 12px; display: none; margin-bottom: 15px; }
    </style>
</head>
<body>
<div class="container">
    <h1><i class="fas fa-receipt"></i> Payment Receipts</h1>

    <!-- ========== INPUT FORM ========== -->
    <div class="form-section">
        <h2><i class="fas fa-plus"></i> New Payment Receipt</h2>
        <div class="form-row">
            <div class="form-group">
                <label>Customer *</label>
                <select id="customerSelect">
                    <option value="">-- Select Customer --</option>
                </select>
                <input type="email" id="customerEmailDirect" placeholder="Or enter email directly" style="margin-top:5px;">
            </div>
            <div class="form-group">
                <label>Payment Date</label>
                <input type="date" id="paymentDate">
            </div>
            <div class="form-group">
                <label>Amount (₹) *</label>
                <input type="number" id="amount" step="0.01" placeholder="Enter amount">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Payment Mode</label>
                <select id="mode">
                    <option value="Cash">Cash</option>
                    <option value="Bank Transfer">Bank Transfer</option>
                    <option value="Cheque">Cheque</option>
                    <option value="UPI">UPI</option>
                </select>
            </div>
            <div class="form-group">
                <label>Reference (Cheque/UTR)</label>
                <input type="text" id="reference" placeholder="Optional">
            </div>
            <div class="form-group">
                <label>Remarks</label>
                <textarea id="remarks" rows="1" placeholder="Optional"></textarea>
            </div>
        </div>
        <div class="form-row">
            <button onclick="addPayment()"><i class="fas fa-save"></i> Save Receipt</button>
            <button onclick="clearForm()"><i class="fas fa-eraser"></i> Clear Form</button>
        </div>
    </div>

    <!-- ========== LIST / TABLE SECTION ========== -->
    <div class="table-section">
        <h2><i class="fas fa-list"></i> All Receipts</h2>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search by Receipt No, Customer..." style="flex:1;">
            <button onclick="filterReceipts()"><i class="fas fa-search"></i> Search</button>
            <button onclick="loadPayments()"><i class="fas fa-sync-alt"></i> Refresh</button>
            <button onclick="exportAllToCSV()"><i class="fas fa-file-csv"></i> Export CSV</button>
            <button onclick="showDebug()"><i class="fas fa-bug"></i> Debug</button>
        </div>
        <div id="debugPanel" class="debug"></div>
        <div id="paymentsTable"></div>
    </div>

    <button onclick="window.location.href='index.html'">Back to Dashboard</button>
</div>

<script>
    let payments = [];
    let customers = [];

    function refreshCustomerDropdown() {
        customers = JSON.parse(localStorage.getItem('customers') || '[]');
        const select = document.getElementById('customerSelect');
        select.innerHTML = '<option value="">-- Select Customer --</option>';
        customers.forEach(c => {
            select.innerHTML += `<option value="${c.email}">${c.name} (${c.email})</option>`;
        });
    }

    function getFinancialYear() {
        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth() + 1;
        if (month >= 4) return `${year}-${(year+1).toString().slice(-2)}`;
        else return `${year-1}-${year.toString().slice(-2)}`;
    }

    function getNextReceiptNumber() {
        const finYear = getFinancialYear();
        let maxNum = 0;
        payments.forEach(p => {
            if (p.receiptNo && p.receiptNo.startsWith(`PR/${finYear}/`)) {
                const num = parseInt(p.receiptNo.split('/').pop());
                if (!isNaN(num) && num > maxNum) maxNum = num;
            }
        });
        return `PR/${finYear}/` + (maxNum + 1).toString().padStart(4, '0');
    }

    function addPayment() {
        let email = document.getElementById('customerSelect').value;
        if (!email) email = document.getElementById('customerEmailDirect').value.trim();
        if (!email) { alert('Please select or enter customer email'); return; }
        const amount = parseFloat(document.getElementById('amount').value);
        if (isNaN(amount) || amount <= 0) { alert('Enter valid amount'); return; }

        // Ensure customer exists in customers array (if not, create a minimal one)
        let customer = customers.find(c => c.email === email);
        if (!customer) {
            // Create placeholder customer
            customer = {
                id: Date.now(),
                name: email.split('@')[0],
                email: email,
                phone: '',
                outstanding: 0,
                totalPurchased: 0,
                creditLimit: 50000,
                status: 'active',
                customerCode: 'CUST' + (customers.length + 1).toString().padStart(4,'0'),
                createdAt: new Date().toISOString()
            };
            customers.push(customer);
            localStorage.setItem('customers', JSON.stringify(customers));
            refreshCustomerDropdown();
        }

        const receiptNo = getNextReceiptNumber();
        const payment = {
            id: Date.now(),
            receiptNo: receiptNo,
            date: document.getElementById('paymentDate').value || new Date().toISOString().slice(0,10),
            customerEmail: email,
            amount: amount,
            reference: document.getElementById('reference').value.trim() || 'N/A',
            mode: document.getElementById('mode').value,
            remarks: document.getElementById('remarks').value
        };

        // Update customer outstanding (reduce)
        customer.outstanding = (customer.outstanding || 0) - amount;
        if (customer.outstanding < 0) customer.outstanding = 0;
        localStorage.setItem('customers', JSON.stringify(customers));

        // Save payment
        payments.push(payment);
        localStorage.setItem('customerPayments', JSON.stringify(payments));

        // Add to ledger
        let ledger = JSON.parse(localStorage.getItem('customerLedger') || '[]');
        ledger.push({
            id: Date.now(),
            customerEmail: email,
            date: payment.date,
            type: 'payment',
            ref: receiptNo,
            debit: 0,
            credit: amount,
            balance: customer.outstanding,
            narration: payment.remarks || 'Payment received'
        });
        localStorage.setItem('customerLedger', JSON.stringify(ledger));

        alert(`Receipt ${receiptNo} saved!`);
        clearForm();
        loadPayments(); // refresh table
    }

    function clearForm() {
        document.getElementById('customerSelect').value = '';
        document.getElementById('customerEmailDirect').value = '';
        document.getElementById('amount').value = '';
        document.getElementById('reference').value = '';
        document.getElementById('remarks').value = '';
        document.getElementById('paymentDate').value = new Date().toISOString().slice(0,10);
    }

    function loadPayments() {
        payments = JSON.parse(localStorage.getItem('customerPayments') || '[]');
        customers = JSON.parse(localStorage.getItem('customers') || '[]');
        displayReceipts();
    }

    function displayReceipts(filter = '') {
        let filtered = payments;
        if (filter) {
            const term = filter.toLowerCase();
            filtered = payments.filter(p => {
                const cust = customers.find(c => c.email === p.customerEmail);
                return (p.receiptNo && p.receiptNo.toLowerCase().includes(term)) ||
                       (cust && (cust.name.toLowerCase().includes(term) || cust.email.toLowerCase().includes(term))) ||
                       (p.reference && p.reference.toLowerCase().includes(term));
            });
        }
        if (filtered.length === 0) {
            document.getElementById('paymentsTable').innerHTML = '<p>No receipts found. Use the form above to add one.</p>';
            return;
        }
        filtered.sort((a,b) => b.receiptNo.localeCompare(a.receiptNo));
        let html = '<table><thead><tr>
            <th>Receipt No</th><th>Date</th><th>Customer</th><th>Amount (₹)</th><th>Mode</th><th>Reference</th><th>Actions</th>
        </tr></thead><tbody>';
        filtered.forEach(p => {
            const cust = customers.find(c => c.email === p.customerEmail);
            const customerName = cust ? cust.name : p.customerEmail;
            html += `<tr>
                <td><strong>${escapeHtml(p.receiptNo)}</strong></td>
                <td>${p.date}</td>
                <td>${escapeHtml(customerName)}</strong></td>
                <td>₹${p.amount.toFixed(2)}</td>
                <td>${p.mode || 'Cash'}</td>
                <td>${escapeHtml(p.reference || '-')}</td>
                <td>
                    <button class="btn-pdf" onclick="generateReceiptPDF('${p.id}')"><i class="fas fa-file-pdf"></i> PDF</button>
                    <button class="btn-edit" onclick="editPayment('${p.id}')"><i class="fas fa-edit"></i> Edit</button>
                </td>
            </tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('paymentsTable').innerHTML = html;
    }

    function generateReceiptPDF(paymentId) {
        const payment = payments.find(p => p.id == paymentId);
        if (!payment) { alert('Payment not found'); return; }
        const customer = customers.find(c => c.email === payment.customerEmail);
        if (!customer) { alert('Customer not found'); return; }
        const receiptDiv = document.createElement('div');
        receiptDiv.style.maxWidth = '800px';
        receiptDiv.style.margin = '0 auto';
        receiptDiv.style.backgroundColor = 'white';
        receiptDiv.style.padding = '20px';
        receiptDiv.style.fontFamily = 'Roboto, sans-serif';
        receiptDiv.innerHTML = `
            <div style="text-align: center;">
                <div style="font-size: 24px; font-weight: bold;">Auto Spares Solution</div>
                <div>GSTIN: 19ANOPD3300R1ZO</div>
                <div>101, 1st floor, Howrah, WB 711108</div>
                <h2>PAYMENT RECEIPT</h2>
                <p>Receipt No: ${payment.receiptNo}</p>
            </div>
            <div><strong>Customer:</strong> ${escapeHtml(customer.name)} (${escapeHtml(customer.email)})</div>
            <div><strong>Date:</strong> ${payment.date}</div>
            <div><strong>Amount:</strong> ₹${payment.amount.toFixed(2)}</div>
            <div><strong>Mode:</strong> ${payment.mode || 'Cash'}</div>
            <div><strong>Reference:</strong> ${escapeHtml(payment.reference || '-')}</div>
            <div><strong>Remarks:</strong> ${escapeHtml(payment.remarks || '-')}</div>
            <div style="margin-top: 30px; text-align: center; border-top: 1px solid #aaa; padding-top: 10px;">Thank you for your business!</div>
        `;
        const opt = { margin: [0.2,0.2,0.2,0.2], filename: `Payment_Receipt_${payment.receiptNo}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' } };
        html2pdf().set(opt).from(receiptDiv).save();
    }

    function editPayment(paymentId) {
        localStorage.setItem('editPaymentId', paymentId);
        window.open('edit-payment.html', '_blank');
    }

    function filterReceipts() { displayReceipts(document.getElementById('searchInput').value.toLowerCase()); }
    function exportAllToCSV() { /* same as before */ }
    function showDebug() { /* same as before */ }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }

    // Initial setup
    document.getElementById('paymentDate').value = new Date().toISOString().slice(0,10);
    refreshCustomerDropdown();
    loadPayments();
</script>
</body>
    </html>
