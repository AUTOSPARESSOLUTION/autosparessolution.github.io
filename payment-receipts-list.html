<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Receipts – Auto Spares</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background: #e9ecef; margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: auto; background: white; border-radius: 12px; padding: 20px; }
        h1 { color: #0a7c71; }
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #dee2e6; padding: 10px; text-align: left; vertical-align: top; }
        th { background: #0a7c71; color: white; }
        button { background: #0a7c71; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; margin: 2px; }
        .btn-pdf { background: #e67e22; }
        .btn-edit { background: #17a2b8; }
        .btn-delete { background: #dc3545; }
        .btn-new { background: #28a745; text-decoration: none; display: inline-block; }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
        @media (max-width: 768px) { table { font-size: 12px; } }
    </style>
</head>
<body>
<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h1><i class="fas fa-receipt"></i> Payment Receipts</h1>
        <a href="payment-receipt.html" class="btn-new" style="background: #28a745; color: white; padding: 8px 16px; border-radius: 6px; text-decoration: none;"><i class="fas fa-plus"></i> New Payment</a>
    </div>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search by Receipt No, Customer..." style="flex:1; padding: 8px;">
        <button onclick="filterReceipts()"><i class="fas fa-search"></i> Search</button>
        <button onclick="loadReceipts()"><i class="fas fa-sync-alt"></i> Refresh</button>
        <button onclick="exportToCSV()"><i class="fas fa-file-csv"></i> Export CSV</button>
    </div>
    <div class="table-responsive">
        <div id="receiptsTable"></div>
    </div>
    <button onclick="window.location.href='index.html'" style="margin-top: 20px;">Back to Dashboard</button>
</div>

<script>
    let receipts = [];
    let customers = [];

    function loadReceipts() {
        receipts = JSON.parse(localStorage.getItem('customerPayments') || '[]');
        customers = JSON.parse(localStorage.getItem('customers') || '[]');
        displayReceipts();
    }

    function displayReceipts(filter = '') {
        let filtered = receipts;
        if (filter) {
            const term = filter.toLowerCase();
            filtered = receipts.filter(r => {
                const cust = customers.find(c => c.email === r.customerEmail);
                return r.receiptNo.toLowerCase().includes(term) ||
                       (cust && cust.name.toLowerCase().includes(term)) ||
                       (r.reference && r.reference.toLowerCase().includes(term));
            });
        }
        if (filtered.length === 0) {
            document.getElementById('receiptsTable').innerHTML = '<p>No payment receipts found.</p>';
            return;
        }
        filtered.sort((a,b) => b.receiptNo.localeCompare(a.receiptNo));
        let html = '<table><thead>
            <th>#</th><th>Receipt No</th><th>Date</th><th>Customer</th><th>Amount (₹)</th><th>Mode</th><th>Reference</th><th>Actions</th>
        </tr></thead><tbody>';
        filtered.forEach((r, idx) => {
            const cust = customers.find(c => c.email === r.customerEmail);
            const customerName = cust ? cust.name : r.customerEmail;
            html += `<tr>
                <td>${idx+1}</td>
                <td><strong>${escapeHtml(r.receiptNo)}</strong></td>
                <td>${r.date}</td>
                <td>${escapeHtml(customerName)}</strong></td>
                <td>₹${r.amount.toFixed(2)}</strong></td>
                <td>${r.mode || 'Cash'}</td>
                <td>${escapeHtml(r.reference || '-')}<tr>
                <td>
                    <button class="btn-pdf" onclick="generateReceiptPDF('${r.id}')"><i class="fas fa-file-pdf"></i> PDF</button>
                    <button class="btn-edit" onclick="editReceipt('${r.id}')"><i class="fas fa-edit"></i> Edit</button>
                    <button class="btn-delete" onclick="deleteReceipt('${r.id}')"><i class="fas fa-trash"></i> Delete</button>
                 </strong></td>
            </tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('receiptsTable').innerHTML = html;
    }

    function generateReceiptPDF(paymentId) {
        const payment = receipts.find(p => p.id == paymentId);
        if (!payment) { alert('Payment not found'); return; }
        const customer = customers.find(c => c.email === payment.customerEmail);
        if (!customer) { alert('Customer not found'); return; }
        const receiptDiv = document.createElement('div');
        receiptDiv.style.maxWidth = '800px';
        receiptDiv.style.margin = '0 auto';
        receiptDiv.style.backgroundColor = 'white';
        receiptDiv.style.padding = '20px';
        receiptDiv.style.fontFamily = 'Roboto, sans-serif';
        receiptDiv.style.border = '1px solid #ccc';
        receiptDiv.innerHTML = `
            <div style="text-align: center; margin-bottom: 20px;">
                <div style="display: flex; align-items: center; justify-content: center; gap: 15px;">
                    <img src="images/ASS.jpg" alt="Logo" style="height: 60px;" onerror="this.style.display='none'">
                    <div>
                        <div style="font-size: 24px; font-weight: bold; color: #0a7c71;">Auto Spares Solution</div>
                        <div>GSTIN: 19ANOPD3300R1ZO</div>
                        <div>101, 1st floor, 57/5, Q Road, Howrah, WB 711108</div>
                    </div>
                </div>
                <h2>PAYMENT RECEIPT</h2>
                <p>Receipt No: ${payment.receiptNo}</p>
            </div>
            <div><strong>Customer:</strong> ${escapeHtml(customer.name)} (${escapeHtml(customer.email)})</div>
            <div><strong>Date:</strong> ${payment.date}</div>
            <div><strong>Amount:</strong> ₹${payment.amount.toFixed(2)}</div>
            <div><strong>Mode:</strong> ${payment.mode || 'Cash'}</div>
            <div><strong>Reference:</strong> ${escapeHtml(payment.reference || '-')}</div>
            <div><strong>Remarks:</strong> ${escapeHtml(payment.remarks || '-')}</div>
            <div style="margin-top: 20px; text-align: center;">Thank you for your business!</div>
        `;
        const opt = { margin: [0.2,0.2,0.2,0.2], filename: `Payment_Receipt_${payment.receiptNo}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' } };
        html2pdf().set(opt).from(receiptDiv).save();
    }

    function editReceipt(paymentId) {
        localStorage.setItem('editPaymentReceiptId', paymentId);
        window.open('edit-payment-receipt.html', '_blank');
    }

    function deleteReceipt(paymentId) {
        if (!confirm('Delete this payment receipt? This will increase customer outstanding back to original amount.')) return;
        const payment = receipts.find(p => p.id == paymentId);
        if (!payment) return;
        // Update customer outstanding (add back the payment amount)
        let customer = customers.find(c => c.email === payment.customerEmail);
        if (customer) {
            customer.outstanding = (customer.outstanding || 0) + payment.amount;
            localStorage.setItem('customers', JSON.stringify(customers));
            // Also update customer ledger (remove the payment entry or add reversal)
            let ledger = JSON.parse(localStorage.getItem('customerLedger') || '[]');
            // Find the ledger entry for this payment (by ref = receiptNo)
            const ledgerIndex = ledger.findIndex(l => l.ref === payment.receiptNo && l.type === 'payment');
            if (ledgerIndex !== -1) ledger.splice(ledgerIndex, 1);
            // Optionally add a reversal note
            ledger.push({
                id: Date.now(),
                customerEmail: payment.customerEmail,
                date: new Date().toISOString().slice(0,10),
                type: 'payment_deletion',
                ref: `DEL-${payment.receiptNo}`,
                debit: payment.amount,
                credit: 0,
                balance: customer.outstanding,
                narration: 'Payment receipt deleted'
            });
            localStorage.setItem('customerLedger', JSON.stringify(ledger));
        }
        // Remove from payments array
        receipts = receipts.filter(p => p.id != paymentId);
        localStorage.setItem('customerPayments', JSON.stringify(receipts));
        alert('Payment receipt deleted and outstanding restored.');
        loadReceipts();
    }

    function filterReceipts() {
        displayReceipts(document.getElementById('searchInput').value.toLowerCase());
    }

    function exportToCSV() {
        if (receipts.length === 0) return;
        let csv = "Receipt No,Date,Customer Email,Amount,Mode,Reference,Remarks\n";
        receipts.forEach(r => {
            csv += `"${r.receiptNo}",${r.date},"${r.customerEmail}",${r.amount},"${r.mode || 'Cash'}","${r.reference || ''}","${r.remarks || ''}"\n`;
        });
        const blob = new Blob([csv], {type: 'text/csv'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'payment_receipts.csv';
        a.click();
        URL.revokeObjectURL(blob);
    }

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
    loadReceipts();
</script>
</body>
</html>
