<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Receipts – Auto Spares</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
* { box-sizing: border-box; }
body { font-family: 'Roboto', sans-serif; background: #e9ecef; margin: 0; padding: 20px; }
.container { max-width: 1400px; margin: auto; background: white; border-radius: 12px; padding: 20px; }
h1 { color: #0a7c71; }

.form-section, .table-section {
    background: #f8f9fa;
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 30px;
    border: 1px solid #dee2e6;
}

.form-row { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 15px; }
.form-group { flex: 1; min-width: 180px; }

label { font-size: 12px; font-weight: 600; }

input, select, textarea {
    width: 100%;
    padding: 8px;
    border: 1px solid #ccc;
    border-radius: 6px;
}

button {
    background: #0a7c71;
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
}

.btn-edit { background: #17a2b8; }
.btn-delete { background: #dc3545; }
.btn-pdf { background: #e67e22; }

table { width: 100%; border-collapse: collapse; margin-top:15px; }
th, td { border: 1px solid #dee2e6; padding: 10px; }
th { background: #0a7c71; color: white; }
</style>
</head>

<body>

<div class="container">

<h1><i class="fas fa-receipt"></i> Payment Receipts</h1>

<!-- FORM -->
<div class="form-section">
<div class="form-row">
<div class="form-group">
<label>Customer *</label>
<select id="customerSelect"></select>
</div>

<div class="form-group">
<label>Date</label>
<input type="date" id="paymentDate">
</div>

<div class="form-group">
<label>Amount</label>
<input type="number" id="amount">
</div>
</div>

<div class="form-row">
<div class="form-group">
<label>Mode</label>
<select id="mode">
<option>Cash</option>
<option>UPI</option>
<option>Bank Transfer</option>
<option>Cheque</option>
</select>
</div>

<div class="form-group">
<label>Reference</label>
<input type="text" id="reference">
</div>

<div class="form-group">
<label>Remarks</label>
<input type="text" id="remarks">
</div>
</div>

<button onclick="addPayment()"><i class="fas fa-save"></i> Save Receipt</button>
</div>

<!-- TABLE -->
<div class="table-section">
<div id="tableData"></div>
</div>

</div>

<script>

/* ================= DATA ================= */
let receipts = JSON.parse(localStorage.getItem('customerPayments') || '[]');
let customers = JSON.parse(localStorage.getItem('customers') || '[]');

/* ================= LOAD ================= */
function loadCustomers(){
let sel = document.getElementById('customerSelect');
sel.innerHTML = '<option value="">-- Select Customer --</option>';
customers.forEach(c=>{
sel.innerHTML += `<option value="${c.email}">${c.name} (${c.email})</option>`;
});
}

/* ================= SAVE ================= */
function saveData(){
localStorage.setItem('customerPayments', JSON.stringify(receipts));
display();
}

/* ================= ADD ================= */
function addPayment(){

let email = document.getElementById('customerSelect').value;
let amount = parseFloat(document.getElementById('amount').value);

if(!email){ alert("Select customer"); return; }
if(isNaN(amount) || amount<=0){ alert("Enter valid amount"); return; }

let receiptNo = "PR/" + Date.now();

let obj = {
id: Date.now(),
receiptNo,
date: document.getElementById('paymentDate').value,
customerEmail: email,
amount,
mode: document.getElementById('mode').value,
reference: document.getElementById('reference').value || "N/A",
remarks: document.getElementById('remarks').value || ""
};

receipts.push(obj);
saveData();
clearForm();
}

/* ================= DISPLAY ================= */
function display(){

if(receipts.length===0){
tableData.innerHTML = "<p>No receipts</p>";
return;
}

let html = `<table>
<tr>
<th>#</th>
<th>Receipt</th>
<th>Date</th>
<th>Customer</th>
<th>Amount</th>
<th>Mode</th>
<th>Action</th>
</tr>`;

receipts.forEach((r,i)=>{
let cust = customers.find(c=>c.email===r.customerEmail);

html += `<tr>
<td>${i+1}</td>
<td>${r.receiptNo}</td>
<td>${r.date}</td>
<td>${cust?cust.name:r.customerEmail}</td>
<td>₹${r.amount.toFixed(2)}</td>
<td>${r.mode}</td>

<td>
<button class="btn-edit" onclick="edit(${r.id})"><i class="fas fa-edit"></i></button>
<button class="btn-delete" onclick="removeReceipt(${r.id})"><i class="fas fa-trash"></i></button>
<button class="btn-pdf" onclick="generatePDF(${r.id})"><i class="fas fa-file-pdf"></i></button>
</td>
</tr>`;
});

html += "</table>";
tableData.innerHTML = html;
}

/* ================= DELETE ================= */
function removeReceipt(id){
if(!confirm("Delete receipt?")) return;
receipts = receipts.filter(r=>r.id!==id);
saveData();
}

/* ================= EDIT ================= */
function edit(id){

let r = receipts.find(x=>x.id===id);

document.getElementById('paymentDate').value = r.date;
document.getElementById('amount').value = r.amount;
document.getElementById('reference').value = r.reference;
document.getElementById('remarks').value = r.remarks;
document.getElementById('mode').value = r.mode;
document.getElementById('customerSelect').value = r.customerEmail;

removeReceipt(id);
}

/* ================= CLEAR ================= */
function clearForm(){
document.getElementById('amount').value="";
document.getElementById('reference').value="";
document.getElementById('remarks').value="";
}

/* ================= PDF WITH LOGO ================= */
function generatePDF(id){

let p = receipts.find(r=>r.id===id);
let c = customers.find(x=>x.email===p.customerEmail);

let div = document.createElement('div');

div.innerHTML = `
<div style="width:800px; padding:20px; font-family:Arial;">

<table width="100%">
<tr>
<td align="center">

<img src="images/ASS.jpg" style="height:60px;" onerror="this.style.display='none'">

<h2 style="margin:0;">AUTO SPARES SOLUTION</h2>
GSTIN: 19ANOPD3300R1ZO<br>
101, 1st Floor, Q Road, Howrah<br>

<h3>PAYMENT RECEIPT</h3>
</td>
</tr>
</table>

<table width="100%" style="margin-top:20px;">
<tr>
<td><b>Receipt No:</b> ${p.receiptNo}</td>
<td align="right"><b>Date:</b> ${p.date}</td>
</tr>
</table>

<hr>

<table width="100%">
<tr><td colspan="2"><b>Customer Details</b></td></tr>
<tr><td width="150">Name</td><td>: ${c?c.name:''}</td></tr>
<tr><td>Email</td><td>: ${p.customerEmail}</td></tr>
<tr><td>Phone</td><td>: ${c?.phone || ''}</td></tr>
</table>

<hr>

<table width="100%">
<tr><td colspan="2"><b>Payment Details</b></td></tr>
<tr><td width="150">Amount</td><td>: ₹${p.amount.toFixed(2)}</td></tr>
<tr><td>Mode</td><td>: ${p.mode}</td></tr>
<tr><td>Reference</td><td>: ${p.reference}</td></tr>
<tr><td>Remarks</td><td>: ${p.remarks}</td></tr>
</table>

<br><br>

<table width="100%">
<tr>
<td align="center">_________________<br>Customer Signature</td>
<td align="center">_________________<br>Authorized Sign</td>
</tr>
</table>

</div>
`;

html2pdf().from(div).save(`Receipt_${p.receiptNo}.pdf`);
}

/* ================= INIT ================= */
document.getElementById('paymentDate').value =
new Date().toISOString().slice(0,10);

loadCustomers();
display();

</script>

</body>
</html>
