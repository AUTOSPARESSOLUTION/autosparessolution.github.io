<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Payment List</title>
<style>
body{font-family:Arial;padding:20px;}
table{border-collapse:collapse;width:100%;}
th,td{border:1px solid #ccc;padding:8px;text-align:left;}
button{padding:5px;margin-right:5px;}
</style>
</head>
<body>

<h2>All Payments</h2>

<button onclick="goBack()">⬅ Back</button>

<table id="paymentTable"></table>

<script>
let payments = [];

function loadPayments(){
    payments = JSON.parse(localStorage.getItem('customerPayments') || '[]');

    let html = "<tr><th>Date</th><th>Customer</th><th>Amount</th><th>Action</th></tr>";

    payments.forEach((p,index)=>{
        html += `<tr>
            <td>${p.date}</td>
            <td>${p.customerEmail}</td>
            <td>₹${p.amount}</td>
            <td>
                <button onclick="editPayment(${index})">Edit</button>
                <button onclick="deletePayment(${index})">Delete</button>
            </td>
        </tr>`;
    });

    document.getElementById('paymentTable').innerHTML = html;
}

// ===== EDIT =====
function editPayment(index){
    let p = payments[index];

    let newAmount = prompt("Edit Amount", p.amount);
    if(newAmount === null) return;

    let newDate = prompt("Edit Date (YYYY-MM-DD)", p.date);

    payments[index].amount = parseFloat(newAmount);
    payments[index].date = newDate || p.date;

    localStorage.setItem('customerPayments', JSON.stringify(payments));

    alert("Updated ✔");
    loadPayments();
}

// ===== DELETE =====
function deletePayment(index){
    if(!confirm("Delete this payment?")) return;

    payments.splice(index,1);
    localStorage.setItem('customerPayments', JSON.stringify(payments));

    alert("Deleted ✔");
    loadPayments();
}

function goBack(){
    window.location.href="payment-receipt.html";
}

loadPayments();
</script>

</body>
</html>
