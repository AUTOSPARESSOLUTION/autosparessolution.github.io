<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Receipts – Auto Spares</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
* { box-sizing: border-box; }
body { font-family: 'Roboto', sans-serif; background: #e9ecef; margin: 0; padding: 20px; }
.container { max-width: 1400px; margin: auto; background: white; border-radius: 12px; padding: 20px; }
h1 { color: #0a7c71; }

.form-section, .table-section {
    background: #f8f9fa;
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 30px;
    border: 1px solid #dee2e6;
}

.form-row { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 15px; }
.form-group { flex: 1; min-width: 180px; }

label { font-size: 12px; font-weight: 600; }

input, select, textarea {
    width: 100%;
    padding: 8px;
    border: 1px solid #ccc;
    border-radius: 6px;
}

button {
    background: #0a7c71;
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
}

.btn-edit { background: #17a2b8; }
.btn-delete { background: #dc3545; }
.btn-pdf { background: #e67e22; }

table { width: 100%; border-collapse: collapse; }
th, td { border: 1px solid #dee2e6; padding: 10px; }
th { background: #0a7c71; color: white; }
</style>
</head>

<body>

<div class="container">

<h1><i class="fas fa-receipt"></i> Payment Receipts</h1>

<!-- FORM -->
<div class="form-section">
<div class="form-row">
<div class="form-group">
<label>Customer</label>
<select id="customerSelect"></select>
</div>

<div class="form-group">
<label>Date</label>
<input type="date" id="paymentDate">
</div>

<div class="form-group">
<label>Amount</label>
<input type="number" id="amount">
</div>
</div>

<div class="form-row">
<div class="form-group">
<label>Mode</label>
<select id="mode">
<option>Cash</option>
<option>UPI</option>
<option>Bank</option>
</select>
</div>

<div class="form-group">
<label>Reference</label>
<input type="text" id="reference">
</div>

<div class="form-group">
<label>Remarks</label>
<input type="text" id="remarks">
</div>
</div>

<button onclick="addPayment()">Save</button>
</div>

<!-- TABLE -->
<div class="table-section">
<div id="tableData"></div>
</div>

</div>

<script>

let receipts = JSON.parse(localStorage.getItem('customerPayments') || '[]');
let customers = JSON.parse(localStorage.getItem('customers') || '[]');

/* ================= LOAD ================= */
function loadCustomers(){
let sel = document.getElementById('customerSelect');
sel.innerHTML = '<option value="">Select</option>';
customers.forEach(c=>{
sel.innerHTML += `<option value="${c.email}">${c.name}</option>`;
});
}

function refresh(){
localStorage.setItem('customerPayments', JSON.stringify(receipts));
display();
}

/* ================= ADD ================= */
function addPayment(){

let email = customerSelect.value;
let amount = parseFloat(amountInput());

if(!email || !amount){
alert("Fill data");
return;
}

let receiptNo = "PR-" + Date.now();

let obj = {
id: Date.now(),
receiptNo,
date: paymentDate.value,
customerEmail: email,
amount,
mode: mode.value,
reference: reference.value,
remarks: remarks.value
};

receipts.push(obj);
refresh();
}

/* ================= DISPLAY ================= */
function display(){

if(receipts.length===0){
tableData.innerHTML = "No Data";
return;
}

let html = `<table>
<tr>
<th>#</th>
<th>Receipt</th>
<th>Date</th>
<th>Customer</th>
<th>Amount</th>
<th>Action</th>
</tr>`;

receipts.forEach((r,i)=>{

let cust = customers.find(c=>c.email===r.customerEmail);

html += `<tr>
<td>${i+1}</td>
<td>${r.receiptNo}</td>
<td>${r.date}</td>
<td>${cust?cust.name:r.customerEmail}</td>
<td>₹${r.amount}</td>

<td>
<button class="btn-edit" onclick="edit(${r.id})">Edit</button>
<button class="btn-delete" onclick="del(${r.id})">Delete</button>
<button class="btn-pdf" onclick="pdf(${r.id})">PDF</button>
</td>
</tr>`;
});

html += "</table>";
tableData.innerHTML = html;
}

/* ================= DELETE ================= */
function del(id){
if(!confirm("Delete?")) return;
receipts = receipts.filter(r=>r.id!==id);
refresh();
}

/* ================= EDIT ================= */
function edit(id){

let r = receipts.find(x=>x.id===id);

paymentDate.value = r.date;
amount.value = r.amount;
reference.value = r.reference;
remarks.value = r.remarks;
mode.value = r.mode;
customerSelect.value = r.customerEmail;

del(id);
}

/* ================= PDF (FIXED EXACT FORMAT) ================= */
function pdf(id){

let p = receipts.find(r=>r.id===id);
let c = customers.find(x=>x.email===p.customerEmail);

let div = document.createElement('div');

div.innerHTML = `
<div style="font-family:Arial;padding:20px">

<h2 style="text-align:center">PAYMENT RECEIPT</h2>

<p><b>Receipt No:</b> ${p.receiptNo}</p>

<hr>

<h3>Customer</h3>
<p>Name: ${c?c.name:''}</p>
<p>Email: ${p.customerEmail}</p>

<hr>

<h3>Payment</h3>
<p>Date: ${p.date}</p>
<p>Amount: ₹${p.amount}</p>
<p>Mode: ${p.mode}</p>
<p>Ref: ${p.reference}</p>

</div>
`;

html2pdf().from(div).save("receipt.pdf");
}

/* ================= HELPERS ================= */
function amountInput(){
return document.getElementById('amount').value;
}

document.getElementById('paymentDate').value =
new Date().toISOString().slice(0,10);

/* ================= INIT ================= */
loadCustomers();
display();

</script>

</body>
</html>
