<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Receipts – Auto Spares</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background: #e9ecef; margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: auto; background: white; border-radius: 12px; padding: 20px; }
        h1 { color: #0a7c71; }
        .form-section { background: #f8f9fa; padding: 20px; border-radius: 8px; margin-bottom: 30px; }
        .form-row { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 15px; }
        .form-group { flex: 1; min-width: 180px; }
        label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 4px; }
        input, select, textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; }
        button { background: #0a7c71; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; margin-right: 10px; }
        .btn-warning { background: #ffc107; color: #333; }
        .btn-pdf { background: #e67e22; }
        .btn-edit { background: #17a2b8; }
        .btn-delete { background: #dc3545; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #dee2e6; padding: 10px; text-align: left; vertical-align: top; }
        th { background: #0a7c71; color: white; }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
        @media (max-width: 768px) { .form-row { flex-direction: column; } table { font-size: 12px; } }
    </style>
</head>
<body>
<div class="container">
    <h1><i class="fas fa-receipt"></i> Payment Receipts</h1>

    <!-- Add New Receipt Form -->
    <div class="form-section">
        <h3>Record New Payment</h3>
        <div class="form-row">
            <div class="form-group">
                <label>Customer *</label>
                <select id="customerSelect">
                    <option value="">-- Select Customer --</option>
                </select>
                <input type="email" id="customerEmailDirect" placeholder="Or enter email" style="margin-top:5px;">
            </div>
            <div class="form-group"><label>Date</label><input type="date" id="paymentDate"></div>
            <div class="form-group"><label>Amount (₹)</label><input type="number" id="amount" step="0.01"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>Mode</label><select id="mode"><option>Cash</option><option>Bank Transfer</option><option>Cheque</option><option>UPI</option></select></div>
            <div class="form-group"><label>Reference</label><input type="text" id="reference" placeholder="Optional"></div>
            <div class="form-group"><label>Remarks</label><textarea id="remarks" rows="1"></textarea></div>
        </div>
        <button onclick="addReceipt()">Save Receipt</button>
        <button class="btn-warning" onclick="clearForm()">Clear</button>
    </div>

    <!-- Receipts Table -->
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search by Receipt No, Customer..." style="flex:1;">
        <button onclick="filterReceipts()">Search</button>
        <button onclick="loadReceipts()">Refresh</button>
        <button onclick="exportToCSV()">Export CSV</button>
    </div>
    <div id="receiptsTable"></div>
    <button onclick="window.location.href='index.html'" style="margin-top:20px;">Back</button>
</div>

<script>
    let receipts = [];
    let customers = [];

    function loadReceipts() {
        receipts = JSON.parse(localStorage.getItem('customerPayments') || '[]');
        customers = JSON.parse(localStorage.getItem('customers') || '[]');
        populateCustomerDropdown();
        displayReceipts();
    }

    function populateCustomerDropdown() {
        const select = document.getElementById('customerSelect');
        select.innerHTML = '<option value="">-- Select Customer --</option>';
        customers.forEach(c => {
            select.innerHTML += `<option value="${c.email}">${c.name} (${c.email})</option>`;
        });
    }

    function getFinancialYear() {
        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth() + 1;
        return (month >= 4) ? `${year}-${(year+1).toString().slice(-2)}` : `${year-1}-${year.toString().slice(-2)}`;
    }

    function getNextReceiptNumber() {
        const finYear = getFinancialYear();
        let maxNum = 0;
        const prefix = `PR/${finYear}/`;
        receipts.forEach(r => {
            if (r.receiptNo && r.receiptNo.startsWith(prefix)) {
                const num = parseInt(r.receiptNo.split('/').pop());
                if (!isNaN(num) && num > maxNum) maxNum = num;
            }
        });
        return prefix + (maxNum + 1).toString().padStart(4, '0');
    }

    function addReceipt() {
        let email = document.getElementById('customerSelect').value;
        if (!email) email = document.getElementById('customerEmailDirect').value.trim();
        if (!email) { alert('Select or enter customer email'); return; }
        const amount = parseFloat(document.getElementById('amount').value);
        if (isNaN(amount) || amount <= 0) { alert('Valid amount required'); return; }
        let customer = customers.find(c => c.email === email);
        if (!customer) {
            alert('Customer not found. Please add in Customer Master first.');
            return;
        }
        const receiptNo = getNextReceiptNumber();
        const payment = {
            id: Date.now(),
            receiptNo: receiptNo,
            date: document.getElementById('paymentDate').value || new Date().toISOString().slice(0,10),
            customerEmail: email,
            amount: amount,
            reference: document.getElementById('reference').value.trim() || 'N/A',
            mode: document.getElementById('mode').value,
            remarks: document.getElementById('remarks').value
        };
        // Update customer outstanding
        customer.outstanding = (customer.outstanding || 0) - amount;
        if (customer.outstanding < 0) customer.outstanding = 0;
        localStorage.setItem('customers', JSON.stringify(customers));
        receipts.push(payment);
        localStorage.setItem('customerPayments', JSON.stringify(receipts));
        // Add to ledger
        let ledger = JSON.parse(localStorage.getItem('customerLedger') || '[]');
        ledger.push({
            id: Date.now(),
            customerEmail: email,
            date: payment.date,
            type: 'payment',
            ref: receiptNo,
            debit: 0,
            credit: amount,
            balance: customer.outstanding,
            narration: payment.remarks || 'Payment received'
        });
        localStorage.setItem('customerLedger', JSON.stringify(ledger));
        alert(`Receipt ${receiptNo} saved!`);
        clearForm();
        loadReceipts();
    }

    function clearForm() {
        document.getElementById('customerSelect').value = '';
        document.getElementById('customerEmailDirect').value = '';
        document.getElementById('amount').value = '';
        document.getElementById('reference').value = '';
        document.getElementById('remarks').value = '';
        document.getElementById('paymentDate').value = new Date().toISOString().slice(0,10);
    }

    function displayReceipts(filter = '') {
        let filtered = receipts;
        if (filter) {
            const term = filter.toLowerCase();
            filtered = receipts.filter(r => {
                const cust = customers.find(c => c.email === r.customerEmail);
                return r.receiptNo.toLowerCase().includes(term) ||
                       (cust && (cust.name.toLowerCase().includes(term))) ||
                       (r.reference && r.reference.toLowerCase().includes(term));
            });
        }
        if (filtered.length === 0) {
            document.getElementById('receiptsTable').innerHTML = '<p>No receipts found. Add one above.</p>';
            return;
        }
        filtered.sort((a,b) => b.receiptNo.localeCompare(a.receiptNo));
        let html = '<table><thead>
            <th>#</th><th>Receipt No</th><th>Date</th><th>Customer</th><th>Amount (₹)</th><th>Mode</th><th>Reference</th><th>Actions</th>
        </tr></thead><tbody>';
        filtered.forEach((r, idx) => {
            const cust = customers.find(c => c.email === r.customerEmail);
            const customerName = cust ? cust.name : r.customerEmail;
            html += `<tr>
                <td>${idx+1}</td>
                <td><strong>${escapeHtml(r.receiptNo)}</strong></td>
                <td>${r.date}</td>
                <td>${escapeHtml(customerName)}</strong></td>
                <td>₹${r.amount.toFixed(2)}</strong></td>
                <td>${r.mode || 'Cash'}</td>
                <td>${escapeHtml(r.reference || '-')}</td>
                <td>
                    <button class="btn-pdf" onclick="generatePDF('${r.id}')"><i class="fas fa-file-pdf"></i> PDF</button>
                    <button class="btn-edit" onclick="editReceipt('${r.id}')"><i class="fas fa-edit"></i> Edit</button>
                    <button class="btn-delete" onclick="deleteReceipt('${r.id}')"><i class="fas fa-trash"></i> Delete</button>
                 </strong></td>
            </tr>`;
        });
        html += '</tbody></td>';
        document.getElementById('receiptsTable').innerHTML = html;
    }

    function generatePDF(paymentId) {
        const payment = receipts.find(p => p.id == paymentId);
        if (!payment) return;
        const customer = customers.find(c => c.email === payment.customerEmail);
        if (!customer) return;
        const div = document.createElement('div');
        div.style.padding = '20px';
        div.style.fontFamily = 'Roboto, sans-serif';
        div.innerHTML = `
            <div style="text-align:center;"><h2>Auto Spares Solution</h2><p>GSTIN: 19ANOPD3300R1ZO</p></div>
            <h3>Payment Receipt</h3>
            <p>Receipt No: ${payment.receiptNo}<br>Date: ${payment.date}<br>Customer: ${customer.name}<br>Amount: ₹${payment.amount.toFixed(2)}<br>Mode: ${payment.mode}<br>Ref: ${payment.reference}<br>Remarks: ${payment.remarks}</p>
        `;
        html2pdf().set({ margin: 0.2, filename: `Receipt_${payment.receiptNo}.pdf` }).from(div).save();
    }

    function editReceipt(id) {
        localStorage.setItem('editPaymentId', id);
        window.open('edit-payment-receipt.html', '_blank');
    }

    function deleteReceipt(id) {
        if (!confirm('Delete this receipt? Outstanding will be restored.')) return;
        const payment = receipts.find(p => p.id == id);
        if (!payment) return;
        let customer = customers.find(c => c.email === payment.customerEmail);
        if (customer) {
            customer.outstanding = (customer.outstanding || 0) + payment.amount;
            localStorage.setItem('customers', JSON.stringify(customers));
        }
        receipts = receipts.filter(p => p.id != id);
        localStorage.setItem('customerPayments', JSON.stringify(receipts));
        // Remove from ledger
        let ledger = JSON.parse(localStorage.getItem('customerLedger') || '[]');
        ledger = ledger.filter(l => l.ref !== payment.receiptNo || l.type !== 'payment');
        localStorage.setItem('customerLedger', JSON.stringify(ledger));
        alert('Receipt deleted');
        loadReceipts();
    }

    function filterReceipts() { displayReceipts(document.getElementById('searchInput').value.toLowerCase()); }
    function exportToCSV() {
        let csv = "Receipt No,Date,Customer Email,Amount,Mode,Reference,Remarks\n";
        receipts.forEach(r => {
            csv += `"${r.receiptNo}",${r.date},"${r.customerEmail}",${r.amount},"${r.mode}","${r.reference}","${r.remarks}"\n`;
        });
        const blob = new Blob([csv], {type:'text/csv'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'receipts.csv'; a.click();
    }
    function escapeHtml(s) { return s.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }

    document.getElementById('paymentDate').value = new Date().toISOString().slice(0,10);
    loadReceipts();
</script>
</body>
</html>
