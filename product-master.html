<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Master – Auto Spares</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="data-manager.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background: #e9ecef; margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: auto; background: white; border-radius: 12px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1, h2 { color: #0a7c71; }
        .form-section { background: #f8f9fa; padding: 20px; border-radius: 8px; margin-bottom: 30px; }
        .form-row { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 15px; }
        .form-group { flex: 1; min-width: 180px; }
        label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 4px; }
        input, select, textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; }
        button { background: #0a7c71; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; margin-right: 10px; }
        button:hover { background: #09645a; }
        .btn-warning { background: #ffc107; color: #333; }
        .btn-warning:hover { background: #e0a800; }
        .btn-danger { background: #dc3545; }
        .btn-danger:hover { background: #c82333; }
        .search-box { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #dee2e6; padding: 10px; text-align: left; vertical-align: top; }
        th { background: #0a7c71; color: white; }
        .low-stock { background-color: #fff3cd; }
        .action-buttons { display: flex; gap: 5px; flex-wrap: wrap; }
        @media (max-width: 768px) { .form-row { flex-direction: column; } table { font-size: 12px; } }
    </style>
</head>
<body>
<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h1>Product Master</h1>
        <div>
            <button onclick="importFromCSV()" style="background:#28a745;"><i class="fas fa-file-csv"></i> Import CSV</button>
            <a href="dashboard.html" style="background:#6c757d; color:white; padding:8px 16px; border-radius:6px; text-decoration:none;">Dashboard</a>
        </div>
    </div>

    <!-- Add/Edit Product Form -->
    <div class="form-section">
        <h2 id="formTitle">Add New Product</h2>
        <div class="form-row">
            <div class="form-group"><label>Product Name *</label><input type="text" id="prodName"></div>
            <div class="form-group"><label>SKU / Part No *</label><input type="text" id="prodSku"></div>
            <div class="form-group"><label>Brand</label><input type="text" id="prodBrand"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>Make</label><input type="text" id="prodMake"></div>
            <div class="form-group"><label>Line Code</label><input type="number" id="prodLineCode"></div>
            <div class="form-group"><label>Group</label><input type="text" id="prodGroup"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>HSN</label><input type="text" id="prodHsn"></div>
            <div class="form-group"><label>Unit</label><input type="text" id="prodUnit" value="pc"></div>
            <div class="form-group"><label>Selling Price (₹)</label><input type="number" id="prodPrice" step="0.01" value="0"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>Current Stock</label><input type="number" id="prodStock" step="1" value="0"></div>
            <div class="form-group"><label>Reorder Level</label><input type="number" id="prodReorder" step="1" value="10"></div>
            <div class="form-group"><label>Cost Price (optional)</label><input type="number" id="prodCost" step="0.01" value="0"></div>
        </div>
        <div class="form-row">
            <button onclick="saveProduct()">💾 Save</button>
            <button class="btn-warning" onclick="clearForm()">Clear</button>
            <button id="cancelEditBtn" class="btn-danger" style="display:none;" onclick="cancelEdit()">Cancel</button>
        </div>
    </div>

    <!-- Search & Table -->
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search by name, SKU, brand, make, group...">
        <button onclick="searchProducts()">🔍 Search</button>
        <button onclick="loadProducts()">🔄 Refresh</button>
        <button onclick="exportToCSV()">📄 Export CSV</button>
    </div>
    <div id="productsTable"></div>
    <button onclick="window.location.href='index.html'" style="margin-top:20px;">Back</button>
</div>

<script>
    let products = [];
    let editId = null;

    function loadProducts() {
        products = getProducts();
        displayProducts();
    }

    function displayProducts() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        let filtered = products;
        if (term) {
            filtered = products.filter(p =>
                (p.name && p.name.toLowerCase().includes(term)) ||
                (p.sku && p.sku.toLowerCase().includes(term)) ||
                (p.brand && p.brand.toLowerCase().includes(term)) ||
                (p.make && p.make.toLowerCase().includes(term)) ||
                (p.group && p.group.toLowerCase().includes(term)) ||
                (p.lineCode && p.lineCode.toString().includes(term))
            );
        }
        if (filtered.length === 0) {
            document.getElementById('productsTable').innerHTML = '<p>No products found. Click "Import CSV" to load from prices.csv.</p>';
            return;
        }
        let html = '</td><thead>
            <th>SKU</th><th>Name</th><th>Brand</th><th>Make</th><th>Line Code</th><th>Group</th><th>HSN</th><th>Unit</th><th>Price</th><th>Stock</th><th>Status</th><th>Actions</th>
        </tr></thead><tbody>';
        filtered.forEach(p => {
            const low = (p.currentStock || 0) <= (p.reorderLevel || 0);
            html += `<tr class="${low ? 'low-stock' : ''}">
                <td>${escapeHtml(p.sku)}</strong></td>
                <td><strong>${escapeHtml(p.name)}</strong></td>
                <td>${escapeHtml(p.brand || '-')}</td>
                <td>${escapeHtml(p.make || '-')}</td>
                <td>${p.lineCode || '-'}</td>
                <td>${escapeHtml(p.group || '-')}</td>
                <td>${escapeHtml(p.hsn || '-')}</td>
                <td>${escapeHtml(p.unit || 'pc')}</td>
                <td>₹${(p.price || 0).toLocaleString()}</td>
                <td>${(p.currentStock || 0).toLocaleString()}</td>
                <td>${low ? '⚠️ Low' : 'OK'}</td>
                <td class="action-buttons">
                    <button onclick="editProduct('${p.id}')" style="background:#17a2b8;">✏️ Edit</button>
                    <button onclick="deleteProduct('${p.id}')" class="btn-danger">🗑️ Delete</button>
                </strong></td>
            <table>`;
        });
        html += '</tbody><table>';
        document.getElementById('productsTable').innerHTML = html;
    }

    function saveProduct() {
        const name = document.getElementById('prodName').value.trim();
        const sku = document.getElementById('prodSku').value.trim();
        if (!name || !sku) { alert('Product Name and SKU required'); return; }
        const productData = {
            id: editId || Date.now(),
            name: name,
            sku: sku,
            brand: document.getElementById('prodBrand').value.trim(),
            make: document.getElementById('prodMake').value.trim(),
            lineCode: document.getElementById('prodLineCode').value ? parseInt(document.getElementById('prodLineCode').value) : null,
            group: document.getElementById('prodGroup').value.trim(),
            hsn: document.getElementById('prodHsn').value.trim(),
            unit: document.getElementById('prodUnit').value,
            price: parseFloat(document.getElementById('prodPrice').value) || 0,
            currentStock: parseInt(document.getElementById('prodStock').value) || 0,
            reorderLevel: parseInt(document.getElementById('prodReorder').value) || 0,
            costPrice: parseFloat(document.getElementById('prodCost').value) || 0,
            updatedAt: new Date().toISOString()
        };
        if (editId === null) {
            productData.createdAt = new Date().toISOString();
            products.push(productData);
        } else {
            const idx = products.findIndex(p => p.id == editId);
            productData.createdAt = products[idx].createdAt;
            products[idx] = productData;
        }
        saveProducts(products);
        alert('Product saved');
        clearForm();
        loadProducts();
    }

    function editProduct(id) {
        const p = products.find(p => p.id == id);
        if (!p) return;
        editId = id;
        document.getElementById('formTitle').innerHTML = 'Edit Product';
        document.getElementById('prodName').value = p.name;
        document.getElementById('prodSku').value = p.sku;
        document.getElementById('prodBrand').value = p.brand || '';
        document.getElementById('prodMake').value = p.make || '';
        document.getElementById('prodLineCode').value = p.lineCode || '';
        document.getElementById('prodGroup').value = p.group || '';
        document.getElementById('prodHsn').value = p.hsn || '';
        document.getElementById('prodUnit').value = p.unit || 'pc';
        document.getElementById('prodPrice').value = p.price || 0;
        document.getElementById('prodStock').value = p.currentStock || 0;
        document.getElementById('prodReorder').value = p.reorderLevel || 0;
        document.getElementById('prodCost').value = p.costPrice || 0;
        document.getElementById('cancelEditBtn').style.display = 'inline-block';
    }

    function deleteProduct(id) {
        if (!confirm('Delete this product? It may affect invoices.')) return;
        products = products.filter(p => p.id != id);
        saveProducts(products);
        loadProducts();
    }

    function clearForm() {
        editId = null;
        document.getElementById('formTitle').innerHTML = 'Add New Product';
        document.getElementById('prodName').value = '';
        document.getElementById('prodSku').value = '';
        document.getElementById('prodBrand').value = '';
        document.getElementById('prodMake').value = '';
        document.getElementById('prodLineCode').value = '';
        document.getElementById('prodGroup').value = '';
        document.getElementById('prodHsn').value = '';
        document.getElementById('prodUnit').value = 'pc';
        document.getElementById('prodPrice').value = '0';
        document.getElementById('prodStock').value = '0';
        document.getElementById('prodReorder').value = '10';
        document.getElementById('prodCost').value = '0';
        document.getElementById('cancelEditBtn').style.display = 'none';
    }
    function cancelEdit() { clearForm(); }
    function searchProducts() { displayProducts(); }

    async function importFromCSV() {
        try {
            const res = await fetch('prices.csv');
            const csv = await res.text();
            const lines = csv.split('\n');
            const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
            const partIdx = headers.indexOf('part');
            const descIdx = headers.indexOf('desc') !== -1 ? headers.indexOf('desc') : headers.indexOf('description');
            const brandIdx = headers.indexOf('brand');
            const makeIdx = headers.indexOf('make');
            const hsnIdx = headers.indexOf('hsn');
            const priceIdx = headers.indexOf('price');
            const stockIdx = headers.indexOf('stock');
            let imported = 0;
            let prods = getProducts();
            for (let i = 1; i < lines.length; i++) {
                const cols = lines[i].split(',');
                const part = cols[partIdx]?.trim();
                if (!part) continue;
                if (!prods.find(p => p.sku === part)) {
                    prods.push({
                        id: Date.now() + Math.random(),
                        name: descIdx !== -1 ? cols[descIdx]?.trim() || part : part,
                        sku: part,
                        brand: brandIdx !== -1 ? cols[brandIdx]?.trim() : '',
                        make: makeIdx !== -1 ? cols[makeIdx]?.trim() : '',
                        lineCode: null,
                        group: '',
                        hsn: hsnIdx !== -1 ? cols[hsnIdx]?.trim() : '',
                        unit: 'pc',
                        price: priceIdx !== -1 ? parseFloat(cols[priceIdx]) || 0 : 0,
                        currentStock: stockIdx !== -1 ? parseInt(cols[stockIdx]) || 0 : 0,
                        reorderLevel: 10,
                        costPrice: 0,
                        createdAt: new Date().toISOString()
                    });
                    imported++;
                }
            }
            if (imported) {
                saveProducts(prods);
                alert(`${imported} products imported.`);
                loadProducts();
            } else {
                alert('No new products found. They may already exist.');
            }
        } catch(e) {
            alert('Error importing CSV: ' + e.message);
        }
    }

    function exportToCSV() {
        let csv = "SKU,Name,Brand,Make,Line Code,Group,HSN,Unit,Price,Stock,Reorder Level\n";
        products.forEach(p => {
            csv += `"${p.sku}","${p.name}","${p.brand || ''}","${p.make || ''}","${p.lineCode || ''}","${p.group || ''}","${p.hsn || ''}","${p.unit || 'pc'}",${p.price || 0},${p.currentStock || 0},${p.reorderLevel || 0}\n`;
        });
        const blob = new Blob([csv], {type:'text/csv'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'products.csv'; a.click(); URL.revokeObjectURL(blob);
    }

    function escapeHtml(s) { if (!s) return ''; return s.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
    loadProducts();
</script>
</body>
    </html>
