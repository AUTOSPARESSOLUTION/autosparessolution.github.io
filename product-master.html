<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Master – Auto Spares</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="data-manager.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background: #e9ecef; margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: auto; background: white; border-radius: 12px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1, h2 { color: #0a7c71; }
        .form-section { background: #f8f9fa; padding: 20px; border-radius: 8px; margin-bottom: 30px; }
        .form-row { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 15px; }
        .form-group { flex: 1; min-width: 180px; }
        label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 4px; color: #555; }
        input, select, textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; }
        button { background: #0a7c71; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; margin-right: 10px; }
        button:hover { background: #09645a; }
        .btn-warning { background: #ffc107; color: #333; }
        .btn-warning:hover { background: #e0a800; }
        .btn-danger { background: #dc3545; }
        .btn-danger:hover { background: #c82333; }
        .btn-secondary { background: #6c757d; }
        .search-box { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; align-items: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #dee2e6; padding: 10px; text-align: left; vertical-align: top; }
        th { background: #0a7c71; color: white; }
        .low-stock { background-color: #fff3cd; }
        .action-buttons { display: flex; gap: 5px; flex-wrap: wrap; }
        .computed-stock { font-weight: normal; color: #0a7c71; font-size: 0.9em; }
        .sync-note { margin-left: 15px; font-size: 0.85em; color: #666; }
        @media (max-width: 768px) { .form-row { flex-direction: column; } table { font-size: 12px; } }
    </style>
</head>
<body>
<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h1>Product Master</h1>
        <div>
            <a href="dashboard.html" style="background: #6c757d; color: white; padding: 8px 16px; border-radius: 6px; text-decoration: none;">Dashboard</a>
            <button onclick="syncStockFromLedger()" style="background: #17a2b8;"><i class="fas fa-sync-alt"></i> Sync Stock from Ledger</button>
            <button onclick="importFromCSV()" style="background: #28a745;"><i class="fas fa-file-csv"></i> Import CSV</button>
            <a href="invoice-stock.html" style="background: #0a7c71; color: white; padding: 8px 16px; border-radius: 6px; text-decoration: none;">+ New Invoice</a>
        </div>
    </div>

    <!-- Add/Edit Product Form -->
    <div class="form-section">
        <h2 id="formTitle">Add New Product</h2>
        <div class="form-row">
            <div class="form-group"><label>Product Name *</label><input type="text" id="prodName" placeholder="e.g., Brake Pad"></div>
            <div class="form-group"><label>SKU / Part No *</label><input type="text" id="prodSku" placeholder="Unique code"></div>
            <div class="form-group"><label>Unit</label><input type="text" id="prodUnit" value="pc"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>Selling Price (₹)</label><input type="number" id="prodPrice" step="0.01" value="0"></div>
            <div class="form-group"><label>Current Stock (Stored)</label><input type="number" id="prodStock" step="1" value="0"></div>
            <div class="form-group"><label>Reorder Level</label><input type="number" id="prodReorder" step="1" value="10"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>HSN / SAC</label><input type="text" id="prodHsn" placeholder="HSN code"></div>
            <div class="form-group"><label>Cost Price (optional)</label><input type="number" id="prodCost" step="0.01" value="0"></div>
            <div class="form-group"><label>Computed Stock (from ledger)</label><input type="text" id="computedStockDisplay" readonly style="background:#e9ecef;"></div>
        </div>
        <div class="form-row">
            <button onclick="saveProduct()">💾 Save Product</button>
            <button class="btn-warning" onclick="clearForm()">Clear</button>
            <button id="cancelEditBtn" class="btn-danger" style="display:none;" onclick="cancelEdit()">Cancel Edit</button>
        </div>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search by name, SKU...">
        <button onclick="searchProducts()">🔍 Search</button>
        <button onclick="loadProducts()">🔄 Refresh</button>
        <button onclick="exportToCSV()">📄 Export CSV</button>
    </div>
    <div id="productsTable"></div>
</div>

<script>
    let products = [];
    let editId = null;
    let computedStockMap = new Map(); // store computed stock for each product ID

    // Compute current stock for all products from transactions (same as inventory.html)
    function computeStockFromTransactions() {
        let productsList = getProducts();
        productsList.forEach(p => {
            if (p.id !== undefined) p.id = String(p.id);
            if (p.sku !== undefined) p.sku = String(p.sku);
        });
        let stockMap = new Map();
        
        // Purchase invoices (IN)
        const purchaseInvoices = JSON.parse(localStorage.getItem('purchaseInvoices') || '[]');
        purchaseInvoices.forEach(inv => {
            (inv.items || []).forEach(item => {
                let productId = item.productId || item.part;
                if (!productId) return;
                productId = String(productId);
                const qty = parseFloat(item.quantity) || 0;
                if (qty === 0) return;
                const current = stockMap.get(productId) || 0;
                stockMap.set(productId, current + qty);
            });
        });
        
        // Sales invoices (OUT)
        const allInvoices = JSON.parse(localStorage.getItem('allInvoices') || '[]');
        allInvoices.forEach(inv => {
            (inv.items || []).forEach(item => {
                let productId = item.part || item.productId;
                if (!productId) return;
                productId = String(productId);
                const qty = parseFloat(item.qty) || 0;
                if (qty === 0) return;
                const current = stockMap.get(productId) || 0;
                stockMap.set(productId, current - qty);
            });
        });
        
        // Adjustments (from inventoryTransactions)
        const transactions = getInventoryTransactions();
        transactions.forEach(t => {
            if (t.type === 'adjustment') {
                let productId = String(t.productId);
                let qty = parseFloat(t.quantity) || 0;
                const current = stockMap.get(productId) || 0;
                stockMap.set(productId, current + qty);
            }
        });
        
        // Also include products that have no transactions (use product.currentStock as fallback)
        productsList.forEach(p => {
            let idKey = p.id;
            let skuKey = p.sku;
            let computed = stockMap.get(idKey);
            if (computed === undefined && skuKey) computed = stockMap.get(skuKey);
            if (computed === undefined) computed = p.currentStock || 0;
            computedStockMap.set(p.id, computed);
        });
        return computedStockMap;
    }

    // Update product master's currentStock to match computed stock
    function syncStockFromLedger() {
        computeStockFromTransactions();
        let productsList = getProducts();
        let updated = 0;
        for (let p of productsList) {
            let computed = computedStockMap.get(p.id);
            if (computed !== undefined && p.currentStock !== computed) {
                p.currentStock = computed;
                updated++;
            }
        }
        if (updated > 0) {
            saveProducts(productsList);
            alert(`Stock synchronized for ${updated} product(s).`);
            loadProducts();
        } else {
            alert('All products already have correct stock.');
        }
    }

    function refreshProducts() {
        products = getProducts();
        computeStockFromTransactions(); // updates computedStockMap
        return products;
    }

    function loadProducts() {
        refreshProducts();
        displayProducts();
    }

    function getComputedStock(productId) {
        return computedStockMap.get(String(productId)) || 0;
    }

    function displayProducts() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        let filtered = products;
        if (searchTerm) {
            filtered = products.filter(p => 
                p.name?.toLowerCase().includes(searchTerm) ||
                p.sku?.toLowerCase().includes(searchTerm) ||
                (p.hsn && p.hsn.toLowerCase().includes(searchTerm))
            );
        }
        if (filtered.length === 0) {
            document.getElementById('productsTable').innerHTML = '<p>No products found. Click "Import CSV" to load from prices.csv.</p>';
            return;
        }
        let html = `<table>
            <thead>
                <tr>
                    <th>SKU</th>
                    <th>Name</th>
                    <th>HSN</th>
                    <th>Unit</th>
                    <th>Price</th>
                    <th>Stored Stock</th>
                    <th>Computed Stock</th>
                    <th>Reorder</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>`;
        filtered.forEach(p => {
            const storedStock = p.currentStock || 0;
            const computed = getComputedStock(p.id);
            const lowStock = (computed <= (p.reorderLevel || 0));
            const productId = String(p.id);
            html += `<tr class="${lowStock ? 'low-stock' : ''}">
                <td>${escapeHtml(p.sku)}</strong></td>
                <td><strong>${escapeHtml(p.name)}</strong></td>
                <td>${escapeHtml(p.hsn || '')}</strong></td>
                <td>${escapeHtml(p.unit || 'pc')}</strong></td>
                <td>₹${(p.price || 0).toLocaleString()}</strong></td>
                <td>${storedStock.toLocaleString()}</strong> <span class="computed-stock">(stored)</span></td>
                <td>${computed.toLocaleString()}</strong> <span class="computed-stock">(actual)</span></td>
                <td>${(p.reorderLevel || 0)}</strong></td>
                <td>${lowStock ? '⚠️ Low Stock' : 'OK'}</strong></td>
                <td class="action-buttons">
                    <button onclick="editProduct('${productId}')" style="background:#17a2b8;">✏️ Edit</button>
                    <button onclick="deleteProduct('${productId}')" class="btn-danger">🗑️ Delete</button>
                </strong></td>
            </tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('productsTable').innerHTML = html;
    }

    function saveProduct() {
        const name = document.getElementById('prodName').value.trim();
        const sku = document.getElementById('prodSku').value.trim();
        if (!name || !sku) { alert('Product Name and SKU are required'); return; }

        refreshProducts();

        const existing = products.find(p => p.sku === sku && (editId === null || p.id !== editId));
        if (existing) {
            alert(`Product with SKU "${sku}" already exists. Please use a unique SKU.`);
            return;
        }

        const productData = {
            id: sku,   // Use SKU as ID for consistency
            name: name,
            sku: sku,
            hsn: document.getElementById('prodHsn').value.trim(),
            unit: document.getElementById('prodUnit').value,
            price: parseFloat(document.getElementById('prodPrice').value) || 0,
            currentStock: parseInt(document.getElementById('prodStock').value) || 0,
            reorderLevel: parseInt(document.getElementById('prodReorder').value) || 0,
            costPrice: parseFloat(document.getElementById('prodCost').value) || 0,
            updatedAt: new Date().toISOString()
        };

        if (editId === null) {
            productData.createdAt = new Date().toISOString();
            products.push(productData);
        } else {
            const index = products.findIndex(p => p.id === editId);
            if (index !== -1) {
                productData.createdAt = products[index].createdAt;
                products[index] = productData;
            } else {
                productData.createdAt = new Date().toISOString();
                products.push(productData);
            }
        }
        saveProducts(products);
        alert('Product saved!');
        clearForm();
        loadProducts();
    }

    function editProduct(id) {
        refreshProducts();
        const product = products.find(p => p.id === id);
        if (!product) return;
        editId = id;
        document.getElementById('formTitle').innerHTML = 'Edit Product';
        document.getElementById('prodName').value = product.name;
        document.getElementById('prodSku').value = product.sku;
        document.getElementById('prodHsn').value = product.hsn || '';
        document.getElementById('prodUnit').value = product.unit || 'pc';
        document.getElementById('prodPrice').value = product.price || 0;
        document.getElementById('prodStock').value = product.currentStock || 0;
        document.getElementById('prodReorder').value = product.reorderLevel || 0;
        document.getElementById('prodCost').value = product.costPrice || 0;
        // Show computed stock
        const computed = getComputedStock(id);
        document.getElementById('computedStockDisplay').value = computed;
        document.getElementById('cancelEditBtn').style.display = 'inline-block';
    }

    function deleteProduct(id) {
        if (!confirm('Delete this product? This may affect existing invoices.')) return;
        refreshProducts();
        const newProducts = products.filter(p => p.id !== id);
        if (newProducts.length === products.length) {
            alert('Product not found.');
            loadProducts();
            return;
        }
        saveProducts(newProducts);
        products = newProducts;
        displayProducts();
        if (editId === id) clearForm();
    }

    function clearForm() {
        editId = null;
        document.getElementById('formTitle').innerHTML = 'Add New Product';
        document.getElementById('prodName').value = '';
        document.getElementById('prodSku').value = '';
        document.getElementById('prodHsn').value = '';
        document.getElementById('prodUnit').value = 'pc';
        document.getElementById('prodPrice').value = '0';
        document.getElementById('prodStock').value = '0';
        document.getElementById('prodReorder').value = '10';
        document.getElementById('prodCost').value = '0';
        document.getElementById('computedStockDisplay').value = '';
        document.getElementById('cancelEditBtn').style.display = 'none';
    }

    function cancelEdit() { clearForm(); }
    function searchProducts() { displayProducts(); }

    async function importFromCSV() {
        try {
            const response = await fetch('prices.csv');
            const csvText = await response.text();
            const lines = csvText.split('\n');
            const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
            const partIdx = headers.indexOf('part');
            const descIdx = headers.indexOf('desc') !== -1 ? headers.indexOf('desc') : headers.indexOf('description');
            const hsnIdx = headers.indexOf('hsn') !== -1 ? headers.indexOf('hsn') : null;
            const priceIdx = headers.indexOf('price') !== -1 ? headers.indexOf('price') : headers.indexOf('sellingprice');
            const stockIdx = headers.indexOf('stock') !== -1 ? headers.indexOf('stock') : null;
            let imported = 0;
            let products = getProducts();
            for (let i = 1; i < lines.length; i++) {
                const cols = lines[i].split(',');
                if (cols.length < 2) continue;
                const part = cols[partIdx]?.trim();
                if (!part) continue;
                const name = descIdx !== -1 ? cols[descIdx]?.trim() || part : part;
                const hsn = hsnIdx !== -1 ? cols[hsnIdx]?.trim() : '';
                const price = priceIdx !== -1 ? parseFloat(cols[priceIdx]) || 0 : 0;
                const stock = stockIdx !== -1 ? parseInt(cols[stockIdx]) || 0 : 0;
                if (!products.find(p => p.sku === part)) {
                    products.push({
                        id: part,
                        name: name,
                        sku: part,
                        hsn: hsn,
                        unit: 'pc',
                        price: price,
                        currentStock: stock,
                        reorderLevel: 10,
                        costPrice: 0,
                        createdAt: new Date().toISOString()
                    });
                    imported++;
                }
            }
            if (imported > 0) {
                saveProducts(products);
                alert(`${imported} products imported from CSV.`);
                loadProducts();
            } else {
                alert('No new products found in CSV (all already exist).');
            }
        } catch (err) {
            alert('Error importing CSV: ' + err.message);
        }
    }

    function exportToCSV() {
        refreshProducts();
        let csv = "SKU,Name,HSN,Unit,Price,Current Stock (Stored),Computed Stock (Actual),Reorder Level\n";
        products.forEach(p => {
            const computed = getComputedStock(p.id);
            csv += `"${p.sku}","${p.name}","${p.hsn || ''}","${p.unit || 'pc'}",${p.price || 0},${p.currentStock || 0},${computed},${p.reorderLevel || 0}\n`;
        });
        const blob = new Blob([csv], {type: 'text/csv'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'products.csv';
        a.click();
        URL.revokeObjectURL(url);
    }

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }

    loadProducts();
</script>
</body>
</html>
