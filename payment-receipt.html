<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Payment Entry</title>
<style>
body{font-family:Arial;padding:20px;}
input,button{padding:8px;margin:5px;}
</style>
</head>
<body>

<h2>Payment Entry</h2>

<input type="text" id="email" placeholder="Customer Email"><br>
<input type="number" id="amount" placeholder="Amount"><br>

<button onclick="savePayment()">Save Payment</button>
<button onclick="goList()">Manage Payments</button>

<script>
function savePayment(){
    const email = document.getElementById('email').value;
    const amount = parseFloat(document.getElementById('amount').value);

    if(!email || !amount){
        alert("Enter valid data");
        return;
    }

    let payments = JSON.parse(localStorage.getItem('customerPayments')||'[]');

    payments.push({
        id: Date.now(),
        date: new Date().toISOString().slice(0,10),
        customerEmail: email,
        amount: amount
    });

    localStorage.setItem('customerPayments', JSON.stringify(payments));

    alert("Payment Saved ✔");

    document.getElementById('email').value="";
    document.getElementById('amount').value="";
}

function goList(){
    window.location.href="payment-list.html";
}
</script>

</body>
</html>
