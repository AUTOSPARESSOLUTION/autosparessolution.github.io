<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Receipt – Customer</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background: #e9ecef; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; border-radius: 12px; padding: 20px; }
        h1 { color: #0a7c71; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; }
        button { background: #0a7c71; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
        .info { background: #e9ecef; padding: 10px; border-radius: 6px; margin: 15px 0; }
    </style>
    <script src="data-manager.js"></script>
</head>
<body>
<div class="container">
    <h1>Customer Payment Receipt</h1>
    <div class="form-group">
        <label>Customer *</label>
        <select id="customerEmail"><option value="">-- Select Customer --</option></select>
    </div>
    <div class="form-group">
        <label>Payment Date</label>
        <input type="date" id="paymentDate">
    </div>
    <div class="form-group">
        <label>Amount (₹) *</label>
        <input type="number" id="amount" step="0.01">
    </div>
    <div class="form-group">
        <label>Reference / Cheque No.</label>
        <input type="text" id="reference">
    </div>
    <div class="form-group">
        <label>Payment Mode</label>
        <select id="mode"><option value="cash">Cash</option><option value="bank">Bank Transfer</option><option value="cheque">Cheque</option></select>
    </div>
    <div id="customerInfo" class="info">Select a customer to see outstanding.</div>
    <button onclick="recordPayment()">💾 Record Payment</button>
    <button onclick="window.location.href='customer-master.html'">Cancel</button>
</div>
<script>
    let customers = [];
    function loadCustomers() {
        customers = JSON.parse(localStorage.getItem('customers') || '[]');
        const select = document.getElementById('customerEmail');
        select.innerHTML = '<option value="">-- Select Customer --</option>';
        customers.forEach(c => {
            select.innerHTML += `<option value="${c.email}" data-outstanding="${c.outstanding || 0}">${c.name} (${c.email}) - Outstanding: ₹${(c.outstanding || 0).toLocaleString()}</option>`;
        });
        document.getElementById('paymentDate').value = new Date().toISOString().slice(0,10);
        select.addEventListener('change', updateCustomerInfo);
    }
    function updateCustomerInfo() {
        const select = document.getElementById('customerEmail');
        const selectedOption = select.options[select.selectedIndex];
        const outstanding = parseFloat(selectedOption.dataset.outstanding) || 0;
        document.getElementById('customerInfo').innerHTML = `Current Outstanding: <strong>₹${outstanding.toLocaleString()}</strong>`;
    }
    function recordPayment() {
        const customerEmail = document.getElementById('customerEmail').value;
        if (!customerEmail) { alert('Select a customer'); return; }
        const amount = parseFloat(document.getElementById('amount').value);
        if (isNaN(amount) || amount <= 0) { alert('Enter valid amount'); return; }
        const payment = {
            id: Date.now(),
            date: document.getElementById('paymentDate').value,
            customerEmail: customerEmail,
            amount: amount,
            reference: document.getElementById('reference').value.trim() || 'PAY-' + Date.now(),
            mode: document.getElementById('mode').value
        };
        try {
            receiveCustomerPayment(payment);
            alert(`Payment of ₹${amount} recorded. Outstanding updated.`);
            window.location.href = 'customer-master.html';
        } catch(err) { alert('Error: ' + err.message); }
    }
    loadCustomers();
</script>
</body>
</html>
