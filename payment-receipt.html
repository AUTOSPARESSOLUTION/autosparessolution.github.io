<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Payments + Outstanding (Final)</title>

<style>
body { font-family: Arial; background:#f4f6f8; padding:20px; }
.container { background:#fff; padding:20px; border-radius:10px; max-width:1200px; margin:auto; }

h2 { color:#0a7c71; }

input, button {
    padding:8px;
    margin:5px;
}

button {
    background:#0a7c71;
    color:#fff;
    border:none;
    cursor:pointer;
}

.btn-delete { background:#dc3545; }
.btn-edit { background:#17a2b8; }

table {
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th, td {
    border:1px solid #ccc;
    padding:8px;
}

th {
    background:#0a7c71;
    color:#fff;
}
</style>
</head>

<body>

<div class="container">

<h2>Payment Entry</h2>

<input type="text" id="email" placeholder="Customer Email">
<input type="number" id="amount" placeholder="Amount">
<input type="date" id="date">

<button onclick="savePayment()">Save Payment</button>

<h2>Outstanding + Ageing</h2>
<div id="report"></div>

<h2>All Payments</h2>
<div id="paymentList"></div>

</div>

<script>

// LOAD DATA
let invoices = JSON.parse(localStorage.getItem('allInvoices') || '[]');
let payments = JSON.parse(localStorage.getItem('paymentReceipts') || '[]');

// NORMALIZE
function norm(x){ return (x||'').toLowerCase().trim(); }

// SAVE PAYMENT
function savePayment(){

    let email = document.getElementById('email').value;
    let amount = parseFloat(document.getElementById('amount').value);
    let date = document.getElementById('date').value;

    if(!email || !amount || !date){
        alert("Fill all fields");
        return;
    }

    payments.push({ email, amount, date });

    localStorage.setItem('paymentReceipts', JSON.stringify(payments));

    alert("Payment Saved");

    generateReport();
    renderPayments();
}

// DELETE PAYMENT
function deletePayment(index){

    if(!confirm("Delete this payment?")) return;

    payments.splice(index,1);

    localStorage.setItem('paymentReceipts', JSON.stringify(payments));

    generateReport();
    renderPayments();
}

// EDIT PAYMENT
function editPayment(index){

    let p = payments[index];

    document.getElementById('email').value = p.email;
    document.getElementById('amount').value = p.amount;
    document.getElementById('date').value = p.date;

    deletePayment(index);
}

// ================= CORE LOGIC =================
function generateReport(){

    let data = [];

    // STEP 1: LOAD CREDIT INVOICES
    invoices.filter(i=>i.invoiceType==='credit').forEach(inv=>{

        let email = norm(inv.buyer?.email);

        data.push({
            key: email,
            name: inv.buyer?.name,
            email: inv.buyer?.email,
            invoiceNo: inv.invoiceNo,
            date: inv.date,
            original: inv.grandTotal,
            balance: inv.grandTotal
        });

    });

    // STEP 2: APPLY PAYMENTS (FIFO)
    payments.forEach(pay=>{

        let payKey = norm(pay.email);
        let remaining = pay.amount;

        let filtered = data
            .filter(d=>d.key === payKey)
            .sort((a,b)=> new Date(a.date)-new Date(b.date));

        filtered.forEach(inv=>{

            if(remaining<=0) return;

            let used = Math.min(inv.balance, remaining);

            inv.balance -= used;
            remaining -= used;
        });

    });

    // STEP 3: DISPLAY
    let html = `<table>
    <tr>
    <th>Email</th>
    <th>Invoice</th>
    <th>Date</th>
    <th>Original</th>
    <th>Outstanding</th>
    <th>Age</th>
    <th>Bucket</th>
    </tr>`;

    let today = new Date();

    data.forEach(inv=>{

        if(inv.balance<=0) return;

        let age = Math.floor((today - new Date(inv.date))/(1000*60*60*24));

        let bucket = age<=30?'0-30':age<=60?'31-60':age<=90?'61-90':'90+';

        html += `<tr>
        <td>${inv.email}</td>
        <td>${inv.invoiceNo}</td>
        <td>${inv.date}</td>
        <td>₹${inv.original.toFixed(2)}</td>
        <td>₹${inv.balance.toFixed(2)}</td>
        <td>${age}</td>
        <td>${bucket}</td>
        </tr>`;
    });

    html += "</table>";

    document.getElementById("report").innerHTML = html;
}

// ================= PAYMENT LIST =================
function renderPayments(){

    let html = `<table>
    <tr>
    <th>Date</th>
    <th>Email</th>
    <th>Amount</th>
    <th>Action</th>
    </tr>`;

    payments.forEach((p,i)=>{

        html += `<tr>
        <td>${p.date}</td>
        <td>${p.email}</td>
        <td>₹${p.amount}</td>
        <td>
            <button class="btn-edit" onclick="editPayment(${i})">Edit</button>
            <button class="btn-delete" onclick="deletePayment(${i})">Delete</button>
        </td>
        </tr>`;
    });

    html += "</table>";

    document.getElementById("paymentList").innerHTML = html;
}

// INIT
generateReport();
renderPayments();

</script>

</body>
</html>
