<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Payment Receipt & Outstanding</title>

<style>
body { font-family: Arial; background:#f4f6f8; padding:20px; }
.container { background:#fff; padding:20px; border-radius:10px; max-width:1100px; margin:auto; }
h2 { color:#0a7c71; }

input, button {
    padding:8px;
    margin:5px;
}

button {
    background:#0a7c71;
    color:#fff;
    border:none;
    cursor:pointer;
}

table {
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th, td {
    border:1px solid #ccc;
    padding:8px;
}

th {
    background:#0a7c71;
    color:#fff;
}
</style>
</head>

<body>

<div class="container">
<h2>Payment Entry</h2>

<input type="text" id="customer" placeholder="Customer Name">
<input type="number" id="amount" placeholder="Amount">
<input type="date" id="date">

<button onclick="savePayment()">Save Payment</button>

<h2>Outstanding + Ageing (After Payment)</h2>
<div id="report"></div>

</div>

<script>

// ================= DATA =================
let invoices = JSON.parse(localStorage.getItem('allInvoices') || '[]');
let payments = JSON.parse(localStorage.getItem('paymentReceipts') || '[]');

// ================= SAVE PAYMENT =================
function savePayment(){
    let customer = document.getElementById('customer').value;
    let amount = parseFloat(document.getElementById('amount').value);
    let date = document.getElementById('date').value;

    if(!customer || !amount || !date){
        alert("Fill all fields");
        return;
    }

    payments.push({
        customer,
        amount,
        date
    });

    localStorage.setItem('paymentReceipts', JSON.stringify(payments));

    alert("Payment Saved");

    generateReport();
}

// ================= MAIN LOGIC =================
function generateReport(){

    let map = {};

    // STEP 1: LOAD CREDIT INVOICES
    invoices
    .filter(inv => inv.invoiceType === 'credit')
    .forEach(inv => {

        let cust = inv.buyer?.name || 'Unknown';

        if(!map[cust]) map[cust] = [];

        map[cust].push({
            invoiceNo: inv.invoiceNo,
            date: inv.date,
            original: inv.grandTotal,
            balance: inv.grandTotal
        });
    });

    // STEP 2: APPLY PAYMENTS (FIFO)
    payments.forEach(pay => {

        let cust = pay.customer;

        if(!map[cust]) return;

        let remaining = pay.amount;

        // sort oldest invoice first
        map[cust].sort((a,b)=> new Date(a.date) - new Date(b.date));

        map[cust].forEach(inv => {

            if(remaining <= 0) return;

            let used = Math.min(inv.balance, remaining);

            inv.balance -= used;
            remaining -= used;
        });

    });

    // STEP 3: BUILD TABLE
    let html = `<table>
    <tr>
        <th>Customer</th>
        <th>Invoice</th>
        <th>Date</th>
        <th>Original</th>
        <th>Balance</th>
        <th>Age (Days)</th>
        <th>Bucket</th>
    </tr>`;

    let today = new Date();

    Object.keys(map).forEach(cust => {

        map[cust].forEach(inv => {

            if(inv.balance <= 0) return;

            let invDate = new Date(inv.date);
            let age = Math.floor((today - invDate)/(1000*60*60*24));

            let bucket = "";
            if(age <=30) bucket="0-30";
            else if(age<=60) bucket="31-60";
            else if(age<=90) bucket="61-90";
            else bucket="90+";

            html += `<tr>
                <td>${cust}</td>
                <td>${inv.invoiceNo}</td>
                <td>${inv.date}</td>
                <td>${inv.original.toFixed(2)}</td>
                <td>${inv.balance.toFixed(2)}</td>
                <td>${age}</td>
                <td>${bucket}</td>
            </tr>`;
        });

    });

    html += "</table>";

    document.getElementById("report").innerHTML = html;
}

// INIT
generateReport();

</script>

</body>
</html>
