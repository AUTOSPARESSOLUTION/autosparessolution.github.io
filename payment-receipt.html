<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Payment + Outstanding Final</title>

<style>
body { font-family: Arial; background:#f4f6f8; padding:20px; }
.container { background:#fff; padding:20px; border-radius:10px; max-width:1200px; margin:auto; }
h2 { color:#0a7c71; margin-top:30px; }

table { width:100%; border-collapse:collapse; margin-top:15px; }
th, td { border:1px solid #ccc; padding:8px; }
th { background:#0a7c71; color:white; }
</style>
</head>

<body>

<div class="container">

<h2>All Payments (from localStorage)</h2>
<div id="paymentList"></div>

<h2>Outstanding After Payment Adjustment</h2>
<div id="report"></div>

</div>

<script>

// ================= LOAD DATA =================
let invoices = JSON.parse(localStorage.getItem('allInvoices') || '[]');
let payments = JSON.parse(localStorage.getItem('paymentReceipts') || '[]');

// ================= HELPER =================
function normalize(str){
    return (str || '').toString().trim().toLowerCase();
}

// 🔥 Detect correct payment key (IMPORTANT FIX)
function getPaymentKey(pay){
    let customer = normalize(pay.customer);
    let email = normalize(pay.email);
    let phone = normalize(pay.phone);

    // If customer field contains email → use it
    if(customer.includes("@")) return customer;

    return email || phone || customer;
}

// 🔥 Invoice key
function getInvoiceKey(inv){
    let email = normalize(inv.buyer?.email);
    let phone = normalize(inv.buyer?.phone);
    let name  = normalize(inv.buyer?.name);

    return email || phone || name;
}

// ================= SHOW PAYMENT LIST =================
function showPayments(){

    if(payments.length === 0){
        document.getElementById("paymentList").innerHTML = "No payments found";
        return;
    }

    let html = `<table>
    <tr>
        <th>Date</th>
        <th>Customer</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Amount</th>
    </tr>`;

    payments.forEach(p => {
        html += `<tr>
            <td>${p.date}</td>
            <td>${p.customer}</td>
            <td>${p.email || ''}</td>
            <td>${p.phone || ''}</td>
            <td>₹${p.amount}</td>
        </tr>`;
    });

    html += "</table>";

    document.getElementById("paymentList").innerHTML = html;
}

// ================= MAIN LOGIC =================
function generateReport(){

    let map = {};

    // STEP 1: LOAD CREDIT INVOICES
    invoices
    .filter(inv => inv.invoiceType === 'credit')
    .forEach(inv => {

        let key = getInvoiceKey(inv);

        if(!map[key]){
            map[key] = {
                name: inv.buyer?.name || '',
                email: inv.buyer?.email || '',
                phone: inv.buyer?.phone || '',
                invoices: []
            };
        }

        map[key].invoices.push({
            invoiceNo: inv.invoiceNo,
            date: inv.date,
            original: inv.grandTotal,
            balance: inv.grandTotal
        });
    });

    // STEP 2: APPLY PAYMENTS (FIFO)
    payments.forEach(pay => {

        let key = getPaymentKey(pay);

        if(!map[key]) return;

        let remaining = pay.amount;

        // sort oldest first
        map[key].invoices.sort((a,b)=> new Date(a.date) - new Date(b.date));

        map[key].invoices.forEach(inv => {

            if(remaining <= 0) return;

            let used = Math.min(inv.balance, remaining);

            inv.balance -= used;
            remaining -= used;
        });
    });

    // STEP 3: DISPLAY REPORT
    let html = `<table>
    <tr>
        <th>Customer</th>
        <th>Email</th>
        <th>Invoice</th>
        <th>Date</th>
        <th>Original</th>
        <th>Balance</th>
        <th>Age</th>
        <th>Bucket</th>
    </tr>`;

    let today = new Date();

    Object.values(map).forEach(cust => {

        cust.invoices.forEach(inv => {

            if(inv.balance <= 0) return;

            let age = Math.floor((today - new Date(inv.date)) / (1000*60*60*24));

            let bucket =
                age <=30 ? "0-30" :
                age <=60 ? "31-60" :
                age <=90 ? "61-90" : "90+";

            html += `<tr>
                <td>${cust.name}</td>
                <td>${cust.email}</td>
                <td>${inv.invoiceNo}</td>
                <td>${inv.date}</td>
                <td>₹${inv.original.toFixed(2)}</td>
                <td>₹${inv.balance.toFixed(2)}</td>
                <td>${age}</td>
                <td>${bucket}</td>
            </tr>`;
        });

    });

    html += "</table>";

    document.getElementById("report").innerHTML = html;
}

// ================= INIT =================
showPayments();
generateReport();

</script>

</body>
</html>
