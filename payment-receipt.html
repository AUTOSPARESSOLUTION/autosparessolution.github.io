<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Receipt – Auto Spares</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Roboto', sans-serif;
            background: #e9ecef;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        h1 { color: #0a7c71; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 13px; }
        input, select, textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; }
        button {
            background: #0a7c71;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 10px;
        }
        button:hover { background: #09645a; }
        .flex-row { display: flex; gap: 15px; flex-wrap: wrap; }
        .flex-row > div { flex: 1; }
        .customer-info { margin-top: 15px; background: #f8f9fa; padding: 8px; border-radius: 6px; font-size: 13px; }
    </style>
</head>
<body>
<div class="container">
    <h1><i class="fas fa-receipt"></i> Payment Receipt</h1>
    
    <div class="form-group">
        <label>Customer *</label>
        <div class="flex-row">
            <select id="customerSelect" style="flex:2;">
                <option value="">-- Select Customer --</option>
            </select>
            <input type="email" id="customerEmail" placeholder="Or enter email directly" style="flex:1;">
        </div>
    </div>

    <div class="flex-row">
        <div class="form-group">
            <label>Payment Date</label>
            <input type="date" id="paymentDate">
        </div>
        <div class="form-group">
            <label>Amount (₹) *</label>
            <input type="number" id="amount" step="0.01" placeholder="Enter amount">
        </div>
    </div>

    <div class="flex-row">
        <div class="form-group">
            <label>Payment Mode</label>
            <select id="mode">
                <option value="Cash">Cash</option>
                <option value="Bank Transfer">Bank Transfer</option>
                <option value="Cheque">Cheque</option>
                <option value="UPI">UPI</option>
            </select>
        </div>
        <div class="form-group">
            <label>Reference / Cheque No.</label>
            <input type="text" id="reference" placeholder="Optional">
        </div>
    </div>

    <div class="form-group">
        <label>Remarks (optional)</label>
        <textarea id="remarks" rows="2" placeholder="Any notes..."></textarea>
    </div>

    <div style="margin-top: 20px;">
        <button onclick="recordPayment()"><i class="fas fa-save"></i> Save & Print Receipt</button>
        <button onclick="window.location.href='payment-receipts-list.html'"><i class="fas fa-list"></i> View All Receipts</button>
        <button onclick="window.location.href='index.html'">Cancel</button>
    </div>

    <div id="customerInfo" class="customer-info" style="display:none;"></div>
</div>

<script>
    let currentCustomer = null;
    let paymentToPrint = null;

    function getFinancialYear() {
        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth() + 1;
        if (month >= 4) return `${year}-${(year+1).toString().slice(-2)}`;
        else return `${year-1}-${year.toString().slice(-2)}`;
    }

    function getNextReceiptNumber() {
        const finYear = getFinancialYear();
        let payments = JSON.parse(localStorage.getItem('customerPayments') || '[]');
        let maxNum = 0;
        const prefix = `PR/${finYear}/`;
        payments.forEach(p => {
            if (p.receiptNo && p.receiptNo.startsWith(prefix)) {
                const num = parseInt(p.receiptNo.split('/').pop());
                if (!isNaN(num) && num > maxNum) maxNum = num;
            }
        });
        const nextNum = maxNum + 1;
        return prefix + nextNum.toString().padStart(4, '0');
    }

    function refreshCustomerDropdown() {
        const customers = JSON.parse(localStorage.getItem('customers') || '[]');
        const select = document.getElementById('customerSelect');
        select.innerHTML = '<option value="">-- Select Customer --</option>';
        customers.forEach(c => {
            select.innerHTML += `<option value="${c.email}">${c.name} (${c.email})</option>`;
        });
    }

    function updateCustomerInfo() {
        let email = document.getElementById('customerSelect').value;
        if (!email) email = document.getElementById('customerEmail').value.trim();
        const infoDiv = document.getElementById('customerInfo');
        if (!email) {
            infoDiv.style.display = 'none';
            currentCustomer = null;
            return;
        }
        const customers = JSON.parse(localStorage.getItem('customers') || '[]');
        currentCustomer = customers.find(c => c.email === email);
        if (currentCustomer) {
            infoDiv.innerHTML = `<strong>${currentCustomer.name}</strong> | Outstanding: ₹${(currentCustomer.outstanding||0).toLocaleString()}`;
            infoDiv.style.display = 'block';
        } else {
            infoDiv.innerHTML = '<span style="color:red;">Customer not found. Please add in Customer Master.</span>';
            infoDiv.style.display = 'block';
            currentCustomer = null;
        }
    }

    document.getElementById('customerSelect').addEventListener('change', updateCustomerInfo);
    document.getElementById('customerEmail').addEventListener('input', updateCustomerInfo);

    function recordPayment() {
        let email = document.getElementById('customerSelect').value;
        if (!email) email = document.getElementById('customerEmail').value.trim();
        if (!email) { alert('Please select or enter customer email'); return; }
        const amount = parseFloat(document.getElementById('amount').value);
        if (isNaN(amount) || amount <= 0) { alert('Enter valid amount'); return; }
        
        const customers = JSON.parse(localStorage.getItem('customers') || '[]');
        const customer = customers.find(c => c.email === email);
        if (!customer) { alert('Customer not found in master'); return; }
        
        const receiptNo = getNextReceiptNumber();
        const payment = {
            id: Date.now(),
            receiptNo: receiptNo,
            date: document.getElementById('paymentDate').value || new Date().toISOString().slice(0,10),
            customerEmail: email,
            amount: amount,
            reference: document.getElementById('reference').value.trim() || 'N/A',
            mode: document.getElementById('mode').value,
            remarks: document.getElementById('remarks').value
        };
        
        // Update customer outstanding
        customer.outstanding = (customer.outstanding || 0) - amount;
        if (customer.outstanding < 0) customer.outstanding = 0;
        localStorage.setItem('customers', JSON.stringify(customers));
        
        // Store payment
        let payments = JSON.parse(localStorage.getItem('customerPayments') || '[]');
        payments.push(payment);
        localStorage.setItem('customerPayments', JSON.stringify(payments));
        
        // Also add to customer ledger
        let ledger = JSON.parse(localStorage.getItem('customerLedger') || '[]');
        ledger.push({
            id: Date.now(),
            customerEmail: email,
            date: payment.date,
            type: 'payment',
            ref: payment.receiptNo,
            debit: 0,
            credit: amount,
            balance: customer.outstanding,
            narration: payment.remarks || 'Payment received'
        });
        localStorage.setItem('customerLedger', JSON.stringify(ledger));
        
        alert(`Receipt ${receiptNo} saved!\nAmount: ₹${amount.toFixed(2)}`);
        
        // Store for PDF and generate
        paymentToPrint = { payment, customer };
        generateReceiptPDF();
        
        // Clear form fields (optional)
        document.getElementById('amount').value = '';
        document.getElementById('reference').value = '';
        document.getElementById('remarks').value = '';
        updateCustomerInfo();
    }

    function generateReceiptPDF() {
        if (!paymentToPrint) return;
        const { payment, customer } = paymentToPrint;
        const receiptDiv = document.createElement('div');
        receiptDiv.style.maxWidth = '800px';
        receiptDiv.style.margin = '0 auto';
        receiptDiv.style.backgroundColor = 'white';
        receiptDiv.style.padding = '20px';
        receiptDiv.style.fontFamily = 'Roboto, sans-serif';
        receiptDiv.style.border = '1px solid #ccc';
        receiptDiv.innerHTML = `
            <div style="text-align: center; margin-bottom: 20px;">
                <div style="display: flex; align-items: center; justify-content: center; gap: 15px;">
                    <img src="images/ASS.jpg" alt="Logo" style="height: 60px;" onerror="this.style.display='none'">
                    <div>
                        <div style="font-size: 24px; font-weight: bold; color: #0a7c71;">Auto Spares Solution</div>
                        <div>GSTIN: 19ANOPD3300R1ZO</div>
                        <div>101, 1st floor, 57/5, Q Road, Howrah, WB 711108</div>
                    </div>
                </div>
                <h2 style="margin-top: 15px;">PAYMENT RECEIPT</h2>
                <p>Receipt No: ${payment.receiptNo}</p>
            </div>
            <div style="margin-bottom: 20px;">
                <h3>Customer Details</h3>
                <div style="display: flex; margin-bottom: 5px;"><div style="width: 120px; font-weight: bold;">Name:</div><div>${escapeHtml(customer.name)}</div></div>
                <div style="display: flex; margin-bottom: 5px;"><div style="width: 120px; font-weight: bold;">Email:</div><div>${escapeHtml(customer.email)}</div></div>
                <div style="display: flex; margin-bottom: 5px;"><div style="width: 120px; font-weight: bold;">Phone:</div><div>${escapeHtml(customer.phone)}</div></div>
                <div style="display: flex; margin-bottom: 5px;"><div style="width: 120px; font-weight: bold;">Address:</div><div>${escapeHtml(customer.address || '')}</div></div>
            </div>
            <div style="margin-bottom: 20px;">
                <h3>Payment Details</h3>
                <div style="display: flex; margin-bottom: 5px;"><div style="width: 120px; font-weight: bold;">Date:</div><div>${payment.date}</div></div>
                <div style="display: flex; margin-bottom: 5px;"><div style="width: 120px; font-weight: bold;">Amount:</div><div>₹${payment.amount.toFixed(2)}</div></div>
                <div style="display: flex; margin-bottom: 5px;"><div style="width: 120px; font-weight: bold;">Mode:</div><div>${payment.mode || 'Cash'}</div></div>
                <div style="display: flex; margin-bottom: 5px;"><div style="width: 120px; font-weight: bold;">Reference:</div><div>${escapeHtml(payment.reference || '-')}</div></div>
                <div style="display: flex; margin-bottom: 5px;"><div style="width: 120px; font-weight: bold;">Remarks:</div><div>${escapeHtml(payment.remarks || '-')}</div></div>
            </div>
            <div style="display: flex; justify-content: space-between; margin-top: 30px;">
                <div style="text-align: center; width: 45%; border-top: 1px solid #333; padding-top: 5px;">Customer Signature</div>
                <div style="text-align: center; width: 45%; border-top: 1px solid #333; padding-top: 5px;">For Auto Spares Solution</div>
            </div>
            <div style="font-size: 10px; text-align: center; margin-top: 20px; color: #777;">
                This is a computer generated receipt. Valid with stamp & signature.<br>Thank you for your business!
            </div>
        `;
        const opt = {
            margin: [0.2, 0.2, 0.2, 0.2],
            filename: `Payment_Receipt_${payment.receiptNo}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(receiptDiv).save();
        paymentToPrint = null;
    }

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }

    document.getElementById('paymentDate').value = new Date().toISOString().slice(0,10);
    refreshCustomerDropdown();
</script>
</body>
</html>
