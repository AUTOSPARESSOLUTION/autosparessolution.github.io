<!DOCTYPE html>
<html>
<head>
    <title>Payment Receipt</title>
    <style>
        body { font-family: Arial; background:#f5f5f5; padding:20px;}
        .box { background:#fff; padding:20px; border-radius:10px; max-width:900px; margin:auto;}
        input, button { padding:8px; margin:5px; }
        table { width:100%; border-collapse:collapse; margin-top:20px;}
        th,td { border:1px solid #ddd; padding:8px; }
        th { background:#0a7c71; color:white;}
    </style>
</head>

<body>
<div class="box">
    <h2>Payment Entry</h2>

    <input id="invNo" placeholder="Invoice No">
    <input id="amount" type="number" placeholder="Amount">
    <input id="date" type="date">
    <button onclick="addPayment()">Add Payment</button>

    <h3>Receipt List</h3>
    <div id="list"></div>
</div>

<script>
let payments = JSON.parse(localStorage.getItem('payments') || '[]');
let invoices = JSON.parse(localStorage.getItem('allInvoices') || '[]');

function addPayment(){
    let inv = document.getElementById('invNo').value;
    let amt = parseFloat(document.getElementById('amount').value);
    let dt = document.getElementById('date').value;

    if(!inv || !amt){ alert("Enter details"); return; }

    payments.push({invoiceNo:inv, amount:amt, date:dt});
    localStorage.setItem('payments', JSON.stringify(payments));

    updateInvoiceStatus(inv);
    load();
}

function updateInvoiceStatus(invNo){
    let inv = invoices.find(i=>i.invoiceNo===invNo);
    if(!inv) return;

    let paid = payments
        .filter(p=>p.invoiceNo===invNo)
        .reduce((a,b)=>a+b.amount,0);

    if(paid >= inv.grandTotal){
        inv.status = "Paid";
    } else if(paid > 0){
        inv.status = "Partial";
    } else {
        inv.status = "Unpaid";
    }

    localStorage.setItem('allInvoices', JSON.stringify(invoices));
}

function load(){
    let html = "<table><tr><th>Invoice</th><th>Date</th><th>Amount</th></tr>";
    payments.forEach(p=>{
        html += `<tr>
            <td>${p.invoiceNo}</td>
            <td>${p.date}</td>
            <td>₹${p.amount}</td>
        </tr>`;
    });
    html += "</table>";
    document.getElementById('list').innerHTML = html;
}

load();
</script>
</body>
</html>
