<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Payment Receipt & Outstanding</title>

<style>
body { font-family: Arial; background:#f4f6f8; padding:20px; }
.container { background:#fff; padding:20px; border-radius:10px; max-width:1100px; margin:auto; }
h2 { color:#0a7c71; }

input, button {
    padding:8px;
    margin:5px;
}

button {
    background:#0a7c71;
    color:#fff;
    border:none;
    cursor:pointer;
}

table {
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th, td {
    border:1px solid #ccc;
    padding:8px;
    text-align:left;
}

th {
    background:#0a7c71;
    color:#fff;
}
</style>
</head>

<body>

<div class="container">
<h2>Payment Entry</h2>

<input type="text" id="customer" placeholder="Customer Name">
<input type="text" id="phone" placeholder="Mobile (Recommended)">
<input type="number" id="amount" placeholder="Amount">
<input type="date" id="date">

<button onclick="savePayment()">Save Payment</button>

<h2>Outstanding + Ageing (After Payment)</h2>
<div id="report"></div>

</div>

<script>

// ================= LOAD DATA =================
let invoices = JSON.parse(localStorage.getItem('allInvoices') || '[]');
let payments = JSON.parse(localStorage.getItem('paymentReceipts') || '[]');

// ================= HELPER =================
function normalize(str){
    return (str || '').toString().trim().toLowerCase();
}

// ================= SAVE PAYMENT =================
function savePayment(){

    let customer = document.getElementById('customer').value;
    let phone = document.getElementById('phone').value;
    let amount = parseFloat(document.getElementById('amount').value);
    let date = document.getElementById('date').value;

    if(!customer || !amount || !date){
        alert("Fill all fields");
        return;
    }

    payments.push({
        customer,
        phone,
        amount,
        date
    });

    localStorage.setItem('paymentReceipts', JSON.stringify(payments));

    alert("Payment Saved Successfully");

    generateReport();
}

// ================= MAIN LOGIC =================
function generateReport(){

    let map = {};

    // STEP 1: LOAD CREDIT INVOICES
    invoices
    .filter(inv => inv.invoiceType === 'credit')
    .forEach(inv => {

        let name = inv.buyer?.name || 'Unknown';
        let phone = inv.buyer?.phone || '';

        let key = normalize(phone) || normalize(name);

        if(!map[key]){
            map[key] = {
                name: name,
                phone: phone,
                list: []
            };
        }

        map[key].list.push({
            invoiceNo: inv.invoiceNo,
            date: inv.date,
            original: inv.grandTotal,
            balance: inv.grandTotal
        });
    });

    // STEP 2: APPLY PAYMENTS (IMPORTANT FIX)
    payments.forEach(pay => {

        let payKey = normalize(pay.phone) || normalize(pay.customer);

        Object.keys(map).forEach(key => {

            if(key === payKey){

                let remaining = pay.amount;

                // FIFO (old invoice first)
                map[key].list.sort((a,b)=> new Date(a.date) - new Date(b.date));

                map[key].list.forEach(inv => {

                    if(remaining <= 0) return;

                    let used = Math.min(inv.balance, remaining);

                    inv.balance -= used;
                    remaining -= used;
                });
            }

        });

    });

    // STEP 3: DISPLAY REPORT
    let html = `<table>
    <tr>
        <th>Customer</th>
        <th>Phone</th>
        <th>Invoice</th>
        <th>Date</th>
        <th>Original</th>
        <th>Balance</th>
        <th>Age (Days)</th>
        <th>Bucket</th>
    </tr>`;

    let today = new Date();

    Object.keys(map).forEach(key => {

        map[key].list.forEach(inv => {

            if(inv.balance <= 0) return;

            let invDate = new Date(inv.date);
            let age = Math.floor((today - invDate)/(1000*60*60*24));

            let bucket = "";
            if(age <=30) bucket="0-30";
            else if(age<=60) bucket="31-60";
            else if(age<=90) bucket="61-90";
            else bucket="90+";

            html += `<tr>
                <td>${map[key].name}</td>
                <td>${map[key].phone}</td>
                <td>${inv.invoiceNo}</td>
                <td>${inv.date}</td>
                <td>₹${inv.original.toFixed(2)}</td>
                <td>₹${inv.balance.toFixed(2)}</td>
                <td>${age}</td>
                <td>${bucket}</td>
            </tr>`;
        });

    });

    html += "</table>";

    document.getElementById("report").innerHTML = html;
}

// INIT
generateReport();

</script>

</body>
</html>
