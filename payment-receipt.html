<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Receipt – Auto Spares</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body { font-family: Arial; background:#e9ecef; padding:20px; }
.container { max-width:800px; margin:auto; background:#fff; padding:20px; border-radius:10px; }
h1 { color:#0a7c71; }

label { font-weight:600; font-size:13px; }
input, select, textarea { width:100%; padding:8px; margin-top:5px; border:1px solid #ccc; border-radius:6px; }

button {
    background:#0a7c71;
    color:#fff;
    border:none;
    padding:10px;
    margin-top:10px;
    cursor:pointer;
    border-radius:6px;
}

.flex { display:flex; gap:10px; }
.flex > div { flex:1; }

.info { margin-top:10px; background:#f8f9fa; padding:8px; border-radius:6px; }
</style>
</head>

<body>

<div class="container">
<h1><i class="fas fa-receipt"></i> Payment Receipt</h1>

<label>Customer</label>
<select id="customerSelect"></select>
<input type="email" id="customerEmail" placeholder="Or enter email manually">

<div class="flex">
<div>
<label>Date</label>
<input type="date" id="date">
</div>

<div>
<label>Amount</label>
<input type="number" id="amount">
</div>
</div>

<div class="flex">
<div>
<label>Mode</label>
<select id="mode">
<option>Cash</option>
<option>Bank</option>
<option>UPI</option>
<option>Cheque</option>
</select>
</div>

<div>
<label>Reference</label>
<input type="text" id="ref">
</div>
</div>

<label>Remarks</label>
<textarea id="remarks"></textarea>

<button onclick="savePayment()">Save & Print</button>

<div id="info" class="info" style="display:none;"></div>

</div>

<script>

// ===== CONSTANT =====
const KEY = "customerPayments";

// ===== LOAD CUSTOMER =====
function loadCustomers(){
    let customers = JSON.parse(localStorage.getItem('customers') || '[]');

    let html = '<option value="">-- Select Customer --</option>';

    customers.forEach(c=>{
        html += `<option value="${c.email}">${c.name} (${c.email})</option>`;
    });

    document.getElementById('customerSelect').innerHTML = html;
}

// ===== RECEIPT NUMBER =====
function getReceiptNo(date){

    let list = JSON.parse(localStorage.getItem(KEY) || '[]');

    let d = new Date(date);
    let y = d.getFullYear();
    let m = d.getMonth()+1;

    let fy = (m>=4) ? `${y}-${(y+1).toString().slice(-2)}` : `${y-1}-${y.toString().slice(-2)}`;

    let max = 0;

    list.forEach(p=>{
        if(p.receiptNo && p.receiptNo.startsWith(`PR/${fy}/`)){
            let n = parseInt(p.receiptNo.split('/').pop());
            if(n>max) max=n;
        }
    });

    return `PR/${fy}/` + (max+1).toString().padStart(4,'0');
}

// ===== CUSTOMER INFO =====
function showInfo(){

    let email = document.getElementById('customerSelect').value ||
                document.getElementById('customerEmail').value;

    let customers = JSON.parse(localStorage.getItem('customers') || '[]');
    let c = customers.find(x=>x.email===email);

    let box = document.getElementById('info');

    if(c){
        box.innerHTML = `<b>${c.name}</b> | Outstanding: ₹${(c.outstanding||0).toFixed(2)}`;
        box.style.display="block";
    }else{
        box.style.display="none";
    }
}

document.getElementById('customerSelect').addEventListener('change', showInfo);
document.getElementById('customerEmail').addEventListener('input', showInfo);

// ===== SAVE PAYMENT =====
function savePayment(){

    let email = document.getElementById('customerSelect').value ||
                document.getElementById('customerEmail').value;

    if(!email){
        alert("Customer required");
        return;
    }

    let amount = parseFloat(document.getElementById('amount').value);

    if(!amount || amount<=0){
        alert("Enter valid amount");
        return;
    }

    let date = document.getElementById('date').value || new Date().toISOString().slice(0,10);

    let receiptNo = getReceiptNo(date);

    let payment = {
        id: Date.now(),
        receiptNo: receiptNo,
        date: date,
        customerEmail: email,
        amount: amount,
        mode: document.getElementById('mode').value,
        reference: document.getElementById('ref').value || 'N/A',
        remarks: document.getElementById('remarks').value || ''
    };

    // ===== SAVE =====
    let list = JSON.parse(localStorage.getItem(KEY) || '[]');
    list.push(payment);
    localStorage.setItem(KEY, JSON.stringify(list));

    // ===== UPDATE CUSTOMER =====
    let customers = JSON.parse(localStorage.getItem('customers') || '[]');
    let c = customers.find(x=>x.email===email);

    if(c){
        c.outstanding = (c.outstanding || 0) - amount;
        if(c.outstanding < 0) c.outstanding = 0;
    }

    localStorage.setItem('customers', JSON.stringify(customers));

    // ===== LEDGER =====
    let ledger = JSON.parse(localStorage.getItem('customerLedger') || '[]');

    ledger.push({
        id: Date.now(),
        customerEmail: email,
        date: date,
        type: 'payment',
        ref: receiptNo,
        debit: 0,
        credit: amount,
        balance: c ? c.outstanding : 0
    });

    localStorage.setItem('customerLedger', JSON.stringify(ledger));

    alert("Saved: " + receiptNo);

    generatePDF(payment, c);

    // reset
    document.getElementById('amount').value='';
    document.getElementById('ref').value='';
    document.getElementById('remarks').value='';
}

// ===== PDF =====
function generatePDF(p,c){

    let div = document.createElement('div');

    div.innerHTML = `
    <h2 style="text-align:center;">PAYMENT RECEIPT</h2>
    <p>Receipt: ${p.receiptNo}</p>
    <p>Name: ${c?.name || ''}</p>
    <p>Email: ${p.customerEmail}</p>
    <p>Date: ${p.date}</p>
    <p>Amount: ₹${p.amount}</p>
    `;

    html2pdf().from(div).save();
}

// INIT
document.getElementById('date').value = new Date().toISOString().slice(0,10);
loadCustomers();

</script>

</body>
</html>
