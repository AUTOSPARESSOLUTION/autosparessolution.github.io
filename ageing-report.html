<!DOCTYPE html>
<html>
<head>
    <title>Outstanding with FIFO Ageing</title>
    <style>
        body { font-family: Arial; background:#eef2f3; padding:20px;}
        .box { background:white; padding:20px; border-radius:10px;}
        table { width:100%; border-collapse:collapse; margin-top:20px;}
        th,td { border:1px solid #ccc; padding:8px;}
        th { background:#0a7c71; color:white;}
    </style>
</head>

<body>
<div class="box">
    <h2>Outstanding with Correct Ageing (FIFO)</h2>
    <div id="report"></div>
</div>

<script>

let invoices = JSON.parse(localStorage.getItem('allInvoices') || '[]');
let payments = JSON.parse(localStorage.getItem('payments') || '[]');

// Clean invoice no
function clean(str){
    return (str || '').toString().trim().toUpperCase();
}

// Convert DD/MM/YYYY
function parseDate(d){
    if(!d) return new Date();
    let p = d.split('/');
    return new Date(p[2], p[1]-1, p[0]);
}

// Age bucket
function ageing(days){
    if(days <= 30) return "0-30 Days";
    if(days <= 60) return "31-60 Days";
    if(days <= 90) return "61-90 Days";
    return "90+ Days";
}

function load(){

    let html = `
    <table>
    <tr>
        <th>Invoice</th>
        <th>Date</th>
        <th>Total</th>
        <th>Paid</th>
        <th>Outstanding</th>
        <th>Ageing (Correct)</th>
    </tr>`;

    invoices.forEach(inv => {

        let invNo = clean(inv.invoiceNo);
        let total = Number(inv.grandTotal || 0);

        // Get payments sorted by date (FIFO)
        let invPayments = payments
            .filter(p => clean(p.invoiceNo) === invNo)
            .sort((a,b)=> new Date(a.date) - new Date(b.date));

        let remaining = total;

        // Apply payments FIFO
        invPayments.forEach(p => {
            if(remaining > 0){
                let payAmt = Number(p.amount || 0);
                if(payAmt >= remaining){
                    remaining = 0;
                } else {
                    remaining -= payAmt;
                }
            }
        });

        // skip if fully paid
        if(remaining <= 0) return;

        let paid = total - remaining;

        // ageing only on remaining
        let invDate = parseDate(inv.date);
        let today = new Date();
        let days = Math.floor((today - invDate)/(1000*60*60*24));

        html += `
        <tr>
            <td>${inv.invoiceNo}</td>
            <td>${inv.date}</td>
            <td>₹${total.toFixed(2)}</td>
            <td>₹${paid.toFixed(2)}</td>
            <td style="color:red;"><b>₹${remaining.toFixed(2)}</b></td>
            <td>${ageing(days)}</td>
        </tr>`;
    });

    html += "</table>";

    document.getElementById('report').innerHTML = html;
}

load();

</script>
</body>
</html>
