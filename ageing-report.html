<!DOCTYPE html>
<html>
<head>
    <title>Final Outstanding with True Ageing</title>
    <style>
        body { font-family: Arial; background:#eef2f3; padding:20px;}
        .box { background:white; padding:20px; border-radius:10px;}
        table { width:100%; border-collapse:collapse; margin-top:20px;}
        th,td { border:1px solid #ccc; padding:8px;}
        th { background:#0a7c71; color:white;}
    </style>
</head>

<body>

<div class="box">
    <h2>Outstanding & Ageing (Tally Correct)</h2>
    <div id="report"></div>
</div>

<script>

let invoices = JSON.parse(localStorage.getItem('allInvoices') || '[]');
let payments = JSON.parse(localStorage.getItem('payments') || '[]');

// Clean
function clean(str){
    return (str || '').toString().trim().toUpperCase();
}

// Parse DD/MM/YYYY
function parseDate(d){
    if(!d) return new Date();
    let p = d.split('/');
    return new Date(p[2], p[1]-1, p[0]);
}

// Age bucket
function ageing(days){
    if(days <= 30) return "0-30 Days";
    if(days <= 60) return "31-60 Days";
    if(days <= 90) return "61-90 Days";
    return "90+ Days";
}

function load(){

    // STEP 1: Prepare invoice ledger
    let ledger = invoices.map(inv => ({
        invoiceNo: inv.invoiceNo,
        date: parseDate(inv.date),
        total: Number(inv.grandTotal || 0),
        balance: Number(inv.grandTotal || 0)
    }));

    // Sort invoices by date (FIFO)
    ledger.sort((a,b)=> a.date - b.date);

    // STEP 2: Apply ALL payments FIFO across invoices
    payments.forEach(p => {

        let payAmt = Number(p.amount || 0);

        for(let i=0; i<ledger.length; i++){

            if(payAmt <= 0) break;

            if(ledger[i].balance > 0){

                if(payAmt >= ledger[i].balance){
                    payAmt -= ledger[i].balance;
                    ledger[i].balance = 0;
                } else {
                    ledger[i].balance -= payAmt;
                    payAmt = 0;
                }
            }
        }
    });

    // STEP 3: Build report
    let html = `
    <table>
    <tr>
        <th>Invoice</th>
        <th>Date</th>
        <th>Total</th>
        <th>Outstanding</th>
        <th>Ageing</th>
    </tr>`;

    let today = new Date();

    ledger.forEach(row => {

        if(row.balance <= 0) return;

        let days = Math.floor((today - row.date)/(1000*60*60*24));

        html += `
        <tr>
            <td>${row.invoiceNo}</td>
            <td>${row.date.toLocaleDateString()}</td>
            <td>₹${row.total.toFixed(2)}</td>
            <td style="color:red;"><b>₹${row.balance.toFixed(2)}</b></td>
            <td>${ageing(days)}</td>
        </tr>`;
    });

    html += "</table>";

    document.getElementById('report').innerHTML = html;
}

load();

</script>

</body>
</html>
