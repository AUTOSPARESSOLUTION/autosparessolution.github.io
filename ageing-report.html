<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Outstanding – Auto Spares</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background: #e9ecef; margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: auto; background: white; border-radius: 12px; padding: 20px; }
        h1 { color: #0a7c71; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #dee2e6; padding: 10px; text-align: left; }
        th { background: #0a7c71; color: white; }
        .total-row { background: #f1f3f5; font-weight: bold; }
        button { background: #0a7c71; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; margin: 5px; }
        .export-btn { background: #6c757d; }
    </style>
</head>
<body>
<div class="container">
    <h1><i class="fas fa-chart-line"></i> Customer Outstanding (Ageing Ready)</h1>
    <div style="margin-bottom: 20px;">
        <button onclick="loadReport()"><i class="fas fa-sync-alt"></i> Refresh</button>
        <button onclick="exportToCSV()" class="export-btn"><i class="fas fa-file-csv"></i> Export CSV</button>
    </div>
    <div id="reportTable"></div>
    <button onclick="window.location.href='index.html'" style="margin-top:20px;">Back to Dashboard</button>
</div>

<script>
    function loadReport() {
        const customers = JSON.parse(localStorage.getItem('customers') || '[]');
        const customersWithOutstanding = customers.filter(c => (c.outstanding || 0) > 0);
        
        if (customersWithOutstanding.length === 0) {
            document.getElementById('reportTable').innerHTML = '<p>No customers with outstanding balance found.</p>';
            return;
        }
        
        // Sort by outstanding descending
        customersWithOutstanding.sort((a,b) => (b.outstanding || 0) - (a.outstanding || 0));
        
        let html = '<table><thead>
            <th>Customer Name</th><th>Email</th><th>Phone</th><th>Outstanding (₹)</th>
        </tr></thead><tbody>';
        let totalOutstanding = 0;
        customersWithOutstanding.forEach(c => {
            totalOutstanding += (c.outstanding || 0);
            html += `<tr>
                <td>${escapeHtml(c.name)}</strong></td>
                <td>${escapeHtml(c.email)}</strong></td>
                <td>${escapeHtml(c.phone)}</strong></td>
                <td><strong>₹${(c.outstanding || 0).toFixed(2)}</strong></td>
            </tr>`;
        });
        html += `<tr class="total-row">
            <td><td colspan="3"><strong>Total Outstanding</strong></td>
            <td><strong>₹${totalOutstanding.toFixed(2)}</strong></td>
        </tr>`;
        html += '</tbody></table>';
        document.getElementById('reportTable').innerHTML = html;
    }
    
    function exportToCSV() {
        const customers = JSON.parse(localStorage.getItem('customers') || '[]');
        const customersWithOutstanding = customers.filter(c => (c.outstanding || 0) > 0);
        if (customersWithOutstanding.length === 0) {
            alert('No data to export');
            return;
        }
        let csv = "Customer Name,Email,Phone,Outstanding (₹)\n";
        customersWithOutstanding.forEach(c => {
            csv += `"${escapeCsv(c.name)}","${escapeCsv(c.email)}","${escapeCsv(c.phone)}",${c.outstanding || 0}\n`;
        });
        const blob = new Blob([csv], {type:'text/csv'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'customer_outstanding.csv';
        a.click();
        URL.revokeObjectURL(blob);
    }
    
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
    function escapeCsv(str) { return `"${(str || '').replace(/"/g, '""')}"`; }
    
    loadReport();
</script>
</body>
</html>
