<!DOCTYPE html>
<html>
<head>
    <title>Outstanding Report</title>
    <style>
        body { font-family: Arial; background:#eef2f3; padding:20px;}
        .box { background:white; padding:20px; border-radius:10px;}
        table { width:100%; border-collapse:collapse; margin-top:20px;}
        th,td { border:1px solid #ccc; padding:8px;}
        th { background:#0a7c71; color:white;}
    </style>
</head>

<body>
<div class="box">
    <h2>Outstanding & Ageing (100% Accurate)</h2>
    <div id="report"></div>
</div>

<script>
let invoices = JSON.parse(localStorage.getItem('allInvoices') || '[]');
let payments = JSON.parse(localStorage.getItem('payments') || '[]');

// ✅ Normalize function (VERY IMPORTANT)
function clean(str){
    return (str || '').toString().trim().toUpperCase();
}

// ✅ Convert DD/MM/YYYY → Date
function parseDate(dateStr){
    if(!dateStr) return new Date();
    let p = dateStr.split('/');
    return new Date(p[2], p[1]-1, p[0]);
}

// ✅ Ageing calculation
function getAgeing(days){
    if(days <= 30) return "0-30 Days";
    if(days <= 60) return "31-60 Days";
    if(days <= 90) return "61-90 Days";
    return "90+ Days";
}

function load(){

    let html = `
    <table>
    <tr>
        <th>Invoice</th>
        <th>Date</th>
        <th>Total</th>
        <th>Paid</th>
        <th>Outstanding</th>
        <th>Ageing</th>
    </tr>`;

    invoices.forEach(inv => {

        let invNo = clean(inv.invoiceNo);

        // ✅ Exact match payments
        let paid = payments
            .filter(p => clean(p.invoiceNo) === invNo)
            .reduce((sum, p) => sum + Number(p.amount || 0), 0);

        let total = Number(inv.grandTotal || 0);
        let balance = total - paid;

        // ignore fully paid
        if(balance <= 0) return;

        // ageing
        let invDate = parseDate(inv.date);
        let today = new Date();
        let days = Math.floor((today - invDate) / (1000*60*60*24));

        html += `
        <tr>
            <td>${inv.invoiceNo}</td>
            <td>${inv.date}</td>
            <td>₹${total.toFixed(2)}</td>
            <td>₹${paid.toFixed(2)}</td>
            <td><b style="color:red;">₹${balance.toFixed(2)}</b></td>
            <td>${getAgeing(days)}</td>
        </tr>`;
    });

    html += "</table>";

    document.getElementById('report').innerHTML = html;
}

load();
</script>
</body>
</html>
