<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ageing Report</title>
</head>
<body>

<h2>Customer Outstanding</h2>

<button onclick="loadReport()">Refresh</button>

<div id="report"></div>

<script>
function applyFIFO(invoices, payments) {
    invoices.sort((a,b)=>new Date(a.date)-new Date(b.date));
    payments.sort((a,b)=>new Date(a.date)-new Date(b.date));

    let payIndex = 0;
    let remaining = 0;

    invoices.forEach(inv=>{
        inv.outstanding = inv.amount;

        while(payIndex < payments.length){
            if(remaining === 0){
                remaining = payments[payIndex].amount;
                payIndex++;
            }

            let used = Math.min(inv.outstanding, remaining);
            inv.outstanding -= used;
            remaining -= used;

            if(inv.outstanding === 0) break;
        }
    });

    return invoices;
}

function loadReport(){
    const invoices = JSON.parse(localStorage.getItem('allInvoices')||'[]');
    const payments = JSON.parse(localStorage.getItem('customerPayments')||'[]');

    let data = {};

    invoices.forEach(inv=>{
        if(inv.invoiceType !== 'credit') return;

        const email = inv.customerEmail || inv.buyer?.email;

        if(!data[email]) data[email]={invoices:[],payments:[]};

        data[email].invoices.push({
            date:inv.date,
            amount:inv.grandTotal || inv.total || 0
        });
    });

    payments.forEach(p=>{
        if(!data[p.customerEmail]) return;
        data[p.customerEmail].payments.push(p);
    });

    let html = "<table border='1'><tr><th>Customer</th><th>Outstanding</th></tr>";

    Object.keys(data).forEach(email=>{
        let result = applyFIFO(data[email].invoices, data[email].payments);
        let total = result.reduce((s,i)=>s+i.outstanding,0);

        if(total>0){
            html += `<tr><td>${email}</td><td>₹${total.toFixed(2)}</td></tr>`;
        }
    });

    html += "</table>";

    document.getElementById('report').innerHTML = html;
}

loadReport();
</script>

</body>
</html>
