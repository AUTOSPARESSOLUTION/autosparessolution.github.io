<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dealer Intelligence Dashboard – Auto Spares Solution</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<!-- HTML TO CANVAS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script src="js/dealer-intelligence.js"></script>
<script src="js/brochure-generator.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:#fff;
    padding:20px;
}

.container{
    max-width:1400px;
    margin:auto;
    background:#1e293b;
    border-radius:15px;
    padding:20px;
}

h1,h2,h3{
    color:#facc15;
    margin-bottom:10px;
}

.btn{
    background:#2563eb;
    color:#fff;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
    margin:5px;
}

.btn:hover{
    opacity:0.9;
}

.btn-whatsapp{
    background:#25D366;
}

.btn-purple{
    background:#9333ea;
}

.btn-success{
    background:#16a34a;
}

.stats-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
    margin:20px 0;
}

.stat-card{
    background:#0f172a;
    padding:15px;
    border-radius:10px;
    text-align:center;
}

.stat-number{
    font-size:32px;
    font-weight:bold;
    color:#4ade80;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #334155;
    padding:8px;
    font-size:14px;
}

th{
    background:#0f172a;
    color:#facc15;
}

.flex{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
}

.flyer-card{
    background:#0f172a;
    border-radius:12px;
    padding:15px;
    min-width:280px;
    border:1px solid #334155;
}

.flyer-title{
    color:#facc15;
    font-size:18px;
    margin-bottom:8px;
}

.flyer-buttons{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>
Dealer Intelligence Dashboard
</h1>

<div class="stats-grid">

<div class="stat-card">
<div class="stat-number" id="totalOffers">0</div>
<div>Total Offers</div>
</div>

<div class="stat-card">
<div class="stat-number" id="highDiscount">0</div>
<div>High Discount</div>
</div>

<div class="stat-card">
<div class="stat-number" id="lowStockCount">0</div>
<div>Low Stock</div>
</div>

<div class="stat-card">
<div class="stat-number" id="areasCount">0</div>
<div>Areas</div>
</div>

</div>

<div class="flex">

<button class="btn btn-success"
onclick="runAnalysis()">

Run Analysis

</button>

<button class="btn"
onclick="generateAllFlyers()">

Generate Flyers

</button>

<button class="btn btn-purple"
onclick="downloadAllFlyersPDF()">

Download PDF

</button>

<button class="btn btn-whatsapp"
onclick="sendBulkWhatsAppFlyers()">

Send Flyers

</button>

</div>

<h2 style="margin-top:20px;">
Active Offers
</h2>

<table>

<thead>

<tr>
<th>Dealer</th>
<th>Part</th>
<th>District</th>
<th>Stock</th>
<th>Discount</th>
<th>Offer Price</th>
<th>Action</th>
</tr>

</thead>

<tbody id="offersTbody"></tbody>

</table>

<h2 style="margin-top:20px;">
Dealer Flyers
</h2>

<div id="flyerList"
class="flex"
style="margin-top:15px;"></div>

</div>

<script>

/* =========================
INIT
========================= */
window.addEventListener('load', async () => {

    try{

        if(window.BrochureGenerator?.init){

            await BrochureGenerator.init();

            console.log("✅ BrochureGenerator Initialized");
        }

    }catch(err){

        console.error(err);
    }
});

/* =========================
RUN ANALYSIS
========================= */
async function runAnalysis(){

    try{

        const result =
            await DealerIntelligence.runFullAnalysis();

        document.getElementById('totalOffers').innerText =
            result.offersGenerated || 0;

        document.getElementById('highDiscount').innerText =
            result.highDiscountOffers || 0;

        document.getElementById('lowStockCount').innerText =
            result.lowStockAlerts || 0;

        document.getElementById('areasCount').innerText =
            result.areasAnalysed || 0;

        displayOffers(result.offers || []);

    }catch(err){

        console.error(err);

        alert(err.message || err);
    }
}

/* =========================
DISPLAY OFFERS
========================= */
function displayOffers(offers){

    const tbody =
        document.getElementById('offersTbody');

    tbody.innerHTML = '';

    offers.slice(0,50).forEach(o => {

        const dealerSafe =
            JSON.stringify(o.dealer || '');

        const row =
            tbody.insertRow();

        row.insertCell(0).innerText =
            o.dealer || '';

        row.insertCell(1).innerText =
            o.part || '';

        row.insertCell(2).innerText =
            o.pincode || '-';

        row.insertCell(3).innerText =
            o.totalStock || 0;

        row.insertCell(4).innerText =
            (o.discount || 0) + '%';

        row.insertCell(5).innerText =
            '₹' + Number(o.offerPrice || 0).toFixed(2);

        row.insertCell(6).innerHTML = `

        <button class="btn btn-whatsapp"
        onclick='sendSingleWhatsApp(${dealerSafe})'>

        <i class="fab fa-whatsapp"></i>

        </button>

        `;
    });
}

/* =========================
WHATSAPP
========================= */
async function sendSingleWhatsApp(dealerName){

    try{

        await BrochureGenerator.loadDealerMaster();

        BrochureGenerator.loadOffers();

        BrochureGenerator.sendFlyerToWhatsApp(
            dealerName
        );

    }catch(err){

        console.error(err);

        alert(err.message || err);
    }
}

/* =========================
GENERATE ALL FLYERS
========================= */
async function generateAllFlyers(){

    try{

        await BrochureGenerator.loadDealerMaster();

        BrochureGenerator.loadOffers();

        const dealers =
            await BrochureGenerator.getDealersWithOffers();

        const div =
            document.getElementById('flyerList');

        div.innerHTML = '';

        if(!dealers.length){

            div.innerHTML = `
            <div style="
                color:#facc15;
                padding:20px;
            ">
                No flyers found.
                Run Analysis first.
            </div>
            `;

            return;
        }

        dealers.forEach(d => {

            const dealerSafe =
                JSON.stringify(d.name || '');

            div.innerHTML += `

            <div class="flyer-card">

                <div class="flyer-title">
                    ${d.name || ''}
                </div>

                <div>
                    Total Offers:
                    ${d.offerCount || 0}
                </div>

                <div class="flyer-buttons">

                    <button class="btn"
                    onclick='previewFlyer(${dealerSafe})'>

                    👁 Preview

                    </button>

                    <button class="btn btn-purple"
                    onclick='downloadSinglePDF(${dealerSafe})'>

                    📄 PDF

                    </button>

                    <div class="flyer-buttons">

    <!-- DIRECT WHATSAPP -->
    <button class="btn btn-whatsapp"
    onclick="sendSingleWhatsApp('${d.name}')">

    <i class="fab fa-whatsapp"></i>
    Msg

    </button>

    <!-- PDF DOWNLOAD -->
    <button class="btn btn-purple"
    onclick="downloadSinglePDF('${d.name}')">

    <i class="fas fa-file-pdf"></i>
    PDF

    </button>

    <!-- PREVIEW -->
    <button class="btn"
    onclick="previewFlyer('${d.name}')">

    👁 Preview

    </button>

</div>

                </div>

            </div>
            `;
        });

    }catch(err){

        console.error(err);

        alert(err.message || err);
    }
}

/* =========================
PREVIEW
========================= */
async function previewFlyer(dealerName){

    try{

        await BrochureGenerator.loadDealerMaster();

        BrochureGenerator.loadOffers();

        BrochureGenerator.showBrochurePreview(
            dealerName
        );

    }catch(err){

        console.error(err);

        alert(err.message || err);
    }
}

/* =========================
PDF DOWNLOAD
========================= */
async function downloadSinglePDF(dealerName){

    try{

        const html =
            BrochureGenerator.generateFullBrochureHTML(
                dealerName
            );

        if(!html){

            alert('No flyer found');

            return;
        }

        const div =
            document.createElement('div');

        div.innerHTML = html;

        div.style.position = 'fixed';
        div.style.left = '-9999px';
        div.style.top = '0';
        div.style.width = '800px';
        div.style.background = 'white';
        div.style.padding = '20px';

        document.body.appendChild(div);

        await new Promise(r =>
            setTimeout(r, 700)
        );

        const canvas =
            await html2canvas(div,{
                scale:2,
                useCORS:true
            });

        const img =
            canvas.toDataURL('image/png');

        const jsPDF =
            window.jspdf?.jsPDF;

        if(!jsPDF){

            alert('PDF library missing');

            return;
        }

        const pdf =
            new jsPDF(
                'p',
                'mm',
                'a4'
            );

        const pdfWidth = 190;

        const pdfHeight =
            (canvas.height * pdfWidth)
            / canvas.width;

        pdf.addImage(
            img,
            'PNG',
            10,
            10,
            pdfWidth,
            pdfHeight
        );

        pdf.save(
            dealerName + '.pdf'
        );

        document.body.removeChild(div);

    }catch(err){

        console.error(err);

        alert(err.message || err);
    }
}

/* =========================
DOWNLOAD ALL PDF
========================= */
async function downloadAllFlyersPDF(){

    try{

        const dealers =
            await BrochureGenerator.getDealersWithOffers();

        for(const d of dealers){

            await downloadSinglePDF(
                d.name
            );
        }

    }catch(err){

        console.error(err);

        alert(err.message || err);
    }
}

/* =========================
SEND BULK WHATSAPP
========================= */
async function sendBulkWhatsAppFlyers(){

    try{

        const dealers =
            await BrochureGenerator.getDealersWithOffers();

        for(const d of dealers){

            if(d.phone){

                BrochureGenerator.sendFlyerToWhatsApp(
                    d.name
                );

                await new Promise(r =>
                    setTimeout(r,1500)
                );
            }
        }

    }catch(err){

        console.error(err);

        alert(err.message || err);
    }
}

</script>

</body>
</html>
