<body>

<div class="container">

Dealer Intelligence Dashboard
</h1>

<!-- ========== DISTRIBUTOR STOCK UPLOAD SECTION (MULTI-FILE) ========== -->
<div class="upload-section">
    <h3><i class="fas fa-warehouse"></i> Distributor Stock (Multiple Excel Files)</h3>

</div>

</div>

<div class="stat-card">

<div>High Discount</div>
</div>

<div class="stat-card">
<div class="stat-number" id="lowStockCount">0</div>
<div>Low Stock</div>
</div>

onclick="runAnalysis()">

Run Analysis

Generate Flyers

</button>

onclick="downloadAllFlyersPDF()">

Download PDF

</button>

Send Flyers

</button>

</div>

Active Offers
</h2>

<thead>

<tr>
<th>Dealer</th>
<th>Part</th>
<th>District</th>
<th>Stock</th>
<th>Discount</th>
<th>Offer Price</th>

</tr>

</thead>

</table>

Dealer Flyers
</h2>

<div id="flyerList"
class="flex"
style="margin-top:15px;"></div>

</div>

<script>

/* =========================
READ EXCEL FILE (HELPER)
========================= */
function readExcelFile(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(sheet);
                const stock = rows.map(row => ({
                    part: row['Part No'] || row['part_no'] || row['Part Number'] || row['Part'],
                    distributor: row['Distributor Name'] || row['distributor'] || row['Supplier'] || '',
                    stock: parseFloat(row['Available Stock'] || row['stock'] || 0),
                    price: parseFloat(row['Price'] || row['price'] || 0),
                    leadTime: parseFloat(row['Lead Time (Days)'] || row['leadTime'] || 3)
                })).filter(item => item.part);
                resolve(stock);
            } catch(err) {
                reject(err);
            }
        };
        reader.onerror = reject;
        reader.readAsArrayBuffer(file);
    });
}

/* =========================
UPLOAD MULTIPLE DISTRIBUTOR FILES
========================= */
async function uploadMultipleDistributorFiles() {
    const files = document.getElementById('distributorFiles').files;
    if (files.length === 0) {
        alert("Please select one or more Excel files");
        return;
    }
    
    const statusSpan = document.getElementById('distributorStatus');
    statusSpan.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing ' + files.length + ' file(s)...';
    statusSpan.style.color = '#facc15';
    
    let allStock = [];
    let errorCount = 0;
    
    for (let file of files) {
        try {
            const stockData = await readExcelFile(file);
            allStock = allStock.concat(stockData);
            console.log(`✅ Loaded ${stockData.length} items from ${file.name}`);
        } catch(err) {
            console.error(`Error reading ${file.name}:`, err);
            errorCount++;
        }
    }
    
    if (errorCount > 0) {
        statusSpan.innerHTML = `⚠️ ${errorCount} file(s) had errors. Partial data loaded.`;
        statusSpan.style.color = '#facc15';
    }
    
    if (allStock.length === 0) {
        statusSpan.innerHTML = '❌ No valid stock data found in selected files.';
        statusSpan.style.color = '#f87171';
        return;
    }
    
    // Merge duplicates: same part + same distributor
    const mergedMap = new Map();
    for (const item of allStock) {
        const key = `${item.part}|${item.distributor}`;
        if (mergedMap.has(key)) {
            const existing = mergedMap.get(key);
            existing.stock += item.stock;
            // Keep lowest price and lead time
            if (item.price && item.price < existing.price) existing.price = item.price;
            if (item.leadTime && item.leadTime < existing.leadTime) existing.leadTime = item.leadTime;
        } else {
            mergedMap.set(key, { ...item });
        }
    }
    
    const combinedStock = Array.from(mergedMap.values());
    localStorage.setItem('distributorStock', JSON.stringify(combinedStock));
    
    statusSpan.innerHTML = `✅ Loaded ${files.length} file(s), total ${combinedStock.length} distributor stock entries.`;
    statusSpan.style.color = '#4ade80';
    
    // Optional: trigger refresh of DealerIntelligence if available
    if (window.DealerIntelligence && typeof window.DealerIntelligence.refreshStock === 'function') {
        window.DealerIntelligence.refreshStock();
    }
    
    // Show summary
    const summary = {};
    for (const item of combinedStock) {
        summary[item.distributor] = (summary[item.distributor] || 0) + 1;
    }
    console.log('Distributor summary:', summary);
}

/* =========================
INIT
========================= */
window.addEventListener('load', async () => {

    try{
        if(window.BrochureGenerator?.init){
            await BrochureGenerator.init();
            console.log("✅ BrochureGenerator Initialized");
        }
        
        // Load existing distributor stock into memory if needed
        const existingStock = localStorage.getItem('distributorStock');
        if (existingStock) {
            const stock = JSON.parse(existingStock);
            console.log(`📦 Loaded ${stock.length} distributor stock entries from cache`);
            const statusSpan = document.getElementById('distributorStatus');
            if (statusSpan && stock.length > 0) {
                statusSpan.innerHTML = `📦 ${stock.length} distributor stock entries loaded. Add more files to update.`;
                statusSpan.style.color = '#4ade80';
            }
        }
    }catch(err){
        console.error(err);
    }
});

/* =========================
RUN ANALYSIS
========================= */
async function runAnalysis(){

    try{

        const result =
            await DealerIntelligence.runFullAnalysis();

        document.getElementById('totalOffers').innerText =
            result.offersGenerated || 0;

        document.getElementById('highDiscount').innerText =
            result.highDiscountOffers || 0;

        document.getElementById('lowStockCount').innerText =
            result.lowStockAlerts || 0;

        document.getElementById('areasCount').innerText =
            result.areasAnalysed || 0;

        displayOffers(result.offers || []);

    }catch(err){

        console.error(err);

        alert(err.message || err);
    }
}

/* =========================
DISPLAY OFFERS
========================= */
function displayOffers(offers){

    const tbody =
        document.getElementById('offersTbody');

    tbody.innerHTML = '';

    offers.slice(0,50).forEach(o => {

        const dealerSafe =
            JSON.stringify(o.dealer || '');

        const row =
            tbody.insertRow();

        row.insertCell(0).innerText =
            o.dealer || '';

        row.insertCell(1).innerText =
            o.part || '';

        row.insertCell(2).innerText =
            o.pincode || '-';

        row.insertCell(3).innerText =
            o.totalStock || 0;

        row.insertCell(4).innerText =
            (o.discount || 0) + '%';

        row.insertCell(5).innerText =
            '₹' + Number(o.offerPrice || 0).toFixed(2);

        row.insertCell(6).innerHTML = `

        <button class="btn btn-whatsapp"
        onclick='sendSingleWhatsApp(${dealerSafe})'>

        <i class="fab fa-whatsapp"></i>

        </button>

        `;
    });
}

/* =========================
WHATSAPP
========================= */
async function sendSingleWhatsApp(dealerName){

    try{

        await BrochureGenerator.loadDealerMaster();

        BrochureGenerator.loadOffers();

        BrochureGenerator.sendFlyerToWhatsApp(
            dealerName
        );

    }catch(err){

        console.error(err);

        alert(err.message || err);
    }
}

/* =========================
GENERATE ALL FLYERS
========================= */
async function generateAllFlyers(){

    try{

        await BrochureGenerator.loadDealerMaster();

        BrochureGenerator.loadOffers();

        const dealers =
            await BrochureGenerator.getDealersWithOffers();

        const div =
            document.getElementById('flyerList');

        div.innerHTML = '';

        if(!dealers.length){

            div.innerHTML = `
            <div style="
                color:#facc15;
                padding:20px;
            ">
                No flyers found.
                Run Analysis first.
            </div>
            `;

            return;
        }

        dealers.forEach(d => {

            const dealerSafe =
                JSON.stringify(d.name || '');

            div.innerHTML += `

            <div class="flyer-card">

                <div class="flyer-title">
                    ${d.name || ''}
                </div>

                <div>
                    Total Offers:
                    ${d.offerCount || 0}
                </div>

                <div class="flyer-buttons">

                    <button class="btn"
                    onclick='previewFlyer(${dealerSafe})'>

                    👁 Preview

                    </button>

                    <button class="btn btn-purple"
                    onclick='downloadSinglePDF(${dealerSafe})'>

                    📄 PDF

                    </button>

                    <button class="btn btn-whatsapp"
                    onclick='sendSingleWhatsApp(${dealerSafe})'>

                    <i class="fab fa-whatsapp"></i>
                    WhatsApp

                    </button>

                </div>

            </div>
            `;
        });

    }catch(err){

        console.error(err);

        alert(err.message || err);
    }
}

/* =========================
PREVIEW
========================= */
async function previewFlyer(dealerName){

    try{

        await BrochureGenerator.loadDealerMaster();

        BrochureGenerator.loadOffers();

        BrochureGenerator.showBrochurePreview(
            dealerName
        );

    }catch(err){

        console.error(err);

        alert(err.message || err);
    }
}

/* =========================
PDF DOWNLOAD
========================= */
async function downloadSinglePDF(dealerName){

    try{

        const html =
            BrochureGenerator.generateFullBrochureHTML(
                dealerName
            );

        if(!html){

            alert('No flyer found');

            return;
        }

        const div =
            document.createElement('div');

        div.innerHTML = html;

        div.style.position = 'fixed';
        div.style.left = '-9999px';
        div.style.top = '0';
        div.style.width = '800px';
        div.style.background = 'white';
        div.style.padding = '20px';

        document.body.appendChild(div);

        await new Promise(r =>
            setTimeout(r, 700)
        );

        const canvas =
            await html2canvas(div,{
                scale:2,
                useCORS:true
            });

        const img =
            canvas.toDataURL('image/png');

        const jsPDF =
            window.jspdf?.jsPDF;

        if(!jsPDF){

            alert('PDF library missing');

            return;
        }

        const pdf =
            new jsPDF(
                'p',
                'mm',
                'a4'
            );

        const pdfWidth = 190;

        const pdfHeight =
            (canvas.height * pdfWidth)
            / canvas.width;

        pdf.addImage(
            img,
            'PNG',
            10,
            10,
            pdfWidth,
            pdfHeight
        );

        pdf.save(
            dealerName.replace(/[^a-z0-9]/gi, '_') + '.pdf'
        );

        document.body.removeChild(div);

    }catch(err){

        console.error(err);

        alert(err.message || err);
    }
}

/* =========================
DOWNLOAD ALL PDF
========================= */
async function downloadAllFlyersPDF(){

    try{

        const dealers =
            await BrochureGenerator.getDealersWithOffers();

        for(const d of dealers){

            await downloadSinglePDF(
                d.name
            );
            
            // Small delay between PDF generations
            await new Promise(r => setTimeout(r, 500));
        }
        
        alert(`Downloaded ${dealers.length} PDF files`);

    }catch(err){

        console.error(err);

        alert(err.message || err);
    }
}

/* =========================
SEND BULK WHATSAPP
========================= */
async function sendBulkWhatsAppFlyers(){

    try{

        const dealers =
            await BrochureGenerator.getDealersWithOffers();
            
        let sentCount = 0;

        for(const d of dealers){

            if(d.phone){

                BrochureGenerator.sendFlyerToWhatsApp(
                    d.name
                );

                sentCount++;
                
                await new Promise(r =>
                    setTimeout(r,1500)
                );
            }
        }
        
        alert(`Opened WhatsApp for ${sentCount} dealers`);

    }catch(err){

        console.error(err);

        alert(err.message || err);
    }
}

</script>
