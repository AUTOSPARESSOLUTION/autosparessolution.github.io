<!-- ========================================= -->
<!-- MARKETING MATERIALS SECTION -->
<!-- ========================================= -->

<div class="upload-section" style="margin-top: 1rem;">

    <h3>
        <i class="fas fa-brochure"></i>
        Marketing Materials (Flyers / Brochures)
    </h3>

    <div class="flex">

        <button class="btn btn-purple"
            onclick="generateAllFlyers()">

            <i class="fas fa-file-alt"></i>
            Generate Flyers
        </button>

        <button class="btn"
            onclick="exportAllFlyersHTML()">

            <i class="fas fa-download"></i>
            Download HTML
        </button>

        <button class="btn btn-warning"
            onclick="exportAllFlyersPDF()">

            <i class="fas fa-file-pdf"></i>
            Download PDF
        </button>

        <button class="btn btn-whatsapp"
            onclick="sendBulkWhatsAppFlyers()">

            <i class="fab fa-whatsapp"></i>
            Send to All Dealers
        </button>

    </div>

    <div id="flyerStatus"
        style="margin-top:0.5rem;font-size:0.85rem;">
    </div>

    <div id="flyerList"
        class="flex"
        style="margin-top:0.5rem;">
    </div>

</div>

<!-- ========================================= -->
<!-- FLYER FUNCTIONS -->
<!-- ========================================= -->

<script>

// =======================================
// GENERATE ALL FLYERS
// =======================================
async function generateAllFlyers() {

    const resultDiv =
        document.getElementById('flyerStatus');

    resultDiv.innerHTML =
        'Generating flyers...';

    try {

        await BrochureGenerator.loadDealerMaster();

        BrochureGenerator.loadOffers();

        const dealers =
            await BrochureGenerator.getDealersWithOffers();

        displayFlyerList(dealers);

        resultDiv.innerHTML =
            `✅ Generated flyers for ${dealers.length} dealers`;

    } catch (err) {

        console.error(err);

        resultDiv.innerHTML =
            `❌ Error: ${err.message}`;
    }
}

// =======================================
// DISPLAY FLYER LIST
// =======================================
function displayFlyerList(flyers) {

    const container =
        document.getElementById('flyerList');

    if (!container) return;

    if (!flyers || flyers.length === 0) {

        container.innerHTML =
            '<div>No dealers with offers found</div>';

        return;
    }

    let html = '';

    for (const f of flyers) {

        html += `

        <div style="
            background:#0f172a;
            padding:12px;
            border-radius:10px;
            margin:5px;
            min-width:260px;
            border:1px solid #334155;
        ">

            <div style="
                color:#facc15;
                font-weight:bold;
                margin-bottom:6px;
                font-size:15px;
            ">
                ${f.name}
            </div>

            <div style="font-size:13px;">
                📞 ${f.phone || 'No Phone'}
            </div>

            <div style="font-size:13px;">
                🎁 ${f.offerCount} Offers
            </div>

            <div style="
                margin-top:10px;
                display:flex;
                gap:6px;
                flex-wrap:wrap;
            ">

                <button class="btn"
                    onclick="previewFlyer('${String(f.name).replace(/'/g, "\\'")}')">

                    👁 Preview
                </button>

                <button class="btn btn-whatsapp"
                    onclick="sendDealerWhatsApp('${String(f.name).replace(/'/g, "\\'")}')">

                    WhatsApp
                </button>

            </div>

        </div>
        `;
    }

    container.innerHTML = html;
}

// =======================================
// PREVIEW FLYER
// =======================================
function previewFlyer(dealerName) {

    BrochureGenerator.showFlyerPreview(
        dealerName
    );
}

// =======================================
// SINGLE WHATSAPP
// =======================================
function sendDealerWhatsApp(dealerName) {

    BrochureGenerator.sendFlyerWhatsApp(
        dealerName
    );
}

// =======================================
// DOWNLOAD HTML
// =======================================
async function exportAllFlyersHTML() {

    await BrochureGenerator.exportAllFlyers();
}

// =======================================
// DOWNLOAD PDF
// =======================================
async function exportAllFlyersPDF() {

    await BrochureGenerator.exportAllFlyersPDF();
}

// =======================================
// BULK WHATSAPP
// =======================================
async function sendBulkWhatsAppFlyers() {

    await BrochureGenerator.sendBulkWhatsAppFlyers();
}

                                                                    </script>
