<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Auto Spares – Quotation from Order</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; border-radius: 10px; padding: 20px; }
        h1 { color: #0a7c71; }
        textarea { width: 100%; height: 150px; padding: 10px; font-family: monospace; margin: 10px 0; }
        button { background: #0a7c71; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin: 5px; }
        button:hover { background: #09645a; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #0a7c71; color: white; }
        .error { color: red; }
        .instruction { background: #e9ecef; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
    </style>
</head>
<body>
<div class="container">
    <h1>📄 Create Quotation from Order</h1>
    
    <div class="instruction">
        <strong>📝 How to use:</strong><br>
        1. Copy the order from customer's email/message<br>
        2. Paste below (one item per line)<br>
        3. Example format: <code>082BAA04661N-3L</code> or <code>Brake pad for Swift 4</code><br>
        4. Click "Generate Quotation"
    </div>

    <textarea id="orderInput" placeholder="Paste order here...
Example:
082BAA04661N-3L
082BAA07201N-3
50ft 10X1.5X30 Lock nut 4
Brake pad Swift 2"></textarea>
    
    <div>
        <button onclick="generateQuotation()">Generate Quotation</button>
        <button onclick="clearAll()">Clear</button>
    </div>
    
    <div id="resultArea"></div>
</div>

<script>
    let products = [];

    // Load products from prices.csv
    async function loadProducts() {
        try {
            const response = await fetch('prices.csv');
            if (!response.ok) throw new Error('prices.csv not found');
            const csv = await response.text();
            const lines = csv.split('\n');
            const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
            const partIdx = headers.indexOf('part');
            const descIdx = headers.indexOf('desc') !== -1 ? headers.indexOf('desc') : headers.indexOf('description');
            const priceIdx = headers.indexOf('price') !== -1 ? headers.indexOf('price') : headers.indexOf('our price');
            
            for (let i = 1; i < lines.length; i++) {
                const cols = lines[i].split(',');
                if (cols.length < 3) continue;
                const part = cols[partIdx]?.trim();
                if (!part) continue;
                products.push({
                    part: part,
                    desc: cols[descIdx]?.trim() || '',
                    brand: headers.includes('brand') ? cols[headers.indexOf('brand')]?.trim() : '',
                    price: parseFloat(cols[priceIdx]) || 0
                });
            }
            console.log('Loaded', products.length, 'products');
            document.getElementById('resultArea').innerHTML = '<div style="color:green;">✅ Products loaded: ' + products.length + ' items ready</div>';
        } catch (err) {
            console.error(err);
            document.getElementById('resultArea').innerHTML = '<div class="error">❌ Failed to load prices.csv. Make sure the file exists in the same folder.</div>';
        }
    }

    function parseOrderLine(line) {
        line = line.trim();
        if (line === '') return null;
        
        let quantity = 1;
        let identifier = line;
        
        // Try to extract quantity from end (e.g., "4" at the end)
        const words = line.split(/\s+/);
        const lastWord = words[words.length-1];
        if (!isNaN(parseFloat(lastWord)) && isFinite(lastWord)) {
            quantity = parseInt(lastWord);
            identifier = words.slice(0, -1).join(' ');
        }
        
        // Check if line contains a dash (part number pattern)
        const dashMatch = identifier.match(/^([A-Z0-9]+)-(\d+)/i);
        if (dashMatch) {
            quantity = parseInt(dashMatch[2]);
            identifier = dashMatch[1];
        }
        
        // Remove special characters from identifier
        identifier = identifier.replace(/[①-⑨]/g, '').trim();
        
        return { identifier, quantity, rawLine: line };
    }

    function matchProduct(identifier) {
        // Exact match on part number
        let exact = products.find(p => p.part.toLowerCase() === identifier.toLowerCase());
        if (exact) return exact;
        
        // Partial match in description
        const searchTerm = identifier.toLowerCase();
        let bestMatch = null;
        let bestScore = 0;
        
        for (const prod of products) {
            let score = 0;
            if (prod.part.toLowerCase().includes(searchTerm)) score += 10;
            if (prod.desc.toLowerCase().includes(searchTerm)) score += 5;
            if (prod.brand && prod.brand.toLowerCase().includes(searchTerm)) score += 3;
            
            // Word by word matching
            const words = searchTerm.split(/\s+/);
            for (const word of words) {
                if (word.length > 2) {
                    if (prod.desc.toLowerCase().includes(word)) score += 2;
                    if (prod.part.toLowerCase().includes(word)) score += 3;
                }
            }
            
            if (score > bestScore) {
                bestScore = score;
                bestMatch = prod;
            }
        }
        
        return bestScore >= 2 ? bestMatch : null;
    }

    function generateQuotation() {
        const orderText = document.getElementById('orderInput').value;
        if (!orderText.trim()) {
            alert('Please paste order first');
            return;
        }
        
        const lines = orderText.split('\n');
        const quoteItems = [];
        const unmatched = [];
        
        for (const line of lines) {
            const parsed = parseOrderLine(line);
            if (!parsed) continue;
            
            const product = matchProduct(parsed.identifier);
            if (product) {
                quoteItems.push({
                    rawLine: parsed.rawLine,
                    identifier: parsed.identifier,
                    part: product.part,
                    desc: product.desc,
                    brand: product.brand,
                    qty: parsed.quantity,
                    price: product.price,
                    total: product.price * parsed.quantity
                });
            } else {
                unmatched.push({ rawLine: parsed.rawLine, identifier: parsed.identifier });
            }
        }
        
        let html = '<h2>📋 Quotation</h2>';
        
        if (quoteItems.length === 0 && unmatched.length === 0) {
            html += '<p>No items found. Please check the format.</p>';
        } else {
            html += '<table><thead><tr><th>Customer Line</th><th>Matched Part</th><th>Description</th><th>Brand</th><th>Qty</th><th>Unit Price</th><th>Total</th></tr></thead><tbody>';
            let subtotal = 0;
            
            for (const item of quoteItems) {
                subtotal += item.total;
                html += `<tr>
                    <td>${escapeHtml(item.rawLine)}<br><small style="color:#666;">→ ${escapeHtml(item.identifier)}</small></td>
                    <td>${escapeHtml(item.part)}</td>
                    <td>${escapeHtml(item.desc)}</td>
                    <td>${escapeHtml(item.brand)}</td>
                    <td>${item.qty}</td>
                    <td>₹${item.price.toFixed(2)}</td>
                    <td>₹${item.total.toFixed(2)}</td>
                </tr>`;
            }
            
            const gst = subtotal * 0.18;
            const grand = subtotal + gst;
            
            html += `<tr style="font-weight:bold;"><td colspan="6" style="text-align:right;">Subtotal</td><td>₹${subtotal.toFixed(2)}</td></tr>`;
            html += `<tr style="font-weight:bold;"><td colspan="6" style="text-align:right;">GST (18%)</td><td>₹${gst.toFixed(2)}</td></tr>`;
            html += `<tr style="font-weight:bold; background:#f0f0f0;"><td colspan="6" style="text-align:right;">Grand Total</td><td>₹${grand.toFixed(2)}</td></tr>`;
            html += '</tbody></table>';
            
            if (unmatched.length > 0) {
                html += '<div class="error"><strong>⚠️ Unmatched items:</strong><ul>';
                for (const u of unmatched) {
                    html += `<li>${escapeHtml(u.rawLine)} → searched for: ${escapeHtml(u.identifier)}</li>`;
                }
                html += '</ul></div>';
            }
            
            html += '<div style="margin-top:20px; text-align:right; font-size:12px; color:#666;">Auto Spares Solution | GSTIN: 19ANOPD3300R1ZO</div>';
        }
        
        document.getElementById('resultArea').innerHTML = html;
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function clearAll() {
        document.getElementById('orderInput').value = '';
        document.getElementById('resultArea').innerHTML = '';
    }
    
    // Load products when page loads
    loadProducts();
</script>
</body>
</html>
