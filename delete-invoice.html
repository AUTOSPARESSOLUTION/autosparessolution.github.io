<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Invoice – Reverse Stock & Outstanding</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background: #e9ecef; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; border-radius: 12px; padding: 20px; }
        h1 { color: #0a7c71; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #dee2e6; padding: 10px; text-align: left; }
        th { background: #0a7c71; color: white; }
        .delete-btn { background: #dc3545; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        .tab { overflow: hidden; border-bottom: 1px solid #ccc; margin-bottom: 20px; }
        .tab button { background-color: #f1f1f1; float: left; border: none; outline: none; cursor: pointer; padding: 10px 16px; margin-right: 5px; }
        .tab button.active { background-color: #0a7c71; color: white; }
        .tabcontent { display: none; }
    </style>
</head>
<body>
<div class="container">
    <h1>Delete Invoice (Reverse Effects)</h1>
    <div class="tab">
        <button class="tablinks active" onclick="openTab(event, 'Sales')">Sales Invoices</button>
        <button class="tablinks" onclick="openTab(event, 'Purchase')">Purchase Invoices</button>
    </div>
    <div id="Sales" class="tabcontent" style="display:block;">
        <h2>Sales Invoices</h2>
        <div id="salesTable"></div>
    </div>
    <div id="Purchase" class="tabcontent">
        <h2>Purchase Invoices</h2>
        <div id="purchaseTable"></div>
    </div>
</div>

<script>
    // ======================== Helper functions (no external dependencies) ========================
    function getSalesInvoices() { return JSON.parse(localStorage.getItem('salesInvoices') || '[]'); }
    function saveSalesInvoices(inv) { localStorage.setItem('salesInvoices', JSON.stringify(inv)); }
    function getAllInvoices() { return JSON.parse(localStorage.getItem('allInvoices') || '[]'); }
    function saveAllInvoices(inv) { localStorage.setItem('allInvoices', JSON.stringify(inv)); }
    function getCustomers() { return JSON.parse(localStorage.getItem('customers') || '[]'); }
    function saveCustomers(cust) { localStorage.setItem('customers', JSON.stringify(cust)); }
    function getCustomerLedger() { return JSON.parse(localStorage.getItem('customerLedger') || '[]'); }
    function saveCustomerLedger(ledger) { localStorage.setItem('customerLedger', JSON.stringify(ledger)); }
    function getInventoryTransactions() { return JSON.parse(localStorage.getItem('inventoryTransactions') || '[]'); }
    function saveInventoryTransactions(trans) { localStorage.setItem('inventoryTransactions', JSON.stringify(trans)); }
    function getProducts() { return JSON.parse(localStorage.getItem('products') || '[]'); }
    function saveProducts(prod) { localStorage.setItem('products', JSON.stringify(prod)); }
    function getPurchaseInvoices() { return JSON.parse(localStorage.getItem('purchaseInvoices') || '[]'); }
    function savePurchaseInvoices(inv) { localStorage.setItem('purchaseInvoices', JSON.stringify(inv)); }
    function getSuppliers() { return JSON.parse(localStorage.getItem('suppliers') || '[]'); }
    function saveSuppliers(sup) { localStorage.setItem('suppliers', JSON.stringify(sup)); }

    // ======================== Tab switching ========================
    function openTab(evt, tabName) {
        document.querySelectorAll('.tabcontent').forEach(div => div.style.display = 'none');
        document.querySelectorAll('.tablinks').forEach(btn => btn.classList.remove('active'));
        document.getElementById(tabName).style.display = 'block';
        evt.currentTarget.classList.add('active');
        if (tabName === 'Sales') loadSalesInvoices();
        else loadPurchaseInvoices();
    }

    // ======================== Sales Invoices ========================
    function loadSalesInvoices() {
        const invoices = getSalesInvoices();
        if (invoices.length === 0) {
            document.getElementById('salesTable').innerHTML = '<p>No sales invoices found.</p>';
            return;
        }
        let html = '<table><thead><tr><th>Invoice No</th><th>Date</th><th>Customer Email</th><th>Total (₹)</th><th>Action</th></tr></thead><tbody>';
        invoices.forEach(inv => {
            html += `<tr>
                <td>${escapeHtml(inv.invoiceNo)}</td>
                <td>${inv.date}</td>
                <td>${escapeHtml(inv.customerEmail)}</td>
                <td>₹${inv.total.toLocaleString()}</td>
                <td><button class="delete-btn" onclick="deleteSalesInvoiceHandler('${inv.id}')">Delete & Reverse</button></td>
            </tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('salesTable').innerHTML = html;
    }

    window.deleteSalesInvoiceHandler = async function(invoiceId) {
        if (!confirm('Delete this sales invoice? Stock will be added back, customer outstanding reduced.')) return;
        try {
            let invoices = getSalesInvoices();
            const invoice = invoices.find(inv => inv.id == invoiceId);
            if (!invoice) { alert('Invoice not found.'); return; }

            // 1. Reverse stock: add quantities back
            let products = getProducts();
            for (let item of invoice.items) {
                let prod = products.find(p => p.id == item.productId || p.sku == item.productId);
                if (prod) {
                    prod.currentStock = (prod.currentStock || 0) + item.quantity;
                }
            }
            saveProducts(products);

            // 2. Remove inventory transactions linked to this invoice
            let invTransactions = getInventoryTransactions();
            invTransactions = invTransactions.filter(t => t.ref !== invoice.invoiceNo && t.ref !== `INV-${invoice.id}`);
            saveInventoryTransactions(invTransactions);

            // 3. Update customer outstanding
            let customers = getCustomers();
            const customer = customers.find(c => c.email === invoice.customerEmail);
            if (customer) {
                customer.outstanding = (customer.outstanding || 0) - invoice.total;
                if (customer.outstanding < 0) customer.outstanding = 0;
                saveCustomers(customers);

                // 4. Add ledger reversal entry
                let ledger = getCustomerLedger();
                ledger.push({
                    id: Date.now(),
                    customerEmail: invoice.customerEmail,
                    date: new Date().toISOString().slice(0,10),
                    type: 'reversal',
                    ref: `DEL-${invoice.invoiceNo}`,
                    debit: 0,
                    credit: invoice.total,
                    balance: customer.outstanding,
                    note: `Reversal of invoice ${invoice.invoiceNo}`
                });
                saveCustomerLedger(ledger);
            }

            // 5. Remove from salesInvoices and allInvoices
            const remaining = invoices.filter(inv => inv.id != invoiceId);
            saveSalesInvoices(remaining);
            let allInv = getAllInvoices();
            allInv = allInv.filter(inv => inv.id != invoiceId && inv.invoiceNo !== invoice.invoiceNo);
            saveAllInvoices(allInv);

            alert('Sales invoice deleted successfully.');
            loadSalesInvoices();
        } catch (err) {
            console.error(err);
            alert('Error: ' + err.message);
        }
    };

    // ======================== Purchase Invoices ========================
    function loadPurchaseInvoices() {
        const invoices = getPurchaseInvoices();
        if (invoices.length === 0) {
            document.getElementById('purchaseTable').innerHTML = '<p>No purchase invoices found.</p>';
            return;
        }
        let html = '<td><thead><tr><th>PO No</th><th>Date</th><th>Supplier Email</th><th>Total (₹)</th><th>Action</th></tr></thead><tbody>';
        invoices.forEach(inv => {
            html += `<tr>
                <td>${escapeHtml(inv.poNo)}</td>
                <td>${inv.date}</td>
                <td>${escapeHtml(inv.supplierEmail)}</td>
                <td>₹${inv.total.toLocaleString()}</td>
                <td><button class="delete-btn" onclick="deletePurchaseInvoiceHandler('${inv.id}')">Delete & Reverse</button></td>
            </tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('purchaseTable').innerHTML = html;
    }

    window.deletePurchaseInvoiceHandler = function(invoiceId) {
        if (!confirm('Delete this purchase invoice? Stock will be reduced, supplier outstanding reduced.')) return;
        try {
            let invoices = getPurchaseInvoices();
            const invoice = invoices.find(inv => inv.id == invoiceId);
            if (!invoice) { alert('Invoice not found'); return; }

            // Reverse stock: subtract quantities (because purchase originally added stock)
            let products = getProducts();
            for (let item of invoice.items) {
                let prod = products.find(p => p.id == item.productId || p.sku == item.productId);
                if (prod) {
                    prod.currentStock = (prod.currentStock || 0) - item.quantity;
                    if (prod.currentStock < 0) prod.currentStock = 0;
                }
            }
            saveProducts(products);

            // Update supplier outstanding
            let suppliers = getSuppliers();
            let supplier = suppliers.find(s => s.email === invoice.supplierEmail);
            if (supplier) {
                supplier.outstanding = (supplier.outstanding || 0) - invoice.total;
                if (supplier.outstanding < 0) supplier.outstanding = 0;
                saveSuppliers(suppliers);
            }

            // Remove the purchase invoice
            const remaining = invoices.filter(inv => inv.id != invoiceId);
            savePurchaseInvoices(remaining);

            alert('Purchase invoice deleted successfully.');
            loadPurchaseInvoices();
        } catch (err) {
            alert('Error: ' + err.message);
        }
    };

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    // Load initial view
    loadSalesInvoices();
</script>
</body>
</html>
