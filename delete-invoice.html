<!DOCTYPE html>
<html>
<head><title>Delete Invoice</title></head>
<body>
<h2>Delete Invoice by Number</h2>
<input type="text" id="invNo" placeholder="Invoice Number">
<button onclick="del()">Delete</button>
<script>
function del() {
    let invNo = document.getElementById('invNo').value;
    let all = JSON.parse(localStorage.getItem('allInvoices') || '[]');
    let sales = JSON.parse(localStorage.getItem('salesInvoices') || '[]');
    let newAll = all.filter(i => i.invoiceNo !== invNo);
    let newSales = sales.filter(i => i.invoiceNo !== invNo);
    localStorage.setItem('allInvoices', JSON.stringify(newAll));
    localStorage.setItem('salesInvoices', JSON.stringify(newSales));
    alert(`Deleted invoice ${invNo}. Remaining: ${newAll.length} invoices.`);
}
</script>
</body>
</html>
