<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supplier Ledger – Auto Spares</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Roboto', sans-serif;
            background: #e9ecef;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        h1 { color: #0a7c71; }
        .supplier-info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #0a7c71;
        }
        .search-box {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #dee2e6;
            padding: 10px;
            text-align: left;
            vertical-align: top;
        }
        th { background: #0a7c71; color: white; }
        .balance-positive { color: #28a745; font-weight: bold; }
        .balance-negative { color: #dc3545; font-weight: bold; }
        button {
            background: #0a7c71;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
        }
        button:hover { background: #09645a; }
        input, select {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }
        .back-link {
            background: #6c757d;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h1><i class="fas fa-book"></i> Supplier Ledger</h1>
        <a href="supplier-master.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Suppliers</a>
    </div>

    <div id="supplierInfo" class="supplier-info">Select or enter supplier email</div>

    <div class="search-box">
        <select id="supplierSelect" style="flex:1;">
            <option value="">-- Select Supplier --</option>
        </select>
        <span style="color:#555;">OR</span>
        <input type="email" id="supplierEmailInput" placeholder="Enter supplier email directly" style="flex:1;">
        <button onclick="loadLedgerByEmail()"><i class="fas fa-chart-line"></i> Load Ledger</button>
        <button onclick="refreshDropdown()"><i class="fas fa-sync-alt"></i> Refresh List</button>
        <button onclick="exportLedger()"><i class="fas fa-file-csv"></i> Export CSV</button>
        <input type="text" id="searchRef" placeholder="Search by ref...">
        <button onclick="filterLedger()"><i class="fas fa-search"></i> Search</button>
    </div>

    <div id="ledgerTable"></div>
</div>

<script>
    let currentSupplier = null;
    let allTransactions = [];

    function refreshDropdown() {
        const suppliers = JSON.parse(localStorage.getItem('suppliers') || '[]');
        const select = document.getElementById('supplierSelect');
        select.innerHTML = '<option value="">-- Select Supplier --</option>';
        suppliers.forEach(s => {
            select.innerHTML += `<option value="${s.email}">${s.name} (${s.email})</option>`;
        });
        // Auto-select if coming from Supplier Master
        const viewEmail = localStorage.getItem('viewSupplierEmail');
        if (viewEmail) {
            select.value = viewEmail;
            localStorage.removeItem('viewSupplierEmail');
            loadLedgerByEmail();
        }
    }

    function loadLedgerByEmail() {
        let email = document.getElementById('supplierSelect').value;
        if (!email) email = document.getElementById('supplierEmailInput').value.trim();
        if (!email) {
            alert('Please select or enter a supplier email');
            return;
        }
        const suppliers = JSON.parse(localStorage.getItem('suppliers') || '[]');
        currentSupplier = suppliers.find(s => s.email === email);
        if (!currentSupplier) {
            alert(`Supplier with email "${email}" not found. Please add in Supplier Master.`);
            return;
        }

        document.getElementById('supplierInfo').innerHTML = `
            <strong>${escapeHtml(currentSupplier.name)}</strong><br>
            Email: ${escapeHtml(currentSupplier.email)} | Phone: ${escapeHtml(currentSupplier.phone)}<br>
            Outstanding: <strong>₹${(currentSupplier.outstanding||0).toLocaleString()}</strong>
        `;

        // Build transactions
        const transactions = [];
        // Purchase invoices
        const allPurchaseInvoices = JSON.parse(localStorage.getItem('purchaseInvoices') || '[]');
        const supplierInvoices = allPurchaseInvoices.filter(inv => inv.supplier?.email === email || inv.supplierEmail === email);
        supplierInvoices.forEach(inv => {
            transactions.push({
                date: inv.date,
                type: 'Purchase',
                ref: inv.poNo || inv.invoiceNo,
                debit: inv.grandTotal || inv.total || 0,   // increase outstanding (supplier owes more)
                credit: 0,
                narration: `Purchase Invoice`
            });
        });

        // Supplier payments
        const allPayments = JSON.parse(localStorage.getItem('supplierPayments') || '[]');
        const supplierPayments = allPayments.filter(p => p.supplierEmail === email);
        supplierPayments.forEach(p => {
            transactions.push({
                date: p.date,
                type: 'Payment',
                ref: p.reference || 'Payment',
                debit: 0,
                credit: p.amount,
                narration: `Payment`
            });
        });

        transactions.sort((a,b) => new Date(a.date) - new Date(b.date));
        allTransactions = transactions;
        displayLedger();
    }

    function displayLedger() {
        if (!currentSupplier) return;
        let running = currentSupplier.openingBalance || 0;
        let html = '<td><thead><tr><th>Date</th><th>Type</th><th>Reference</th><th>Debit (₹)</th><th>Credit (₹)</th><th>Balance (₹)</th><th>Narration</th></tr></thead><tbody>';
        allTransactions.forEach(t => {
            running += (t.debit - t.credit);
            html += `<tr>
                <td>${t.date}</td>
                <td>${t.type}</td>
                <td>${escapeHtml(t.ref)}</td>
                <td>${t.debit ? '₹'+t.debit.toLocaleString() : '-'}</td>
                <td>${t.credit ? '₹'+t.credit.toLocaleString() : '-'}</td>
                <td class="${running>=0?'balance-positive':'balance-negative'}">₹${running.toLocaleString()}</td>
                <td>${escapeHtml(t.narration)}</td>
            </tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('ledgerTable').innerHTML = html;
    }

    function filterLedger() {
        const term = document.getElementById('searchRef').value.toLowerCase();
        if (!term) {
            displayLedger();
            return;
        }
        const filtered = allTransactions.filter(t => 
            (t.ref && t.ref.toLowerCase().includes(term)) || 
            t.type.toLowerCase().includes(term)
        );
        if (filtered.length === 0) {
            document.getElementById('ledgerTable').innerHTML = '<p>No matching transactions.</p>';
            return;
        }
        let running = currentSupplier.openingBalance || 0;
        let html = '<table><thead>…</thead><tbody>';
        filtered.forEach(t => {
            running += (t.debit - t.credit);
            html += `<tr>
                <td>${t.date}</td>
                <td>${t.type}</td>
                <td>${escapeHtml(t.ref)}</td>
                <td>${t.debit ? '₹'+t.debit.toLocaleString() : '-'}</td>
                <td>${t.credit ? '₹'+t.credit.toLocaleString() : '-'}</td>
                <td class="${running>=0?'balance-positive':'balance-negative'}">₹${running.toLocaleString()}</td>
                <td>${escapeHtml(t.narration)}</td>
            </tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('ledgerTable').innerHTML = html;
    }

    function exportLedger() {
        if (!allTransactions.length) {
            alert('No data to export');
            return;
        }
        let csv = "Date,Type,Reference,Debit,Credit,Balance,Narration\n";
        let running = currentSupplier.openingBalance || 0;
        allTransactions.forEach(t => {
            running += (t.debit - t.credit);
            csv += `"${t.date}","${t.type}","${t.ref}",${t.debit},${t.credit},${running},"${t.narration}"\n`;
        });
        const blob = new Blob([csv], {type: 'text/csv'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `supplier_ledger_${currentSupplier.email}.csv`;
        a.click();
        URL.revokeObjectURL(url);
    }

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }

    refreshDropdown();
</script>
</body>
    </html>
