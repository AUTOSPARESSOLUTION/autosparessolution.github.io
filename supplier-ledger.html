<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supplier Ledger – Auto Spares</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background: #e9ecef; margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: auto; background: white; border-radius: 12px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1, h2, h3 { color: #0a7c71; }
        .selector-box, .payment-form, .credit-note-form { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .form-row { display: flex; flex-wrap: wrap; gap: 15px; align-items: flex-end; }
        .form-group { flex: 1; min-width: 150px; }
        label { display: block; font-size: 12px; font-weight: 600; color: #555; }
        input, select, textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; }
        button { background: #0a7c71; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        .btn-pdf { background: #e67e22; }
        .period-filters { display: flex; flex-wrap: wrap; gap: 10px; margin: 20px 0; align-items: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
        th, td { border: 1px solid #dee2e6; padding: 8px; text-align: left; }
        th { background: #0a7c71; color: white; }
        .text-right { text-align: right; }
        .balance-positive { color: #28a745; font-weight: bold; }
        .balance-negative { color: #dc3545; font-weight: bold; }
        .summary-box { background: #e9ecef; padding: 12px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 20px; flex-wrap: wrap; }
        .summary-item { flex: 1; text-align: center; }
        @media print { .no-print { display: none !important; } body { background: white; padding: 0; } .container { box-shadow: none; padding: 0; } }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
<div class="container">
    <h1>Supplier Ledger</h1>
    <div class="selector-box no-print">
        <div class="form-row">
            <div class="form-group"><label>Select Supplier</label><select id="supplierSelect"></select></div>
            <div class="form-group"><button onclick="loadSupplierLedger()">Load Ledger</button></div>
        </div>
    </div>

    <div id="paymentForm" class="payment-form no-print" style="display:none;">
        <h3>Record Payment</h3>
        <div class="form-row">
            <div class="form-group"><label>Date</label><input type="date" id="paymentDate"></div>
            <div class="form-group"><label>Amount (₹)</label><input type="number" id="paymentAmount" step="0.01"></div>
            <div class="form-group"><label>Against Invoice</label><select id="paymentInvoiceSelect"><option value="">All outstanding</option></select></div>
            <div class="form-group"><label>Remarks</label><input type="text" id="paymentRemarks"></div>
            <div class="form-group"><button onclick="recordSupplierPayment()">Record Payment</button></div>
        </div>
    </div>

    <div id="creditNoteForm" class="credit-note-form no-print" style="display:none;">
        <h3>Record Credit Note (Supplier Return)</h3>
        <div class="form-row">
            <div class="form-group"><label>Date</label><input type="date" id="creditDate"></div>
            <div class="form-group"><label>Amount (₹)</label><input type="number" id="creditAmount" step="0.01"></div>
            <div class="form-group"><label>Against Invoice</label><select id="creditInvoiceSelect"><option value="">All outstanding</option></select></div>
            <div class="form-group"><label>Remarks</label><input type="text" id="creditRemarks"></div>
            <div class="form-group"><button onclick="recordSupplierCreditNote()">Record Credit Note</button></div>
        </div>
    </div>

    <div class="period-filters no-print">
        <div class="form-group"><label>Period</label><select id="periodType"><option value="all">All Time</option><option value="fy">Financial Year</option><option value="quarter">Quarter</option><option value="month">Month</option><option value="day">Day</option><option value="custom">Custom</option></select></div>
        <div id="fyYearGroup" style="display:none;"><label>FY</label><select id="fyYear"></select></div>
        <div id="quarterGroup" style="display:none;"><label>Quarter</label><select id="quarterSelect"><option value="1">Q1</option><option value="2">Q2</option><option value="3">Q3</option><option value="4">Q4</option></select></div>
        <div id="monthGroup" style="display:none;"><label>Month</label><input type="month" id="monthPicker"></div>
        <div id="dayGroup" style="display:none;"><label>Date</label><input type="date" id="dayPicker"></div>
        <div id="customStartGroup" style="display:none;"><label>Start</label><input type="date" id="customStart"></div>
        <div id="customEndGroup" style="display:none;"><label>End</label><input type="date" id="customEnd"></div>
        <div><button class="btn-pdf" onclick="generateSupplierStatementPDF()">PDF Statement</button></div>
    </div>

    <div id="statementContainer" style="display:none;">
        <div class="summary-box" id="summaryBox"></div>
        <div style="overflow-x:auto;"><table id="statementTable"><thead><tr><th>Date</th><th>Type</th><th>Invoice No</th><th>Particulars</th><th class="text-right">Debit (₹)</th><th class="text-right">Credit (₹)</th><th class="text-right">Balance (₹)</th></tr></thead><tbody id="statementBody"></tbody></table></div>
    </div>
</div>

<script>
    let suppliers = JSON.parse(localStorage.getItem('suppliers') || '[]');
    let purchaseInvoices = JSON.parse(localStorage.getItem('purchaseInvoices') || '[]');
    let supplierPayments = JSON.parse(localStorage.getItem('supplierPayments') || '[]');
    let supplierCreditNotes = JSON.parse(localStorage.getItem('supplierCreditNotes') || '[]');
    let currentSupplier = null;

    function formatDate(d) { return new Date(d).toLocaleDateString('en-IN'); }
    function formatMoney(amt) { return '₹' + amt.toFixed(2); }

    function populateSupplierDropdown() {
        const select = document.getElementById('supplierSelect');
        select.innerHTML = '<option value="">-- Select --</option>';
        suppliers.forEach(s => { select.innerHTML += `<option value="${s.name}">${s.name}</option>`; });
    }

    function loadSupplierLedger() {
        const name = document.getElementById('supplierSelect').value;
        if (!name) return;
        currentSupplier = suppliers.find(s => s.name === name);
        document.getElementById('paymentForm').style.display = 'block';
        document.getElementById('creditNoteForm').style.display = 'block';
        document.getElementById('statementContainer').style.display = 'block';
        // populate invoice dropdowns
        const invs = purchaseInvoices.filter(i => i.supplier.name === name);
        const paySelect = document.getElementById('paymentInvoiceSelect');
        paySelect.innerHTML = '<option value="">All outstanding</option>';
        invs.forEach(i => paySelect.innerHTML += `<option value="${i.invoiceNo}">${i.invoiceNo} - ₹${i.grandTotal.toFixed(2)}</option>`);
        const creditSelect = document.getElementById('creditInvoiceSelect');
        creditSelect.innerHTML = '<option value="">All outstanding</option>';
        invs.forEach(i => creditSelect.innerHTML += `<option value="${i.invoiceNo}">${i.invoiceNo} - ₹${i.grandTotal.toFixed(2)}</option>`);
        document.getElementById('paymentDate').valueAsDate = new Date();
        document.getElementById('creditDate').valueAsDate = new Date();
        applyPeriodFilter();
    }

    function recordSupplierPayment() {
        if (!currentSupplier) return;
        const date = document.getElementById('paymentDate').value;
        const amt = parseFloat(document.getElementById('paymentAmount').value);
        if (!date || isNaN(amt) || amt <= 0) { alert('Invalid amount'); return; }
        const payment = { id: Date.now(), supplierName: currentSupplier.name, date: date, amount: amt, invoiceNo: document.getElementById('paymentInvoiceSelect').value || null, remarks: document.getElementById('paymentRemarks').value };
        supplierPayments.push(payment);
        localStorage.setItem('supplierPayments', JSON.stringify(supplierPayments));
        currentSupplier.outstanding -= amt;
        if (currentSupplier.outstanding < 0) currentSupplier.outstanding = 0;
        localStorage.setItem('suppliers', JSON.stringify(suppliers));
        alert('Payment recorded');
        document.getElementById('paymentAmount').value = '';
        applyPeriodFilter();
    }

    function recordSupplierCreditNote() {
        if (!currentSupplier) return;
        const date = document.getElementById('creditDate').value;
        const amt = parseFloat(document.getElementById('creditAmount').value);
        if (!date || isNaN(amt) || amt <= 0) { alert('Invalid amount'); return; }
        const credit = { id: Date.now(), supplierName: currentSupplier.name, date: date, amount: amt, invoiceNo: document.getElementById('creditInvoiceSelect').value || null, remarks: document.getElementById('creditRemarks').value };
        supplierCreditNotes.push(credit);
        localStorage.setItem('supplierCreditNotes', JSON.stringify(supplierCreditNotes));
        currentSupplier.outstanding -= amt;
        if (currentSupplier.outstanding < 0) currentSupplier.outstanding = 0;
        localStorage.setItem('suppliers', JSON.stringify(suppliers));
        alert('Credit note recorded');
        document.getElementById('creditAmount').value = '';
        applyPeriodFilter();
    }

    function getTransactions(supplierName, startDate, endDate) {
        let transactions = [];
        purchaseInvoices.filter(i => i.supplier.name === supplierName).forEach(inv => {
            if (new Date(inv.date) >= startDate && new Date(inv.date) <= endDate)
                transactions.push({ date: inv.date, type: 'Purchase', invoiceNo: inv.invoiceNo, particulars: 'Bill', debit: inv.grandTotal, credit: 0 });
        });
        supplierPayments.filter(p => p.supplierName === supplierName).forEach(p => {
            if (new Date(p.date) >= startDate && new Date(p.date) <= endDate)
                transactions.push({ date: p.date, type: 'Payment', invoiceNo: p.invoiceNo || 'N/A', particulars: p.remarks, debit: 0, credit: p.amount });
        });
        supplierCreditNotes.filter(c => c.supplierName === supplierName).forEach(c => {
            if (new Date(c.date) >= startDate && new Date(c.date) <= endDate)
                transactions.push({ date: c.date, type: 'Credit Note', invoiceNo: c.invoiceNo || 'N/A', particulars: c.remarks, debit: 0, credit: c.amount });
        });
        transactions.sort((a,b)=>new Date(a.date)-new Date(b.date));
        return transactions;
    }

    function getOpeningBalance(supplierName, startDate) {
        let bal = 0;
        purchaseInvoices.filter(i => i.supplier.name === supplierName).forEach(i => { if (new Date(i.date) < startDate) bal += i.grandTotal; });
        supplierPayments.filter(p => p.supplierName === supplierName).forEach(p => { if (new Date(p.date) < startDate) bal -= p.amount; });
        supplierCreditNotes.filter(c => c.supplierName === supplierName).forEach(c => { if (new Date(c.date) < startDate) bal -= c.amount; });
        return bal;
    }

    function applyPeriodFilter() {
        if (!currentSupplier) return;
        const type = document.getElementById('periodType').value;
        let start, end, today = new Date();
        if (type === 'fy') { const fy = document.getElementById('fyYear').value; if(!fy){populateFYOptions();return;} const [y1,y2]=fy.split('-'); start=new Date(`${y1}-04-01`); end=new Date(`${parseInt(y2)+2000}-03-31`); }
        else if (type === 'quarter') { const q=parseInt(document.getElementById('quarterSelect').value); start=new Date(today.getFullYear(), (q-1)*3+3, 1); end=new Date(today.getFullYear(), (q-1)*3+6, 0); }
        else if (type === 'month') { const m=document.getElementById('monthPicker').value; if(!m){document.getElementById('monthPicker').value=today.toISOString().slice(0,7);return;} const [yy,mm]=m.split('-'); start=new Date(yy,mm-1,1); end=new Date(yy,mm,0); }
        else if (type === 'day') { const d=document.getElementById('dayPicker').value; if(!d){document.getElementById('dayPicker').value=today.toISOString().split('T')[0];return;} start=end=new Date(d); }
        else if (type === 'custom') { const cs=document.getElementById('customStart').value, ce=document.getElementById('customEnd').value; if(!cs||!ce)return; start=new Date(cs); end=new Date(ce); }
        else { start=new Date(2000,0,1); end=new Date(2099,11,31); }
        const opening = getOpeningBalance(currentSupplier.name, start);
        const trans = getTransactions(currentSupplier.name, start, end);
        let balance = opening;
        let html = '';
        trans.forEach(t => { if(t.debit>0) balance+=t.debit; if(t.credit>0) balance-=t.credit; html+=`<tr><td>${formatDate(t.date)}</td><td>${t.type}</td><td>${t.invoiceNo}</td><td>${t.particulars}</td><td class="text-right">${t.debit>0?formatMoney(t.debit):'-'}</td><td class="text-right">${t.credit>0?formatMoney(t.credit):'-'}</td><td class="text-right ${balance>=0?'balance-positive':'balance-negative'}">${formatMoney(balance)}</td></tr>`; });
        const totalDebit = trans.reduce((s,t)=>s+t.debit,0);
        const totalCredit = trans.reduce((s,t)=>s+t.credit,0);
        const closing = opening + totalDebit - totalCredit;
        document.getElementById('summaryBox').innerHTML = `<div class="summary-item"><strong>Opening</strong><br>${formatMoney(opening)}</div><div class="summary-item"><strong>Purchases</strong><br>${formatMoney(totalDebit)}</div><div class="summary-item"><strong>Payments + Credit Notes</strong><br>${formatMoney(totalCredit)}</div><div class="summary-item"><strong>Closing</strong><br>${formatMoney(closing)}</div>`;
        document.getElementById('statementBody').innerHTML = html || '<tr><td colspan="7">No transactions</td></tr>';
    }

    function generateSupplierStatementPDF() { /* same as before but using current data */ alert('PDF generation not shown for brevity – reuse from previous answer'); }

    function populateFYOptions() { const fy=document.getElementById('fyYear'); fy.innerHTML=''; const y=new Date().getFullYear(); for(let i=y-2;i<=y+1;i++) fy.innerHTML+=`<option value="${i}-${i+1}">FY ${i}-${i+1}</option>`; }
    function togglePeriodInputs() { const t=document.getElementById('periodType').value; document.getElementById('fyYearGroup').style.display=t==='fy'?'block':'none'; document.getElementById('quarterGroup').style.display=t==='quarter'?'block':'none'; document.getElementById('monthGroup').style.display=t==='month'?'block':'none'; document.getElementById('dayGroup').style.display=t==='day'?'block':'none'; document.getElementById('customStartGroup').style.display=t==='custom'?'block':'none'; document.getElementById('customEndGroup').style.display=t==='custom'?'block':'none'; if(t==='fy')populateFYOptions(); if(t==='month'&&!document.getElementById('monthPicker').value)document.getElementById('monthPicker').value=new Date().toISOString().slice(0,7); if(t==='day'&&!document.getElementById('dayPicker').value)document.getElementById('dayPicker').value=new Date().toISOString().split('T')[0]; if(currentSupplier)applyPeriodFilter(); }
    document.getElementById('periodType').addEventListener('change',togglePeriodInputs);
    document.getElementById('fyYear').addEventListener('change',()=>applyPeriodFilter());
    document.getElementById('quarterSelect').addEventListener('change',()=>applyPeriodFilter());
    document.getElementById('monthPicker').addEventListener('change',()=>applyPeriodFilter());
    document.getElementById('dayPicker').addEventListener('change',()=>applyPeriodFilter());
    document.getElementById('customStart').addEventListener('change',()=>applyPeriodFilter());
    document.getElementById('customEnd').addEventListener('change',()=>applyPeriodFilter());
    populateSupplierDropdown();
    togglePeriodInputs();
</script>
</body>
</html>
