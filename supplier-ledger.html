<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supplier Ledger – Auto Spares</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background: #e9ecef; margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; background: white; border-radius: 12px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: #0a7c71; }
        .supplier-info { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 4px solid #0a7c71; }
        .search-box { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #dee2e6; padding: 10px; text-align: left; vertical-align: top; }
        th { background: #0a7c71; color: white; }
        .balance-positive { color: #28a745; font-weight: bold; }
        .balance-negative { color: #dc3545; font-weight: bold; }
        button { background: #0a7c71; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        button:hover { background: #09645a; }
        input, select { padding: 8px; border: 1px solid #ccc; border-radius: 6px; }
        .date-range { display: flex; gap: 10px; align-items: center; }
        .date-range input { width: 130px; }
        .recalc-btn { background: #fd7e14; }
        .recalc-btn:hover { background: #e06c0e; }
        @media print { .no-print { display: none !important; } body { background: white; padding: 0; } .container { box-shadow: none; padding: 10px; } }
    </style>
</head>
<body>
<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h1><i class="fas fa-book"></i> Supplier Ledger</h1>
        <a href="supplier-master.html" style="background:#6c757d; color:white; padding:8px 16px; border-radius:6px; text-decoration:none;"><i class="fas fa-arrow-left"></i> Back to Suppliers</a>
    </div>

    <div id="supplierInfo" class="supplier-info">Select or enter supplier email</div>

    <div class="search-box no-print">
        <select id="supplierSelect" style="flex:1;">
            <option value="">-- Select Supplier --</option>
        </select>
        <span style="color:#555;">OR</span>
        <input type="email" id="supplierEmailInput" placeholder="Enter supplier email directly" style="flex:1;">
        <button onclick="loadLedgerByEmail()"><i class="fas fa-chart-line"></i> Load Ledger</button>
        <button onclick="refreshDropdown()"><i class="fas fa-sync-alt"></i> Refresh List</button>
        <button onclick="refreshLedger()" style="background:#17a2b8;"><i class="fas fa-undo-alt"></i> Refresh</button>
        <button onclick="recalculateOutstanding()" class="recalc-btn"><i class="fas fa-calculator"></i> Recalc Outstanding</button>
    </div>

    <div class="search-box no-print">
        <div class="date-range">
            <label>From:</label>
            <input type="date" id="startDate">
            <label>To:</label>
            <input type="date" id="endDate">
            <button onclick="applyDateFilter()"><i class="fas fa-calendar-alt"></i> Filter</button>
            <button onclick="clearDateFilter()"><i class="fas fa-undo-alt"></i> Clear</button>
        </div>
        <input type="text" id="searchRef" placeholder="Search by reference...">
        <button onclick="filterLedger()"><i class="fas fa-search"></i> Search</button>
        <button onclick="exportLedger()"><i class="fas fa-file-csv"></i> Export CSV</button>
        <button onclick="downloadPDF()"><i class="fas fa-file-pdf"></i> Download PDF</button>
    </div>

    <div id="ledgerTable"></div>
</div>

<script>
    let currentSupplier = null;
    let allTransactions = [];
    let filteredTransactions = [];
    let currentFilterStart = null;
    let currentFilterEnd = null;

    // ---------- DATE NORMALIZATION (supports DD/MM/YYYY and YYYY-MM-DD) ----------
    function toISODate(dateStr) {
        if (!dateStr) return '';
        if (/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) return dateStr;
        const parts = dateStr.split('/');
        if (parts.length === 3 && parts[0].length === 2 && parts[1].length === 2 && parts[2].length === 4) {
            return `${parts[2]}-${parts[1]}-${parts[0]}`;
        }
        const d = new Date(dateStr);
        if (!isNaN(d.getTime())) return d.toISOString().slice(0,10);
        return dateStr;
    }

    function refreshDropdown() {
        const suppliers = JSON.parse(localStorage.getItem('suppliers') || '[]');
        const select = document.getElementById('supplierSelect');
        select.innerHTML = '<option value="">-- Select Supplier --</option>';
        suppliers.forEach(s => {
            select.innerHTML += `<option value="${s.email}">${escapeHtml(s.name)} (${s.email})</option>`;
        });
        const viewEmail = localStorage.getItem('viewSupplierEmail');
        if (viewEmail) {
            select.value = viewEmail;
            localStorage.removeItem('viewSupplierEmail');
            loadLedgerByEmail();
        }
        // No default date range – show all transactions
        document.getElementById('startDate').value = '';
        document.getElementById('endDate').value = '';
    }

    function refreshLedger() {
        if (currentSupplier) loadLedgerByEmail();
        else alert('Please load a supplier first.');
    }

    function loadLedgerByEmail() {
        let email = document.getElementById('supplierSelect').value;
        if (!email) email = document.getElementById('supplierEmailInput').value.trim();
        if (!email) {
            alert('Please select or enter a supplier email');
            return;
        }
        const suppliers = JSON.parse(localStorage.getItem('suppliers') || '[]');
        currentSupplier = suppliers.find(s => s.email === email);
        if (!currentSupplier) {
            alert(`Supplier with email "${email}" not found.`);
            return;
        }

        document.getElementById('supplierInfo').innerHTML = `
            <strong>${escapeHtml(currentSupplier.name)}</strong><br>
            Email: ${escapeHtml(currentSupplier.email)} | Phone: ${escapeHtml(currentSupplier.phone)}<br>
            Outstanding in Master: <strong>₹${(currentSupplier.outstanding||0).toLocaleString()}</strong>
        `;

        const transactions = [];

        // Purchase invoices (debit – increases supplier outstanding)
        const allPurchaseInvoices = JSON.parse(localStorage.getItem('purchaseInvoices') || '[]');
        const supplierInvoices = allPurchaseInvoices.filter(inv => inv.supplier?.email === email || inv.supplierEmail === email);
        supplierInvoices.forEach(inv => {
            const amount = inv.grandTotal || inv.total || 0;
            if (amount === 0) return;
            const rawDate = inv.date;
            const isoDate = toISODate(rawDate);
            transactions.push({
                originalDate: rawDate,
                date: isoDate,
                type: 'Purchase',
                ref: inv.poNo || inv.invoiceNo,
                debit: amount,
                credit: 0,
                narration: 'Purchase Invoice'
            });
        });

        // Supplier payments (credit – reduces outstanding)
        const allPayments = JSON.parse(localStorage.getItem('supplierPayments') || '[]');
        const supplierPayments = allPayments.filter(p => p.supplierEmail === email);
        supplierPayments.forEach(p => {
            const rawDate = p.date;
            const isoDate = toISODate(rawDate);
            transactions.push({
                originalDate: rawDate,
                date: isoDate,
                type: 'Payment',
                ref: p.reference || 'Payment',
                debit: 0,
                credit: p.amount,
                narration: 'Payment'
            });
        });

        // Sort using ISO date strings
        transactions.sort((a,b) => a.date.localeCompare(b.date));
        allTransactions = transactions;

        // Apply current date filter (if any)
        let start = document.getElementById('startDate').value;
        let end = document.getElementById('endDate').value;
        currentFilterStart = start;
        currentFilterEnd = end;

        if (!start && !end) {
            filteredTransactions = [...allTransactions];
        } else {
            filteredTransactions = allTransactions.filter(t => {
                if (start && t.date < start) return false;
                if (end && t.date > end) return false;
                return true;
            });
        }

        if (allTransactions.length === 0) {
            document.getElementById('ledgerTable').innerHTML = '<p>No transactions found for this supplier.</p>';
        } else {
            displayLedger();
        }
    }

    function applyDateFilter() {
        if (!currentSupplier) return;
        const start = document.getElementById('startDate').value;
        const end = document.getElementById('endDate').value;
        currentFilterStart = start;
        currentFilterEnd = end;
        if (!start && !end) {
            filteredTransactions = [...allTransactions];
        } else {
            filteredTransactions = allTransactions.filter(t => {
                if (start && t.date < start) return false;
                if (end && t.date > end) return false;
                return true;
            });
        }
        displayLedger();
    }

    function clearDateFilter() {
        document.getElementById('startDate').value = '';
        document.getElementById('endDate').value = '';
        applyDateFilter();
    }

    function getOpeningBalanceBeforeDate(date) {
        if (!date) return 0;
        let balance = 0;
        for (let t of allTransactions) {
            if (t.date >= date) break;
            balance += t.debit - t.credit;
        }
        return balance;
    }

    function calculateTotalOutstanding() {
        let totalDebit = 0, totalCredit = 0;
        for (let t of allTransactions) {
            totalDebit += t.debit;
            totalCredit += t.credit;
        }
        return totalDebit - totalCredit;
    }

    function recalculateOutstanding() {
        if (!currentSupplier) { alert('Load a supplier first'); return; }
        let calculated = calculateTotalOutstanding();
        if (confirm(`Recalculate outstanding for ${currentSupplier.name}?\nCurrent master: ₹${(currentSupplier.outstanding||0).toLocaleString()}\nLedger total: ₹${calculated.toLocaleString()}\n\nUpdate master to ₹${calculated.toLocaleString()}?`)) {
            let suppliers = JSON.parse(localStorage.getItem('suppliers') || '[]');
            let idx = suppliers.findIndex(s => s.email === currentSupplier.email);
            if (idx !== -1) {
                suppliers[idx].outstanding = calculated;
                localStorage.setItem('suppliers', JSON.stringify(suppliers));
                currentSupplier.outstanding = calculated;
                document.getElementById('supplierInfo').innerHTML = `
                    <strong>${escapeHtml(currentSupplier.name)}</strong><br>
                    Email: ${escapeHtml(currentSupplier.email)} | Phone: ${escapeHtml(currentSupplier.phone)}<br>
                    Outstanding in Master: <strong>₹${(currentSupplier.outstanding||0).toLocaleString()}</strong>
                `;
                alert('Outstanding updated from ledger.');
                displayLedger(); // refresh display to remove warning
            }
        }
    }

    function displayLedger() {
        if (!currentSupplier) {
            document.getElementById('ledgerTable').innerHTML = '<p>No supplier selected.</p>';
            return;
        }
        let transactionsToShow = [...filteredTransactions];
        transactionsToShow.sort((a,b) => a.date.localeCompare(b.date));
        
        if (transactionsToShow.length === 0) {
            document.getElementById('ledgerTable').innerHTML = '<p>No transactions in selected period.</p>';
            return;
        }

        let openingBalance = getOpeningBalanceBeforeDate(currentFilterStart);
        let running = openingBalance;
        
        let html = `<table><thead>
            <tr>
                <th>Date</th>
                <th>Type</th>
                <th>Reference</th>
                <th style="text-align:right">Debit (₹)</th>
                <th style="text-align:right">Credit (₹)</th>
                <th style="text-align:right">Balance (₹)</th>
                <th>Narration</th>
            </tr>
        </thead><tbody>`;

        if (openingBalance !== 0 && currentFilterStart) {
            html += `<tr>
                <td>${currentFilterStart || 'Before start'}</td>
                <td>Opening Balance</strong></td>
                <td>-</strong></td>
                <td style="text-align:right">${openingBalance > 0 ? '₹' + openingBalance.toLocaleString() : '-'}</strong></td>
                <td style="text-align:right">${openingBalance < 0 ? '₹' + (-openingBalance).toLocaleString() : '-'}</strong></td>
                <td style="text-align:right" class="${openingBalance >= 0 ? 'balance-positive' : 'balance-negative'}">₹${openingBalance.toLocaleString()}</strong></td>
                <td>Opening Balance (before selected period)</strong></td>
            </tr>`;
        }

        for (let t of transactionsToShow) {
            running += t.debit - t.credit;
            const displayDate = t.originalDate || t.date;
            html += `<tr>
                <td>${displayDate}</td>
                <td>${t.type}</td>
                <td><strong>${escapeHtml(t.ref)}</strong></td>
                <td style="text-align:right">${t.debit ? '₹' + t.debit.toLocaleString() : '-'}</strong></td>
                <td style="text-align:right">${t.credit ? '₹' + t.credit.toLocaleString() : '-'}</strong></td>
                <td style="text-align:right" class="${running >= 0 ? 'balance-positive' : 'balance-negative'}">₹${running.toLocaleString()}</strong></td>
                <td>${escapeHtml(t.narration)}</strong></td>
            </tr>`;
        }
        html += '</tbody></table>';
        document.getElementById('ledgerTable').innerHTML = html;

        // Compare with master outstanding
        const finalBalance = running;
        const masterOutstanding = currentSupplier.outstanding || 0;
        if (Math.abs(finalBalance - masterOutstanding) > 1) {
            const warning = `<div style="background:#fff3cd; padding:10px; margin-top:10px; border:1px solid #ffeeba;">
                ⚠️ Ledger closing balance (₹${finalBalance.toLocaleString()}) differs from Master outstanding (₹${masterOutstanding.toLocaleString()}).
                Use the <strong>"Recalc Outstanding"</strong> button to fix.
            </div>`;
            document.getElementById('ledgerTable').innerHTML += warning;
        }
    }

    function filterLedger() {
        const term = document.getElementById('searchRef').value.toLowerCase();
        if (!term) { displayLedger(); return; }
        const filtered = filteredTransactions.filter(t => 
            (t.ref && t.ref.toLowerCase().includes(term)) || 
            t.type.toLowerCase().includes(term) ||
            (t.narration && t.narration.toLowerCase().includes(term))
        );
        if (filtered.length === 0) {
            document.getElementById('ledgerTable').innerHTML = '<p>No matching transactions.</p>';
            return;
        }
        let openingBalance = getOpeningBalanceBeforeDate(currentFilterStart);
        let running = openingBalance;
        let rows = '';
        filtered.forEach(t => {
            running += (t.debit - t.credit);
            const displayDate = t.originalDate || t.date;
            rows += `<tr>
                <td>${displayDate}</td>
                <td>${t.type}</td>
                <td>${escapeHtml(t.ref)}</strong></td>
                <td style="text-align:right">${t.debit ? '₹' + t.debit.toLocaleString() : '-'}</strong></td>
                <td style="text-align:right">${t.credit ? '₹' + t.credit.toLocaleString() : '-'}</strong></td>
                <td style="text-align:right" class="${running >= 0 ? 'balance-positive' : 'balance-negative'}">₹${running.toLocaleString()}</strong></td>
                <td>${escapeHtml(t.narration)}</strong></td>
            </tr>`;
        });
        document.getElementById('ledgerTable').innerHTML = `<td><thead>运转<th>Date</th><th>Type</th><th>Reference</th><th style="text-align:right">Debit (₹)</th><th style="text-align:right">Credit (₹)</th><th style="text-align:right">Balance (₹)</th><th>Narration</th></tr></thead><tbody>${rows}</tbody></table>`;
    }

    function exportLedger() {
        if (!filteredTransactions.length) {
            alert('No data to export');
            return;
        }
        let csv = "Date,Type,Reference,Debit,Credit,Balance,Narration\n";
        let openingBalance = getOpeningBalanceBeforeDate(currentFilterStart);
        let running = openingBalance;
        if (openingBalance !== 0 && currentFilterStart) {
            csv += `"${currentFilterStart || 'Before start'}","Opening Balance","-",${openingBalance>0?openingBalance:0},${openingBalance<0?-openingBalance:0},${openingBalance},"Opening Balance"\n`;
        }
        for (let t of filteredTransactions) {
            running += (t.debit - t.credit);
            const displayDate = t.originalDate || t.date;
            csv += `"${displayDate}","${t.type}","${t.ref}",${t.debit},${t.credit},${running},"${t.narration}"\n`;
        }
        const blob = new Blob([csv], {type: 'text/csv'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `supplier_ledger_${currentSupplier.email}_${currentFilterStart || 'all'}_to_${currentFilterEnd || 'all'}.csv`;
        a.click();
        URL.revokeObjectURL(url);
    }

    function downloadPDF() {
        if (!currentSupplier) {
            alert('Please load a supplier ledger first.');
            return;
        }
        const originalContainer = document.getElementById('ledgerTable');
        const cloneContainer = originalContainer.cloneNode(true);
        const infoDiv = document.getElementById('supplierInfo').cloneNode(true);
        const title = document.createElement('h2');
        title.innerText = 'Supplier Ledger Statement';
        let fromDate = currentFilterStart || document.getElementById('startDate').value || 'All';
        let toDate = currentFilterEnd || document.getElementById('endDate').value || 'All';
        const period = document.createElement('p');
        period.innerHTML = `<strong>Selected Period:</strong> ${fromDate} to ${toDate}`;
        
        const pdfContent = document.createElement('div');
        pdfContent.style.fontFamily = 'Roboto, sans-serif';
        pdfContent.style.padding = '20px';
        pdfContent.style.backgroundColor = 'white';
        pdfContent.appendChild(title);
        pdfContent.appendChild(infoDiv);
        pdfContent.appendChild(period);
        pdfContent.appendChild(cloneContainer);
        
        const header = document.createElement('div');
        header.style.backgroundColor = '#0a7c71';
        header.style.color = 'white';
        header.style.padding = '10px';
        header.style.marginBottom = '15px';
        header.style.textAlign = 'center';
        header.innerHTML = '<h2>Auto Spares Solution</h2><p>GSTIN: 19ANOPD3300R1ZO | 101, Howrah, WB</p>';
        pdfContent.prepend(header);
        
        const opt = {
            margin: [0.3, 0.3, 0.3, 0.3],
            filename: `Supplier_Ledger_${currentSupplier.name}_${fromDate}_to_${toDate}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, letterRendering: true },
            jsPDF: { unit: 'in', format: 'a4', orientation: 'landscape' }
        };
        html2pdf().set(opt).from(pdfContent).save();
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    refreshDropdown();
</script>
</body>
    </html>
