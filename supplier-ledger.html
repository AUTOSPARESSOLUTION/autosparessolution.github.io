<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supplier Ledger</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background: #e9ecef; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; border-radius: 12px; padding: 20px; }
        h1 { color: #0a7c71; }
        .supplier-info { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 4px solid #0a7c71; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #dee2e6; padding: 10px; text-align: left; }
        th { background: #0a7c71; color: white; }
        .balance-positive { color: #28a745; font-weight: bold; }
        .balance-negative { color: #dc3545; font-weight: bold; }
        button { background: #0a7c71; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
    </style>
    <script src="data-manager.js"></script>
</head>
<body>
<div class="container">
    <h1>Supplier Ledger</h1>
    <div id="supplierInfo" class="supplier-info">Loading...</div>
    <div>
        <input type="text" id="searchInput" placeholder="Search by ref, type..." style="padding:8px;width:200px;">
        <button onclick="filterLedger()">Search</button>
        <button onclick="loadLedger()">Refresh</button>
        <button onclick="exportToCSV()">Export CSV</button>
    </div>
    <div id="ledgerTable"></div>
    <button onclick="window.location.href='supplier-master.html'">← Back to Suppliers</button>
</div>
<script>
    let supplierEmail = localStorage.getItem('viewSupplierEmail');
    let ledger = [];
    let filtered = [];
    let supplier = null;

    function loadLedger() {
        if (!supplierEmail) { document.getElementById('supplierInfo').innerHTML = '<p style="color:red;">No supplier selected.</p>'; return; }
        let suppliers = JSON.parse(localStorage.getItem('suppliers') || '[]');
        supplier = suppliers.find(s => s.email === supplierEmail);
        if (supplier) {
            document.getElementById('supplierInfo').innerHTML = `<strong>${supplier.name}</strong> (${supplier.email})<br>Outstanding: ₹${(supplier.outstanding || 0).toLocaleString()}`;
        } else {
            document.getElementById('supplierInfo').innerHTML = '<p>Supplier not found</p>';
            return;
        }
        ledger = JSON.parse(localStorage.getItem('supplierLedger') || '[]');
        ledger = ledger.filter(e => e.supplierEmail === supplierEmail).sort((a,b) => new Date(a.date) - new Date(b.date));
        filtered = [...ledger];
        displayLedger();
    }

    function displayLedger() {
        let html = '<table><thead><tr><th>Date</th><th>Type</th><th>Reference</th><th>Debit (₹)</th><th>Credit (₹)</th><th>Running Balance</th><th>Narration</th></tr></thead><tbody>';
        let balance = supplier.openingBalance || 0;
        filtered.forEach(entry => {
            balance += (entry.debit || 0) - (entry.credit || 0);
            html += `<tr>
                <td>${entry.date}</td>
                <td>${entry.type}</td>
                <td>${entry.ref || '-'}</td>
                <td>${entry.debit ? '₹' + entry.debit.toLocaleString() : '-'}</td>
                <td>${entry.credit ? '₹' + entry.credit.toLocaleString() : '-'}</td>
                <td class="${balance>=0?'balance-positive':'balance-negative'}">₹${balance.toLocaleString()}</td>
                <td>${entry.narration || '-'}</td>
            </tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('ledgerTable').innerHTML = html || '<p>No transactions.</p>';
    }

    function filterLedger() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        if (!term) filtered = [...ledger];
        else filtered = ledger.filter(e => (e.ref && e.ref.toLowerCase().includes(term)) || e.type.toLowerCase().includes(term));
        displayLedger();
    }

    function exportToCSV() {
        let csv = "Date,Type,Reference,Debit,Credit,Running Balance,Narration\n";
        let balance = supplier.openingBalance || 0;
        filtered.forEach(e => {
            balance += (e.debit||0) - (e.credit||0);
            csv += `"${e.date}","${e.type}","${e.ref || ''}",${e.debit||0},${e.credit||0},${balance},"${e.narration||''}"\n`;
        });
        const blob = new Blob([csv], {type:'text/csv'}); const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = `supplier_ledger_${supplierEmail}.csv`; a.click(); URL.revokeObjectURL(url);
    }
    loadLedger();
</script>
</body>
</html>
