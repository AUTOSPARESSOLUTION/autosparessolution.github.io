<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proforma Invoice – Auto Spares</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background: #e9ecef; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; border-radius: 12px; padding: 20px; }
        h1, h2 { color: #0a7c71; }
        .form-row { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 15px; }
        .form-group { flex: 1; min-width: 180px; }
        label { display: block; font-size: 12px; font-weight: 600; }
        input, select, textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; }
        button { background: #0a7c71; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; margin-right: 10px; }
        table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        th, td { border: 1px solid #dee2e6; padding: 8px; text-align: left; }
        th { background: #f1f3f5; }
        .remove-btn { background: #dc3545; color: white; border: none; padding: 4px 8px; cursor: pointer; }
        .total { font-size: 18px; font-weight: bold; text-align: right; margin-top: 15px; }
        .action-buttons { margin-top: 20px; }
    </style>
    <script src="data-manager.js"></script>
</head>
<body>
<div class="container">
    <h1><i class="fas fa-file-invoice"></i> Proforma Invoice</h1>
    <div class="form-row">
        <div class="form-group"><label>Customer *</label><select id="customerEmail"><option value="">-- Select Customer --</option></select></div>
        <div class="form-group"><label>Date</label><input type="date" id="proformaDate"></div>
        <div class="form-group"><label>Proforma No.</label><input type="text" id="proformaNo" placeholder="Auto"></div>
    </div>
    <h2>Items</h2>
    <table id="itemsTable"><thead><tr><th>Product</th><th>Qty</th><th>Price (₹)</th><th>Total</th><th></th></tr></thead><tbody id="itemsBody"><tr class="item-row"><td><select class="productSelect" style="width:200px;"><option value="">-- Select --</option></select></td><td><input type="number" class="qty" value="1" min="1"></td><td><input type="number" class="price" step="0.01" value="0"></td><td class="itemTotal">₹0</td><td><button type="button" class="remove-btn" onclick="this.closest('tr').remove(); calcTotal()">Remove</button></td></tr></tbody></table>
    <button onclick="addItemRow()">+ Add Item</button>
    <div class="total">Total: ₹<span id="grandTotal">0</span></div>
    <div class="action-buttons">
        <button onclick="saveProforma()"><i class="fas fa-save"></i> Save Proforma</button>
        <button onclick="convertToInvoice()" style="background:#28a745;"><i class="fas fa-exchange-alt"></i> Convert to Sales Invoice</button>
        <button onclick="window.location.href='index.html'">Cancel</button>
    </div>
    <div id="savedProformas" style="margin-top:30px;"><h3>Saved Proforma Invoices</h3><div id="proformaList"></div></div>
</div>
<script>
    let products = [], customers = [], proformas = [];
    let currentItems = [];

    function loadData() {
        products = getProducts();
        customers = JSON.parse(localStorage.getItem('customers') || '[]');
        const customerSelect = document.getElementById('customerEmail');
        customerSelect.innerHTML = '<option value="">-- Select Customer --</option>';
        customers.forEach(c => customerSelect.innerHTML += `<option value="${c.email}">${c.name} (${c.email})</option>`);
        proformas = JSON.parse(localStorage.getItem('proformas') || '[]');
        displayProformas();
        document.getElementById('proformaDate').value = new Date().toISOString().slice(0,10);
    }

    function addItemRow() {
        const tbody = document.getElementById('itemsBody');
        const newRow = document.createElement('tr'); newRow.className = 'item-row';
        newRow.innerHTML = `<td><select class="productSelect"><option value="">-- Select --</option></select></td><td><input type="number" class="qty" value="1" min="1"></td><td><input type="number" class="price" step="0.01" value="0"></td><td class="itemTotal">₹0</td><td><button type="button" class="remove-btn" onclick="this.closest('tr').remove(); calcTotal()">Remove</button></td>`;
        tbody.appendChild(newRow);
        fillProductDropdowns();
        attachEvents();
        calcTotal();
    }

    function fillProductDropdowns() {
        document.querySelectorAll('.productSelect').forEach(select => {
            const currentVal = select.value;
            select.innerHTML = '<option value="">-- Select --</option>';
            products.forEach(p => select.innerHTML += `<option value="${p.id}" data-price="${p.price || 0}">${p.name} (${p.sku}) - Stock: ${p.currentStock}</option>`);
            if (currentVal) select.value = currentVal;
        });
    }

    function attachEvents() {
        document.querySelectorAll('.productSelect').forEach(select => select.addEventListener('change', onProductChange));
        document.querySelectorAll('.qty, .price').forEach(input => input.addEventListener('input', calcTotal));
    }

    function onProductChange(e) {
        const select = e.target;
        const price = parseFloat(select.options[select.selectedIndex]?.dataset.price) || 0;
        const row = select.closest('tr');
        row.querySelector('.price').value = price;
        calcTotal();
    }

    function calcTotal() {
        let grand = 0;
        document.querySelectorAll('#itemsBody .item-row').forEach(row => {
            const qty = parseFloat(row.querySelector('.qty')?.value) || 0;
            const price = parseFloat(row.querySelector('.price')?.value) || 0;
            const total = qty * price;
            row.querySelector('.itemTotal').innerText = '₹' + total.toFixed(2);
            grand += total;
        });
        document.getElementById('grandTotal').innerText = grand.toFixed(2);
    }

    function getItemsFromForm() {
        const items = [];
        document.querySelectorAll('#itemsBody .item-row').forEach(row => {
            const productId = row.querySelector('.productSelect').value;
            if (!productId) return;
            items.push({
                productId: parseInt(productId),
                quantity: parseFloat(row.querySelector('.qty').value),
                price: parseFloat(row.querySelector('.price').value)
            });
        });
        return items;
    }

    function saveProforma() {
        const customerEmail = document.getElementById('customerEmail').value;
        if (!customerEmail) { alert('Select customer'); return; }
        const items = getItemsFromForm();
        if (items.length === 0) { alert('Add items'); return; }
        const total = items.reduce((s,i) => s + i.quantity * i.price, 0);
        const proformaNo = document.getElementById('proformaNo').value.trim() || 'PROF-' + Date.now();
        const proforma = {
            id: Date.now(),
            date: document.getElementById('proformaDate').value,
            customerEmail: customerEmail,
            items: items,
            total: total,
            proformaNo: proformaNo,
            status: 'draft'
        };
        proformas.push(proforma);
        localStorage.setItem('proformas', JSON.stringify(proformas));
        alert('Proforma saved');
        displayProformas();
        clearForm();
    }

    function convertToInvoice() {
        const customerEmail = document.getElementById('customerEmail').value;
        if (!customerEmail) { alert('Select customer'); return; }
        const items = getItemsFromForm();
        if (items.length === 0) { alert('Add items'); return; }
        const total = items.reduce((s,i) => s + i.quantity * i.price, 0);
        const invoice = {
            id: Date.now(),
            date: document.getElementById('proformaDate').value,
            customerEmail: customerEmail,
            items: items,
            total: total,
            invoiceNo: 'INV-' + Date.now(),
            status: 'pending'
        };
        try {
            createSalesInvoice(invoice);
            alert('Converted to Sales Invoice! Stock and outstanding updated.');
            clearForm();
            displayProformas();
        } catch(err) { alert('Error: ' + err.message); }
    }

    function displayProformas() {
        let html = '<table><thead><tr><th>No.</th><th>Date</th><th>Customer</th><th>Total</th><th>Actions</th></tr></thead><tbody>';
        proformas.forEach(p => {
            html += `<tr><td>${p.proformaNo}</td><td>${p.date}</td><td>${p.customerEmail}</td><td>₹${p.total}</td><td><button onclick="loadProforma('${p.id}')">Load</button> <button onclick="deleteProforma('${p.id}')">Delete</button></td></tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('proformaList').innerHTML = html || '<p>No proformas.</p>';
    }

    function loadProforma(id) {
        const proforma = proformas.find(p => p.id == id);
        if (!proforma) return;
        document.getElementById('customerEmail').value = proforma.customerEmail;
        document.getElementById('proformaDate').value = proforma.date;
        document.getElementById('proformaNo').value = proforma.proformaNo;
        // Clear and rebuild items
        document.getElementById('itemsBody').innerHTML = '';
        proforma.items.forEach(item => {
            const row = document.createElement('tr'); row.className = 'item-row';
            row.innerHTML = `<td><select class="productSelect"><option value="${item.productId}">Loading...</option></select></td><td><input type="number" class="qty" value="${item.quantity}"></td><td><input type="number" class="price" value="${item.price}"></td><td class="itemTotal">₹${item.quantity*item.price}</td><td><button type="button" class="remove-btn" onclick="this.closest('tr').remove(); calcTotal()">Remove</button></td>`;
            document.getElementById('itemsBody').appendChild(row);
        });
        fillProductDropdowns();
        calcTotal();
    }

    function deleteProforma(id) {
        if(confirm('Delete proforma?')) {
            proformas = proformas.filter(p => p.id != id);
            localStorage.setItem('proformas', JSON.stringify(proformas));
            displayProformas();
        }
    }

    function clearForm() {
        document.getElementById('customerEmail').value = '';
        document.getElementById('proformaDate').value = new Date().toISOString().slice(0,10);
        document.getElementById('proformaNo').value = '';
        document.getElementById('itemsBody').innerHTML = '<tr class="item-row"><td><select class="productSelect"><option value="">-- Select --</option></select></td><td><input type="number" class="qty" value="1" min="1"></td><td><input type="number" class="price" step="0.01" value="0"></td><td class="itemTotal">₹0</td><td><button type="button" class="remove-btn" onclick="this.closest('tr').remove(); calcTotal()">Remove</button></td></tr>';
        fillProductDropdowns();
        calcTotal();
    }

    loadData();
    addItemRow(); // initial row
</script>
</body>
</html>
