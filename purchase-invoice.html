<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase Entry – Supplier Bill / Credit Note (Stock Integrated)</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Roboto', sans-serif;
            background: #e9ecef;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: auto;
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        h1, h2, h3 { color: #0a7c71; }
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
        }
        .form-group {
            flex: 1;
            min-width: 200px;
        }
        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #555;
        }
        input, select, textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-family: inherit;
        }
        .item-row {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        .item-row input, .item-row select { flex: 1; min-width: 100px; }
        .remove-item { background: #dc3545; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; }
        .add-item { background: #28a745; margin-bottom: 15px; }
        .totals { text-align: right; margin-top: 20px; }
        .totals table { width: 300px; margin-left: auto; }
        .totals td { padding: 5px; }
        button { background: #0a7c71; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; margin-right: 10px; }
        button:hover { background: #09645a; }
        .btn-danger { background: #6c757d; }
        .credit-note-section { margin-top: 20px; border-top: 1px solid #dee2e6; padding-top: 20px; }
        hr { margin: 20px 0; }
    </style>
    <script src="data-manager.js"></script>
</head>
<body>
<div class="container">
    <h1>Purchase Entry (Stock Integrated)</h1>
    <hr>

    <!-- Supplier Details -->
    <div class="form-row">
        <div class="form-group">
            <label>Supplier *</label>
            <select id="supplierSelect">
                <option value="">-- Select existing or type new --</option>
            </select>
            <input type="text" id="supplierName" placeholder="Or enter new supplier name" style="margin-top:5px;">
        </div>
        <div class="form-group"><label>Supplier GSTIN</label><input type="text" id="supplierGstin"></div>
        <div class="form-group"><label>Supplier Phone</label><input type="text" id="supplierPhone"></div>
    </div>
    <div class="form-row">
        <div class="form-group"><label>Supplier Address</label><textarea id="supplierAddress" rows="2"></textarea></div>
    </div>

    <!-- Bill Details -->
    <div class="form-row">
        <div class="form-group"><label>Purchase Invoice No *</label><input type="text" id="purchaseInvoiceNo"></div>
        <div class="form-group"><label>Invoice Date</label><input type="date" id="purchaseDate"></div>
        <div class="form-group"><label>Due Date</label><input type="date" id="purchaseDueDate"></div>
        <div class="form-group"><label>Payment Terms (days)</label><input type="number" id="paymentTerms" value="30"></div>
    </div>

    <!-- Items Table (with product selection) -->
    <h3>Items Purchased</h3>
    <div id="itemsContainer"></div>
    <button class="add-item" onclick="addItem()">+ Add Item</button>

    <!-- Totals -->
    <div class="totals">
        <table>
            <tr><td style="text-align:right;">Subtotal: </td><td style="text-align:right;">₹<span id="subtotal">0.00</span></td></tr>
            <tr><td style="text-align:right;">CGST (9%): </td><td style="text-align:right;">₹<span id="cgstTotal">0.00</span></td></tr>
            <tr><td style="text-align:right;">SGST (9%): </td><td style="text-align:right;">₹<span id="sgstTotal">0.00</span></td></tr>
            <tr style="font-weight:bold;"><td style="text-align:right;">Grand Total: </td><td style="text-align:right;">₹<span id="grandTotal">0.00</span></td></tr>
        </table>
    </div>

    <div>
        <button onclick="savePurchaseInvoice()">💾 Save Purchase Invoice</button>
        <button class="btn-danger" onclick="window.close()">Cancel</button>
    </div>

    <!-- Credit Note Entry Section -->
    <div class="credit-note-section">
        <h3>Record Credit Note (Supplier Return)</h3>
        <div class="form-row">
            <div class="form-group"><label>Credit Note Date</label><input type="date" id="creditDate"></div>
            <div class="form-group"><label>Amount (₹)</label><input type="number" id="creditAmount" step="0.01" placeholder="Enter amount"></div>
            <div class="form-group"><label>Against Invoice (optional)</label><select id="creditInvoiceSelect"><option value="">All outstanding</option></select></div>
            <div class="form-group"><label>Reason / Remarks</label><input type="text" id="creditRemarks" placeholder="Return reason"></div>
            <div class="form-group"><button onclick="recordCreditNote()">Record Credit Note</button></div>
        </div>
    </div>
</div>

<script>
    let items = [];
    let products = [];
    let suppliers = [];
    let purchaseInvoices = [];

    // Load data from localStorage
    function loadData() {
        products = getProducts();  // from data-manager.js
        suppliers = JSON.parse(localStorage.getItem('suppliers') || '[]');
        purchaseInvoices = JSON.parse(localStorage.getItem('purchaseInvoices') || '[]');

        // Populate supplier dropdown
        const supplierSelect = document.getElementById('supplierSelect');
        supplierSelect.innerHTML = '<option value="">-- Select existing supplier --</option>';
        suppliers.forEach(sup => {
            supplierSelect.innerHTML += `<option value="${sup.email}" data-name="${sup.name}" data-gstin="${sup.gstin || ''}" data-phone="${sup.phone || ''}" data-address="${sup.address || ''}">${sup.name} (${sup.email})</option>`;
        });
        supplierSelect.addEventListener('change', function() {
            const selected = supplierSelect.options[supplierSelect.selectedIndex];
            if (selected.value) {
                document.getElementById('supplierName').value = selected.dataset.name || '';
                document.getElementById('supplierGstin').value = selected.dataset.gstin || '';
                document.getElementById('supplierPhone').value = selected.dataset.phone || '';
                document.getElementById('supplierAddress').value = selected.dataset.address || '';
            } else {
                document.getElementById('supplierName').value = '';
                document.getElementById('supplierGstin').value = '';
                document.getElementById('supplierPhone').value = '';
                document.getElementById('supplierAddress').value = '';
            }
            populateInvoiceDropdown();
        });
    }

    function addItem() {
        items.push({ productId: '', productName: '', qty: 1, cost: 0 });
        renderItems();
    }

    function removeItem(idx) {
        items.splice(idx, 1);
        renderItems();
        recalcTotals();
    }

    function updateItem(idx, field, value) {
        items[idx][field] = value;
        if (field === 'productId') {
            const product = products.find(p => p.id == value);
            if (product) {
                items[idx].productName = product.name;
                items[idx].cost = product.price || 0; // default to selling price? user can change.
            } else {
                items[idx].productName = '';
            }
        }
        renderItems(); // re-render to refresh product name display
        recalcTotals();
    }

    function renderItems() {
        const container = document.getElementById('itemsContainer');
        container.innerHTML = '';
        items.forEach((item, idx) => {
            const div = document.createElement('div');
            div.className = 'item-row';
            // Product dropdown
            let productOptions = '<option value="">-- Select Product --</option>';
            products.forEach(p => {
                productOptions += `<option value="${p.id}" ${item.productId == p.id ? 'selected' : ''}>${p.name} (${p.sku}) - Stock: ${p.currentStock}</option>`;
            });
            div.innerHTML = `
                <select onchange="updateItem(${idx}, 'productId', this.value)" style="flex:2;">${productOptions}</select>
                <input type="text" placeholder="Product Name" value="${escapeHtml(item.productName)}" readonly style="flex:2; background:#e9ecef;">
                <input type="number" placeholder="Qty" value="${item.qty}" onchange="updateItem(${idx}, 'qty', parseFloat(this.value))" style="flex:1;">
                <input type="number" placeholder="Cost (₹)" value="${item.cost}" step="0.01" onchange="updateItem(${idx}, 'cost', parseFloat(this.value))" style="flex:1;">
                <button class="remove-item" onclick="removeItem(${idx})">X</button>
            `;
            container.appendChild(div);
        });
    }

    function recalcTotals() {
        let subtotal = 0;
        items.forEach(item => subtotal += (item.qty || 0) * (item.cost || 0));
        const cgst = subtotal * 0.09;
        const sgst = subtotal * 0.09;
        let grand = subtotal + cgst + sgst;
        grand = Math.round(grand);
        document.getElementById('subtotal').innerText = subtotal.toFixed(2);
        document.getElementById('cgstTotal').innerText = cgst.toFixed(2);
        document.getElementById('sgstTotal').innerText = sgst.toFixed(2);
        document.getElementById('grandTotal').innerText = grand.toFixed(2);
    }

    function savePurchaseInvoice() {
        // Get supplier email or create new supplier
        let supplierEmail = document.getElementById('supplierSelect').value;
        let supplierName = document.getElementById('supplierName').value.trim();
        if (!supplierName) { alert('Please select or enter supplier name'); return; }
        const purchaseInvoiceNo = document.getElementById('purchaseInvoiceNo').value.trim();
        if (!purchaseInvoiceNo) { alert('Enter purchase invoice number'); return; }
        if (items.length === 0) { alert('Add at least one item'); return; }

        // Find or create supplier in suppliers array
        let supplier = suppliers.find(s => s.email === supplierEmail || s.name === supplierName);
        if (!supplier) {
            // Create new supplier
            supplier = {
                id: Date.now(),
                name: supplierName,
                email: supplierEmail || `supplier_${Date.now()}@temp.com`,
                phone: document.getElementById('supplierPhone').value,
                gstin: document.getElementById('supplierGstin').value,
                address: document.getElementById('supplierAddress').value,
                creditLimit: 50000,
                openingBalance: 0,
                outstanding: 0,
                status: 'active',
                supplierCode: 'SUP' + (suppliers.length + 1).toString().padStart(4,'0'),
                createdAt: new Date().toISOString()
            };
            suppliers.push(supplier);
            localStorage.setItem('suppliers', JSON.stringify(suppliers));
        }

        // Prepare items for createPurchaseInvoice (from data-manager.js)
        const purchaseItems = [];
        for (let item of items) {
            if (!item.productId) {
                alert('Please select a product for each item');
                return;
            }
            purchaseItems.push({
                productId: parseInt(item.productId),
                quantity: item.qty,
                cost: item.cost
            });
        }

        const purchaseDate = document.getElementById('purchaseDate').value || new Date().toISOString().split('T')[0];
        const dueDate = document.getElementById('purchaseDueDate').value;

        const purchase = {
            id: Date.now(),
            date: purchaseDate,
            supplierEmail: supplier.email,
            items: purchaseItems,
            total: parseFloat(document.getElementById('grandTotal').innerText),
            poNo: purchaseInvoiceNo,
            dueDate: dueDate
        };

        try {
            // Central function from data-manager.js
            createPurchaseInvoice(purchase);
            alert(`Purchase invoice ${purchaseInvoiceNo} saved! Stock increased and supplier outstanding updated.`);

            // Reset form
            document.getElementById('supplierSelect').value = '';
            document.getElementById('supplierName').value = '';
            document.getElementById('supplierGstin').value = '';
            document.getElementById('supplierPhone').value = '';
            document.getElementById('supplierAddress').value = '';
            document.getElementById('purchaseInvoiceNo').value = '';
            items = [];
            renderItems();
            recalcTotals();
            populateInvoiceDropdown();
        } catch (err) {
            alert('Error: ' + err.message);
        }
    }

    function recordCreditNote() {
        const supplierName = document.getElementById('supplierName').value.trim();
        if (!supplierName) { alert('Select a supplier first'); return; }
        const creditDate = document.getElementById('creditDate').value;
        const amount = parseFloat(document.getElementById('creditAmount').value);
        const invoiceNo = document.getElementById('creditInvoiceSelect').value;
        const remarks = document.getElementById('creditRemarks').value;
        if (!creditDate || isNaN(amount) || amount <= 0) { alert('Enter valid date and amount'); return; }

        // Find supplier to reduce outstanding
        let supplier = suppliers.find(s => s.name === supplierName);
        if (!supplier) { alert('Supplier not found in master'); return; }

        // Update supplier outstanding using paySupplier from data-manager.js (if you have it)
        // Or directly update outstanding and ledger
        supplier.outstanding = Math.max(0, (supplier.outstanding || 0) - amount);
        localStorage.setItem('suppliers', JSON.stringify(suppliers));

        // Record credit note in separate array (optional)
        let supplierCreditNotes = JSON.parse(localStorage.getItem('supplierCreditNotes') || '[]');
        supplierCreditNotes.push({
            id: Date.now(),
            supplierName: supplierName,
            date: creditDate,
            amount: amount,
            invoiceNo: invoiceNo || null,
            remarks: remarks || 'Credit Note',
            type: 'credit_note'
        });
        localStorage.setItem('supplierCreditNotes', JSON.stringify(supplierCreditNotes));

        // Also add to supplier ledger if you have one
        // For now, just update outstanding
        alert('Credit note recorded. Supplier outstanding reduced.');
        document.getElementById('creditAmount').value = '';
        document.getElementById('creditRemarks').value = '';
        // Refresh supplier list display if needed
    }

    function populateInvoiceDropdown() {
        const supplierName = document.getElementById('supplierName').value.trim();
        const select = document.getElementById('creditInvoiceSelect');
        if (!supplierName) { select.innerHTML = '<option value="">All outstanding</option>'; return; }
        const invoices = purchaseInvoices.filter(inv => inv.supplier.name === supplierName);
        select.innerHTML = '<option value="">All outstanding</option>';
        invoices.forEach(inv => {
            select.innerHTML += `<option value="${inv.invoiceNo}">${inv.invoiceNo} - ₹${inv.grandTotal.toFixed(2)} (Due: ${inv.dueDate})</option>`;
        });
    }

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }

    // Set default dates
    document.getElementById('purchaseDate').valueAsDate = new Date();
    const due = new Date(); due.setDate(due.getDate() + 30);
    document.getElementById('purchaseDueDate').valueAsDate = due;
    document.getElementById('creditDate').valueAsDate = new Date();

    // Initialization
    loadData();
    addItem(); // start with one empty row
</script>
</body>
</html>
