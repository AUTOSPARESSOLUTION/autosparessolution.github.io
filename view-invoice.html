<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Invoice – Auto Spares</title>
    <style>
        body { font-family: 'Roboto', sans-serif; background: #e9ecef; margin: 0; padding: 20px; }
        .invoice-container { max-width: 1100px; margin: 0 auto; background: white; border-radius: 12px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .company-header { background: #0a7c71; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 20px; border-radius: 8px; }
        .logo-area { display: flex; align-items: center; gap: 15px; }
        .logo-area img { height: 60px; }
        .company-details h1 { margin: 0; font-size: 24px; }
        .company-details p { margin: 3px 0 0; font-size: 12px; }
        .invoice-title h2 { margin: 0; font-size: 20px; }
        .info-box { background: #f8f9fa; border-radius: 8px; padding: 15px; margin-bottom: 20px; }
        .info-row { display: flex; margin-bottom: 8px; }
        .info-label { width: 120px; font-weight: 600; }
        .info-value { flex: 1; word-break: break-word; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; font-size: 12px; }
        th, td { border: 1px solid #dee2e6; padding: 8px; text-align: left; vertical-align: top; }
        th { background: #f8f9fa; }
        .totals { text-align: right; margin-top: 20px; }
        .totals table { width: 280px; margin-left: auto; }
        .totals td { border: none; padding: 5px; }
        .signature-box { margin-top: 30px; text-align: right; border-top: 1px solid #333; padding-top: 10px; width: 250px; margin-left: auto; }
        button { background: #0a7c71; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; margin-top: 20px; }
        @media print { button { display: none; } body { background: white; padding: 0; } .invoice-container { box-shadow: none; padding: 0; } }
    </style>
</head>
<body>
<div class="invoice-container" id="invoiceView"></div>
<button onclick="window.print()">🖨️ Print Invoice</button>

<script>
    const invoice = JSON.parse(localStorage.getItem('viewInvoice') || '{}');
    if (!invoice.invoiceNo) {
        document.getElementById('invoiceView').innerHTML = '<p style="color:red;">No invoice data found.</p>';
    } else {
        // Calculate tax groups from items
        let taxGroups = {};
        invoice.items.forEach(item => {
            const taxable = item.price * item.qty;
            const cgst = taxable * 0.09;
            const sgst = taxable * 0.09;
            const hsn = item.hsn || '';
            if (!taxGroups[hsn]) taxGroups[hsn] = { taxable: 0, cgst: 0, sgst: 0 };
            taxGroups[hsn].taxable += taxable;
            taxGroups[hsn].cgst += cgst;
            taxGroups[hsn].sgst += sgst;
        });
        let taxHtml = '';
        for (let hsn in taxGroups) {
            const g = taxGroups[hsn];
            const totalTax = g.cgst + g.sgst;
            taxHtml += `<tr>
                <td style="border:1px solid #dee2e6; padding:6px 4px;">${hsn || 'N/A'}</td>
                <td style="border:1px solid #dee2e6; padding:6px 4px; text-align:right;">₹${g.taxable.toFixed(2)}</td>
                <td style="border:1px solid #dee2e6; padding:6px 4px; text-align:right;">₹${g.cgst.toFixed(2)}</td>
                <td style="border:1px solid #dee2e6; padding:6px 4px; text-align:right;">₹${g.sgst.toFixed(2)}</td>
                <td style="border:1px solid #dee2e6; padding:6px 4px; text-align:right;">₹0.00</td>
                <td style="border:1px solid #dee2e6; padding:6px 4px; text-align:right;">₹${totalTax.toFixed(2)}</td>
            </tr>`;
        }

        let itemsHtml = '';
        invoice.items.forEach((item, idx) => {
            const taxable = item.price * item.qty;
            const cgst = taxable * 0.09;
            const sgst = taxable * 0.09;
            const totalItem = taxable + cgst + sgst;
            itemsHtml += `<tr>
                <td style="border:1px solid #dee2e6; padding:6px 4px; text-align:center;">${idx+1}</td>
                <td style="border:1px solid #dee2e6; padding:6px 4px;">${escapeHtml(item.part)}</td>
                <td style="border:1px solid #dee2e6; padding:6px 4px;">${escapeHtml(item.desc)}</td>
                <td style="border:1px solid #dee2e6; padding:6px 4px;">${escapeHtml(item.hsn)}</td>
                <td style="border:1px solid #dee2e6; padding:6px 4px; text-align:center;">${item.qty}</td>
                <td style="border:1px solid #dee2e6; padding:6px 4px; text-align:right;">₹${item.price.toFixed(2)}</td>
                <td style="border:1px solid #dee2e6; padding:6px 4px; text-align:right;">₹${taxable.toFixed(2)}</td>
                <td style="border:1px solid #dee2e6; padding:6px 4px; text-align:center;">18%</td>
                <td style="border:1px solid #dee2e6; padding:6px 4px; text-align:right;">₹${cgst.toFixed(2)}</td>
                <td style="border:1px solid #dee2e6; padding:6px 4px; text-align:right;">₹${sgst.toFixed(2)}</td>
                <td style="border:1px solid #dee2e6; padding:6px 4px; text-align:right;">₹${totalItem.toFixed(2)}</td>
            </tr>`;
        });

        let html = `
            <div class="company-header">
                <div class="logo-area">
                    <img src="images/ASS.jpg" alt="Logo" onerror="this.src='https://via.placeholder.com/60?text=ASS'">
                    <div class="company-details">
                        <h1>Auto Spares Solution</h1>
                        <p>GSTIN: 19ANOPD3300R1ZO</p>
                        <p>101, 1st floor, 57/5, Q Road, Howrah, WB 711108</p>
                    </div>
                </div>
                <div class="invoice-title">
                    <h2>TAX INVOICE</h2>
                    <p><strong>Invoice No:</strong> ${invoice.invoiceNo}</p>
                    <p><strong>Date:</strong> ${invoice.date}</p>
                    <p><strong>Due Date:</strong> ${invoice.dueDate}</p>
                </div>
            </div>
            <div style="display:flex; gap:20px; flex-wrap:wrap;">
                <div style="flex:1;"><div class="info-box"><h3>Buyer</h3><div class="info-row"><div class="info-label">Name:</div><div class="info-value">${escapeHtml(invoice.buyer?.name)}</div></div><div class="info-row"><div class="info-label">Address:</div><div class="info-value">${escapeHtml(invoice.buyer?.address)}</div></div><div class="info-row"><div class="info-label">GSTIN:</div><div class="info-value">${escapeHtml(invoice.buyer?.gstin)}</div></div><div class="info-row"><div class="info-label">State:</div><div class="info-value">${escapeHtml(invoice.buyer?.state)}</div></div><div class="info-row"><div class="info-label">Phone:</div><div class="info-value">${escapeHtml(invoice.buyer?.phone)}</div></div><div class="info-row"><div class="info-label">Email:</div><div class="info-value">${escapeHtml(invoice.buyer?.email)}</div></div></div></div>
                <div style="flex:1;"><div class="info-box"><h3>Consignee</h3><div class="info-row"><div class="info-label">Name:</div><div class="info-value">${escapeHtml(invoice.consignee?.name)}</div></div><div class="info-row"><div class="info-label">Address:</div><div class="info-value">${escapeHtml(invoice.consignee?.address)}</div></div><div class="info-row"><div class="info-label">Phone:</div><div class="info-value">${escapeHtml(invoice.consignee?.phone)}</div></div></div></div>
            </div>
            <div style="display:flex; gap:20px; flex-wrap:wrap;">
                <div style="flex:1;"><div class="info-box"><h3>Order Details</h3><div class="info-row"><div class="info-label">Customer Code:</div><div class="info-value">${escapeHtml(invoice.orderDetails?.customerCode)}</div></div><div class="info-row"><div class="info-label">SO No:</div><div class="info-value">${escapeHtml(invoice.orderDetails?.salesOrderNo)}</div></div><div class="info-row"><div class="info-label">Ref No:</div><div class="info-value">${escapeHtml(invoice.orderDetails?.referenceNo)}</div></div><div class="info-row"><div class="info-label">Payment Terms:</div><div class="info-value">${escapeHtml(invoice.orderDetails?.paymentTerms)}</div></div></div></div>
                <div style="flex:1;"><div class="info-box"><h3>Dispatch Details</h3><div class="info-row"><div class="info-label">Doc No:</div><div class="info-value">${escapeHtml(invoice.dispatchDetails?.docNo)}</div></div><div class="info-row"><div class="info-label">Mode:</div><div class="info-value">${escapeHtml(invoice.dispatchDetails?.transportMode)}</div></div><div class="info-row"><div class="info-label">Vehicle No:</div><div class="info-value">${escapeHtml(invoice.dispatchDetails?.vehicleNo)}</div></div></div></div>
            </div>
            <table style="width:100%; border-collapse:collapse; margin:20px 0; font-size:11px; table-layout:fixed;">
                <thead><tr style="background:#f8f9fa;"><th style="width:5%;">#</th><th style="width:10%;">Part No</th><th style="width:15%;">Description</th><th style="width:8%;">HSN</th><th style="width:5%;">Qty</th><th style="width:8%;">Unit Price</th><th style="width:8%;">Taxable</th><th style="width:6%;">GST%</th><th style="width:8%;">CGST</th><th style="width:8%;">SGST</th><th style="width:8%;">Total</th></tr></thead>
                <tbody>${itemsHtml}</tbody>
            </table>
            <table style="width:100%; border-collapse:collapse; margin:15px 0; font-size:11px;">
                <thead><tr style="background:#f8f9fa;"><th>HSN/SAC</th><th>Taxable Value</th><th>CGST</th><th>SGST</th><th>IGST</th><th>Total Tax</th></tr></thead>
                <tbody>${taxHtml}</tbody>
            </table>
            <div class="totals">
                <table>
                    <tr><td style="text-align:right;">Subtotal:  </td><td style="text-align:right;">₹${invoice.subtotal?.toFixed(2) || '0.00'}</td></tr>
                    <tr><td style="text-align:right;">CGST (9%):  </td><td style="text-align:right;">₹${invoice.cgst?.toFixed(2) || '0.00'}</td></tr>
                    <tr><td style="text-align:right;">SGST (9%):  </td><td style="text-align:right;">₹${invoice.sgst?.toFixed(2) || '0.00'}</td></tr>
                    <tr><td style="text-align:right;">Round Off:  </td><td style="text-align:right;">₹${invoice.roundOff?.toFixed(2) || '0.00'}</td></tr>
                    <tr style="font-weight:bold;"><td style="text-align:right;">Grand Total:  </td><td style="text-align:right;">₹${invoice.grandTotal?.toFixed(2) || '0.00'}</td></tr>
                </table>
            </div>
            <div class="signature-box">
                For Auto Spares Solution<br>(Authorised Signatory)
            </div>
        `;
        document.getElementById('invoiceView').innerHTML = html;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;');
    }
</script>
</body>
</html>
