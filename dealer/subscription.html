<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Subscription</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Roboto',sans-serif;background:#0f172a;color:#e2e8f0}.header{background:#1e293b;padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center}.container{padding:2rem;max-width:1200px;margin:0 auto}h1{color:#facc15;margin-bottom:1rem}.plans-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.5rem;margin-top:1.5rem}.plan-card{background:#1e293b;border-radius:1rem;padding:1.5rem;border:2px solid transparent}.plan-card.popular{border-color:#facc15}.plan-name{font-size:1.5rem;font-weight:bold;color:#facc15}.plan-price{font-size:2rem;font-weight:bold;margin:1rem 0}.plan-price small{font-size:0.8rem;color:#94a3b8}.plan-features{list-style:none;margin:1rem 0}.plan-features li{padding:0.5rem 0;border-bottom:1px solid #334155}.btn{width:100%;padding:0.75rem;border:none;border-radius:0.5rem;font-weight:bold;cursor:pointer}.btn-primary{background:#facc15;color:#0f172a}.btn-outline{background:transparent;border:2px solid #facc15;color:#facc15}.current-plan{background:#22c55e;color:white;padding:0.25rem 0.5rem;border-radius:0.25rem;font-size:0.8rem}.footer{text-align:center;padding:1rem;margin-top:2rem}</style></head>
<body><div class="header"><div><img src="../images/ASS.jpg" height="40"> Auto Spares – Subscription</div><a href="dashboard.html" style="color:#facc15;">← Dashboard</a></div><div class="container"><h1><i class="fas fa-crown"></i> Choose Your ERP Plan</h1><p>Start with 14 days free trial. No commitment, cancel anytime.</p><div class="plans-grid" id="plansGrid"></div><div style="margin-top:2rem;background:#1e293b;padding:1rem;border-radius:0.5rem;text-align:center"><h3><i class="fas fa-credit-card"></i> Auto-Debit Payment</h3><p>After free trial ends, your subscription will automatically renew.</p><button class="btn btn-outline" onclick="managePayment()" style="width:auto;padding:0.5rem 1rem">Manage Payment Method</button></div></div><div class="footer">Powered by Auto Spares Solution</div>
<script>const dealer=JSON.parse(localStorage.getItem('currentDealer'));if(!dealer)window.location.href='index.html';const PLANS={free:{name:'Free Trial',price:0,gst:0,total:0,features:['Stock Management','Invoice Generation','Sales History','14 Days Free Trial']},basic:{name:'Basic',price:499,gst:89.82,total:588.82,features:['Stock Management','Invoice Generation','Sales History','Email Support']},pro:{name:'Pro',price:999,gst:179.82,total:1178.82,features:['Everything in Basic','Marketplace','Bank Details & UPI QR','Digital Signature']},enterprise:{name:'Enterprise',price:1999,gst:359.82,total:2358.82,features:['Everything in Pro','API Access','Multiple Users','Priority Support']}};function getSub(){return JSON.parse(localStorage.getItem(`dealer_${dealer.email}_subscription`)||'{}');}function renderPlans(){const cur=getSub();const grid=document.getElementById('plansGrid');grid.innerHTML='';for(const[key,plan]of Object.entries(PLANS)){const isCurrent=cur.plan===key;const card=document.createElement('div');card.className=`plan-card ${key==='pro'?'popular':''}`;card.innerHTML=`<div class="plan-name">${plan.name}</div>${isCurrent?'<span class="current-plan">Current Plan</span>':''}<div class="plan-price">${plan.price===0?'FREE':`₹${plan.price}`}<small>${plan.price>0?'/month + GST':''}</small></div>${plan.price>0?`<div>+18% GST: ₹${plan.gst}<br><strong>Total: ₹${plan.total}/month</strong></div>`:''}<ul class="plan-features">${plan.features.map(f=>`<li><i class="fas fa-check"></i> ${f}</li>`).join('')}</ul>${!isCurrent?`<button class="btn ${plan.price===0?'btn-outline':'btn-primary'}" onclick="selectPlan('${key}')">${plan.price===0?'Start Free Trial':'Subscribe Now'}</button>`:`<button class="btn btn-outline" onclick="cancelSub()">Cancel Plan</button>`}`;grid.appendChild(card);}}function selectPlan(planKey){const plan=PLANS[planKey];if(planKey==='free'){const trialEnd=new Date();trialEnd.setDate(trialEnd.getDate()+14);localStorage.setItem(`dealer_${dealer.email}_subscription`,JSON.stringify({plan:'free',startDate:new Date().toISOString(),trialEndDate:trialEnd.toISOString(),status:'active',autoRenew:false}));alert('Free trial activated! 14 days full access.');location.reload();}else{if(confirm(`Subscribe to ${plan.name} Plan?\nMonthly: ₹${plan.total}\nAuto-debit enabled.`)){localStorage.setItem(`dealer_${dealer.email}_subscription`,JSON.stringify({plan:planKey,startDate:new Date().toISOString(),nextBillingDate:new Date(new Date().setMonth(new Date().getMonth()+1)).toISOString(),status:'active',autoRenew:true,amount:plan.total}));alert(`Subscribed to ${plan.name} Plan!`);location.reload();}}}function cancelSub(){if(confirm('Cancel subscription? Access continues until billing period ends.')){const sub=getSub();sub.status='cancelled';sub.autoRenew=false;localStorage.setItem(`dealer_${dealer.email}_subscription`,JSON.stringify(sub));alert('Subscription cancelled.');location.reload();}}function managePayment(){alert('Payment method management will open here.');}renderPlans();</script></body></html>
