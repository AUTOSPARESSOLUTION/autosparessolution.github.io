<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Dealer Registration</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Roboto',sans-serif;background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}.register-container{background:#1e293b;padding:2rem;border-radius:1rem;width:100%;max-width:500px}.logo{text-align:center;margin-bottom:2rem}.logo img{width:60px}h2{color:#facc15;text-align:center;margin-bottom:1rem}input{width:100%;padding:0.75rem;margin-bottom:1rem;border-radius:0.5rem;border:none;background:#0f172a;color:white}button{width:100%;padding:0.75rem;background:#facc15;color:#0f172a;border:none;border-radius:0.5rem;font-weight:bold;cursor:pointer}.login-link{text-align:center;margin-top:1rem}.login-link a{color:#facc15}</style></head>
<body><div class="register-container"><div class="logo"><img src="../images/ASS.jpg" alt="Logo"><h2>Dealer Registration</h2><p>Join Auto Spares Solution ERP Network</p></div><form id="registerForm"><input type="text" id="dealerName" placeholder="Business Name" required><input type="email" id="dealerEmail" placeholder="Email" required><input type="password" id="dealerPassword" placeholder="Password" required><input type="tel" id="dealerPhone" placeholder="Phone Number" required><input type="text" id="dealerGSTIN" placeholder="GSTIN" required><input type="text" id="dealerAddress" placeholder="Address" required><input type="text" id="dealerPincode" placeholder="Pincode" required><button type="submit"><i class="fas fa-user-plus"></i> Register as Dealer</button></form><div class="login-link"><a href="index.html">Already registered? Login</a></div></div>
<script>document.getElementById('registerForm').addEventListener('submit',function(e){e.preventDefault();const newDealer={name:document.getElementById('dealerName').value,email:document.getElementById('dealerEmail').value,password:document.getElementById('dealerPassword').value,phone:document.getElementById('dealerPhone').value,gstin:document.getElementById('dealerGSTIN').value,address:document.getElementById('dealerAddress').value,pincode:document.getElementById('dealerPincode').value,registeredAt:new Date().toISOString()};const dealers=JSON.parse(localStorage.getItem('dealers')||'[]');if(dealers.find(d=>d.email===newDealer.email)){alert("Email already registered");return;}dealers.push(newDealer);localStorage.setItem('dealers',JSON.stringify(dealers));alert("Registration successful! Please login.");window.location.href='index.html';});</script></body></html>
