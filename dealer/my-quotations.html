<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>My Quotations</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><style>body{font-family:'Roboto',sans-serif;background:#0f172a;color:#e2e8f0}.header{background:#1e293b;padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center}.container{padding:2rem;max-width:1200px;margin:0 auto}table{width:100%;border-collapse:collapse;margin-top:1rem}th,td{border:1px solid #334155;padding:0.5rem;text-align:left}th{background:#facc15;color:#0f172a}.btn{background:#3b82f6;color:white;padding:0.25rem 0.5rem;border:none;border-radius:0.25rem;cursor:pointer}.footer{text-align:center;padding:1rem;margin-top:2rem}</style></head>
<body><div class="header"><div><img src="../images/ASS.jpg" height="40"> Auto Spares – My Quotations</div><a href="dashboard.html" style="color:#facc15;">← Dashboard</a></div><div class="container"><h1><i class="fas fa-file-alt"></i> My Quotations</h1><table id="quoteTable"><thead><tr><th>Quote No</th><th>Date</th><th>Customer</th><th>Total</th><th>Action</th></tr></thead><tbody></tbody></table><button class="btn" onclick="createNewQuote()" style="margin-top:1rem"><i class="fas fa-plus"></i> New Quotation</button></div><div class="footer">Powered by Auto Spares Solution</div>
<script>const dealer=JSON.parse(localStorage.getItem('currentDealer'));if(!dealer)window.location.href='index.html';const quotes=JSON.parse(localStorage.getItem(`dealer_${dealer.email}_quotations`)||'[]');const tbody=document.querySelector('#quoteTable tbody');for(const q of quotes.reverse()){const r=tbody.insertRow();r.insertCell(0).innerText=q.quoteNo||'N/A';r.insertCell(1).innerText=new Date(q.date).toLocaleDateString();r.insertCell(2).innerText=q.customer||'N/A';r.insertCell(3).innerText=`₹${(q.total||0).toFixed(2)}`;r.insertCell(4).innerHTML=`<button class="btn" onclick="alert('Quotation details')">View</button>`;}function createNewQuote(){const quoteNo=`Q-${Date.now()}`;const newQuote={quoteNo,date:new Date().toISOString(),customer:'New Customer',total:0,items:[]};let qs=JSON.parse(localStorage.getItem(`dealer_${dealer.email}_quotations`)||'[]');qs.push(newQuote);localStorage.setItem(`dealer_${dealer.email}_quotations`,JSON.stringify(qs));alert(`Quotation ${quoteNo} created. Edit feature coming soon.`);location.reload();}</script></body></html>
