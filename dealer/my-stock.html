<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>My Stock</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Roboto',sans-serif;background:#0f172a;color:#e2e8f0}.header{background:#1e293b;padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center}.container{padding:2rem;max-width:1200px;margin:0 auto}.add-form{background:#1e293b;padding:1rem;border-radius:0.5rem;margin-bottom:1rem;display:flex;gap:1rem;flex-wrap:wrap;align-items:end}input,select{background:#0f172a;border:1px solid #334155;color:white;padding:0.5rem;border-radius:0.5rem}table{width:100%;border-collapse:collapse}th,td{border:1px solid #334155;padding:0.5rem;text-align:left}th{background:#facc15;color:#0f172a}.btn{background:#3b82f6;color:white;padding:0.5rem 1rem;border:none;border-radius:0.5rem;cursor:pointer}.btn-success{background:#22c55e}.footer{text-align:center;padding:1rem;margin-top:2rem}</style></head>
<body><div class="header"><div><img src="../images/ASS.jpg" height="40"> Auto Spares – My Stock</div><a href="dashboard.html" style="color:#facc15;">← Dashboard</a></div><div class="container"><h1><i class="fas fa-boxes"></i> My Stock</h1><div class="add-form"><input type="text" id="partNo" placeholder="Part Number" required><input type="text" id="description" placeholder="Description"><input type="number" id="stockQty" placeholder="Quantity" required><input type="number" id="price" placeholder="Price (₹)" step="0.01"><button class="btn btn-success" onclick="addStock()"><i class="fas fa-plus"></i> Add Stock</button></div><table id="stockTable"><thead><tr><th>Part No</th><th>Description</th><th>Quantity</th><th>Price</th><th>Value</th><th>Action</th></tr></thead><tbody></tbody></table></div><div class="footer">Powered by Auto Spares Solution</div>
<script>const dealer=JSON.parse(localStorage.getItem('currentDealer'));if(!dealer)window.location.href='index.html';const STORAGE_KEY=`dealer_${dealer.email}_stock`;function loadStock(){const stock=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');const tbody=document.querySelector('#stockTable tbody');tbody.innerHTML='';for(const i of stock){const r=tbody.insertRow();r.insertCell(0).innerText=i.part;r.insertCell(1).innerText=i.desc||'';r.insertCell(2).innerText=i.stock;r.insertCell(3).innerText=`₹${i.price.toFixed(2)}`;r.insertCell(4).innerText=`₹${(i.price*i.stock).toFixed(2)}`;r.insertCell(5).innerHTML=`<button class="btn" onclick="deleteStock('${i.part}')"><i class="fas fa-trash"></i></button>`;}}function addStock(){const part=document.getElementById('partNo').value.trim();const desc=document.getElementById('description').value.trim();const qty=parseInt(document.getElementById('stockQty').value);const price=parseFloat(document.getElementById('price').value);if(!part||isNaN(qty))return;let stock=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');const existing=stock.find(i=>i.part===part);if(existing){existing.stock+=qty;if(price)existing.price=price;if(desc)existing.desc=desc;}else{stock.push({part,desc,stock:qty,price:price||0});}localStorage.setItem(STORAGE_KEY,JSON.stringify(stock));document.getElementById('partNo').value='';document.getElementById('stockQty').value='';loadStock();}function deleteStock(part){let stock=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');stock=stock.filter(i=>i.part!==part);localStorage.setItem(STORAGE_KEY,JSON.stringify(stock));loadStock();}loadStock();</script></body></html>
