<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Dealer Login</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Roboto',sans-serif;background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center}.login-container{background:#1e293b;padding:2rem;border-radius:1rem;width:100%;max-width:400px;box-shadow:0 4px 20px rgba(0,0,0,0.3)}.logo{text-align:center;margin-bottom:2rem}.logo img{width:80px;margin-bottom:1rem}.logo h1{color:#facc15;font-size:1.5rem}.logo p{color:#a0d9d4;font-size:0.8rem}input{width:100%;padding:0.75rem;margin-bottom:1rem;border-radius:0.5rem;border:none;background:#0f172a;color:white}button{width:100%;padding:0.75rem;background:#facc15;color:#0f172a;border:none;border-radius:0.5rem;font-weight:bold;cursor:pointer}.error{color:#f87171;margin-top:1rem;text-align:center}.register-link{text-align:center;margin-top:1rem}.register-link a{color:#facc15;text-decoration:none}</style></head>
<body><div class="login-container"><div class="logo"><img src="../images/ASS.jpg" alt="Logo"><h1>Dealer ERP Portal</h1><p>Powered by Auto Spares Solution</p></div><form id="loginForm"><input type="email" id="dealerEmail" placeholder="Dealer Email" required><input type="password" id="dealerPassword" placeholder="Password" required><button type="submit"><i class="fas fa-sign-in-alt"></i> Login to ERP</button></form><div id="loginError" class="error"></div><div class="register-link"><a href="register.html">New dealer? Register here</a></div></div>
<script>function initDealerSystem(){if(!localStorage.getItem('dealers'))localStorage.setItem('dealers',JSON.stringify([{email:"demo@example.com",password:"demo123",name:"Demo Dealer",gstin:"19ABCDE1234F1Z5",phone:"9876543210",address:"Kolkata",pincode:"700001"}]));}document.getElementById('loginForm').addEventListener('submit',function(e){e.preventDefault();const email=document.getElementById('dealerEmail').value,pass=document.getElementById('dealerPassword').value;const dealers=JSON.parse(localStorage.getItem('dealers')||'[]');const dealer=dealers.find(d=>d.email===email&&d.password===pass);if(dealer){localStorage.setItem('currentDealer',JSON.stringify(dealer));window.location.href='dashboard.html';}else{document.getElementById('loginError').innerText='Invalid email or password';}});initDealerSystem();</script></body></html>
