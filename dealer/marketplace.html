<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Marketplace</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><style>body{font-family:'Roboto',sans-serif;background:#0f172a;color:#e2e8f0}.header{background:#1e293b;padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center}.container{padding:2rem;max-width:1200px;margin:0 auto}.dealer-card{background:#1e293b;border-radius:0.5rem;padding:1rem;margin-bottom:1rem}.dealer-name{color:#facc15;font-weight:bold}.stock-item{border-left:3px solid #facc15;padding-left:0.5rem;margin:0.5rem 0}.btn{background:#3b82f6;color:white;padding:0.25rem 0.5rem;border:none;border-radius:0.25rem;cursor:pointer}.footer{text-align:center;padding:1rem;margin-top:2rem}</style></head>
<body><div class="header"><div><img src="../images/ASS.jpg" height="40"> Auto Spares – Marketplace</div><a href="dashboard.html" style="color:#facc15;">← Dashboard</a></div><div class="container"><h1><i class="fas fa-store"></i> Dealer Marketplace</h1><p>Buy from other dealers in the Auto Spares Solution network</p><div id="marketplaceList"></div></div><div class="footer">Powered by Auto Spares Solution</div>
<script>const currentDealer=JSON.parse(localStorage.getItem('currentDealer'));if(!currentDealer)window.location.href='index.html';const PLATFORM_FEE={type:'percentage',value:2,minFee:10,maxFee:500,gst:18};function calcFee(amt){let fee=PLATFORM_FEE.type==='percentage'?amt*PLATFORM_FEE.value/100:PLATFORM_FEE.value;fee=Math.min(PLATFORM_FEE.maxFee,Math.max(PLATFORM_FEE.minFee,fee));const gst=fee*PLATFORM_FEE.gst/100;return{ fee, gst, total: fee+gst };}function loadMarketplace(){const dealers=JSON.parse(localStorage.getItem('dealers')||'[]');const container=document.getElementById('marketplaceList');container.innerHTML='';for(const d of dealers){if(d.email===currentDealer.email)continue;const skey=`dealer_${d.email}_stock`;const stock=JSON.parse(localStorage.getItem(skey)||'[]');if(stock.length===0)continue;const card=document.createElement('div');card.className='dealer-card';card.innerHTML=`<div class="dealer-name"><i class="fas fa-store"></i> ${d.name} (${d.gstin})</div><div>📍 ${d.address} | 📞 ${d.phone}</div><div style="margin-top:0.5rem"><strong>Available Stock:</strong></div>`+stock.map(it=>`<div class="stock-item">${it.part} - ${it.desc||''} | Qty: ${it.stock} | ₹${it.price.toFixed(2)} <button class="btn" onclick="orderFromDealer('${d.email}','${it.part}',${it.price})">Order</button></div>`).join('');container.appendChild(card);}if(container.innerHTML==='')container.innerHTML='<div>No other dealers have listed stock yet.</div>';}function orderFromDealer(sellerEmail,part,price){const qty=prompt("Enter quantity:","1");if(!qty||parseInt(qty)<=0)return;const quantity=parseInt(qty);const amt=price*quantity;const{fee,gst,totalFee}=calcFee(amt);if(!confirm(`Order Summary:\nPart: ${part}\nQty: ${quantity}\nSubtotal: ₹${amt}\nPlatform Fee: ₹${fee}\nGST on Fee: ₹${gst}\nTotal: ₹${amt+totalFee}\n\nProceed?`))return;const purchaseKey=`dealer_${currentDealer.email}_purchases`;let purchases=JSON.parse(localStorage.getItem(purchaseKey)||'[]');purchases.push({poNo:`PO-${Date.now()}`,date:new Date().toISOString(),supplierName:sellerEmail,part,qty:quantity,price,subtotal:amt,platformFee:fee,platformFeeGST:gst,totalFee,grandTotal:amt+totalFee,status:'pending'});localStorage.setItem(purchaseKey,JSON.stringify(purchases));let fees=JSON.parse(localStorage.getItem('platform_fees')||'[]');fees.push({id:`PF-${Date.now()}`,date:new Date().toISOString(),buyerEmail:currentDealer.email,buyerName:currentDealer.name,sellerEmail,part,quantity,orderAmount:amt,platformFee:fee,platformFeeGST:gst,totalFee,status:'pending'});localStorage.setItem('platform_fees',JSON.stringify(fees));const sellerStockKey=`dealer_${sellerEmail}_stock`;let sellerStock=JSON.parse(localStorage.getItem(sellerStockKey)||'[]');const stockItem=sellerStock.find(i=>i.part===part);if(stockItem)stockItem.stock-=quantity;localStorage.setItem(sellerStockKey,JSON.stringify(sellerStock));alert(`Order placed! Platform fee: ₹${totalFee.toFixed(2)}\nSeller will contact you.`);loadMarketplace();}loadMarketplace();</script></body></html>
