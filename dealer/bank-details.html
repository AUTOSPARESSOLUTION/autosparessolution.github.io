<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Bank Details</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><style>body{font-family:'Roboto',sans-serif;background:#0f172a;color:#e2e8f0}.header{background:#1e293b;padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center}.container{padding:2rem;max-width:800px;margin:0 auto}.card{background:#1e293b;border-radius:0.5rem;padding:1.5rem;margin-bottom:1rem}.card h2{color:#facc15;margin-bottom:1rem}input,textarea{width:100%;padding:0.5rem;margin-bottom:0.5rem;background:#0f172a;border:1px solid #334155;color:white;border-radius:0.5rem}.btn{background:#3b82f6;color:white;padding:0.5rem 1rem;border:none;border-radius:0.5rem;cursor:pointer}.btn-success{background:#22c55e}.signature-pad canvas{background:white;border-radius:0.5rem;cursor:crosshair;width:100%;height:200px}.footer{text-align:center;padding:1rem;margin-top:2rem}</style></head>
<body><div class="header"><div><img src="../images/ASS.jpg" height="40"> Auto Spares – Bank Details</div><a href="dashboard.html" style="color:#facc15;">← Dashboard</a></div><div class="container"><div class="card"><h2><i class="fas fa-building-columns"></i> Bank Account Details</h2><form id="bankForm"><input type="text" id="accountHolder" placeholder="Account Holder Name"><input type="text" id="bankName" placeholder="Bank Name"><input type="text" id="accountNumber" placeholder="Account Number"><input type="text" id="ifscCode" placeholder="IFSC Code"><input type="text" id="upiId" placeholder="UPI ID (for QR code)"><textarea id="branchAddress" rows="2" placeholder="Branch Address"></textarea><button type="submit" class="btn btn-success"><i class="fas fa-save"></i> Save Bank Details</button></form></div><div class="card"><h2><i class="fas fa-pen-fancy"></i> Digital Signature / Stamp</h2><div class="signature-pad"><canvas id="signatureCanvas" width="400" height="200"></canvas><div style="display:flex;gap:0.5rem;margin-top:0.5rem"><button class="btn" onclick="clearSignature()">Clear</button><button class="btn btn-success" onclick="saveSignature()">Save Signature</button></div></div><div class="preview" id="signaturePreview"></div></div></div><div class="footer">Powered by Auto Spares Solution</div>
<script>const dealer=JSON.parse(localStorage.getItem('currentDealer'));if(!dealer)window.location.href='index.html';const STORAGE_KEY=`dealer_${dealer.email}_bank`;let canvas=document.getElementById('signatureCanvas'),ctx=canvas.getContext('2d'),drawing=false;function resizeCanvas(){canvas.width=canvas.clientWidth;canvas.height=200;ctx.fillStyle='white';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='#0f172a';ctx.lineWidth=2;loadSignature();}function startDrawing(e){drawing=true;const rect=canvas.getBoundingClientRect();const x=(e.clientX-rect.left)*(canvas.width/rect.width);const y=(e.clientY-rect.top)*(canvas.height/rect.height);ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x,y);ctx.stroke();}function draw(e){if(!drawing)return;e.preventDefault();const rect=canvas.getBoundingClientRect();const x=(e.clientX-rect.left)*(canvas.width/rect.width);const y=(e.clientY-rect.top)*(canvas.height/rect.height);ctx.lineTo(x,y);ctx.stroke();ctx.beginPath();ctx.moveTo(x,y);}function stopDrawing(){drawing=false;ctx.beginPath();}canvas.addEventListener('mousedown',startDrawing);canvas.addEventListener('mousemove',draw);canvas.addEventListener('mouseup',stopDrawing);canvas.addEventListener('mouseleave',stopDrawing);canvas.addEventListener('touchstart',(e)=>{e.preventDefault();startDrawing(e.touches[0]);});canvas.addEventListener('touchmove',(e)=>{e.preventDefault();draw(e.touches[0]);});canvas.addEventListener('touchend',stopDrawing);function clearSignature(){ctx.fillStyle='white';ctx.fillRect(0,0,canvas.width,canvas.height);localStorage.removeItem(`dealer_${dealer.email}_bank_signature`);document.getElementById('signaturePreview').innerHTML='';}function saveSignature(){const data=canvas.toDataURL();localStorage.setItem(`dealer_${dealer.email}_bank_signature`,data);document.getElementById('signaturePreview').innerHTML=`<img src="${data}" style="max-height:100px">`;alert('Signature saved!');}function loadSignature(){const saved=localStorage.getItem(`dealer_${dealer.email}_bank_signature`);if(saved){const img=new Image();img.onload=()=>ctx.drawImage(img,0,0,canvas.width,canvas.height);img.src=saved;document.getElementById('signaturePreview').innerHTML=`<img src="${saved}" style="max-height:100px">`;}}function loadBankDetails(){const bank=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');document.getElementById('accountHolder').value=bank.accountHolder||'';document.getElementById('bankName').value=bank.bankName||'';document.getElementById('accountNumber').value=bank.accountNumber||'';document.getElementById('ifscCode').value=bank.ifscCode||'';document.getElementById('upiId').value=bank.upiId||'';document.getElementById('branchAddress').value=bank.branchAddress||'';}document.getElementById('bankForm').addEventListener('submit',(e)=>{e.preventDefault();const bankData={accountHolder:document.getElementById('accountHolder').value,bankName:document.getElementById('bankName').value,accountNumber:document.getElementById('accountNumber').value,ifscCode:document.getElementById('ifscCode').value,upiId:document.getElementById('upiId').value,branchAddress:document.getElementById('branchAddress').value};localStorage.setItem(STORAGE_KEY,JSON.stringify(bankData));alert('Bank details saved!');});resizeCanvas();loadBankDetails();window.addEventListener('resize',resizeCanvas);</script></body></html>
