<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Create Invoice</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Roboto',sans-serif;background:#0f172a;color:#e2e8f0}.header{background:#1e293b;padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center}.container{padding:2rem;max-width:1200px;margin:0 auto}.invoice-header{background:#1e293b;padding:1.5rem;border-radius:0.5rem;margin-bottom:1.5rem}.flex-row{display:flex;gap:2rem;flex-wrap:wrap}input,select,textarea{background:#0f172a;border:1px solid #334155;color:white;padding:0.5rem;border-radius:0.5rem;width:100%;margin-bottom:0.5rem}table{width:100%;border-collapse:collapse;margin:1rem 0}th,td{border:1px solid #334155;padding:0.5rem;text-align:left}th{background:#facc15;color:#0f172a}.btn{background:#3b82f6;color:white;padding:0.5rem 1rem;border:none;border-radius:0.5rem;cursor:pointer}.btn-success{background:#22c55e}.btn-warning{background:#eab308;color:#0f172a}.total-row{font-weight:bold;background:#1e293b}.bank-signature-section{background:#0f172a;border-radius:0.5rem;padding:1rem;margin-top:1rem;border-left:4px solid #facc15;display:flex;flex-wrap:wrap;justify-content:space-between;gap:1rem}.bank-details{flex:2;font-size:0.85rem}.qr-section{flex:1;text-align:center}.signature-area{flex:1;text-align:right}.signature-img{max-height:80px;border:1px solid #334155;padding:0.25rem;background:white;border-radius:0.25rem}.qr-code{background:white;padding:0.5rem;border-radius:0.5rem;display:inline-block}.footer{text-align:center;padding:1rem;margin-top:2rem}@media print{.header,.btn,.add-item-row,.footer{display:none}}</style></head>
<body><div class="header"><div><img src="../images/ASS.jpg" height="40"> Auto Spares – Create Invoice</div><a href="dashboard.html" style="color:#facc15;">← Dashboard</a></div><div class="container"><h1><i class="fas fa-file-invoice"></i> Create Invoice</h1><div class="invoice-header"><div class="flex-row"><div style="flex:1"><h3>Seller (Your Company)</h3><div id="sellerDetails"></div></div><div style="flex:1"><h3>Buyer (Customer)</h3><input type="text" id="buyerName" placeholder="Customer Name" required><input type="email" id="buyerEmail" placeholder="Customer Email"><input type="text" id="buyerGSTIN" placeholder="Customer GSTIN"><input type="text" id="buyerAddress" placeholder="Customer Address"></div></div></div><h3>Add Products</h3><div class="add-item-row"><select id="productSelect" style="flex:2"><option value="">-- Select from your stock --</option></select><input type="number" id="itemQty" placeholder="Qty" style="width:80px"><button class="btn" onclick="addItemFromStock()"><i class="fas fa-plus"></i> Add Item</button><a href="my-stock.html" style="color:#facc15;">+ Add new product to stock</a></div><table id="invoiceItems"><thead><tr><th>Part No</th><th>Description</th><th>Qty</th><th>Price</th><th>GST (18%)</th><th>Total</th><th></th></tr></thead><tbody id="itemsBody"></tbody><tfoot><tr class="total-row"><td colspan="5" style="text-align:right">Subtotal:</td><td id="subtotal">₹0</td><td></td></tr><tr class="total-row"><td colspan="5" style="text-align:right">GST (18%):</td><td id="gstAmount">₹0</td><td></td></tr><tr class="total-row"><td colspan="5" style="text-align:right"><strong>Grand Total:</strong></td><td id="grandTotal">₹0</td><td></td></tr></tfoot></table><div class="bank-signature-section"><div class="bank-details" id="bankDetailsDisplay"></div><div class="qr-section" id="qrDisplay"></div><div class="signature-area" id="signatureDisplay"></div></div><div style="display:flex;gap:1rem;margin-top:1rem"><button class="btn btn-success" onclick="generateInvoice()"><i class="fas fa-save"></i> Generate Invoice</button><button class="btn" onclick="window.print()"><i class="fas fa-print"></i> Print</button><button class="btn btn-warning" onclick="sendWhatsApp()"><i class="fab fa-whatsapp"></i> Send WhatsApp</button></div></div><div class="footer">Powered by Auto Spares Solution</div>
<script>const dealer=JSON.parse(localStorage.getItem('currentDealer'));if(!dealer)window.location.href='index.html';let dealerStock=[],invoiceItems=[];function loadDealerStock(){const skey=`dealer_${dealer.email}_stock`;dealerStock=JSON.parse(localStorage.getItem(skey)||'[]');const sel=document.getElementById('productSelect');sel.innerHTML='<option value="">-- Select from your stock --</option>';for(const i of dealerStock){const opt=document.createElement('option');opt.value=JSON.stringify(i);opt.textContent=`${i.part} - ${i.desc||''} (Stock: ${i.stock}) - ₹${i.price}`;sel.appendChild(opt);}}function displaySellerDetails(){document.getElementById('sellerDetails').innerHTML=`<div style="background:#0f172a;padding:1rem;border-radius:0.5rem"><strong>${dealer.name}</strong><br>GSTIN: ${dealer.gstin}<br>Address: ${dealer.address}<br>Phone: ${dealer.phone}<br>Email: ${dealer.email}</div>`;}function loadBankAndSignature(){const bankKey=`dealer_${dealer.email}_bank`;const bank=JSON.parse(localStorage.getItem(bankKey)||'{}');const sig=localStorage.getItem(`dealer_${dealer.email}_bank_signature`);const stamp=localStorage.getItem(`dealer_${dealer.email}_bank_stamp`);let bankHtml='';if(bank.accountNumber){bankHtml=`<strong>Bank Details:</strong><br>A/c: ${bank.accountHolder}<br>Bank: ${bank.bankName}<br>A/c No: ${bank.accountNumber}<br>IFSC: ${bank.ifscCode}<br>UPI: ${bank.upiId||'-'}`;}else{bankHtml='<em>No bank details. <a href="bank-details.html" style="color:#facc15;">Add here</a></em>';}document.getElementById('bankDetailsDisplay').innerHTML=bankHtml;let sigHtml='';if(sig)sigHtml+=`<div><img src="${sig}" class="signature-img"></div>`;if(stamp)sigHtml+=`<div><img src="${stamp}" class="signature-img"></div>`;if(!sig&&!stamp)sigHtml='<em>No signature/stamp</em>';document.getElementById('signatureDisplay').innerHTML=sigHtml;}function addItemFromStock(){const sel=document.getElementById('productSelect').value;if(!sel)return;const item=JSON.parse(sel);const qty=parseInt(document.getElementById('itemQty').value)||1;if(qty>item.stock){alert(`Only ${item.stock} units available`);return;}const existing=invoiceItems.find(i=>i.part===item.part);if(existing)existing.qty+=qty;else invoiceItems.push({part:item.part,desc:item.desc||'',qty,price:item.price});renderInvoiceItems();document.getElementById('itemQty').value='';document.getElementById('productSelect').value='';}function renderInvoiceItems(){const tbody=document.getElementById('itemsBody');tbody.innerHTML='';let sub=0;for(let i=0;i<invoiceItems.length;i++){const it=invoiceItems[i];const gst=it.price*it.qty*0.18;const tot=it.price*it.qty+gst;sub+=it.price*it.qty;const r=tbody.insertRow();r.insertCell(0).innerText=it.part;r.insertCell(1).innerText=it.desc;r.insertCell(2).innerHTML=`<input type="number" value="${it.qty}" min="1" onchange="updateQty(${i},this.value)" style="width:60px">`;r.insertCell(3).innerText=`₹${it.price.toFixed(2)}`;r.insertCell(4).innerText=`₹${gst.toFixed(2)}`;r.insertCell(5).innerText=`₹${tot.toFixed(2)}`;r.insertCell(6).innerHTML=`<button class="btn" onclick="removeItem(${i})"><i class="fas fa-trash"></i></button>`;}const totalGST=invoiceItems.reduce((s,i)=>s+(i.price*i.qty*0.18),0);const grand=sub+totalGST;document.getElementById('subtotal').innerText=`₹${sub.toFixed(2)}`;document.getElementById('gstAmount').innerText=`₹${totalGST.toFixed(2)}`;document.getElementById('grandTotal').innerText=`₹${grand.toFixed(2)}`;const bk=JSON.parse(localStorage.getItem(`dealer_${dealer.email}_bank`)||'{}');if(bk.upiId&&grand>0){const upi=`upi://pay?pa=${encodeURIComponent(bk.upiId)}&pn=${encodeURIComponent(dealer.name)}&am=${grand.toFixed(2)}&cu=INR`;document.getElementById('qrDisplay').innerHTML=`<div><strong>Scan to Pay</strong><div id="qrcode" class="qr-code"></div><small>UPI: ${bk.upiId}</small><br><small>₹${grand.toFixed(2)}</small></div>`;new QRCode(document.getElementById("qrcode"),{text:upi,width:100,height:100});}}function updateQty(idx,qty){invoiceItems[idx].qty=parseInt(qty)||1;renderInvoiceItems();}function removeItem(idx){invoiceItems.splice(idx,1);renderInvoiceItems();}function generateInvoice(){const buyer=document.getElementById('buyerName').value;if(!buyer){alert("Enter buyer name");return;}if(invoiceItems.length===0){alert("Add items");return;}const invNo=`INV-${dealer.email.split('@')[0]}-${Date.now()}`;const invoice={invoiceNo:invNo,date:new Date().toISOString(),seller:{name:dealer.name,gstin:dealer.gstin,address:dealer.address,phone:dealer.phone,email:dealer.email},buyer:{name:buyer,email:document.getElementById('buyerEmail').value,gstin:document.getElementById('buyerGSTIN').value,address:document.getElementById('buyerAddress').value},items:invoiceItems.map(it=>({...it,gst:it.price*it.qty*0.18,total:it.price*it.qty*1.18})),subtotal:invoiceItems.reduce((s,i)=>s+(i.price*i.qty),0),gstTotal:invoiceItems.reduce((s,i)=>s+(i.price*i.qty*0.18),0),grandTotal:invoiceItems.reduce((s,i)=>s+(i.price*i.qty*1.18),0)};const salesKey=`dealer_${dealer.email}_sales`;let sales=JSON.parse(localStorage.getItem(salesKey)||'[]');sales.push(invoice);localStorage.setItem(salesKey,JSON.stringify(sales));alert(`Invoice ${invNo} generated!`);window.print();}function sendWhatsApp(){const phone=prompt("Enter customer WhatsApp number:","91");if(phone&&invoiceItems.length){let msg=`Dear ${document.getElementById('buyerName').value},\n\nInvoice from ${dealer.name}\n\n`;for(const it of invoiceItems)msg+=`${it.part} x${it.qty} = ₹${(it.price*it.qty).toFixed(2)}\n`;msg+=`\nTotal: ${document.getElementById('grandTotal').innerText}\n\nThank you!`;window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`,'_blank');}}loadDealerStock();displaySellerDetails();loadBankAndSignature();</script></body></html>
