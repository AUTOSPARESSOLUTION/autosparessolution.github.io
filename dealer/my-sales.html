<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>My Sales</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><style>body{font-family:'Roboto',sans-serif;background:#0f172a;color:#e2e8f0}.header{background:#1e293b;padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center}.container{padding:2rem;max-width:1200px;margin:0 auto}table{width:100%;border-collapse:collapse;margin-top:1rem}th,td{border:1px solid #334155;padding:0.5rem;text-align:left}th{background:#facc15;color:#0f172a}.footer{text-align:center;padding:1rem;margin-top:2rem}</style></head>
<body><div class="header"><div><img src="../images/ASS.jpg" height="40"> Auto Spares – My Sales</div><a href="dashboard.html" style="color:#facc15;">← Dashboard</a></div><div class="container"><h1><i class="fas fa-file-invoice"></i> My Sales Invoices</h1><table id="salesTable"><thead><tr><th>Invoice No</th><th>Date</th><th>Customer</th><th>Total</th></tr></thead><tbody></tbody></table></div><div class="footer">Powered by Auto Spares Solution</div>
<script>const dealer=JSON.parse(localStorage.getItem('currentDealer'));if(!dealer)window.location.href='index.html';const sales=JSON.parse(localStorage.getItem(`dealer_${dealer.email}_sales`)||'[]');const tbody=document.querySelector('#salesTable tbody');for(const inv of sales.reverse()){const r=tbody.insertRow();r.insertCell(0).innerText=inv.invoiceNo;r.insertCell(1).innerText=new Date(inv.date).toLocaleDateString();r.insertCell(2).innerText=inv.buyer?.name||'N/A';r.insertCell(3).innerText=`₹${inv.grandTotal.toFixed(2)}`;}</script></body></html>
