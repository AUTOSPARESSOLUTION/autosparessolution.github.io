<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Proforma Invoice – Auto Spares</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="data-manager.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Roboto', sans-serif;
            background: #e9ecef;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        h1, h2 { color: #0a7c71; }
        .form-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 15px;
        }
        .form-group {
            flex: 1;
            min-width: 180px;
        }
        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #555;
        }
        input, select, textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }
        button {
            background: #0a7c71;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 10px;
        }
        button:hover { background: #09645a; }
        .btn-warning { background: #ffc107; color: #333; }
        .btn-warning:hover { background: #e0a800; }
        .btn-danger { background: #dc3545; }
        .btn-danger:hover { background: #c82333; }
        .items-table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
            font-size: 12px;
        }
        .items-table th, .items-table td {
            border: 1px solid #dee2e6;
            padding: 8px;
            text-align: left;
            vertical-align: top;
        }
        .items-table th { background: #f8f9fa; }
        .remove-item { background: #dc3545; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; }
        .add-item { background: #28a745; margin-bottom: 15px; }
        .totals {
            text-align: right;
            margin-top: 20px;
            font-size: 14px;
        }
        .totals table {
            width: 300px;
            margin-left: auto;
        }
        .totals td { padding: 5px; }
        .actions {
            margin-top: 30px;
            display: flex;
            justify-content: flex-end;
            gap: 15px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1><i class="fas fa-edit"></i> Edit Proforma Invoice</h1>
    <hr>

    <!-- Customer Details -->
    <div class="form-section">
        <h2>Customer Information</h2>
        <div class="form-row">
            <div class="form-group"><label>Customer Name *</label><input type="text" id="custName" placeholder="Customer name"></div>
            <div class="form-group"><label>Customer Email *</label><input type="email" id="custEmail" placeholder="email@example.com"></div>
            <div class="form-group"><label>Phone</label><input type="text" id="custPhone" placeholder="Phone"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>Address</label><textarea id="custAddress" rows="2" placeholder="Address"></textarea></div>
            <div class="form-group"><label>GSTIN</label><input type="text" id="custGstin" placeholder="GSTIN"></div>
            <div class="form-group"><label>State</label><input type="text" id="custState" placeholder="State"></div>
        </div>
    </div>

    <!-- Proforma Details -->
    <div class="form-section">
        <h2>Proforma Details</h2>
        <div class="form-row">
            <div class="form-group"><label>Proforma No.</label><input type="text" id="proformaNo" readonly style="background:#e9ecef;"></div>
            <div class="form-group"><label>Date</label><input type="date" id="proformaDate"></div>
            <div class="form-group"><label>Valid Until</label><input type="date" id="validUntil"></div>
        </div>
    </div>

    <!-- Items Table -->
    <h2>Items</h2>
    <div id="itemsContainer"></div>
    <button class="add-item" onclick="addItemRow()"><i class="fas fa-plus"></i> Add Item</button>

    <!-- Totals -->
    <div class="totals">
        <table>
            <tr><td style="text-align:right;">Subtotal: </td><td>₹<span id="subtotal">0.00</span></td></tr>
            <tr><td style="text-align:right;">CGST (9%): </td><td>₹<span id="cgst">0.00</span></td></tr>
            <tr><td style="text-align:right;">SGST (9%): </td><td>₹<span id="sgst">0.00</span></td></tr>
            <tr style="font-weight:bold;"><td style="text-align:right;">Grand Total: </td><td>₹<span id="grandTotal">0.00</span></td></tr>
        </table>
    </div>

    <div class="actions">
        <button onclick="updateProforma()">💾 Update Proforma</button>
        <button class="btn-warning" onclick="generatePDF()">📄 Save as PDF</button>
        <button onclick="window.close()">Cancel</button>
    </div>
</div>

<script>
    let originalProforma = null;
    let items = [];

    // Load proforma data using editProformaId from localStorage (set by list page)
    function loadProformaData() {
        const editId = localStorage.getItem('editProformaId');
        if (!editId) {
            alert('No proforma selected for editing.');
            window.close();
            return;
        }
        const allProformas = JSON.parse(localStorage.getItem('proformas') || '[]');
        originalProforma = allProformas.find(p => p.id == editId);
        if (!originalProforma) {
            alert('Proforma not found. It may have been deleted.');
            window.close();
            return;
        }
        // Fill form
        document.getElementById('custName').value = originalProforma.customer.name || '';
        document.getElementById('custEmail').value = originalProforma.customer.email || '';
        document.getElementById('custPhone').value = originalProforma.customer.phone || '';
        document.getElementById('custAddress').value = originalProforma.customer.address || '';
        document.getElementById('custGstin').value = originalProforma.customer.gstin || '';
        document.getElementById('custState').value = originalProforma.customer.state || '';
        document.getElementById('proformaNo').value = originalProforma.proformaNo;
        document.getElementById('proformaDate').value = originalProforma.date;
        document.getElementById('validUntil').value = originalProforma.validUntil || '';
        // Copy items
        items = originalProforma.items.map(item => ({
            part: item.part || '',
            desc: item.desc || '',
            hsn: item.hsn || '',
            qty: item.qty || 1,
            price: item.price || 0,
            discount: item.discount || 0
        }));
        renderItems();
        recalcTotals();
    }

    function addItemRow() {
        items.push({ part: '', desc: '', hsn: '', qty: 1, price: 0, discount: 0 });
        renderItems();
        recalcTotals();
    }

    function removeItemRow(idx) {
        items.splice(idx, 1);
        renderItems();
        recalcTotals();
    }

    function updateItem(idx, field, value) {
        items[idx][field] = value;
        recalcTotals();
    }

    function renderItems() {
        const container = document.getElementById('itemsContainer');
        if (items.length === 0) {
            container.innerHTML = '<p>No items added. Click "Add Item" to start.</p>';
            return;
        }
        let html = '<table class="items-table"><thead><tr><th>#</th><th>Part No</th><th>Description</th><th>HSN</th><th>Qty</th><th>Price (₹)</th><th>Disc %</th><th>Taxable (₹)</th><th>CGST (₹)</th><th>SGST (₹)</th><th>Total (₹)</th><th></th></tr></thead><tbody>';
        items.forEach((item, idx) => {
            const taxable = item.qty * item.price * (1 - item.discount / 100);
            const cgst = taxable * 0.09;
            const sgst = taxable * 0.09;
            const total = taxable + cgst + sgst;
            html += `<tr>
                <td>${idx+1}</td>
                <td><input type="text" value="${escapeHtml(item.part)}" onchange="updateItem(${idx}, 'part', this.value)" style="width:100%;"></td>
                <td><input type="text" value="${escapeHtml(item.desc)}" onchange="updateItem(${idx}, 'desc', this.value)" style="width:100%;"></td>
                <td><input type="text" value="${escapeHtml(item.hsn)}" onchange="updateItem(${idx}, 'hsn', this.value)" style="width:100%;"></td>
                <td><input type="number" value="${item.qty}" step="1" onchange="updateItem(${idx}, 'qty', parseFloat(this.value))" style="width:70px;"></td>
                <td><input type="number" value="${item.price}" step="0.01" onchange="updateItem(${idx}, 'price', parseFloat(this.value))" style="width:90px;"></td>
                <td><input type="number" value="${item.discount}" step="0.01" onchange="updateItem(${idx}, 'discount', parseFloat(this.value))" style="width:70px;"></td>
                <td style="text-align:right;">${taxable.toFixed(2)}</td>
                <td style="text-align:right;">${cgst.toFixed(2)}</td>
                <td style="text-align:right;">${sgst.toFixed(2)}</td>
                <td style="text-align:right;">${total.toFixed(2)}</td>
                <td><button class="remove-item" onclick="removeItemRow(${idx})">X</button></td>
            </tr>`;
        });
        html += '</tbody></table>';
        container.innerHTML = html;
    }

    function recalcTotals() {
        let subtotal = 0;
        items.forEach(item => {
            const taxable = item.qty * item.price * (1 - item.discount / 100);
            subtotal += taxable;
        });
        const cgst = subtotal * 0.09;
        const sgst = subtotal * 0.09;
        const grand = subtotal + cgst + sgst;
        document.getElementById('subtotal').innerText = subtotal.toFixed(2);
        document.getElementById('cgst').innerText = cgst.toFixed(2);
        document.getElementById('sgst').innerText = sgst.toFixed(2);
        document.getElementById('grandTotal').innerText = grand.toFixed(2);
        return { subtotal, cgst, sgst, grand };
    }

    function updateProforma() {
        const name = document.getElementById('custName').value.trim();
        const email = document.getElementById('custEmail').value.trim();
        if (!name || !email) { alert('Customer name and email are required'); return; }
        if (items.length === 0) { alert('Please add at least one item'); return; }

        const totals = recalcTotals();
        const updatedProforma = {
            ...originalProforma,
            date: document.getElementById('proformaDate').value,
            validUntil: document.getElementById('validUntil').value,
            customer: {
                name: name,
                email: email,
                phone: document.getElementById('custPhone').value,
                address: document.getElementById('custAddress').value,
                gstin: document.getElementById('custGstin').value,
                state: document.getElementById('custState').value
            },
            items: items.map(i => ({ ...i })),
            subtotal: totals.subtotal,
            cgst: totals.cgst,
            sgst: totals.sgst,
            grandTotal: totals.grand,
            updatedAt: new Date().toISOString()
        };

        let allProformas = JSON.parse(localStorage.getItem('proformas') || '[]');
        const index = allProformas.findIndex(p => p.id == originalProforma.id);
        if (index !== -1) {
            allProformas[index] = updatedProforma;
            localStorage.setItem('proformas', JSON.stringify(allProformas));
            alert(`Proforma ${updatedProforma.proformaNo} updated successfully!`);
            localStorage.removeItem('editProformaId');
            window.close();
        } else {
            alert('Original proforma not found in storage.');
        }
    }

    function generatePDF() {
        const name = document.getElementById('custName').value.trim();
        const email = document.getElementById('custEmail').value.trim();
        if (!name || !email) { alert('Customer details required before PDF'); return; }
        if (items.length === 0) { alert('No items to generate PDF'); return; }

        const container = document.createElement('div');
        container.style.maxWidth = '1200px';
        container.style.margin = '0 auto';
        container.style.backgroundColor = 'white';
        container.style.padding = '0 15px 15px 15px';
        container.style.fontFamily = 'Roboto, sans-serif';

        let itemsHtml = '';
        items.forEach((item, idx) => {
            const taxable = item.qty * item.price * (1 - item.discount / 100);
            const cgst = taxable * 0.09;
            const sgst = taxable * 0.09;
            const total = taxable + cgst + sgst;
            itemsHtml += `<tr>
                <td style="border:1px solid #dee2e6; padding:4px;">${idx+1}</td>
                <td style="border:1px solid #dee2e6; padding:4px;">${escapeHtml(item.part)}</td>
                <td style="border:1px solid #dee2e6; padding:4px;">${escapeHtml(item.desc)}</td>
                <td style="border:1px solid #dee2e6; padding:4px;">${escapeHtml(item.hsn)}</td>
                <td style="border:1px solid #dee2e6; padding:4px; text-align:center;">${item.qty}</td>
                <td style="border:1px solid #dee2e6; padding:4px; text-align:right;">₹${item.price.toFixed(2)}</td>
                <td style="border:1px solid #dee2e6; padding:4px; text-align:center;">${item.discount}%</td>
                <td style="border:1px solid #dee2e6; padding:4px; text-align:right;">₹${taxable.toFixed(2)}</td>
                <td style="border:1px solid #dee2e6; padding:4px; text-align:right;">₹${cgst.toFixed(2)}</td>
                <td style="border:1px solid #dee2e6; padding:4px; text-align:right;">₹${sgst.toFixed(2)}</td>
                <td style="border:1px solid #dee2e6; padding:4px; text-align:right;">₹${total.toFixed(2)}</td>
            </tr>`;
        });

        const totals = recalcTotals();
        const proformaNo = document.getElementById('proformaNo').value;
        const date = document.getElementById('proformaDate').value;
        const validUntil = document.getElementById('validUntil').value;

        container.innerHTML = `
            <div style="background:#0a7c71; color:white; padding:15px 20px; display:flex; justify-content:space-between; margin:0 -15px 15px -15px;">
                <div><div style="font-size:24px;">Auto Spares Solution</div><div>GSTIN: 19ANOPD3300R1ZO</div><div>101, 1st floor, Howrah, WB 711108</div></div>
                <div style="text-align:right;"><div style="font-size:20px;">PROFORMA INVOICE</div><div>${proformaNo}</div><div>${date}</div><div>Valid Till: ${validUntil}</div></div>
            </div>
            <div style="background:#f8f9fa; padding:10px; margin-bottom:15px;">
                <strong>Customer:</strong> ${escapeHtml(name)}<br>
                ${escapeHtml(document.getElementById('custAddress').value)}<br>
                GSTIN: ${escapeHtml(document.getElementById('custGstin').value)} | State: ${escapeHtml(document.getElementById('custState').value)}<br>
                Phone: ${escapeHtml(document.getElementById('custPhone').value)} | Email: ${escapeHtml(email)}
            </div>
            <table style="width:100%; border-collapse:collapse; font-size:11px;">
                <thead><tr style="background:#f8f9fa;"><th>#</th><th>Part No</th><th>Description</th><th>HSN</th><th>Qty</th><th>Price</th><th>Disc%</th><th>Taxable</th><th>CGST</th><th>SGST</th><th>Total</th></tr></thead>
                <tbody>${itemsHtml}</tbody>
            </table>
            <div style="text-align:right; margin-top:10px;">
                <table style="width:280px; margin-left:auto;">
                    <tr><td style="text-align:right;">Subtotal:</td><td style="text-align:right;">₹${totals.subtotal.toFixed(2)}</td></tr>
                    <tr><td style="text-align:right;">CGST (9%):</td><td style="text-align:right;">₹${totals.cgst.toFixed(2)}</td></tr>
                    <tr><td style="text-align:right;">SGST (9%):</td><td style="text-align:right;">₹${totals.sgst.toFixed(2)}</td></tr>
                    <tr style="font-weight:bold;"><td style="text-align:right;">Grand Total:</td><td style="text-align:right;">₹${totals.grand.toFixed(2)}</td></tr>
                </table>
            </div>
            <div style="margin-top:20px; border-top:1px solid #aaa; padding-top:10px; text-align:center; font-size:10px;">
                This is a proforma invoice – not a tax invoice. Valid for 15 days. Thank you for your business.
            </div>
        `;

        html2pdf().set({ margin: 0.2, filename: `Proforma_${proformaNo}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'a4' } }).from(container).save();
    }

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }

    loadProformaData();
</script>
</body>
  </html>
