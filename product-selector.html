<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Select Products</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="data-manager.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background: #e9ecef; margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: auto; background: white; border-radius: 12px; padding: 20px; }
        h1 { color: #0a7c71; }
        button { background: #0a7c71; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        .btn-quote { background: #28a745; }
        .btn-proforma { background: #e67e22; }
        .btn-sync { background: #6c757d; margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #dee2e6; padding: 10px; text-align: left; }
        th { background: #0a7c71; color: white; }
        .qty-input, .disc-input, .hsn-input { width: 100px; padding: 4px; text-align: center; }
        .stock-zero { background-color: #f8d7da; }
        @media (max-width: 768px) { .qty-input, .disc-input, .hsn-input { width: 70px; } table { font-size: 12px; } }
    </style>
</head>
<body>
<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h1><i class="fas fa-boxes"></i> Select Products</h1>
        <div>
            <button class="btn-quote" onclick="createDocument('quotation')">Quotation</button>
            <button class="btn-proforma" onclick="createDocument('proforma')">Proforma</button>
            <button onclick="window.location.href='index.html'">Back</button>
        </div>
    </div>
    <div style="margin: 10px 0;">
        <button class="btn-sync" onclick="syncHsnFromInvoices()"><i class="fas fa-sync-alt"></i> Sync HSN from Invoices</button>
    </div>
    <div class="search-box" style="margin: 10px 0;">
        <input type="text" id="searchInput" placeholder="Search...">
        <button onclick="filterProducts()">Search</button>
        <label><input type="checkbox" id="selectAllCheckbox" onchange="toggleSelectAll()"> Select All</label>
    </div>
    <div id="productsTableContainer"></div>
</div>

<script>
    let allProducts = [];
    let selectedProductRows = new Map();
    let filteredProducts = [];

    function loadProducts() {
        if (typeof window.getProducts === 'function') {
            allProducts = window.getProducts();
        } else {
            allProducts = JSON.parse(localStorage.getItem('products') || '[]');
        }
        if (!allProducts || allProducts.length === 0) {
            document.getElementById('productsTableContainer').innerHTML = '<p>No products found. Click "Sync HSN from Invoices" to recover.</p>';
            return;
        }
        allProducts.forEach(p => {
            p.id = String(p.id);
            p.sku = p.sku || '';
            p.name = p.name || '';
            p.price = p.price || 0;
            p.currentStock = p.currentStock || 0;
            p.unit = p.unit || 'pc';
            p.hsn = p.hsn || '';
        });
        filterProducts();
    }

    function filterProducts() {
        const term = document.getElementById('searchInput').value.trim().toLowerCase();
        if (!term) filteredProducts = [...allProducts];
        else filteredProducts = allProducts.filter(p => p.sku.toLowerCase().includes(term) || p.name.toLowerCase().includes(term));
        renderTable();
    }

    function renderTable() {
        if (filteredProducts.length === 0) {
            document.getElementById('productsTableContainer').innerHTML = '<p>No matching products.</p>';
            return;
        }
        let html = `<table><thead><tr><th>Select</th><th>SKU</th><th>Name</th><th>HSN</th><th>Unit</th><th>Price</th><th>Stock</th><th>Qty</th><th>Disc%</th></tr></thead><tbody>`;
        for (let p of filteredProducts) {
            const selected = selectedProductRows.has(p.id);
            const stored = selectedProductRows.get(p.id);
            const qty = selected ? stored.qty : (p.currentStock > 0 ? p.currentStock : 1);
            const discount = selected ? stored.discount : 0;
            const hsnValue = p.hsn || '';
            const rowClass = (p.currentStock === 0) ? 'stock-zero' : '';
            html += `<tr class="${rowClass}">
                <td><input type="checkbox" class="product-checkbox" data-id="${p.id}" ${selected ? 'checked' : ''} onchange="toggleProduct('${p.id}', this.checked)"></td>
                <td><strong>${escapeHtml(p.sku)}</strong></td>
                <td>${escapeHtml(p.name)}</strong></td>
                <td><input type="text" class="hsn-input" value="${escapeHtml(hsnValue)}" ${selected ? '' : 'disabled'} onchange="updateHsn('${p.id}', this.value)"></td>
                <td>${escapeHtml(p.unit)}</strong></td>
                <td>₹${p.price.toLocaleString()}</strong></td>
                <td>${p.currentStock.toLocaleString()}</strong></td>
                <td><input type="number" class="qty-input" value="${qty}" min="0.01" step="0.01" ${selected ? '' : 'disabled'} onchange="updateQty('${p.id}', this.value)"></strong></td>
                <td><input type="number" class="disc-input" value="${discount}" min="0" max="100" step="0.01" ${selected ? '' : 'disabled'} onchange="updateDiscount('${p.id}', this.value)"></strong></td>
            </tr>`;
        }
        html += `</tbody></table>`;
        document.getElementById('productsTableContainer').innerHTML = html;
        const allCheckboxes = document.querySelectorAll('.product-checkbox');
        document.getElementById('selectAllCheckbox').checked = allCheckboxes.length > 0 && Array.from(allCheckboxes).every(cb => cb.checked);
    }

    function toggleProduct(id, isSelected) {
        const product = allProducts.find(p => p.id === id);
        if (!product) return;
        if (isSelected) {
            let defaultQty = product.currentStock > 0 ? product.currentStock : 1;
            selectedProductRows.set(id, { qty: defaultQty, discount: 0 });
        } else {
            selectedProductRows.delete(id);
        }
        renderTable();
    }

    function updateQty(id, newQty) { let qty = parseFloat(newQty); if (isNaN(qty) || qty <= 0) return; if (selectedProductRows.has(id)) { const cur = selectedProductRows.get(id); selectedProductRows.set(id, { ...cur, qty }); } }
    function updateDiscount(id, disc) { let d = parseFloat(disc); if (isNaN(d) || d < 0) return; if (selectedProductRows.has(id)) { const cur = selectedProductRows.get(id); selectedProductRows.set(id, { ...cur, discount: d }); } }

    function updateHsn(id, newHsn) {
        // Save HSN directly to the product master (permanent)
        let product = allProducts.find(p => p.id === id);
        if (product) {
            product.hsn = newHsn;
            let allProds = JSON.parse(localStorage.getItem('products') || '[]');
            let index = allProds.findIndex(p => p.id == id);
            if (index !== -1) {
                allProds[index].hsn = newHsn;
                localStorage.setItem('products', JSON.stringify(allProds));
            }
        }
    }

    function toggleSelectAll() {
        const check = document.getElementById('selectAllCheckbox').checked;
        if (check) {
            for (let p of filteredProducts) {
                if (!selectedProductRows.has(p.id)) {
                    let qty = p.currentStock > 0 ? p.currentStock : 1;
                    selectedProductRows.set(p.id, { qty, discount: 0 });
                }
            }
        } else {
            for (let p of filteredProducts) selectedProductRows.delete(p.id);
        }
        renderTable();
    }

    function createDocument(type) {
        if (selectedProductRows.size === 0) { alert('Select at least one product.'); return; }
        let cart = [];
        for (let [id, { qty, discount }] of selectedProductRows.entries()) {
            let product = allProducts.find(p => p.id === id);
            if (!product) continue;
            let hsn = product.hsn || '';
            cart.push({ part: product.sku, desc: product.name, hsn, qty, price: product.price, discount });
        }
        localStorage.setItem('invoiceCart', JSON.stringify(cart));
        window.location.href = type === 'quotation' ? 'quotation.html' : 'proforma-invoice.html';
    }

    function syncHsnFromInvoices() {
        let allInvoices = JSON.parse(localStorage.getItem('allInvoices') || '[]');
        let products = JSON.parse(localStorage.getItem('products') || '[]');
        let updated = 0;
        products.forEach(prod => {
            let sku = prod.sku;
            for (let inv of allInvoices) {
                let item = (inv.items || []).find(i => (i.productId === sku || i.part === sku || i.sku === sku));
                if (item) {
                    let newHsn = item.hsn || item.hsnCode || item.gstHsn || item.taxCode || item.gst || '';
                    if (newHsn && prod.hsn !== newHsn) {
                        prod.hsn = newHsn;
                        updated++;
                        break;
                    }
                }
            }
        });
        if (updated > 0) {
            localStorage.setItem('products', JSON.stringify(products));
            alert(`Updated HSN for ${updated} products. Page will reload.`);
            location.reload();
        } else {
            alert("No HSN found in invoices. Ensure invoices have 'hsn' field (or hsnCode/gstHsn) in items.");
        }
    }

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }

    loadProducts();
</script>
</body>
</html>
