<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Quick Select Products</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="data-manager.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Roboto', sans-serif;
            background: #e9ecef;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: auto;
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        h1 {
            color: #0a7c71;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .actions {
            display: flex;
            gap: 10px;
        }
        button {
            background: #0a7c71;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        button:hover {
            background: #09645a;
        }
        .btn-quote {
            background: #28a745;
        }
        .btn-quote:hover {
            background: #218838;
        }
        .btn-proforma {
            background: #e67e22;
        }
        .btn-proforma:hover {
            background: #d35400;
        }
        .btn-sync {
            background: #6c757d;
        }
        .btn-sync:hover {
            background: #5a6268;
        }
        .btn-purchase-sync {
            background: #17a2b8;
        }
        .btn-purchase-sync:hover {
            background: #138496;
        }
        .search-box {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            margin-bottom: 20px;
        }
        .search-box input {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 6px;
            flex: 1;
            min-width: 200px;
        }
        .table-wrapper {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid #dee2e6;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th {
            background: #0a7c71;
            color: white;
            padding: 12px 8px;
            font-weight: 600;
            position: sticky;
            top: 0;
            white-space: nowrap;
        }
        td {
            border-bottom: 1px solid #dee2e6;
            padding: 10px 8px;
            vertical-align: middle;
        }
        tr:hover {
            background-color: #f8f9fa;
        }
        .stock-zero {
            background-color: #fff3cd;
        }
        .product-name {
            font-weight: 500;
        }
        .price {
            font-weight: bold;
            color: #0a7c71;
        }
        .qty-input, .disc-input, .hsn-input {
            width: 100px;
            padding: 6px;
            text-align: center;
            border: 1px solid #ced4da;
            border-radius: 4px;
        }
        .product-checkbox {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .select-all-label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            white-space: nowrap;
        }
        @media (max-width: 768px) {
            .qty-input, .disc-input, .hsn-input {
                width: 70px;
            }
            table {
                font-size: 12px;
            }
            th, td {
                padding: 6px 4px;
            }
        }
        @media (max-width: 600px) {
            .toolbar {
                flex-direction: column;
                align-items: stretch;
            }
            .actions {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="toolbar">
        <h1><i class="fas fa-boxes"></i> Select Products</h1>
        <div class="actions">
            <button class="btn-quote" onclick="createDocument('quotation')"><i class="fas fa-file-alt"></i> Quotation</button>
            <button class="btn-proforma" onclick="createDocument('proforma')"><i class="fas fa-file-invoice"></i> Proforma</button>
            <button onclick="window.location.href='index.html'"><i class="fas fa-home"></i> Back</button>
        </div>
    </div>

    <div style="display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px;">
        <button class="btn-sync" onclick="syncHsnFromInvoices()"><i class="fas fa-sync-alt"></i> Sync HSN from Sales</button>
        <button class="btn-purchase-sync" onclick="syncFromPurchaseInvoices()"><i class="fas fa-truck"></i> Sync from Purchase</button>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search by SKU, Name, HSN...">
        <button onclick="filterProducts()"><i class="fas fa-search"></i> Search</button>
        <button onclick="clearSearch()"><i class="fas fa-eraser"></i> Clear</button>
        <label class="select-all-label">
            <input type="checkbox" id="selectAllCheckbox" onchange="toggleSelectAll()"> Select All (visible)
        </label>
    </div>

    <div class="table-wrapper">
        <div id="productsTableContainer"></div>
    </div>
</div>

<script>
    let allProducts = [];
    let selectedProductRows = new Map();
    let filteredProducts = [];

    function loadProducts() {
        if (typeof window.getProducts === 'function') {
            allProducts = window.getProducts();
        } else {
            allProducts = JSON.parse(localStorage.getItem('products') || '[]');
        }
        if (!allProducts || allProducts.length === 0) {
            document.getElementById('productsTableContainer').innerHTML = `
                <div style="text-align: center; padding: 40px;">
                    <p>No products found.</p>
                    <button onclick="syncFromPurchaseInvoices()" style="background:#17a2b8;">Sync from Purchase Invoices</button>
                    <button onclick="syncHsnFromInvoices()" style="background:#6c757d;">Sync HSN from Sales</button>
                </div>`;
            return;
        }
        allProducts.forEach(p => {
            p.id = String(p.id);
            p.sku = p.sku || '';
            p.name = p.name || '';
            p.price = p.price || 0;
            p.currentStock = p.currentStock || 0;
            p.unit = p.unit || 'pc';
            p.hsn = p.hsn || '';
        });
        filterProducts();
    }

    function filterProducts() {
        const term = document.getElementById('searchInput').value.trim().toLowerCase();
        if (!term) {
            filteredProducts = [...allProducts];
        } else {
            filteredProducts = allProducts.filter(p => 
                p.sku.toLowerCase().includes(term) ||
                p.name.toLowerCase().includes(term) ||
                (p.hsn && p.hsn.toLowerCase().includes(term))
            );
        }
        renderTable();
    }

    function clearSearch() {
        document.getElementById('searchInput').value = '';
        filterProducts();
    }

    function renderTable() {
        if (filteredProducts.length === 0) {
            document.getElementById('productsTableContainer').innerHTML = '<p style="padding:20px; text-align:center;">No matching products.</p>';
            return;
        }

        let html = `<table>
            <thead>
                <tr>
                    <th style="width:5%">Select</th>
                    <th style="width:12%">SKU</th>
                    <th style="width:20%">Product Name</th>
                    <th style="width:10%">HSN</th>
                    <th style="width:8%">Unit</th>
                    <th style="width:10%">Price (₹)</th>
                    <th style="width:8%">Stock</th>
                    <th style="width:8%">Qty</th>
                    <th style="width:8%">Disc %</th>
                </tr>
            </thead>
            <tbody>
        `;

        for (let p of filteredProducts) {
            const selected = selectedProductRows.has(p.id);
            const stored = selectedProductRows.get(p.id);
            const qty = selected ? stored.qty : (p.currentStock > 0 ? p.currentStock : 1);
            const discount = selected ? stored.discount : 0;
            const hsnValue = p.hsn || '';
            const rowClass = (p.currentStock === 0) ? 'stock-zero' : '';

            html += `<tr class="${rowClass}">
                <td style="text-align:center">
                    <input type="checkbox" class="product-checkbox" data-id="${p.id}" ${selected ? 'checked' : ''} onchange="toggleProduct('${p.id}', this.checked)">
                </td>
                <td><strong>${escapeHtml(p.sku)}</strong></td>
                <td class="product-name">${escapeHtml(p.name)}</td>
                <td><input type="text" class="hsn-input" value="${escapeHtml(hsnValue)}" ${selected ? '' : 'disabled'} onchange="updateHsn('${p.id}', this.value)"></td>
                <td>${escapeHtml(p.unit)}</td>
                <td class="price">₹${(p.price || 0).toLocaleString()}</td>
                <td>${(p.currentStock || 0).toLocaleString()}</td>
                <td><input type="number" class="qty-input" value="${qty}" min="0.01" step="0.01" ${selected ? '' : 'disabled'} onchange="updateQty('${p.id}', this.value)"></td>
                <td><input type="number" class="disc-input" value="${discount}" min="0" max="100" step="0.01" ${selected ? '' : 'disabled'} onchange="updateDiscount('${p.id}', this.value)"></td>
            </tr>`;
        }
        html += `</tbody></table>`;
        document.getElementById('productsTableContainer').innerHTML = html;

        // Update "Select All" checkbox state
        const allCheckboxes = document.querySelectorAll('.product-checkbox');
        const allChecked = allCheckboxes.length > 0 && Array.from(allCheckboxes).every(cb => cb.checked);
        document.getElementById('selectAllCheckbox').checked = allChecked;
    }

    function toggleProduct(id, isSelected) {
        const product = allProducts.find(p => p.id === id);
        if (!product) return;
        if (isSelected) {
            let defaultQty = product.currentStock > 0 ? product.currentStock : 1;
            selectedProductRows.set(id, { qty: defaultQty, discount: 0 });
        } else {
            selectedProductRows.delete(id);
        }
        renderTable();
    }

    function updateQty(id, newQty) {
        let qty = parseFloat(newQty);
        if (isNaN(qty) || qty <= 0) return;
        if (selectedProductRows.has(id)) {
            const cur = selectedProductRows.get(id);
            selectedProductRows.set(id, { ...cur, qty });
        }
    }

    function updateDiscount(id, disc) {
        let d = parseFloat(disc);
        if (isNaN(d) || d < 0) return;
        if (selectedProductRows.has(id)) {
            const cur = selectedProductRows.get(id);
            selectedProductRows.set(id, { ...cur, discount: d });
        }
    }

    function updateHsn(id, newHsn) {
        const product = allProducts.find(p => p.id === id);
        if (product) {
            product.hsn = newHsn;
            const allProds = JSON.parse(localStorage.getItem('products') || '[]');
            const index = allProds.findIndex(p => p.id == id);
            if (index !== -1) {
                allProds[index].hsn = newHsn;
                localStorage.setItem('products', JSON.stringify(allProds));
            }
        }
    }

    function toggleSelectAll() {
        const checkAll = document.getElementById('selectAllCheckbox').checked;
        if (checkAll) {
            for (let p of filteredProducts) {
                if (!selectedProductRows.has(p.id)) {
                    let qty = p.currentStock > 0 ? p.currentStock : 1;
                    selectedProductRows.set(p.id, { qty, discount: 0 });
                }
            }
        } else {
            for (let p of filteredProducts) {
                selectedProductRows.delete(p.id);
            }
        }
        renderTable();
    }

    function createDocument(type) {
        if (selectedProductRows.size === 0) {
            alert('Please select at least one product.');
            return;
        }
        const cart = [];
        for (let [id, { qty, discount }] of selectedProductRows.entries()) {
            const product = allProducts.find(p => p.id === id);
            if (!product) continue;
            const hsn = product.hsn || '';
            cart.push({
                part: product.sku,
                desc: product.name,
                hsn: hsn,
                qty: qty,
                price: product.price,
                discount: discount
            });
        }
        localStorage.setItem('invoiceCart', JSON.stringify(cart));
        if (type === 'quotation') {
            window.location.href = 'quotation.html';
        } else {
            window.location.href = 'proforma-invoice.html';
        }
    }

    // Sync HSN from sales invoices only
    function syncHsnFromInvoices() {
        const allInvoices = JSON.parse(localStorage.getItem('allInvoices') || '[]');
        if (allInvoices.length === 0) {
            alert("No sales invoices found.");
            return;
        }
        let products = JSON.parse(localStorage.getItem('products') || '[]');
        let updated = 0;
        products.forEach(prod => {
            const sku = prod.sku;
            for (let inv of allInvoices) {
                const item = (inv.items || []).find(i => (i.productId === sku || i.part === sku || i.sku === sku));
                if (item) {
                    const newHsn = item.hsn || item.hsnCode || item.gstHsn || '';
                    if (newHsn && prod.hsn !== newHsn) {
                        prod.hsn = newHsn;
                        updated++;
                        break;
                    }
                }
            }
        });
        if (updated > 0) {
            localStorage.setItem('products', JSON.stringify(products));
            alert(`Updated HSN for ${updated} products. Page will reload.`);
            location.reload();
        } else {
            alert("No new HSN found in sales invoices.");
        }
    }

    // Sync products from purchase invoices (add missing, update prices/HSN)
    function syncFromPurchaseInvoices() {
        const purchaseInvoices = JSON.parse(localStorage.getItem('purchaseInvoices') || '[]');
        if (purchaseInvoices.length === 0) {
            alert("No purchase invoices found.");
            return;
        }
        let products = JSON.parse(localStorage.getItem('products') || '[]');
        const productMap = new Map();
        products.forEach(p => {
            if (p.sku) productMap.set(p.sku, p);
            if (p.id) productMap.set(p.id, p);
        });
        let added = 0, updated = 0;

        purchaseInvoices.forEach(inv => {
            (inv.items || []).forEach(item => {
                const sku = item.productId || item.part || item.sku;
                if (!sku) return;
                const name = item.desc || item.name || `Product ${sku}`;
                const price = item.cost || item.price || 0;
                const hsn = item.hsn || item.hsnCode || item.gstHsn || '';

                if (!productMap.has(sku)) {
                    const newProd = {
                        id: sku,
                        sku: sku,
                        name: name,
                        price: price,
                        hsn: hsn,
                        unit: 'pc',
                        currentStock: 0,
                        reorderLevel: 10,
                        createdAt: new Date().toISOString()
                    };
                    productMap.set(sku, newProd);
                    added++;
                } else {
                    const existing = productMap.get(sku);
                    let changed = false;
                    if (price && existing.price !== price) {
                        existing.price = price;
                        changed = true;
                    }
                    if (hsn && !existing.hsn) {
                        existing.hsn = hsn;
                        changed = true;
                    }
                    if (name && existing.name === `Product ${sku}`) {
                        existing.name = name;
                        changed = true;
                    }
                    if (changed) updated++;
                }
            });
        });

        if (added > 0 || updated > 0) {
            const merged = Array.from(productMap.values());
            localStorage.setItem('products', JSON.stringify(merged));
            alert(`✅ Synced: ${added} new products added, ${updated} updated. Page will reload.`);
            location.reload();
        } else {
            alert("No new or updated products found in purchase invoices.");
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    loadProducts();
</script>
</body>
                                                                               </html>
