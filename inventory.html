<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Inventory – Auto Spares (Integrated)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background: #e9ecef; margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: auto; background: white; border-radius: 12px; padding: 20px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { color: #0a7c71; }
        .stats { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        .stat-card { background: #f8f9fa; padding: 15px; border-radius: 8px; flex: 1; text-align: center; }
        .stat-card .number { font-size: 28px; font-weight: bold; color: #0a7c71; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #dee2e6; padding: 8px; text-align: left; }
        th { background: #0a7c71; color: white; }
        .low-stock-row { background: #fff3cd; }
        .search-box { margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        input, select { padding: 6px; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #0a7c71; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        .btn-adjust { background: #17a2b8; }
        .btn-transfer { background: #6c757d; }
        .tab { overflow: hidden; border-bottom: 1px solid #ccc; margin: 20px 0; }
        .tab button { background: #f1f1f1; float: left; border: none; outline: none; cursor: pointer; padding: 8px 16px; margin-right: 5px; }
        .tab button.active { background: #0a7c71; color: white; }
        .tabcontent { display: none; padding: 15px 0; }
        .form-row { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 15px; align-items: flex-end; }
        .form-group { flex: 1; min-width: 150px; }
        label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 4px; }
    </style>
    <script src="data-manager.js"></script>
</head>
<body>
<div class="container">
    <h1><i class="fas fa-boxes"></i> Stock Inventory (Integrated)</h1>
    <div class="stats" id="stats"></div>
    
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search by Name, SKU..." style="width: 250px;">
        <button onclick="displayInventory()"><i class="fas fa-search"></i> Search</button>
        <button onclick="importFromCSV()" id="importBtn" style="background:#6c757d;"><i class="fas fa-file-csv"></i> Import from prices.csv</button>
        <button onclick="window.location.href='product-master.html'"><i class="fas fa-plus"></i> Add Product</button>
    </div>

    <div class="tab">
        <button class="tablinks active" onclick="openTab(event, 'View')">View Stock</button>
        <button class="tablinks" onclick="openTab(event, 'Adjust')">Stock Adjustment</button>
        <button class="tablinks" onclick="openTab(event, 'Transfer')">Stock Transfer</button>
        <button class="tablinks" onclick="openTab(event, 'Log')">Movement Log</button>
    </div>

    <!-- View Stock Tab -->
    <div id="View" class="tabcontent" style="display:block;">
        <div id="inventoryTable"></div>
    </div>

    <!-- Adjustment Tab -->
    <div id="Adjust" class="tabcontent">
        <div class="form-row">
            <div class="form-group"><label>Product</label><select id="adjProduct"><option value="">-- Select --</option></select></div>
            <div class="form-group"><label>Type</label><select id="adjType"><option value="add">Add (+)</option><option value="remove">Remove (-)</option></select></div>
            <div class="form-group"><label>Quantity</label><input type="number" id="adjQty" step="1" value="0"></div>
            <div class="form-group"><label>Reason</label><input type="text" id="adjReason" placeholder="e.g., Physical count"></div>
        </div>
        <button onclick="adjustStock()"><i class="fas fa-check"></i> Apply Adjustment</button>
    </div>

    <!-- Transfer Tab -->
    <div id="Transfer" class="tabcontent">
        <div class="form-row">
            <div class="form-group"><label>Product</label><select id="transProduct"><option value="">-- Select --</option></select></div>
            <div class="form-group"><label>From Location</label><input type="text" id="fromLocation" placeholder="e.g., Main Warehouse"></div>
            <div class="form-group"><label>To Location</label><input type="text" id="toLocation" placeholder="e.g., Showroom"></div>
            <div class="form-group"><label>Quantity</label><input type="number" id="transQty" step="1" value="0"></div>
        </div>
        <button onclick="transferStock()"><i class="fas fa-exchange-alt"></i> Transfer Stock</button>
        <p style="margin-top:10px; font-size:12px; color:#6c757d;">Note: Transfer does not change total stock, only records movement.</p>
    </div>

    <!-- Log Tab -->
    <div id="Log" class="tabcontent">
        <div id="transactionLog"></div>
    </div>

    <div id="resultMsg" style="margin-top:20px; padding:10px; border-radius:6px;"></div>
</div>

<script>
    let allProducts = [];

    function loadData() {
        allProducts = getProducts();
        displayInventory();
        populateProductSelects();
        displayTransactionLog();
    }

    function displayInventory() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        let filtered = allProducts.filter(p => 
            p.name?.toLowerCase().includes(searchTerm) || 
            p.sku?.toLowerCase().includes(searchTerm)
        );
        let totalValue = filtered.reduce((sum, p) => sum + ((p.currentStock||0) * (p.price||0)), 0);
        let lowStockCount = filtered.filter(p => (p.currentStock||0) <= (p.reorderLevel||0)).length;
        document.getElementById('stats').innerHTML = `
            <div class="stat-card"><h3>Total Products</h3><div class="number">${filtered.length}</div></div>
            <div class="stat-card"><h3>Low Stock (≤ Reorder)</h3><div class="number">${lowStockCount}</div></div>
            <div class="stat-card"><h3>Total Stock Units</h3><div class="number">${filtered.reduce((s,p)=>s+(p.currentStock||0),0)}</div></div>
            <div class="stat-card"><h3>Total Stock Value</h3><div class="number">₹${totalValue.toLocaleString()}</div></div>
        `;
        let html = '<table><thead><tr><th>SKU</th><th>Product Name</th><th>Current Stock</th><th>Unit</th><th>Reorder Level</th><th>Price (₹)</th><th>Actions</th></tr></thead><tbody>';
        filtered.forEach(p => {
            const isLow = (p.currentStock||0) <= (p.reorderLevel||0);
            html += `<tr class="${isLow ? 'low-stock-row' : ''}">
                <td>${escapeHtml(p.sku)}</td>
                <td>${escapeHtml(p.name)}</td>
                <td><strong>${p.currentStock || 0}</strong></td>
                <td>${escapeHtml(p.unit)}</td>
                <td>${p.reorderLevel || 0}</td>
                <td>₹${(p.price||0).toFixed(2)}</td>
                <td>
                    <button class="btn-adjust" onclick="quickAdjust('${p.id}')"><i class="fas fa-edit"></i> Adjust</button>
                </td>
            </tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('inventoryTable').innerHTML = html || '<p>No products. Use "Import from CSV" or add products in Product Master.</p>';
    }

    function populateProductSelects() {
        const adjSelect = document.getElementById('adjProduct');
        const transSelect = document.getElementById('transProduct');
        adjSelect.innerHTML = '<option value="">-- Select --</option>';
        transSelect.innerHTML = '<option value="">-- Select --</option>';
        allProducts.forEach(p => {
            adjSelect.innerHTML += `<option value="${p.id}">${p.name} (${p.sku}) - Stock: ${p.currentStock}</option>`;
            transSelect.innerHTML += `<option value="${p.id}">${p.name} (${p.sku}) - Stock: ${p.currentStock}</option>`;
        });
    }

    function adjustStock() {
        const productId = document.getElementById('adjProduct').value;
        if (!productId) { showMessage('Select a product', 'error'); return; }
        const type = document.getElementById('adjType').value;
        let qty = parseInt(document.getElementById('adjQty').value);
        if (isNaN(qty) || qty <= 0) { showMessage('Enter valid positive quantity', 'error'); return; }
        const reason = document.getElementById('adjReason').value.trim() || 'Manual adjustment';
        if (type === 'remove') qty = -qty;

        let products = getProducts();
        let product = products.find(p => p.id == productId);
        if (!product) { showMessage('Product not found', 'error'); return; }
        let oldStock = product.currentStock;
        let newStock = oldStock + qty;
        if (newStock < 0) { showMessage('Stock cannot be negative', 'error'); return; }
        product.currentStock = newStock;
        saveProducts(products);

        let invTransactions = getInventoryTransactions();
        invTransactions.push({
            id: Date.now(),
            productId: parseInt(productId),
            type: 'adjustment',
            quantity: qty,
            date: new Date().toISOString(),
            ref: reason,
            balanceAfter: newStock
        });
        saveInventoryTransactions(invTransactions);
        showMessage(`Stock adjusted: ${product.name} from ${oldStock} to ${newStock}`, 'success');
        loadData(); // refresh all
        document.getElementById('adjQty').value = '';
        document.getElementById('adjReason').value = '';
    }

    function quickAdjust(productId) {
        const product = allProducts.find(p => p.id == productId);
        if (product) {
            document.getElementById('adjProduct').value = productId;
            document.querySelector('.tablinks[onclick*="Adjust"]').click();
            document.getElementById('adjQty').focus();
        }
    }

    function transferStock() {
        const productId = document.getElementById('transProduct').value;
        if (!productId) { showMessage('Select a product', 'error'); return; }
        const fromLoc = document.getElementById('fromLocation').value.trim();
        const toLoc = document.getElementById('toLocation').value.trim();
        if (!fromLoc || !toLoc) { showMessage('Enter both locations', 'error'); return; }
        let qty = parseInt(document.getElementById('transQty').value);
        if (isNaN(qty) || qty <= 0) { showMessage('Enter valid positive quantity', 'error'); return; }

        let products = getProducts();
        let product = products.find(p => p.id == productId);
        if (!product) { showMessage('Product not found', 'error'); return; }
        if (product.currentStock < qty) { showMessage(`Insufficient stock: only ${product.currentStock} available`, 'error'); return; }

        let invTransactions = getInventoryTransactions();
        invTransactions.push({
            id: Date.now(),
            productId: parseInt(productId),
            type: 'transfer',
            quantity: -qty,
            date: new Date().toISOString(),
            ref: `Transfer ${qty} from ${fromLoc} to ${toLoc}`,
            balanceAfter: product.currentStock,
            fromLocation: fromLoc,
            toLocation: toLoc
        });
        saveInventoryTransactions(invTransactions);
        showMessage(`Stock transfer recorded: ${qty} x ${product.name} from ${fromLoc} → ${toLoc}`, 'success');
        document.getElementById('transQty').value = '';
        displayTransactionLog();
    }

    function displayTransactionLog() {
        const transactions = getInventoryTransactions();
        if (transactions.length === 0) { document.getElementById('transactionLog').innerHTML = '<p>No transactions yet.</p>'; return; }
        let html = '<table><thead><tr><th>Date</th><th>Product</th><th>Type</th><th>Quantity</th><th>Reference</th><th>Balance After</th></tr></thead><tbody>';
        const products = getProducts();
        transactions.slice(-30).reverse().forEach(t => {
            const product = products.find(p => p.id == t.productId);
            const productName = product ? product.name : t.productId;
            html += `<tr>
                <td>${new Date(t.date).toLocaleDateString()}</td>
                <td>${escapeHtml(productName)}</td>
                <td>${t.type}</td>
                <td>${t.quantity}</td>
                <td>${escapeHtml(t.ref || '-')}</td>
                <td>${t.balanceAfter}</td>
            </tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('transactionLog').innerHTML = html;
    }

    async function importFromCSV() {
        try {
            const response = await fetch('prices.csv');
            const csvText = await response.text();
            const lines = csvText.split('\n');
            const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
            const partIdx = headers.indexOf('part');
            const descIdx = headers.indexOf('desc') !== -1 ? headers.indexOf('desc') : headers.indexOf('description');
            const stockIdx = headers.indexOf('stock');
            const priceIdx = headers.indexOf('price');
            
            let products = getProducts();
            let importedCount = 0;
            for (let i = 1; i < lines.length; i++) {
                const cols = lines[i].split(',');
                if (cols.length < 2) continue;
                const part = cols[partIdx]?.trim();
                if (!part) continue;
                const desc = descIdx !== -1 ? cols[descIdx]?.trim() || '' : '';
                const initialStock = stockIdx !== -1 ? parseInt(cols[stockIdx]) || 0 : 0;
                const price = priceIdx !== -1 ? parseFloat(cols[priceIdx]) || 0 : 0;
                
                // Check if product already exists by sku (use part as sku)
                const existing = products.find(p => p.sku === part);
                if (!existing) {
                    products.push({
                        id: Date.now() + Math.random(),
                        name: desc || part,
                        sku: part,
                        unit: 'pc',
                        price: price,
                        currentStock: initialStock,
                        reorderLevel: 10,
                        createdAt: new Date().toISOString()
                    });
                    importedCount++;
                } else {
                    // Optionally update current stock from CSV if you want to sync
                    // existing.currentStock = initialStock;
                }
            }
            saveProducts(products);
            showMessage(`Imported ${importedCount} new products from CSV.`, 'success');
            loadData();
        } catch(err) {
            showMessage('Error importing CSV: ' + err.message, 'error');
        }
    }

    function showMessage(msg, type) {
        const div = document.getElementById('resultMsg');
        div.innerHTML = msg;
        div.style.backgroundColor = type === 'error' ? '#f8d7da' : '#d1e7dd';
        div.style.color = type === 'error' ? '#721c24' : '#0a7c71';
        setTimeout(() => div.innerHTML = '', 4000);
    }

    function openTab(evt, tabName) {
        document.querySelectorAll('.tabcontent').forEach(div => div.style.display = 'none');
        document.querySelectorAll('.tablinks').forEach(btn => btn.classList.remove('active'));
        document.getElementById(tabName).style.display = 'block';
        evt.currentTarget.classList.add('active');
        if (tabName === 'Log') displayTransactionLog();
        else if (tabName === 'Adjust') populateProductSelects();
        else if (tabName === 'Transfer') populateProductSelects();
    }

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }

    loadData();
</script>
</body>
    </html>
