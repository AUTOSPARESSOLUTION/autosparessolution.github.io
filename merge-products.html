<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merge Products – Auto Spares</title>
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: #e9ecef;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 { color: #0a7c71; margin-bottom: 20px; }
        button {
            background: #0a7c71;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin: 20px 0;
        }
        button:hover { background: #09645a; }
        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            display: none;
        }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        pre {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 6px;
            text-align: left;
            font-size: 12px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🔄 Merge Duplicate Products</h1>
    <p>This tool will merge product records that have the same SKU (part number) but different IDs. Stock quantities will be combined.</p>
    <p><strong>⚠️ Warning:</strong> Please ensure you have a backup of your data before running this script.</p>
    <button onclick="mergeProducts()">Run Merge Script</button>
    <div id="result" class="message"></div>
    <div id="details" style="margin-top: 20px; display: none;">
        <pre id="detailsPre"></pre>
    </div>
</div>

<script>
    function mergeProducts() {
        const resultDiv = document.getElementById('result');
        const detailsDiv = document.getElementById('details');
        const detailsPre = document.getElementById('detailsPre');
        
        try {
            // Read current products
            let products = JSON.parse(localStorage.getItem('products') || '[]');
            const originalCount = products.length;
            
            // Merge by SKU (use sku field, fallback to id)
            let merged = new Map();
            products.forEach(p => {
                let sku = p.sku || p.id;
                if (!sku) return;
                if (!merged.has(sku)) {
                    // Create a copy of the first product, but reset currentStock to 0
                    let base = { ...p, currentStock: 0 };
                    merged.set(sku, base);
                }
                let existing = merged.get(sku);
                existing.currentStock += (p.currentStock || 0);
                // Keep the first non‑empty name and price
                if (!existing.name && p.name) existing.name = p.name;
                if (!existing.price && p.price) existing.price = p.price;
                // Keep the earliest createdAt
                if (p.createdAt && (!existing.createdAt || p.createdAt < existing.createdAt)) existing.createdAt = p.createdAt;
            });
            
            let mergedProducts = Array.from(merged.values());
            localStorage.setItem('products', JSON.stringify(mergedProducts));
            
            // Show success message
            resultDiv.className = 'message success';
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = `✅ Merge successful!<br>Original products: ${originalCount}<br>Merged products: ${mergedProducts.length}<br><br>Page will reload in 3 seconds.`;
            
            // Show detailed changes
            detailsPre.innerHTML = `Before:\n${JSON.stringify(products.slice(0,5), null, 2)}${products.length > 5 ? '\n...' : ''}\n\nAfter:\n${JSON.stringify(mergedProducts.slice(0,5), null, 2)}${mergedProducts.length > 5 ? '\n...' : ''}`;
            detailsDiv.style.display = 'block';
            
            // Reload after 3 seconds to refresh all pages
            setTimeout(() => {
                location.reload();
            }, 3000);
        } catch (err) {
            resultDiv.className = 'message error';
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = `❌ Error: ${err.message}`;
        }
    }
</script>
</body>
</html>
